<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Let's Go 2 - English Learning App</title>
<style>
:root {
  --orange: #FF8C00;
  --yellow: #FFD700;
  --blue: #1E90FF;
  --green: #32CD32;
  --red: #FF4444;
  --purple: #9B59B6;
  --pink: #FF69B4;
  --teal: #20B2AA;
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --shadow: 0 4px 15px rgba(0,0,0,0.1);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); min-height: 100vh; }
/* HEADER */
.app-header {
  background: linear-gradient(135deg, #FF8C00, #FFD700);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 3px 10px rgba(255,140,0,0.4);
}
.app-logo { font-size: 1.4rem; font-weight: 900; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.header-stars { color: white; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
.star-count { background: rgba(255,255,255,0.3); border-radius: 20px; padding: 3px 10px; font-weight: bold; }
/* NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 2px solid #FFD700;
  display: flex; z-index: 100;
  box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
}
.nav-btn {
  flex: 1; padding: 8px 4px; border: none; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 0.65rem; font-weight: 600; color: #999;
  transition: all 0.2s;
}
.nav-btn.active { color: var(--orange); }
.nav-btn .nav-icon { font-size: 1.4rem; }
/* SCREENS */
.screen { display: none; padding: 16px; padding-bottom: 80px; min-height: 100vh; }
.screen.active { display: block; }
/* HOME SCREEN */
.home-banner {
  background: linear-gradient(135deg, #FF8C00, #FF6347);
  border-radius: 20px; padding: 20px; margin-bottom: 20px;
  color: white; text-align: center;
  box-shadow: 0 6px 20px rgba(255,140,0,0.3);
}
.home-banner h2 { font-size: 1.5rem; margin-bottom: 6px; }
.home-banner p { opacity: 0.9; font-size: 0.9rem; }
.progress-bar-wrap { background: rgba(255,255,255,0.3); border-radius: 10px; height: 10px; margin-top: 10px; }
.progress-bar-fill { background: white; border-radius: 10px; height: 100%; transition: width 0.5s; }
.section-title { font-size: 1.1rem; font-weight: 800; color: #333; margin: 18px 0 10px; display: flex; align-items: center; gap: 8px; }
.units-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.unit-card {
  background: white; border-radius: 16px; padding: 14px;
  box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  border-left: 5px solid var(--orange); position: relative; overflow: hidden;
}
.unit-card:hover, .unit-card:active { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
.unit-card .unit-num { font-size: 0.75rem; color: #999; font-weight: 600; }
.unit-card .unit-name { font-size: 0.95rem; font-weight: 800; color: #333; margin: 4px 0; }
.unit-card .unit-progress { font-size: 0.75rem; color: var(--orange); }
.unit-emoji { position: absolute; right: 10px; top: 10px; font-size: 1.8rem; opacity: 0.3; }
/* LESSONS */
.lesson-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.lesson-tab {
  padding: 8px 14px; border-radius: 20px; border: 2px solid #ddd;
  background: white; cursor: pointer; font-weight: 700; font-size: 0.8rem;
  white-space: nowrap; transition: all 0.2s; color: #666;
}
.lesson-tab.active { background: var(--orange); border-color: var(--orange); color: white; }
.lesson-content { display: none; }
.lesson-content.active { display: block; }
/* VOCAB CARDS */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.vocab-card {
  background: white; border-radius: 14px; padding: 14px;
  box-shadow: var(--shadow); text-align: center; cursor: pointer;
  transition: transform 0.2s; border: 3px solid transparent;
}
.vocab-card:hover { transform: scale(1.05); border-color: var(--orange); }
.vocab-emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
.vocab-word { font-size: 1rem; font-weight: 800; color: #333; }
.vocab-hint { font-size: 0.75rem; color: #999; margin-top: 4px; }
/* GRAMMAR BOX */
.grammar-box {
  background: linear-gradient(135deg, #E8F4FD, #D5E8F8);
  border-radius: 16px; padding: 16px; margin-bottom: 16px;
  border-left: 5px solid var(--blue);
}
.grammar-title { font-size: 1rem; font-weight: 800; color: var(--blue); margin-bottom: 10px; }
.grammar-pattern {
  background: white; border-radius: 10px; padding: 10px 14px;
  margin: 8px 0; font-size: 0.95rem; display: flex; gap: 8px; align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.grammar-pattern .pattern-text { flex: 1; font-family: monospace; color: #333; font-size: 0.9rem; line-height: 1.5; }
.grammar-pattern .pattern-color { color: var(--orange); font-weight: bold; }
.grammar-example { color: #555; font-size: 0.85rem; margin-top: 8px; padding: 8px 12px; background: rgba(255,255,255,0.7); border-radius: 8px; line-height: 1.5; }
/* PHONICS */
.phonics-box { background: linear-gradient(135deg, #FFF0F5, #FFE4EE); border-radius: 16px; padding: 16px; border-left: 5px solid var(--pink); }
.phonics-letter { font-size: 3rem; font-weight: 900; color: var(--pink); text-align: center; padding: 10px; }
.phonics-words { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
.phonics-word-card {
  background: white; border-radius: 12px; padding: 10px 14px; text-align: center;
  box-shadow: var(--shadow); cursor: pointer; min-width: 80px;
}
.phonics-word-card span { display: block; font-size: 0.9rem; font-weight: 700; }
.phonics-word-card .ph-highlight { color: var(--pink); }
/* CONVERSATION */
.dialog-box { margin-bottom: 16px; }
.dialog-bubble {
  display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start;
}
.dialog-bubble.right { flex-direction: row-reverse; }
.dialog-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.dialog-bubble.right .dialog-avatar { background: var(--blue); }
.bubble-text {
  background: white; border-radius: 16px; padding: 10px 14px;
  box-shadow: var(--shadow); max-width: 75%; font-size: 0.9rem; line-height: 1.4; font-weight: 600;
}
.dialog-bubble.right .bubble-text { background: var(--blue); color: white; }
/* SPEAKING */
.speak-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, var(--green), #00A86B);
  color: white; border: none; border-radius: 30px; padding: 14px 24px;
  font-size: 1rem; font-weight: 800; cursor: pointer; width: 100%;
  margin: 10px 0; transition: all 0.2s; box-shadow: 0 4px 15px rgba(50,205,50,0.4);
}
.speak-btn:active { transform: scale(0.97); }
.speak-btn.listening { background: linear-gradient(135deg, var(--red), #FF2222); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 4px 15px rgba(255,68,68,0.4); } 50% { box-shadow: 0 4px 30px rgba(255,68,68,0.8); } }
.score-display { text-align: center; padding: 16px; background: white; border-radius: 16px; box-shadow: var(--shadow); margin: 10px 0; }
.score-num { font-size: 2.5rem; font-weight: 900; color: var(--orange); }
.score-label { font-size: 0.85rem; color: #999; }
/* GAMES */
.games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.game-card {
  background: white; border-radius: 16px; padding: 16px; text-align: center;
  box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s;
  border-top: 5px solid var(--orange);
}
.game-card:hover { transform: translateY(-4px); }
.game-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
.game-name { font-size: 0.9rem; font-weight: 800; color: #333; }
.game-desc { font-size: 0.75rem; color: #999; margin-top: 4px; }
/* QUIZ GAME */
.quiz-container { max-width: 600px; margin: 0 auto; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.quiz-score { font-weight: 800; color: var(--orange); font-size: 1rem; }
.quiz-progress-bar { background: #eee; border-radius: 10px; height: 8px; margin-bottom: 16px; }
.quiz-progress-fill { background: var(--green); border-radius: 10px; height: 100%; transition: width 0.4s; }
.quiz-question {
  background: white; border-radius: 20px; padding: 24px; text-align: center;
  box-shadow: var(--shadow); margin-bottom: 16px;
}
.quiz-emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
.quiz-text { font-size: 1.1rem; font-weight: 700; color: #333; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quiz-opt {
  background: white; border: 3px solid #ddd; border-radius: 14px; padding: 14px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.quiz-opt:hover { border-color: var(--orange); background: #FFF5E6; }
.quiz-opt.correct { border-color: var(--green); background: #F0FFF0; color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: #FFF0F0; color: var(--red); }
/* MATCH GAME */
.match-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 500px; margin: 0 auto; }
.match-card {
  aspect-ratio: 1; background: var(--orange); border-radius: 12px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 1.5rem; transition: all 0.3s; color: white; font-weight: 800;
  box-shadow: var(--shadow);
}
.match-card.flipped { background: white; color: #333; border: 3px solid var(--orange); }
.match-card.matched { background: var(--green); color: white; pointer-events: none; }
/* WORD BUILD */
.word-build { padding: 10px; }
.letter-slots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
.letter-slot { width: 44px; height: 44px; border: 3px dashed #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 800; color: #333; }
.letter-slot.filled { border-color: var(--orange); background: #FFF5E6; }
.letter-choices { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
.letter-btn { width: 40px; height: 40px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.letter-btn:disabled { background: #ccc; }
/* FILL BLANKS */
.fill-sentence { font-size: 1.1rem; font-weight: 700; color: #333; text-align: center; margin: 16px 0; line-height: 1.8; }
.blank-input { display: inline-block; border: none; border-bottom: 3px solid var(--orange); width: 100px; text-align: center; font-size: 1.1rem; font-weight: 700; background: transparent; outline: none; color: var(--orange); }
.word-bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 12px 0; }
.word-chip { background: white; border: 2px solid var(--blue); border-radius: 20px; padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 0.9rem; color: var(--blue); transition: all 0.2s; }
.word-chip:hover { background: var(--blue); color: white; }
.word-chip.used { background: #eee; color: #ccc; border-color: #ccc; pointer-events: none; }
/* SNAKE & LADDER */
.board-game { position: relative; }
.board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; max-width: 350px; margin: 0 auto; }
.board-cell { aspect-ratio: 1; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; border: 2px solid #eee; position: relative; cursor: pointer; }
.board-cell.special { background: #FFF5E6; border-color: var(--orange); }
.board-player { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--red); border-radius: 50%; border: 2px solid white; z-index: 5; }
/* SING ALONG */
.song-lyrics { background: white; border-radius: 16px; padding: 20px; box-shadow: var(--shadow); line-height: 2; }
.lyric-line { font-size: 1rem; color: #555; transition: all 0.3s; padding: 3px 0; }
.lyric-line.highlight { color: var(--orange); font-weight: 800; font-size: 1.05rem; background: #FFF5E6; border-radius: 6px; padding: 3px 8px; }
/* BUTTONS */
.btn { padding: 12px 24px; border-radius: 30px; border: none; cursor: pointer; font-weight: 800; font-size: 0.95rem; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--orange), #FF6347); color: white; box-shadow: 0 4px 15px rgba(255,140,0,0.4); }
.btn-secondary { background: white; color: var(--orange); border: 2px solid var(--orange); }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
/* UTILS */
.text-center { text-align: center; }
.mt-12 { margin-top: 12px; }
.gap-row { display: flex; gap: 10px; }
.full-w { width: 100%; }
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #333; color: white; padding: 10px 20px; border-radius: 20px;
  font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.back-btn {
  background: none; border: none; cursor: pointer; font-size: 1.5rem; padding: 8px;
  color: #555; display: flex; align-items: center; gap: 6px; font-weight: 700; color: var(--orange);
}
.screen-title { font-size: 1.3rem; font-weight: 900; color: #333; margin: 10px 0 16px; }
/* REVIEW / PROGRESS */
.progress-screen {}
.progress-ring { width: 120px; height: 120px; margin: 0 auto; }
.skill-bars { margin-top: 16px; }
.skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.skill-name { width: 80px; font-size: 0.85rem; font-weight: 700; color: #555; flex-shrink: 0; }
.skill-track { flex: 1; background: #eee; border-radius: 10px; height: 12px; }
.skill-fill { height: 100%; border-radius: 10px; transition: width 0.8s; }
.badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
.badge { text-align: center; padding: 10px; background: white; border-radius: 12px; box-shadow: var(--shadow); }
.badge-icon { font-size: 2rem; display: block; }
.badge-name { font-size: 0.65rem; color: #999; margin-top: 4px; }
.badge.earned .badge-icon { filter: none; }
.badge:not(.earned) .badge-icon { filter: grayscale(1); opacity: 0.4; }
/* RESPONSIVE */
@media (min-width: 600px) {
  .units-grid { grid-template-columns: repeat(3, 1fr); }
  .games-grid { grid-template-columns: repeat(3, 1fr); }
  .match-board { grid-template-columns: repeat(4, 1fr); }
  .vocab-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 360px) {
  .units-grid { grid-template-columns: 1fr; }
  .quiz-options { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app-header">
  <div class="app-logo">🌟 Let's Go 2</div>
  <div class="header-stars">
    <span>⭐</span><span class="star-count" id="totalStars">0</span>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SCREENS -->
<div class="screen active" id="homeScreen">
  <div class="home-banner">
    <h2>Welcome to Let's Go 2! 🎉</h2>
    <p>Learn English with fun activities!</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="overallProgress" style="width:5%"></div>
    </div>
    <div style="color:rgba(255,255,255,0.8); font-size:0.8rem; margin-top:4px;">Overall Progress: <span id="progressPct">5</span>%</div>
  </div>
  <div class="section-title">📚 Choose a Unit</div>
  <div class="units-grid" id="unitsGrid"></div>
</div>

<!-- UNIT DETAIL SCREEN -->
<div class="screen" id="unitScreen">
  <button class="back-btn" onclick="showScreen('homeScreen')">← Back</button>
  <div class="screen-title" id="unitTitle"></div>
  <div class="lesson-tabs" id="lessonTabs"></div>
  <div id="lessonContents"></div>
</div>

<!-- GAMES SCREEN -->
<div class="screen" id="gamesScreen">
  <div class="screen-title">🎮 Fun Games</div>
  <div class="games-grid" id="gamesGrid"></div>
  <div id="gameArea" style="margin-top:16px;"></div>
</div>

<!-- PROGRESS SCREEN -->
<div class="screen" id="progressScreen">
  <div class="screen-title">📊 My Progress</div>
  <div class="score-display">
    <div class="score-num" id="totalScore">0</div>
    <div class="score-label">Total Stars Earned</div>
  </div>
  <div class="section-title">📈 Skills</div>
  <div class="skill-bars" id="skillBars"></div>
  <div class="section-title">🏅 Badges</div>
  <div class="badge-grid" id="badgeGrid"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showScreen('homeScreen');setActiveNav(this)">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-btn" onclick="showScreen('gamesScreen');setActiveNav(this)">
    <span class="nav-icon">🎮</span>Games
  </button>
  <button class="nav-btn" onclick="showSpeakScreen();setActiveNav(this)">
    <span class="nav-icon">🎤</span>Speak
  </button>
  <button class="nav-btn" onclick="showScreen('progressScreen');setActiveNav(this);updateProgress()">
    <span class="nav-icon">⭐</span>Progress
  </button>
</nav>

    ]}
  }
};

let appState = JSON.parse(localStorage.getItem('letsgo2_state') || '{}');

if (!appState.skillScores) appState.skillScores = { vocab:0, grammar:0, speaking:0, phonics:0, games:0 };

function showScreen(id) {

}
function setActiveNav(btn) {

}
function showToast(msg, color='#FF8C00') {

// ============ UNIT SCREEN ============
function openUnit(unitKey) {
  const unit = CURRICULUM[unitKey];
  document.getElementById('unitTitle').textContent = unit.title;
  const tabs = document.getElementById('lessonTabs');
  const contents = document.getElementById('lessonContents');
  tabs.innerHTML = '';
  contents.innerHTML = '';

  const lessons = [
    { id:'talk', label:"🗣️ Talk", build: () => buildConversation(unit) },
    { id:'vocab', label:"📝 Words", build: () => buildVocab(unit, unitKey) },
    { id:'grammar', label:"📖 Grammar", build: () => buildGrammar(unit) },
    { id:'phonics', label:"🔤 Phonics", build: () => buildPhonics(unit), skip: !unit.phonics },
    { id:'song', label:"🎵 Song", build: () => buildSong(unit), skip: !unit.song },
    { id:'quiz', label:"✏️ Quiz", build: () => buildUnitQuiz(unit, unitKey) }
  ].filter(l => !l.skip);

  lessons.forEach((l,i) => {
    const tab = document.createElement('button');
    tab.className = 'lesson-tab' + (i===0?' active':'');
    tab.textContent = l.label;
    tab.onclick = () => {
      document.querySelectorAll('.lesson-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.lesson-content').forEach(c=>c.classList.remove('active'));
      tab.classList.add('active');
      const c = document.getElementById('lc_'+l.id);
      if(c) c.classList.add('active');
    };
    tabs.appendChild(tab);

    const content = document.createElement('div');
    content.id = 'lc_'+l.id;
    content.className = 'lesson-content' + (i===0?' active':'');
    content.innerHTML = l.build();
    contents.appendChild(content);

    // Attach event listeners
    if(l.id==='vocab') attachVocabListeners(content, unit, unitKey);
    if(l.id==='phonics') attachPhonicsListeners(content, unit);
    if(l.id==='song') attachSongListeners(content, unit);
    if(l.id==='quiz') attachQuizListeners(content, unit, unitKey);
    if(l.id==='talk') attachTalkListeners(content, unit, unitKey);
  });

  showScreen('unitScreen');
}

// ============ CONVERSATION ============
function buildConversation(unit) {
  const conv = unit.conversation;
  if(!conv) return '<p>No conversation data.</p>';
  if(!conv.phrases) conv.phrases = [];
  let html = `<div class="dialog-box">`;
  if(conv.dialogs) {
    conv.dialogs.forEach(d => {
      if(d.left) html += `<div class="dialog-bubble"><div class="dialog-avatar">😊</div><div class="bubble-text">${d.left}</div></div>`;
      if(d.right) html += `<div class="dialog-bubble right"><div class="dialog-avatar">😄</div><div class="bubble-text">${d.right}</div></div>`;
    });
  }
  html += `</div>`;
  if(conv.phrases && conv.phrases.length) {
    html += `<div class="grammar-box"><div class="grammar-title">Key Phrases</div>`;
    conv.phrases.forEach(p => {
      html += `<div class="grammar-pattern"><span style="font-size:1.2rem">💬</span><span class="pattern-text">${p}</span><button class="btn btn-secondary" style="padding:6px 10px;font-size:0.75rem;" onclick="speakText('${p}')">🔊</button></div>`;
    });
    html += `</div>`;
  }
  if(conv.contraction) {
    html += `<div class="grammar-box" style="background:linear-gradient(135deg,#FFF9E0,#FFF3CC);border-color:#FFD700"><div class="grammar-title" style="color:#B8860B">💡 Contraction</div><div class="grammar-pattern">${conv.contraction}</div></div>`;
  }
  if(conv.feelings) {
    html += `<div class="grammar-box"><div class="grammar-title">Feelings</div><div class="vocab-grid">`;
    conv.feelings.forEach(f => {
      html += `<div class="vocab-card" onclick="speakText('${f.w}')"><span class="vocab-emoji">${f.emoji}</span><div class="vocab-word">${f.w}</div></div>`;
    });
    html += `</div></div>`;
  }
  html += `<button class="speak-btn" id="practiceConvBtn" style="margin-top:12px;">🎤 Practice Speaking</button>
  <div id="convSpeakArea" style="display:none;margin-top:12px;">
    <div class="grammar-box"><div class="grammar-title">Say this phrase:</div><div id="convPrompt" style="font-size:1.2rem;font-weight:800;text-align:center;padding:10px;"></div></div>
    <button class="speak-btn" id="convRecordBtn">🎤 Tap to Speak</button>
    <div class="score-display" id="convScore" style="display:none;">
      <div class="score-num" id="convScoreNum">-</div>
      <div class="score-label">Speaking Score</div>
    </div>
  </div>`;
  return html;
}

function attachTalkListeners(content, unit, unitKey) {
  const practiceBtn = content.querySelector('#practiceConvBtn');
  if(!practiceBtn) return;
  const phrases = (unit.conversation && unit.conversation.phrases) || [];
  if(!phrases.length) { practiceBtn.style.display='none'; return; }
  let phraseIdx = 0;
  let isRecording = false;

  practiceBtn.onclick = () => {
    content.querySelector('#convSpeakArea').style.display = 'block';
    const prompt = content.querySelector('#convPrompt');
    prompt.textContent = phrases[phraseIdx % phrases.length];
    speakText(phrases[phraseIdx % phrases.length]);
  };

  const recordBtn = content.querySelector('#convRecordBtn');
  if(recordBtn) {
    recordBtn.onclick = () => {
      if(isRecording) return;
      isRecording = true;
      recordBtn.classList.add('listening');
      recordBtn.textContent = '🔴 Listening...';
      const target = phrases[phraseIdx % phrases.length];
      startSpeechRecognition(target, (score, transcript) => {
        isRecording = false;
        recordBtn.classList.remove('listening');
        recordBtn.textContent = '🎤 Tap to Speak Again';
        const scoreDiv = content.querySelector('#convScore');
        const scoreNum = content.querySelector('#convScoreNum');
        scoreDiv.style.display = 'block';
        scoreNum.textContent = score + '%';
        scoreNum.style.color = score>=70?'#32CD32':score>=50?'#FF8C00':'#FF4444';
        if(score >= 60) {
          addStars(1);
          phraseIdx++;
          if(phraseIdx < phrases.length) {
            setTimeout(() => {
              const prompt = content.querySelector('#convPrompt');
              prompt.textContent = phrases[phraseIdx];
              speakText(phrases[phraseIdx]);
              scoreDiv.style.display = 'none';
              recordBtn.textContent = '🎤 Tap to Speak';
            }, 2000);
          }
        }
      });
    };
  }
}

// ============ VOCABULARY ============
function buildVocab(unit, unitKey) {
  const words = unit.vocabulary;
  if(!words) return '<p>No vocabulary.</p>';
  let html = `<div class="vocab-grid" id="vocabGrid_${unitKey}">`;
  words.forEach((w,i) => {
    html += `<div class="vocab-card" data-word="${w.word}" data-idx="${i}">
      <span class="vocab-emoji">${w.emoji}</span>
      <div class="vocab-word">${w.word}</div>
      <div class="vocab-hint">${w.hint}</div>
    </div>`;
  });
  html += `</div><div style="text-align:center;margin-top:16px;">
    <button class="btn btn-primary" onclick="this.closest('.lesson-content').querySelector('#vocabQuizArea').style.display='block'">🎯 Test Yourself</button>
  </div>
  <div id="vocabQuizArea" style="display:none;margin-top:16px;">
    <div class="quiz-container" id="vocabQuizContainer_${unitKey}"></div>
  </div>`;
  return html;
}

function attachVocabListeners(content, unit, unitKey) {
  content.querySelectorAll('.vocab-card').forEach(card => {
    card.addEventListener('click', () => {
      const word = card.dataset.word;
      speakText(word);
      card.style.transform = 'scale(1.1)';
      card.style.borderColor = '#FF8C00';
      setTimeout(() => {
        card.style.transform = '';
        card.style.borderColor = '';
      }, 500);
    });
  });
  // Build vocab quiz
  const quizContainer = content.querySelector(`#vocabQuizContainer_${unitKey}`);
  if(quizContainer) {
    buildMiniQuiz(unit.vocabulary, quizContainer);
  }
}

function buildMiniQuiz(words, container) {
  let qIdx = 0, score = 0, total = Math.min(10, words.length);
  function renderQ() {
    if(qIdx >= total) {
      container.innerHTML = `<div class="quiz-question"><span class="quiz-emoji">🎉</span><div class="quiz-text">Score: ${score}/${total}</div></div>
      <button class="btn btn-primary full-w mt-12" onclick="">Try Again</button>`;
      const pct = Math.round(score/total*100);
      if(pct>=70) addStars(2);
      return;
    }
    const correct = words[qIdx];
    const others = words.filter((_,i)=>i!==qIdx).sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [...others, correct].sort(()=>Math.random()-0.5);
    container.innerHTML = `
      <div class="quiz-header"><span>Question ${qIdx+1}/${total}</span><span class="quiz-score">⭐ ${score}</span></div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${(qIdx/total)*100}%"></div></div>
      <div class="quiz-question"><span class="quiz-emoji">${correct.emoji}</span><div class="quiz-text">What is this?</div></div>
      <div class="quiz-options">
        ${opts.map(o=>`<button class="quiz-opt" onclick="checkVocabAnswer(this,'${o.word}','${correct.word}')">${o.word}</button>`).join('')}
      </div>`;
    speakText(correct.word);
  }
  window.checkVocabAnswer = function(btn, chosen, correct) {
    document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
    if(chosen===correct) { btn.classList.add('correct'); score++; speakText('Correct!'); }
    else { btn.classList.add('wrong'); speakText('Try again!'); document.querySelectorAll('.quiz-opt').forEach(b=>{ if(b.textContent===correct) b.classList.add('correct'); }); }
    qIdx++;
    setTimeout(renderQ, 1500);
  };
  renderQ();
}

// ============ GRAMMAR ============
function buildGrammar(unit) {
  const g = unit.grammar;
  if(!g) return '<p>No grammar data.</p>';
  let html = `<div class="grammar-box"><div class="grammar-title">📖 ${g.title}</div>`;
  if(g.patterns) g.patterns.forEach(p => {
    html += `<div class="grammar-pattern">
      <div><div class="pattern-text">${p.text}</div>
      <div class="grammar-example">Example: ${p.example}</div></div>
      <button style="background:none;border:none;cursor:pointer;font-size:1.3rem;" onclick="speakText('${p.example.replace(/'/g,"\\'")}')">🔊</button>
    </div>`;
  });
  if(g.contractions) {
    html += `<div style="margin-top:12px;"><div class="grammar-title">💡 Contractions</div>`;
    g.contractions.forEach(c => html += `<div class="grammar-pattern"><span>📌</span><span class="pattern-text">${c}</span></div>`);
    html += `</div>`;
  }
  html += `</div>`;
  // Grammar exercise
  html += buildGrammarExercise(g);
  return html;
}

function buildGrammarExercise(g) {
  if(!g.patterns || !g.patterns.length) return '';
  const exercises = [
    { q:"What do you say when you meet a friend?", a:"Hi! How are you?", opts:["Hi! How are you?","Goodbye!","Yes, it is.","They're nice."] },
    { q:"How do you answer 'What's this?'", a:"It's a clock.", opts:["It's a clock.","They're clocks.","I have a clock.","Are those clocks?"] },
    { q:"How do you ask about plural objects?", a:"What are these?", opts:["What are these?","What's this?","Is this a pen?","Do you have a pen?"] },
    { q:"How do you say you cannot do something?", a:"I can't swim.", opts:["I can't swim.","I swim.","I don't swim.","Swimming!"] },
    { q:"How do you ask about someone's job?", a:"Who's she?", opts:["Who's she?","What's she?","Where's she?","How's she?"] }
  ];
  let html = `<div class="grammar-box" style="background:linear-gradient(135deg,#F0FFF4,#DCFFE4);border-color:#32CD32;margin-top:16px;">
    <div class="grammar-title" style="color:#32CD32">✏️ Practice Exercise</div>
    <div id="gramExArea">`;
  exercises.slice(0,3).forEach((ex,i) => {
    html += `<div class="grammar-pattern" style="flex-direction:column;gap:8px;">
      <div style="font-weight:700">${i+1}. ${ex.q}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${ex.opts.map(o=>`<button class="word-chip" onclick="checkGramOpt(this,'${o.replace(/'/g,"\\'")}','${ex.a.replace(/'/g,"\\'")}','gramFb${i}')">${o}</button>`).join('')}
      </div>
      <div id="gramFb${i}" style="font-size:0.85rem;margin-top:4px;"></div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}
window.checkGramOpt = function(btn, chosen, correct, fbId) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.style.pointerEvents='none');
  const fb = document.getElementById(fbId);
  if(chosen===correct) { btn.style.background='#32CD32'; btn.style.color='white'; btn.style.borderColor='#32CD32'; fb.textContent='✅ Correct!'; fb.style.color='#32CD32'; addStars(1); }
  else { btn.style.background='#FF4444'; btn.style.color='white'; btn.style.borderColor='#FF4444'; fb.textContent=`❌ Answer: ${correct}`; fb.style.color='#FF4444'; }
};

// ============ PHONICS ============
function buildPhonics(unit) {
  const p = unit.phonics;
  if(!p) return '<p>No phonics data.</p>';
  let html = `<div class="phonics-box">
    <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">`;
  if(p.letter1) {
    html += `<div style="text-align:center"><div class="phonics-letter">${p.letter1}</div>
    <div class="phonics-words">`;
    p.words1.forEach(w => {
      const highlighted = w.w.replace(new RegExp(p.letter1.charAt(0).toLowerCase(),'i'), m=>`<span class="ph-highlight">${m}</span>`);
      html += `<div class="phonics-word-card" onclick="speakText('${w.w}')"><span style="font-size:1.8rem">${w.emoji}</span><span>${highlighted}</span></div>`;
    });
    html += `</div></div>`;
  }
  if(p.letter2) {
    html += `<div style="text-align:center"><div class="phonics-letter" style="color:#1E90FF">${p.letter2}</div>
    <div class="phonics-words">`;
    p.words2.forEach(w => {
      html += `<div class="phonics-word-card" onclick="speakText('${w.w}')"><span style="font-size:1.8rem">${w.emoji}</span><span>${w.w}</span></div>`;
    });
    html += `</div></div>`;
  }
  html += `</div></div>`;
  if(p.chant) {
    html += `<div class="phonics-box" style="margin-top:12px;background:linear-gradient(135deg,#FFF0F5,#F8E8FF);border-color:#9B59B6">
    <div style="font-weight:800;color:#9B59B6;margin-bottom:8px;">🎵 ${p.chant}</div>`;
    p.chantLines.forEach(l => html += `<div style="line-height:2;font-size:0.95rem">${l}</div>`);
    html += `<button class="btn btn-primary" style="margin-top:10px;background:linear-gradient(135deg,#9B59B6,#6C3483);" onclick="speakChant(${JSON.stringify(p.chantLines)})">🔊 Hear Chant</button></div>`;
  }
  if(p.story) {
    html += `<div class="grammar-box" style="text-align:center;margin-top:12px;"><div class="grammar-title">📖 Story: ${p.story}</div>
    <p style="color:#555;font-size:0.9rem;margin-top:8px;">Read the phonics story and practice the sounds!</p>
    <button class="speak-btn" id="phonicsReadBtn" style="margin-top:10px;">🎤 Practice Phonics</button>
    <div id="phonicsPracticeArea" style="display:none;margin-top:10px;"></div></div>`;
  }
  return html;
}
function attachPhonicsListeners(content, unit) {
  const btn = content.querySelector('#phonicsReadBtn');
  if(!btn) return;
  const allWords = [...(unit.phonics.words1||[]),...(unit.phonics.words2||[])];
  let wIdx=0;
  btn.onclick = () => {
    const area = content.querySelector('#phonicsPracticeArea');
    area.style.display='block';
    if(allWords.length===0) return;
    const target = allWords[wIdx%allWords.length].w;
    area.innerHTML = `<div class="quiz-question"><span class="quiz-emoji">${allWords[wIdx%allWords.length].emoji}</span><div class="quiz-text">Say: "${target}"</div></div>
    <button class="speak-btn" id="phRecBtn">🎤 Speak Now</button>
    <div id="phScore" style="display:none;text-align:center;padding:10px;"></div>`;
    area.querySelector('#phRecBtn').onclick = function() {
      this.classList.add('listening');
      this.textContent='🔴 Listening...';
      const self=this;
      startSpeechRecognition(target,(score,transcript)=>{
        self.classList.remove('listening');
        self.textContent='🎤 Speak Now';
        area.querySelector('#phScore').style.display='block';
        area.querySelector('#phScore').innerHTML=`<span style="font-size:2rem;font-weight:900;color:${score>=70?'#32CD32':'#FF8C00'}">${score}%</span>`;
        if(score>=60){addStars(1);wIdx++;}
      });
    };
  };
}
function speakChant(lines) {
  let i=0;
  function next(){
    if(i>=lines.length) return;
    speakText(lines[i++], next);
  }
  next();
}

// ============ SONG ============
function buildSong(unit) {
  const s = unit.song;
  if(!s) return '<p>No song data.</p>';
  let html = `<div class="song-lyrics"><div style="font-weight:900;font-size:1.2rem;color:#FF8C00;margin-bottom:12px;text-align:center">🎵 ${s.title}</div>`;
  s.lines.forEach((l,i) => html += `<div class="lyric-line" id="lyric_${i}">${l}</div>`);
  html += `</div>
  <div style="display:flex;gap:10px;margin-top:12px;">
    <button class="btn btn-primary" style="flex:1" id="playSongBtn">▶️ Listen</button>
    <button class="btn btn-secondary" style="flex:1" id="singBtn">🎤 Sing Along</button>
  </div>`;
  return html;
}
function attachSongListeners(content, unit) {
  const playBtn = content.querySelector('#playSongBtn');
  const singBtn = content.querySelector('#singBtn');
  const lines = unit.song.lines;
  if(playBtn) {
    playBtn.onclick = () => {
      let i=0;
      function next(){
        if(i>0) content.querySelector(`#lyric_${i-1}`)?.classList.remove('highlight');
        if(i>=lines.length){ addStars(1); return; }
        content.querySelector(`#lyric_${i}`)?.classList.add('highlight');
        speakText(lines[i++], next);
      }
      next();
    };
  }
  if(singBtn) {
    singBtn.onclick = () => {
      let i=0;
      function next(){
        if(i>=lines.length){addStars(2);return;}
        const line=lines[i];
        content.querySelector(`#lyric_${i}`)?.classList.add('highlight');
        speakText(line, ()=>{
          startSpeechRecognition(line,(score)=>{
            content.querySelector(`#lyric_${i}`)?.classList.remove('highlight');
            i++;
            next();
          });
        });
      }
      next();
    };
  }
}

// ============ UNIT QUIZ ============
function buildUnitQuiz(unit, unitKey) {
  return `<div class="quiz-container" id="unitQuizInner_${unitKey}">
    <button class="btn btn-primary full-w" onclick="startUnitQuiz('${unitKey}')">🚀 Start Quiz</button>
    <div id="unitQuizContent_${unitKey}"></div>
  </div>`;
}
function attachQuizListeners(content, unit, unitKey) {
  window['startUnitQuiz'] = function(key) {
    const u = CURRICULUM[key];
    const container = document.getElementById(`unitQuizContent_${key}`);
    if(!container) return;
    const words = u.vocabulary || [];
    if(words.length < 4) { container.innerHTML='<p>Not enough words for quiz.</p>'; return; }
    let qIdx=0, score=0, total=Math.min(8,words.length);
    function renderQ(){
      if(qIdx>=total){
        container.innerHTML=`<div class="quiz-question"><span class="quiz-emoji">🎉</span><div class="quiz-text">Quiz Done! ${score}/${total}</div></div>
        <div class="score-display"><div class="score-num">${Math.round(score/total*100)}%</div><div class="score-label">Score</div></div>`;
        if(score>=total*0.7) { addStars(5); appState.unitProgress[key]=100; saveState(); showToast('Unit Complete! 🎉','#32CD32'); }
        return;
      }
      const correct=words[Math.floor(Math.random()*words.length)];
      const others=words.filter(w=>w.word!==correct.word).sort(()=>Math.random()-0.5).slice(0,3);
      const opts=[...others,correct].sort(()=>Math.random()-0.5);
      container.innerHTML=`
        <div class="quiz-header"><span>${qIdx+1}/${total}</span><span class="quiz-score">⭐${score}</span></div>
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${qIdx/total*100}%"></div></div>
        <div class="quiz-question"><span class="quiz-emoji">${correct.emoji}</span><div class="quiz-text">What is this?</div></div>
        <div class="quiz-options">${opts.map(o=>`<button class="quiz-opt" onclick="checkUQ(this,'${o.word.replace(/'/g,"\\'")}','${correct.word.replace(/'/g,"\\'")}',${qIdx})">${o.word}</button>`).join('')}</div>`;
      speakText(correct.word);
    }
    window.checkUQ=(btn,chosen,correct,idx)=>{
      document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
      if(chosen===correct){btn.classList.add('correct');score++;}
      else{btn.classList.add('wrong');document.querySelectorAll('.quiz-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});}
      qIdx++;
      setTimeout(renderQ,1500);
    };
    renderQ();
  };
}

// ============ SPEECH ============
function speakText(text, callback) {
  if(!window.speechSynthesis) return callback&&callback();
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.85; u.pitch=1.1;
  if(callback) u.onend=callback;
  window.speechSynthesis.speak(u);
}

function startSpeechRecognition(target, callback) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) {
    const simScore = Math.floor(Math.random()*40)+50;
    setTimeout(()=>callback(simScore,'simulated'),1500);
    return;
  }
  const rec = new SR();
  rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=(e)=>{
    const transcript=e.results[0][0].transcript.toLowerCase();
    const score=calcScore(transcript, target.toLowerCase());
    callback(score, transcript);
  };
  rec.onerror=()=>callback(30,'error');
  rec.start();
  setTimeout(()=>{try{rec.stop();}catch(e){}},5000);
}

function calcScore(spoken, target) {
  target=target.replace(/[^a-z\s]/g,'');
  spoken=spoken.replace(/[^a-z\s]/g,'');
  if(spoken===target) return 100;
  const tWords=target.split(' '), sWords=spoken.split(' ');
  let matches=0;
  tWords.forEach(tw=>{if(sWords.some(sw=>sw===tw||sw.includes(tw)||tw.includes(sw)))matches++;});
  const wordScore=matches/tWords.length*100;
  const lenRatio=Math.min(spoken.length,target.length)/Math.max(spoken.length,target.length||1)*100;
  return Math.round((wordScore*0.7+lenRatio*0.3));
}

// --- MATCH PAIRS ---
function buildMatchPairs(area) {
  const words=ALL_WORDS.sort(()=>Math.random()-0.5).slice(0,6);
  const pairs=[...words.map(w=>({type:'emoji',val:w.emoji,match:w.word})),...words.map(w=>({type:'word',val:w.word,match:w.word}))];
  pairs.sort(()=>Math.random()-0.5);
  let selected=null, matched=0, score=0;
  area.innerHTML=`<div style="font-weight:800;margin-bottom:12px;text-align:center">🎴 Match Pairs — Score: <span id="mpScore">0</span></div>
  <div class="match-board" id="mpBoard"></div>
  <div id="mpResult" style="text-align:center;margin-top:12px;"></div>`;
  const board=document.getElementById('mpBoard');
  pairs.forEach((p,i)=>{
    const c=document.createElement('div');
    c.className='match-card';
    c.dataset.idx=i;
    c.dataset.match=p.match;
    c.innerHTML=p.val;
    c.onclick=()=>{
      if(c.classList.contains('matched')) return;
      if(!selected){selected=c;c.classList.add('flipped');return;}
      if(selected===c){selected=null;c.classList.remove('flipped');return;}
      c.classList.add('flipped');
      if(selected.dataset.match===c.dataset.match && selected!==c){
        selected.classList.add('matched');c.classList.add('matched');
        matched+=2;score+=10;document.getElementById('mpScore').textContent=score;
        addStars(1);
        if(matched===pairs.length){ document.getElementById('mpResult').innerHTML=`<div class="score-display"><div class="score-num">🎉</div><div class="score-label">All matched! +5 stars!</div></div>`;addStars(5);}
        selected=null;
      } else {
        setTimeout(()=>{selected.classList.remove('flipped');c.classList.remove('flipped');selected=null;},800);
      }
    };
    board.appendChild(c);
  });
}

// --- WORD BUILD ---
function buildWordBuild(area) {
  const words=ALL_WORDS.filter(w=>w.word.length<=8&&!w.word.includes(' ')).sort(()=>Math.random()-0.5);
  let wIdx=0, built=[], score=0;
  function render(){
    const w=words[wIdx%words.length];
    const target=w.word;
    const letters=[...target].sort(()=>Math.random()-0.5);
    // add decoys
    const decoys=['x','z','q','j'].slice(0,2);
    const allLetters=[...letters,...decoys].sort(()=>Math.random()-0.5);
    built=[];
    area.innerHTML=`<div class="word-build">
      <div style="font-weight:800;text-align:center;margin-bottom:8px">🔡 Word Builder — Score: ${score}</div>
      <div style="text-align:center;font-size:3rem">${w.emoji}</div>
      <div class="letter-slots" id="wbSlots">${target.split('').map(()=>'<div class="letter-slot"></div>').join('')}</div>
      <div class="letter-choices" id="wbChoices">${allLetters.map(l=>`<button class="letter-btn" onclick="addLetter('${l}',this)">${l.toUpperCase()}</button>`).join('')}</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
        <button class="btn btn-secondary" onclick="built=[];document.querySelectorAll('.letter-slot').forEach(s=>{s.textContent='';s.classList.remove('filled');});document.querySelectorAll('.letter-btn').forEach(b=>b.disabled=false);">Clear</button>
        <button class="btn btn-primary" onclick="checkWord('${target}')">Check ✓</button>
        <button class="btn btn-secondary" onclick="wIdx++;render()">Skip</button>
      </div>
      <div id="wbFeedback" style="text-align:center;font-weight:700;margin-top:10px;font-size:1.2rem"></div>
    </div>`;
    window.addLetter=(l,btn)=>{
      if(built.length>=target.length) return;
      built.push(l);
      btn.disabled=true;
      const slots=document.querySelectorAll('.letter-slot');
      slots[built.length-1].textContent=l.toUpperCase();
      slots[built.length-1].classList.add('filled');
    };
    window.checkWord=(target)=>{
      const attempt=built.join('');
      const fb=document.getElementById('wbFeedback');
      if(attempt===target){fb.textContent='✅ Correct! Well done!';fb.style.color='#32CD32';score+=10;addStars(2);setTimeout(()=>{wIdx++;render();},1500);}
      else{fb.textContent=`❌ Try again! Hint: ${target[0]}...`;fb.style.color='#FF4444';}
    };
  }
  render();
}

      const fb=document.getElementById('tfFb');
      if(chosen===correct){fb.textContent='🎉 Correct!';fb.style.color='#32CD32';score+=10;addStars(1);}
      else{fb.textContent='❌ Wrong! Think again.';fb.style.color='#FF4444';}
      setTimeout(()=>{idx++;render();},1500);
    };
  }
  render();
}

// --- SCRAMBLE ---
function buildScramble(area) {
  const words=ALL_WORDS.filter(w=>!w.word.includes(' ') && w.word.length>=3).sort(()=>Math.random()-0.5);
  let idx=0,score=0;
  function render(){
    const w=words[idx%words.length];
    const scrambled=[...w.word].sort(()=>Math.random()-0.5).join('');
    area.innerHTML=`<div style="font-weight:800;text-align:center;margin-bottom:12px">🌀 Word Scramble — Score: ${score}</div>
    <div class="quiz-question"><span class="quiz-emoji">${w.emoji}</span>
    <div class="quiz-text">Unscramble: <span style="color:#FF8C00;font-size:1.5rem;letter-spacing:4px">${scrambled.toUpperCase()}</span></div></div>
    <input id="scrambleInput" type="text" placeholder="Type your answer..." style="width:100%;padding:14px;border:3px solid #ddd;border-radius:14px;font-size:1.1rem;margin-top:10px;outline:none;text-align:center;font-weight:700">
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-primary" style="flex:1" onclick="checkScramble('${w.word}')">Check ✓</button>
      <button class="btn btn-secondary" style="flex:1" onclick="speakText('${w.word}')">🔊 Hint</button>
    </div>
    <div id="scFb" style="text-align:center;font-weight:700;font-size:1.1rem;margin-top:10px"></div>`;
    window.checkScramble=(correct)=>{
      const inp=document.getElementById('scrambleInput');
      const fb=document.getElementById('scFb');
      if(inp.value.toLowerCase()===correct){fb.textContent='🎉 Correct!';fb.style.color='#32CD32';score+=10;addStars(2);setTimeout(()=>{idx++;render();},1500);}
      else{fb.textContent=`❌ Try again!`;fb.style.color='#FF4444';}
    };
    document.getElementById('scrambleInput').addEventListener('keyup',e=>{if(e.key==='Enter')window.checkScramble(w.word);});
  }
  render();
}

// --- LISTEN & CHOOSE ---
function buildListenChoose(area) {
  let idx=0,score=0;
  const words=ALL_WORDS.sort(()=>Math.random()-0.5);
  function render(){
    const correct=words[idx%words.length];
    const others=words.filter(w=>w.word!==correct.word).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[...others,correct].sort(()=>Math.random()-0.5);
    area.innerHTML=`<div style="font-weight:800;text-align:center;margin-bottom:12px">👂 Listen & Choose — Score: ${score}</div>
    <div class="quiz-question"><span class="quiz-emoji">🔊</span><div class="quiz-text">Listen and choose the word!</div></div>
    <button class="btn btn-primary full-w mt-12" onclick="speakText('${correct.word}')">🔊 Play Sound</button>
    <div class="quiz-options" style="margin-top:12px">
      ${opts.map(o=>`<button class="quiz-opt" onclick="checkLC(this,'${o.word}','${correct.word}')">${o.emoji} ${o.word}</button>`).join('')}
    </div>
    <div id="lcFb" style="text-align:center;font-weight:700;margin-top:10px"></div>`;
    speakText(correct.word);
    window.checkLC=(btn,chosen,correct)=>{
      document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
      const fb=document.getElementById('lcFb');
      if(chosen===correct){btn.classList.add('correct');fb.textContent='✅ Correct!';fb.style.color='#32CD32';score+=10;addStars(1);setTimeout(()=>{idx++;render();},1500);}
      else{btn.classList.add('wrong');document.querySelectorAll('.quiz-opt').forEach(b=>{if(b.textContent.includes(correct))b.classList.add('correct');});fb.textContent='❌ Try again!';fb.style.color='#FF4444';setTimeout(()=>{idx++;render();},2000);}
    };
  }
  render();
}

// --- GRAMMAR GAME ---
const GRAMMAR_QUESTIONS=[
  {q:"She ___ a teacher.",opts:["is","are","am","be"],a:"is"},
  {q:"What ___ this?",opts:["is","are","am","do"],a:"is"},
  {q:"They ___ paper clips.",opts:["are","is","am","be"],a:"are"},
  {q:"He ___ fly a kite.",opts:["can","cans","could be","is"],a:"can"},
  {q:"I ___ find my book.",opts:["can't","isn't","aren't","doesn't"],a:"can't"},
  {q:"What does ___ have?",opts:["she","they","I","we"],a:"she"},
  {q:"Does he have __ umbrella?",opts:["an","a","the","some"],a:"an"},
  {q:"___ are those? They're doors.",opts:["What","Where","Who","Which"],a:"What"},
  {q:"She ___ a peach.",opts:["wants","want","wanting","wanted"],a:"wants"},
  {q:"He's ___ a bicycle.",opts:["riding","ride","rides","rode"],a:"riding"},
  {q:"Are ___ dentists?",opts:["they","he","she","I"],a:"they"},
  {q:"It ___ six o'clock.",opts:["is","are","am","be"],a:"is"}
];
function buildGrammarGame(area) {
  let idx=0,score=0,streak=0;
  function render(){
    const q=GRAMMAR_QUESTIONS[idx%GRAMMAR_QUESTIONS.length];
    area.innerHTML=`<div style="font-weight:800;text-align:center;margin-bottom:12px">📖 Grammar Chase 🔥${streak} — Score: ${score}</div>
    <div class="quiz-question"><div class="quiz-text" style="font-size:1.3rem">${q.q}</div></div>
    <div class="quiz-options" style="margin-top:12px">
      ${q.opts.map(o=>`<button class="quiz-opt" onclick="checkGG(this,'${o}','${q.a}')">${o}</button>`).join('')}
    </div>
    <div id="ggFb" style="text-align:center;font-weight:700;margin-top:10px"></div>`;
    window.checkGG=(btn,chosen,correct)=>{
      document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
      const fb=document.getElementById('ggFb');
      if(chosen===correct){btn.classList.add('correct');score+=10+streak*2;streak++;fb.textContent=`✅ Correct! 🔥${streak} streak!`;fb.style.color='#32CD32';addStars(1);setTimeout(()=>{idx++;render();},1200);}
      else{btn.classList.add('wrong');document.querySelectorAll('.quiz-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});fb.textContent=`❌ Answer: ${correct}`;fb.style.color='#FF4444';streak=0;setTimeout(()=>{idx++;render();},1500);}
    };
  }
  render();
}

// --- SPELLING BEE ---
function buildSpellingBee(area) {
  const words=ALL_WORDS.filter(w=>!w.word.includes(' ')).sort(()=>Math.random()-0.5);
  let idx=0,score=0;
  function render(){
    const w=words[idx%words.length];
    area.innerHTML=`<div style="font-weight:800;text-align:center;margin-bottom:12px">🐝 Spelling Bee — Score: ${score}</div>
    <div class="quiz-question"><span class="quiz-emoji">${w.emoji}</span><div class="quiz-text">Listen and spell the word!</div></div>
    <button class="btn btn-primary full-w mt-12" onclick="speakText('${w.word}')">🔊 Hear the Word</button>
    <input id="spellingInput" type="text" placeholder="Type the spelling..." style="width:100%;padding:14px;border:3px solid #ddd;border-radius:14px;font-size:1.2rem;margin-top:12px;outline:none;text-align:center;font-weight:700;text-transform:lowercase">
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-primary" style="flex:1" onclick="checkSpelling('${w.word}')">Check ✓</button>
      <button class="btn btn-secondary" style="flex:1" onclick="idx++;render()">Skip ▶</button>
    </div>
    <div id="sbFb" style="text-align:center;font-weight:700;font-size:1.2rem;margin-top:10px"></div>`;
    speakText(w.word);
    window.checkSpelling=(correct)=>{
      const inp=document.getElementById('spellingInput');
      const fb=document.getElementById('sbFb');
      if(inp.value.toLowerCase()===correct){fb.textContent='🎉 Perfect spelling!';fb.style.color='#32CD32';score+=15;addStars(2);speakText('Excellent!');setTimeout(()=>{idx++;render();},1500);}
      else{fb.textContent=`❌ It's "${correct}". Try again!`;fb.style.color='#FF4444';speakText(correct);}
    };
    document.getElementById('spellingInput').addEventListener('keyup',e=>{if(e.key==='Enter')window.checkSpelling(w.word);});
  }
  render();
}

// --- SENTENCE BUILDER ---
const SENTENCE_BUILD=[
  {words:["It's","a","clock","."],scrambled:["clock","a","It's","."]},
  {words:["What","are","those","?"],scrambled:["those","are","?","What"]},
  {words:["She","can","swim","."],scrambled:["swim","She","can","."]},
  {words:["He","is","a","teacher","."],scrambled:["a","He","teacher",".","is"]},
  {words:["I","can't","find","my","book","."],scrambled:["book","find","I","my","can't","."]},
  {words:["What's","for","lunch","?"],scrambled:["lunch","for","?","What's"]},
  {words:["She","wants","a","peach","."],scrambled:["peach","wants","a","She","."]},
  {words:["He's","at","the","library","."],scrambled:["library","at","He's","the","."]}
];
function buildSentenceBuilder(area) {
  let idx=0,score=0,chosen=[];
  function render(){
    const q=SENTENCE_BUILD[idx%SENTENCE_BUILD.length];
    chosen=[];
    area.innerHTML=`<div style="font-weight:800;text-align:center;margin-bottom:12px">🧩 Sentence Builder — Score: ${score}</div>
    <div style="background:white;border-radius:14px;padding:14px;min-height:50px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:flex;flex-wrap:wrap;gap:6px;align-items:center" id="sbResult">
      <span style="color:#ccc">Build the sentence here...</span>
    </div>
    <div class="word-bank" id="sbWords">${q.scrambled.map((w,i)=>`<button class="word-chip" id="sbw${i}" onclick="addToSentence('${w}',${i})">${w}</button>`).join('')}</div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="chosen=[];document.querySelectorAll('[id^=sbw]').forEach(b=>b.classList.remove('used'));document.getElementById('sbResult').innerHTML='<span style=\\'color:#ccc\\'>Build the sentence here...</span>'">Clear</button>
      <button class="btn btn-primary" style="flex:1" onclick="checkSentence('${q.words.join(' ')}')">Check ✓</button>
    </div>
    <div id="sbFb" style="text-align:center;font-weight:700;margin-top:10px;font-size:1.1rem"></div>`;
    window.addToSentence=(word,btnIdx)=>{
      chosen.push(word);
      document.getElementById(`sbw${btnIdx}`).classList.add('used');
      const result=document.getElementById('sbResult');
      result.innerHTML=chosen.map(w=>`<span style="background:#FFF5E6;border:2px solid #FF8C00;border-radius:8px;padding:4px 10px;font-weight:700">${w}</span>`).join(' ');
    };
    window.checkSentence=(correct)=>{
      const attempt=chosen.join(' ');
      const fb=document.getElementById('sbFb');
      if(attempt===correct){fb.textContent='✅ Perfect sentence!';fb.style.color='#32CD32';score+=15;addStars(2);speakText(correct.replace('?','').replace('.',''));setTimeout(()=>{idx++;render();},2000);}
      else{fb.textContent=`❌ Try again! Correct: ${correct}`;fb.style.color='#FF4444';}
    };
  }
  render();
}

// ============ PROGRESS ============
function updateProgress() {
  document.getElementById('totalScore').textContent = appState.stars;
  const skills = [
    {name:'Vocabulary', val: Math.min(100, (appState.skillScores.vocab||0)*2), color:'#1E90FF'},
    {name:'Grammar', val: Math.min(100, (appState.skillScores.grammar||0)*3), color:'#9B59B6'},
    {name:'Speaking', val: Math.min(100, (appState.skillScores.speaking||0)*2), color:'#32CD32'},
    {name:'Phonics', val: Math.min(100, (appState.skillScores.phonics||0)*3), color:'#FF69B4'},
    {name:'Games', val: Math.min(100, appState.stars*2), color:'#FF8C00'}
  ];
  document.getElementById('skillBars').innerHTML = skills.map(s=>`
    <div class="skill-row">
      <div class="skill-name">${s.name}</div>
      <div class="skill-track"><div class="skill-fill" style="width:${s.val}%;background:${s.color}"></div></div>
      <div style="font-weight:700;width:40px;text-align:right;font-size:0.85rem;color:#555">${s.val}%</div>
    </div>`).join('');
  const stars=appState.stars;
  const badges=[
    {icon:'⭐',name:'First Star',earned:stars>=1},
    {icon:'🏅',name:'10 Stars',earned:stars>=10},
    {icon:'🥇',name:'50 Stars',earned:stars>=50},
    {icon:'👑',name:'100 Stars',earned:stars>=100},
    {icon:'🌟',name:'Speaker',earned:(appState.skillScores.speaking||0)>=10},
    {icon:'📚',name:'Reader',earned:false},
    {icon:'🎯',name:'Quiz Pro',earned:stars>=30},
    {icon:'🎮',name:'Gamer',earned:stars>=20}
  ];
  document.getElementById('badgeGrid').innerHTML = badges.map(b=>`
    <div class="badge ${b.earned?'earned':''}">
      <span class="badge-icon">${b.icon}</span>
      <div class="badge-name">${b.name}</div>
    </div>`).join('');
}

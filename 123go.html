<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Say The Word On Beat - TikTok Synced Fix</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            color: #ff007f;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            text-align: center;
        }

        .info {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 5px;
            color: #00ffff;
        }

        .pattern-info {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-align: center;
            min-height: 35px;
            width: 100%;
            word-wrap: break-word;
        }

        /* Lưới tự động thích ứng với kích thước màn hình, chống tràn chữ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            max-width: 650px;
            width: 100%;
        }

        /* Chuyển thành lưới 2 cột khi chạy trên điện thoại di động nhỏ */
        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .word-box {
            background-color: #1f1f1f;
            border: 3px solid #333;
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
            transition: all 0.04s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            min-width: 0; 
        }

        /* Kích thước ảnh Vector co giãn linh hoạt */
        .word-box .svg-icon {
            width: clamp(40px, 10vw, 55px);
            height: clamp(40px, 10vw, 55px);
            opacity: 0.25; 
            transition: all 0.04s ease-in-out;
        }

        /* Chữ tự động thu nhỏ dựa trên độ rộng màn hình, không sợ bị khuất từ JELLYFISH */
        .word-box .text {
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            font-weight: bold;
            text-transform: uppercase;
            color: #555;
            transition: all 0.04s ease-in-out;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
        }

        /* HIỆU ỨNG KHI ĐÈN NHÁY THEO NHỊP CHÍNH THỨC */
        .word-box.active {
            background-color: #ff007f;
            border-color: #ffffff;
            transform: scale(1.06);
            box-shadow: 0 0 20px #ff007f;
        }

        .word-box.active .text {
            color: #ffffff;
        }
        
        .word-box.active .svg-icon {
            opacity: 1;
            transform: scale(1.1);
        }

        button {
            margin-top: 35px;
            padding: 15px 40px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: bold;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>SAY THE WORD ON BEAT!</h1>
    <div class="info">Vòng: <span id="round">1</span> | Tốc độ: Nhạc gốc TikTok</div>
    <div class="pattern-info" id="pattern-text">Bấm nút để bắt đầu thử thách</div>

    <div class="grid-container" id="grid">
        <!-- 8 ô chữ sẽ tự sinh ở đây -->
    </div>

    <button id="start-btn" onclick="toggleGame()">BẮT ĐẦU CHƠI</button>

    <!-- Tệp nhạc nền gốc chứa câu đếm thoại dạo đầu mở màn -->
    <audio id="tiktok-audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" crossorigin="anonymous"></audio>

    <script>
        // Sơ đồ vẽ hình Vector trực tiếp, sắc nét, không bị lỗi hiển thị hình ảnh
        const svgIcons = {
            JUG: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 11V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a7 7 0 0 0 14 0Z"/><path d="M18 11h2a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/></svg>`,
            JAR: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8v2H8Z"/><path d="M6 9v10a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V9c0-2-2-4-4-4H10C8 5 6 7 6 9Z"/></svg>`,
            JUICE: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2"><rect x="6" y="6" width="12" height="15" rx="2"/><path d="M12 6V3m0 0h3"/></svg>`,
            JET: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="2"><path d="M22 2 15 5 9 11 4 9 2 11l5 3 3 5 2-2-2-5 6-6Z"/></svg>`,
            JACKET: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ff00ff" stroke-width="2"><path d="M5 3h14v18H5z M5 8h14 M12 8v13 M5 3l7 5 7-5"/></svg>`,
            JAM: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ff0055" stroke-width="2"><path d="M8 4h8v3H8z M6 7h12v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7z M9 12h6"/></svg>`,
            JELLYFISH: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#00ffaa" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8h16a8 8 0 0 0-8-8z M8 10v10 M12 10v12 M16 10v10"/></svg>`,
            JELLY: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ffff00" stroke-width="2"><path d="M4 18l2-10h12l2 10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z M6 8a3 3 0 0 1 6 0 3 3 0 0 1 6 0"/></svg>`
        };

        const wordPairs = [
            { word1: { text: "JUG", icon: svgIcons.JUG }, word2: { text: "JAR", icon: svgIcons.JAR } },         
            { word1: { text: "JUICE", icon: svgIcons.JUICE }, word2: { text: "JET", icon: svgIcons.JET } },       
            { word1: { text: "JACKET", icon: svgIcons.JACKET }, word2: { text: "JAM", icon: svgIcons.JAM } },      
            { word1: { text: "JELLYFISH", icon: svgIcons.JELLYFISH }, word2: { text: "JELLY", icon: svgIcons.JELLY } }   
        ];

        // Chuỗi nhịp gõ phách cố định cho 8 ô chữ
        const sequence1 = [0, 1, 0, 1, 0, 1, 0, 1];
        const sequence2 = [0, 0, 1, 1, 0, 0, 1, 1];
        const sequence3 = [0, 0, 0, 1, 1, 1, 1, 0];

        const layouts = [
            { name: "Nhịp xen kẽ (1-2-1-2-1-2-1-2)", sequence: sequence1 },
            { name: "Nhịp đôi (1-1-2-2-1-1-2-2)", sequence: sequence2 },
            { name: "Nhịp dồn nâng cao (1-1-1-2-2-2-2-1)", sequence: sequence3 }
        ];

        let currentRound = 0;
        let activeIndex = -1; // -1 đại diện cho trạng thái chưa có ô nào sáng đèn
        let gameInterval = null;
        let isPlaying = false;
        let isFirstBeatOfRound = true; 
        
        const beatIntervalMs = 500; 

        // Độ trễ chờ Intro: Đợi chuẩn 6 giây nhạc dạo đầu chạy hết hoàn toàn mới phát đèn
        const introDelayMs = 6000; 

        const gridElement = document.getElementById("grid");
        const startBtn = document.getElementById("start-btn");
        const roundText = document.getElementById("round");
        const patternText = document.getElementById("pattern-text");
        const audioTrack = document.getElementById("tiktok-audio");

        function buildRoundLayout() {
            gridElement.innerHTML = "";
            let pairIndex = Math.floor(currentRound / layouts.length) % wordPairs.length;
            let pair = wordPairs[pairIndex];
            let layoutIndex = currentRound % layouts.length;
            let currentLayout = layouts[layoutIndex];

            for (let i = 0; i < 8; i++) {
                let wordType = currentLayout.sequence[i]; 
                let targetData = (wordType === 0) ? pair.word1 : pair.word2;

                const box = document.createElement("div");
                box.className = "word-box";
                box.id = `box-${i}`;

                const iconContainer = document.createElement("div");
                iconContainer.innerHTML = targetData.icon;

                const textDiv = document.createElement("div");
                textDiv.className = "text";
                textDiv.innerText = targetData.text;

                box.appendChild(iconContainer.firstChild);
                box.appendChild(textDiv);
                gridElement.appendChild(box);
            }
            roundText.innerText = currentRound + 1;
            patternText.innerText = `Từ: ${pair.word1.text} & ${pair.word2.text} | ${currentLayout.name}`;
        }

        function nextBeat() {
            // Tắt đèn tất cả các ô trước khi nhấp nháy ô tiếp theo
            for (let i = 0; i < 8; i++) {
                const el = document.getElementById(`box-${i}`);
                if (el) el.classList.remove("active");
            }

            if (!isFirstBeatOfRound) {
                activeIndex++;
            } else {
                isFirstBeatOfRound = false; 
            }

            if (activeIndex >= 8) {
                activeIndex = 0;
                isFirstBeatOfRound = true; 
                currentRound++;
                clearInterval(gameInterval);
 buildRoundLayout();
                gameInterval = setInterval(nextBeat, beatIntervalMs);
                return;
            }

            const currentBox = document.getElementById(`box-${activeIndex}`);
            if (currentBox) currentBox.classList.add("active");
        }

        function toggleGame() {
            if (isPlaying) {
                // Thao tác dừng game, tắt nhạc nền dứt khoát
                clearInterval(gameInterval);
                audioTrack.pause();
                audioTrack.currentTime = 0;
                startBtn.innerText = "BẮT ĐẦU CHƠI";
                startBtn.style.backgroundColor = "#00ffff";
                isPlaying = false;
                activeIndex = -1; // Trả về trạng thái đóng băng ẩn đèn
                isFirstBeatOfRound = true;
                patternText.innerText = "Bấm nút để bắt đầu thử thách";
                for (let i = 0; i < 8; i++) {
                    const el = document.getElementById(`box-${i}`);
                    if (el) el.classList.remove("active");
                }
            } else {
                // Khởi tạo trạng thái ban đầu nhưng GIỮ CHO TOÀN BỘ Ô CHỮ TẮT ĐÈN
                currentRound = 0;
                activeIndex = 0; // Đặt sẵn chỉ số ô số 1 chuẩn bị chạy sau khi hết intro
                isFirstBeatOfRound = true;
                
                // Vẽ lưới chữ ban đầu ở trạng thái mờ, KHÔNG gọi kích hoạt lớp .active
                buildRoundLayout();
                
                startBtn.innerText = "DỪNG LẠI";
                startBtn.style.backgroundColor = "#ff0000";
                isPlaying = true;

                patternText.innerText = "Chuẩn bị nhạc dạo: Ubaddada... 1... 2... 3... GO!";
                
                audioTrack.play().then(() => {
                    // ĐÓNG BĂNG HOÀN TOÀN: Đợi đúng 6.0 giây (nhạc dạo chạy xong) mới gọi lệnh kích hoạt đèn nhảy
                    setTimeout(() => {
                        if (isPlaying) {
                            // Ô số 1 chính thức sáng đèn hồng neon khi vào phách nhạc chính
                            const currentBox = document.getElementById(`box-${activeIndex}`);
                            if (currentBox) currentBox.classList.add("active");
                            
                            // Bắt đầu chu kỳ quét đèn tự động theo phách
                            gameInterval = setInterval(nextBeat, beatIntervalMs);
                        }
                    }, introDelayMs);
                }).catch(err => {
                    console.log("Audio Error:", err);
                    // Nếu lỗi âm thanh trình duyệt chặn, tự động nhảy đèn cứu cánh luôn
                    gameInterval = setInterval(nextBeat, beatIntervalMs);
                });
            }
        }

        // Vẽ giao diện lần đầu tiên lúc nạp trang
        buildRoundLayout();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Say The Word On Beat - AI Voice Edition Perfect</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            color: #ff007f;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            text-align: center;
        }

        .info {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 5px;
            color: #00ffff;
        }

        .pattern-info {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-align: center;
            min-height: 40px;
            width: 100%;
            word-wrap: break-word;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
        }

        /* Lưới tự co giãn thích ứng mọi màn hình */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            max-width: 650px;
            width: 100%;
            transition: transform 0.1s ease;
        }

        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .word-box {
            background-color: #1f1f1f;
            border: 3px solid #333;
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
            transition: all 0.04s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            min-width: 0; 
        }

        .word-box .svg-icon {
            width: clamp(40px, 10vw, 55px);
            height: clamp(40px, 10vw, 55px);
            opacity: 0.25; 
            transition: all 0.04s ease-in-out;
        }

        .word-box .text {
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            font-weight: bold;
            text-transform: uppercase;
            color: #555;
            transition: all 0.04s ease-in-out;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
        }

        /* ĐÈN CHỈ SÁNG KHI VÀO TRẬN CHÍNH THỨC */
        .word-box.active {
            background-color: #ff007f;
            border-color: #ffffff;
            transform: scale(1.08);
            box-shadow: 0 0 25px #ff007f;
        }

        .word-box.active .text {
            color: #ffffff;
        }
        
        .word-box.active .svg-icon {
            opacity: 1;
            transform: scale(1.15);
        }

        button {
            margin-top: 35px;
            padding: 15px 40px;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: bold;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>SAY THE WORD ON BEAT!</h1>
    <div class="info">Vòng: <span id="round">1</span> | Tốc độ: <span id="bpm-display">120</span> BPM</div>
    <div class="pattern-info" id="pattern-text">Bấm nút để bắt đầu thử thách</div>

    <div class="grid-container" id="grid">
        <!-- 8 ô chữ tự động sinh ở đây -->
    </div>

    <button id="start-btn" onclick="toggleGame()">BẮT ĐẦU CHƠI</button>

    <script>
        // Hệ thống vẽ hình Vector trực tiếp không lỗi ô vuông
        const svgIcons = {
            JUG: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 11V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a7 7 0 0 0 14 0Z"/><path d="M18 11h2a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/></svg>`,
            JAR: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8v2H8Z"/><path d="M6 9v10a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V9c0-2-2-4-4-4H10C8 5 6 7 6 9Z"/></svg>`,
            JUICE: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2"><rect x="6" y="6" width="12" height="15" rx="2"/><path d="M12 6V3m0 0h3"/></svg>`,
            JET: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="2"><path d="M22 2 15 5 9 11 4 9 2 11l5 3 3 5 2-2-2-5 6-6Z"/></svg>`,
            JACKET: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ff00ff" stroke-width="2"><path d="M5 3h14v18H5z M5 8h14 M12 8v13 M5 3l7 5 7-5"/></svg>`,
            JAM: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ff0055" stroke-width="2"><path d="M8 4h8v3H8z M6 7h12v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7z M9 12h6"/></svg>`,
            JELLYFISH: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#00ffaa" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8h16a8 8 0 0 0-8-8z M8 10v10 M12 10v12 M16 10v10"/></svg>`,
            JELLY: `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#ffff00" stroke-width="2"><path d="M4 18l2-10h12l2 10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z M6 8a3 3 0 0 1 6 0 3 3 0 0 1 6 0"/></svg>`
        };

        const wordPairs = [
            { word1: { text: "JUG", icon: svgIcons.JUG }, word2: { text: "JAR", icon: svgIcons.JAR } },         
            { word1: { text: "JUICE", icon: svgIcons.JUICE }, word2: { text: "JET", icon: svgIcons.JET } },       
            { word1: { text: "JACKET", icon: svgIcons.JACKET }, word2: { text: "JAM", icon: svgIcons.JAM } },      
            { word1: { text: "JELLYFISH", icon: svgIcons.JELLYFISH }, word2: { text: "JELLY", icon: svgIcons.JELLY } }   
        ];

        // ĐÃ ĐIỀN ĐỦ SỐ 100%: 0 tương ứng từ thứ 1, 1 tương ứng từ thứ 2
        const sequence1 = [0, 1, 0, 1, 0, 1, 0, 1];
        const sequence2 = [0, 0, 1, 1, 0, 0, 1, 1];
        const sequence3 = [0, 0, 0, 1, 1, 1, 1, 0];

        const layouts = [
            { name: "Nhịp xen kẽ (1-2-1-2-1-2-1-2)", sequence: sequence1 },
            { name: "Nhịp đôi (1-1-2-2-1-1-2-2)", sequence: sequence2 },
            { name: "Nhịp dồn nâng cao (1-1-1-2-2-2-2-1)", sequence: sequence3 }
        ];

        let currentRound = 0;
        let activeIndex = -1; 
        let gameInterval = null;
        let isPlaying = false;
        let isFirstBeatOfRound = true; 
        
        let bpm = 120;
        let audioCtx = null;
        let introTimeouts = []; 

        const gridElement = document.getElementById("grid");
        const startBtn = document.getElementById("start-btn");
        const roundText = document.getElementById("round");
        const bpmDisplay = document.getElementById("bpm-display");
        const patternText = document.getElementById("pattern-text");

        function buildRoundLayout() {
            gridElement.innerHTML = "";
            let pairIndex = Math.floor(currentRound / layouts.length) % wordPairs.length;
            let pair = wordPairs[pairIndex];
            let layoutIndex = currentRound % layouts.length;
            let currentLayout = layouts[layoutIndex];

            for (let i = 0; i < 8; i++) {
                let wordType = currentLayout.sequence[i]; 
                let targetData = (wordType === 0) ? pair.word1 : pair.word2;

                const box = document.createElement("div");
                box.className = "word-box";
                box.id = `box-${i}`;

                const iconContainer = document.createElement("div");
                iconContainer.innerHTML = targetData.icon;

                const textDiv = document.createElement("div");
                textDiv.className = "text";
                textDiv.innerText = targetData.text;

                box.appendChild(iconContainer.firstChild);
                box.appendChild(textDiv);
                gridElement.appendChild(box);
            }
            roundText.innerText = currentRound + 1;
            bpmDisplay.innerText = bpm;
            patternText.innerText = `Từ: ${pair.word1.text} & ${pair.word2.text} | ${currentLayout.name}`;
        }

        // Tạo tiếng gõ phách cơ học của máy đếm nhịp
        function playBeatSound(freq = 700, vol = 0.3, duration = 0.04) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration + 0.01);
            } catch (e) { console.log(e); }
        }

        // Giọng AI đọc chữ tiếng Anh dạo đầu
        function speakWord(text) {
            if (!isPlaying) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
           utterance.rate = 1.3; 
            utterance.volume = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // Chuỗi thời gian chờ phách gõ dạo đầu khớp tiếng đọc AI
        function runAIIntroCountdown(onFinished) {
            window.speechSynthesis.cancel(); 
            introTimeouts = [];
            
            const intervals = [0, 400, 800, 1200, 1800, 2300, 2800, 3300];
            const words = ["U", "ba", "da", "da", "One", "Two", "Three", "Go"];
            const freqs = [400, 450, 500, 550, 650, 650, 650, 850];

            intervals.forEach((delay, index) => {
                let t = setTimeout(() => {
                    if (!isPlaying) return;
                    
                    speakWord(words[index]);
                    playBeatSound(freqs[index], 0.4, 0.08);
                    patternText.innerText = `Chờ khởi động... ${words[index].toUpperCase()}`;

                    gridElement.style.transform = "scale(1.02)";
                    setTimeout(() => gridElement.style.transform = "scale(1)", 60);
                }, delay);
                introTimeouts.push(t);
            });

            // Đợi chuẩn phách AI đọc xong chữ Go! mới kích hoạt nhảy đèn ô chữ số 1
            let finalTimeout = setTimeout(() => {
                if (isPlaying) {
                    onFinished();
                }
            }, 3800);
            introTimeouts.push(finalTimeout);
        }

        function nextBeat() {
            for (let i = 0; i < 8; i++) {
                const el = document.getElementById(`box-${i}`);
                if (el) el.classList.remove("active");
            }

            if (!isFirstBeatOfRound) {
                activeIndex++;
            } else {
                isFirstBeatOfRound = false; 
            }

            if (activeIndex >= 8) {
                activeIndex = 0;
                isFirstBeatOfRound = true; 
                currentRound++;
                bpm += 10; 
                clearInterval(gameInterval);
                buildRoundLayout();
                
                const intervalMs = (60 / bpm) * 1000;
                gameInterval = setInterval(nextBeat, intervalMs);
                return;
            }

            const currentBox = document.getElementById(`box-${activeIndex}`);
            if (currentBox) currentBox.classList.add("active");
            
            playBeatSound(750, 0.3, 0.04); 
        }

        function toggleGame() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (isPlaying) {
                clearInterval(gameInterval);
                introTimeouts.forEach(t => clearTimeout(t)); 
                window.speechSynthesis.cancel(); 
                
                startBtn.innerText = "BẮT ĐẦU CHƠI";
                startBtn.style.backgroundColor = "#00ffff";
                isPlaying = false;
                activeIndex = -1; 
                isFirstBeatOfRound = true;
                patternText.innerText = "Bấm nút để bắt đầu thử thách";
                for (let i = 0; i < 8; i++) {
                    const el = document.getElementById(`box-${i}`);
                    if (el) el.classList.remove("active");
                }
            } else {
                currentRound = 0;
                bpm = 120; 
                activeIndex = 0; 
                isFirstBeatOfRound = true;
                isPlaying = true;
                
                buildRoundLayout();
                for (let i = 0; i < 8; i++) {
                    const el = document.getElementById(`box-${i}`);
                    if (el) el.classList.remove("active");
                }
                
                startBtn.innerText = "DỪNG LẠI";
                startBtn.style.backgroundColor = "#ff0000";

                runAIIntroCountdown(() => {
                    buildRoundLayout();
                    const currentBox = document.getElementById(`box-${activeIndex}`);
                    if (currentBox) currentBox.classList.add("active");
                    playBeatSound(750, 0.3, 0.04);

                    const intervalMs = (60 / bpm) * 1000;
                    gameInterval = setInterval(nextBeat, intervalMs);
                });
            }
        }

        buildRoundLayout();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phonics Open The Box - Wordwall Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: linear-gradient(135deg, #fad0c4 0%, #ffd1ff 100%); display: flex; justify-content: center; align-items: center; font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; }
        
        /* KHUNG CHƠI TOÀN MÀN HÌNH TỰ ĐỘNG SCALE ĐỘNG */
        #gameArea {
            width: 800px; height: 650px; position: absolute; transform-origin: center center;
            background: #ffffff; overflow: hidden; border: 8px solid #474787; border-radius: 35px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        #hud {
            width: 100%; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; font-size: 22px; font-weight: bold;
            background: #f1f2f6; padding: 12px 25px; border-radius: 25px; border: 4px solid #ced6e0; box-shadow: 0 6px 0 #ced6e0; position: relative; z-index: 10;
        }
        #scoreDisplay { color: #ff4757; font-size: 26px; font-weight: 900; }
        #timerDisplay { color: #2ed573; font-weight: 900; }

        /* LƯỚI HIỂN THỊ 9 CHIẾC HỘP QUÀ QUAN SÁT CHỮ */
        #boxGrid {
            width: 95%; height: 420px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 15px 0;
        }
        .gift-container {
            background: #ffeaa7; border: 4px solid #ffa502; border-radius: 25px; position: relative;
            box-shadow: 0 8px 0 #e69500; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; font-size: 50px;
        }
        .gift-container:active { transform: translateY(4px); box-shadow: 0 4px 0 #e69500; }
        .gift-number { position: absolute; top: 10px; left: 15px; font-size: 18px; font-weight: 900; color: #ffa502; background: rgba(255,255,255,0.6); padding: 2px 8px; border-radius: 10px; }
        .gift-container.opened { background: #ced6e0 !important; border-color: #747d8c !important; box-shadow: 0 4px 0 #57606f !important; opacity: 0.6; cursor: default; }

        /* KHU VỰC POPUP HIỂN THỊ CÂU ĐỐ KHI MỞ HỘP */
        #boxQuizPopup {
            position: absolute; top: 75px; left: 20px; width: calc(100% - 40px); height: calc(100% - 100px);
            background: #ffffff; border-radius: 30px; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; z-index: 50;
        }
        #question-display-box {
            width: 95%; background: #f1f2f6; border: 5px solid #ff4757; border-radius: 25px; padding: 15px; text-align: center; color: #2c3e50;
            font-size: 26px; font-weight: bold; min-height: 110px; box-shadow: 0 8px 0 #ff4757; display: flex; justify-content: center; align-items: center;
        }

        /* 4 NÚT ĐÁP ÁN HÌNH ẢNH TO RÕ CỦA WORDWALL */
        #options-container { width: 95%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 5px; }
        .quiz-option {
            padding: 14px 20px; font-size: 22px; font-weight: bold; color: #ffffff; border: none; border-radius: 25px; cursor: pointer; text-align: left;
            display: flex; align-items: center; gap: 15px; transition: all 0.1s;
        }
        .quiz-option:nth-child(1) { background: #ff4757; box-shadow: 0 6px 0 #ff2a3b; }
        .quiz-option:nth-child(2) { background: #1e90ff; box-shadow: 0 6px 0 #0077e6; }
        .quiz-option:nth-child(3) { background: #2ed573; box-shadow: 0 6px 0 #22bb59; }
        .quiz-option:nth-child(4) { background: #ffa502; box-shadow: 0 6px 0 #e69500; }
        .quiz-option:active { transform: translateY(3px); box-shadow: 0 3px 0 linear !important; }
        .quiz-option::before { content: attr(data-prefix); background: rgba(255, 255, 255, 0.3); padding: 2px 10px; border-radius: 10px; }

        .quiz-option.correct-choice { background: #2ed573 !important; box-shadow: 0 6px 0 #22bb59 !important; animation: bounce 0.3s infinite alternate; }
        .quiz-option.wrong-choice { background: #ff4757 !important; box-shadow: 0 6px 0 #ff2a3b !important; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }

        .flash-correct { animation: bgGreen 0.3s ease-out; }
        .flash-wrong { animation: bgRed 0.3s ease-out; }
        @keyframes bgGreen { 50% { background: #e3fcef; } }
        @keyframes bgRed { 50% { background: #ffebee; } }

        #gameOverScreen, #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #2c3e50; z-index: 100; padding: 30px; text-align: center; }
        .screen-title { font-size: 56px; color: #ff4757; margin-bottom: 20px; font-weight: 900; text-shadow: 4px 4px 0 #f1f2f6; }
        .action-btn { padding: 18px 60px; font-size: 26px; font-weight: bold; background: #2ed573; border: none; color: white; border-radius: 25px; cursor: pointer; box-shadow: 0 10px 0 #22bb59; margin-top: 25px; transition: all 0.1s; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #22bb59; }
    </style>
</head>
<body>
<div id="gameArea">
    <div id="startScreen">
        <h1 class="screen-title" style="color: #ff4757;">OPEN THE BOX! 🎁</h1>
        <p style="font-size: 26px; margin-bottom: 35px; color: #57606f; font-weight: bold;">Chọn hộp quà ngẫu nhiên, đọc chữ trên hộp và tìm hình ảnh đúng nhé! 🔍</p>
        <button class="action-btn" onclick="initGame()">Bắt Đầu Mở Hộp 🕹️</button>
    </div>
    <div id="gameOverScreen" style="display: none;">
        <h1 class="screen-title" id="endTitle">HOÀN THÀNH! 🏆</h1>
        <p style="font-size: 30px; margin-bottom: 25px; color: #57606f; font-weight: bold;">Số hộp quà bé giải mã đúng: <span id="finalScore" style="color:#2ed573; font-size:40px;">0</span> / 9</p>
        <button class="action-btn" style="background: #ffa502; box-shadow: 0 10px 0 #e69500;" onclick="location.reload()">Chơi Lượt Mới 🔄</button>
    </div>
    
    <div id="hud" style="visibility: hidden;">
        <div id="score-box">⭐ Đúng: <span id="scoreDisplay">0</span> / 9</div>
        <div id="timerDisplay">⏱️ Thời gian: 10s</div>
        <div id="livesDisplay">💖💖💖</div>
    </div>
    
    <div id="boxGrid" style="visibility: hidden;">
        <!-- Lưới 9 hộp quà Candy sinh tự động ở phần sau -->
    </div>

    <!-- Ô CỬA SỔ HIỂN THỊ CÂU ĐỐ KHI MỞ NẮP HỘP QUÀ -->
    <div id="boxQuizPopup">
        <div id="question-display-box">Loading sentence...</div>
        <div id="options-container">
            <button class="quiz-option" data-prefix="A" onclick="selectOption(0)"></button>
            <button class="quiz-option" data-prefix="B" onclick="selectOption(1)"></button>
            <button class="quiz-option" data-prefix="C" onclick="selectOption(2)"></button>
            <button class="quiz-option" data-prefix="D" onclick="selectOption(3)"></button>
        </div>
    </div>
</div>
<script>
    // ==================== KHAI BÁO CÁC PHẦN TỬ ĐIỀU KHIỂN DOM ====================
    const gameArea = document.getElementById('gameArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const questionDisplayBox = document.getElementById('question-display-box');
    const optionsContainer = document.getElementById('options-container');
    const boxGrid = document.getElementById('boxGrid');
    const timerDisplay = document.getElementById('timerDisplay');
    const boxQuizPopup = document.getElementById('boxQuizPopup');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');
    const hud = document.getElementById('hud');
    const endTitle = document.getElementById('endTitle');

    // Thuật toán co giãn thông minh giúp game phóng to căng tràn lấp kín mọi màn hình iPhone/PC
    function resizeGame() {
        const targetWidth = 800; const targetHeight = 650;
        const windowWidth = window.innerWidth; const windowHeight = window.innerHeight;
        let scaleX = windowWidth / targetWidth; let scaleY = windowHeight / targetHeight;
        gameArea.style.transform = `scale(${scaleX}, ${scaleY})`;
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();

    // ==================== KHO DỮ LIỆU TỪ VỰNG TIẾNG ANH CHUẨN CÓ MẠO TỪ ====================
    const J_WORDS = [
        { word: "juice", icon: "🧃", isSvg: false, article: "some" },
        { word: "jug", icon: "🏺", isSvg: false, article: "a" },
        { 
            word: "jar", 
            icon: `<svg viewBox="0 0 64 64" width="55" height="55"><path d="M44,16V10a2,2,0,0,0-2-2H22a2,2,0,0,0-2,2v6A12,12,0,0,0,10,28V50a6,6,0,0,0,6,6H48a6,6,0,0,0,6-6V28A12,12,0,0,0,44,16Z" fill="#e0f7fa" stroke="#485460" stroke-width="4"/><rect x="22" y="5" width="20" height="5" rx="2" fill="#485460"/><path d="M14,32H50" stroke="#485460" stroke-width="3" stroke-dasharray="4 3"/></svg>`, 
            isSvg: true, article: "a" 
        },
        { word: "jet", icon: "🛩️", isSvg: false, article: "a" },
        { word: "jacket", icon: "🧥", isSvg: false, article: "a" },
        { word: "jam", icon: "🍯", isSvg: false, article: "some" },
        { word: "jellyfish", icon: "🐙", isSvg: false, article: "a" },
        { word: "jelly", icon: "🍮", isSvg: false, article: "some" }
    ];

    const K_WORDS = [
        { word: "key", icon: "🔑", isSvg: false, article: "a" },
        { word: "kite", icon: "🪁", isSvg: false, article: "a" },
        { word: "kangaroo", icon: "🦘", isSvg: false, article: "a" },
        { word: "kitten", icon: "🐱", isSvg: false, article: "a" },
        { word: "knife", icon: "🔪", isSvg: false, article: "a" },
        { 
            word: "kettle", 
            icon: `<svg viewBox="0 0 64 64" width="55" height="55"><path d="M48,42a16,16,0,1,1-32,0c0-6,4-12,10-14V22a2,2,0,0,1,2-2h8a2,2,0,0,1,2,2v6C44,30,48,36,48,42Z" fill="#ffb74d" stroke="#485460" stroke-width="4"/><path d="M16,38L6,34v-5l10,5" fill="none" stroke="#485460" stroke-width="4" stroke-linecap="round"/><path d="M44,30c5-2,10,2,8,8" fill="none" stroke="#485460" stroke-width="4" stroke-linecap="round"/><path d="M26,13a6,6,0,0,1,12,0" fill="none" stroke="#485460" stroke-width="4"/></svg>`, 
            isSvg: true, article: "a" 
        },
        { word: "king", icon: "👑", isSvg: false, article: "a" },
        { word: "koala", icon: "🐨", isSvg: false, article: "a" }
    ];

    const L_WORDS = [
        { word: "lion", icon: "🦁", isSvg: false, article: "a" },
        { word: "lemon", icon: "🍋", isSvg: false, article: "a" },
        { word: "leaf", icon: "🍃", isSvg: false, article: "a" },
        { word: "lollipop", icon: "🍭", isSvg: false, article: "a" },
        { 
            word: "ladder", 
            icon: `<svg viewBox="0 0 64 64" width="55" height="55"><path d="M22,8V56M42,8V56" stroke="#8b5a2b" stroke-width="5" stroke-linecap="round"/><path d="M22,18H42M22,28H42M22,38H42M22,48H42" stroke="#cd853f" stroke-width="4" stroke-linecap="round"/></svg>`, 
            isSvg: true, article: "a" 
        },
        { word: "lock", icon: "🔒", isSvg: false, article: "a" },
        { word: "lips", icon: "👄", isSvg: false, article: "some" },
        { word: "lizard", icon: "🦎", isSvg: false, article: "a" }
    ];

    // CẤU HÌNH BIẾN TRẠNG THÁI HỆ THỐNG
    let score = 0; let lives = 3; let openedBoxesCount = 0;
    let currentBoxId = -1; let currentCorrectAnswerIdx = -1;
    let questionsList = []; let isBlockClick = false; let gameOver = false;
    let timerInterval = null; let timeLeft = 10; let audioCtx = null;
// ==================== HỆ THỐNG ÂM THANH (WEB AUDIO API & TTS) ====================
    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSoundTone(frequency, type, duration) {
        try {
            initAudioContext();
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }

    function speakVoice(textToSpeak, callback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US'; utterance.rate = 0.9;
            if(callback) utterance.onend = function() { callback(); };
            window.speechSynthesis.speak(utterance);
        } else if (callback) { setTimeout(callback, 2000); }
    }

    // ==================== CƠ CHẾ ĐẾM NGƯỢC THỜI GIAN (10 GIÂY/HỘP) ====================
    function startTimer() {
        clearInterval(timerInterval); timeLeft = 10;
        timerDisplay.innerText = `⏱️ Thời gian: 10.0s`;
        timerInterval = setInterval(() => {
            if (gameOver || isBlockClick) return;
            timeLeft -= 0.1;
            timerDisplay.innerText = `⏱️ Thời gian: ${Math.max(0, timeLeft).toFixed(1)}s`;
            if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeOut(); }
        }, 100);
    }

    function handleTimeOut() {
        isBlockClick = true; playSoundTone(150, 'sawtooth', 0.5); lives--; updateLivesDisplay();
        gameArea.classList.add('flash-wrong');
        
        // Đánh dấu hộp vừa mở bị sai/hết giờ
        const currentBox = document.getElementById(`gift-${currentBoxId}`);
        if(currentBox) currentBox.classList.add('opened');

        speakVoice("Time out!", function() { 
            gameArea.classList.remove('flash-wrong'); 
            closeQuizPopup();
        });
    }

    // ==================== THUẬT TOÁN TẠO CÂU HỎI & ĐÁP ÁN NHIỄU PHẲNG ====================
    function getUniqueWrongOptions(correctItem, pool1, pool2) {
        let allWords = [...pool1, ...pool2];
        let filtered = allWords.filter(item => item.word !== correctItem.word);
        let uniqueWords = [], seen = new Set();
        for (let item of filtered) {
            if (!seen.has(item.word)) { seen.add(item.word); uniqueWords.push(item); }
        }
        uniqueWords.sort(() => 0.5 - Math.random());
        return [correctItem, uniqueWords[0], uniqueWords[1], uniqueWords[2]];
    }

    function buildQuizDatabase() {
        let list = [];
        const templates = ["What is it? It is", "What can you see? I can see"];
        // Gộp tất cả kho từ vựng lại rồi lấy ngẫu nhiên 9 từ cho 9 hộp quà
        let allWords = [...J_WORDS, ...K_WORDS, ...L_WORDS].sort(() => Math.random() - 0.5);

        for(let i = 0; i < 9; i++) {
            let item = allWords[i];
            let basicTemplate = templates[Math.floor(Math.random() * templates.length)];
            let sentenceText = `${basicTemplate} ${item.article} ${item.word}.`;
            list.push({
                id: i,
                correctWord: item.word, correctItem: item, voiceText: sentenceText,
                options: getUniqueWrongOptions(item, J_WORDS, K_WORDS),
                questionText: `${basicTemplate} ${item.article} <span style="color:#ff4757; font-weight:900; text-transform:uppercase; border-bottom:4px dashed #ff4757;">${item.word}</span>.`
            });
        }
        return list;
    }

    // ==================== KHỞI CHẠY GAME VÀ TẠO 9 HỘP QUÀ ĐỘNG ====================
    function initGame() {
        initAudioContext();
        startScreen.style.display = 'none'; hud.style.visibility = 'visible'; boxGrid.style.visibility = 'visible';
        
        questionsList = buildQuizDatabase(); score = 0; lives = 3; openedBoxesCount = 0; gameOver = false;
        scoreDisplay.innerText = score; updateLivesDisplay();
        
        // Vẽ lưới 9 hộp quà Wordwall rực rỡ
        boxGrid.innerHTML = "";
        for(let i = 0; i < 9; i++) {
            boxGrid.innerHTML += `
                <div class="gift-container" id="gift-${i}" onclick="openTheBox(${i})">
                    <div class="gift-number">${i + 1}</div>
                    🎁
                </div>`;
        }
    }

    // LOGIC KHI BÉ BẤM CHỌN MỞ NẮP MỘT HỘP QUÀ
    function openTheBox(boxId) {
        if (isBlockClick || gameOver) return;
        const clickedBox = document.getElementById(`gift-${boxId}`);
        if (clickedBox.classList.contains('opened')) return; // Bỏ qua nếu hộp đã mở rồi

        currentBoxId = boxId;
        const q = questionsList.find(item => item.id === boxId);
        
        // Cấu hình popup câu hỏi chữ in hoa to rõ
        questionDisplayBox.innerHTML = q.questionText;
        
        // Xáo trộn mảng phẳng 4 đáp án hình ảnh
        let scrambledOptions = [...q.options].sort(() => 0.5 - Math.random());
        currentCorrectAnswerIdx = scrambledOptions.findIndex(item => item.word === q.correctWord);

        const buttons = document.querySelectorAll('.quiz-option');
        buttons.forEach((btn, idx) => {
            btn.className = 'quiz-option'; // Reset hiệu ứng cũ
            const opt = scrambledOptions[idx];
            let iconHtml = opt.isSvg ? opt.icon : `<span style="font-size:38px; line-height:1;">${opt.icon}</span>`;
            btn.innerHTML = `<div style="display:inline-flex; width:45px; height:45px; align-items:center; justify-content:center;">${iconHtml}</div> <span style="margin-left:5px; font-size:18px; text-transform:capitalize;">(${opt.word})</span>`;
        });

        // Bật popup, hú còi reo vui và phát âm thanh mẫu câu chữ
        boxQuizPopup.style.display = 'flex';
        playSoundTone(440, 'sine', 0.15); setTimeout(() => playSoundTone(554.37, 'sine', 0.15), 80);
        speakVoice(q.voiceText); startTimer();
    }

    // XỬ LÝ CLICK CHỌN ĐÁP ÁN TRONG POPUP HỘP QUÀ
    function selectOption(selectedIdx) {
        if (isBlockClick || gameOver) return;
        isBlockClick = true; clearInterval(timerInterval);

        const buttons = document.querySelectorAll('.quiz-option');
        const currentBox = document.getElementById(`gift-${currentBoxId}`);
        
        // Ghi nhận chiếc hộp này đã chính thức bị khui nắp công khai
        if(currentBox) {
            currentBox.classList.add('opened');
            currentBox.innerHTML = `<div class="gift-number">${currentBoxId + 1}</div>📖`; // Đổi icon sang cuốn sách đã mở
        }

        if (selectedIdx === currentCorrectAnswerIdx) {
            buttons[selectedIdx].classList.add('correct-choice'); gameArea.classList.add('flash-correct');
            score++; scoreDisplay.innerText = score;
            playSoundTone(523.25, 'sine', 0.15); setTimeout(() => playSoundTone(659.25, 'sine', 0.2), 100);
            speakVoice("Bingo!", function() { gameArea.classList.remove('flash-correct'); checkRoundProgress(); });
        } else {
            buttons[selectedIdx].classList.add('wrong-choice'); buttons[currentCorrectAnswerIdx].classList.add('correct-choice');
            gameArea.classList.add('flash-wrong'); lives--; updateLivesDisplay();
            playSoundTone(220, 'sawtooth', 0.4);
            speakVoice("Oh no!", function() { gameArea.classList.remove('flash-wrong'); checkRoundProgress(); });
        }
    }

    // ĐÓNG POPUP ĐỂ QUAY LẠI MÀN HÌNH CHỌN HỘP CHÍNH
    function checkRoundProgress() {
        openedBoxesCount++;
        setTimeout(() => {
            closeQuizPopup();
            if (lives <= 0) {
                endGame(false);
            } else if (openedBoxesCount >= 9) {
                endGame(true);
            }
        }, 1200);
    }

    function closeQuizPopup() {
        boxQuizPopup.style.display = 'none';
        isBlockClick = false;
    }

    function updateLivesDisplay() { livesDisplay.innerText = "💖".repeat(lives) + "🖤".repeat(3 - lives); }

    function endGame(isWin) {
        gameOver = true; clearInterval(timerInterval);
        hud.style.visibility = 'hidden'; boxGrid.style.visibility = 'hidden'; boxQuizPopup.style.display = 'none';
        gameOverScreen.style.display = 'flex'; finalScore.innerText = score;
        if (isWin) { endTitle.innerText = "HOÀN THÀNH! 🏆"; speakVoice("Amazing! You opened all the secret boxes!"); } 
        else { endTitle.innerText = "GAME OVER"; speakVoice("Great try! Let's play again!"); }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family &amp; Friends 4</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F4FF;--surface:#FFF;--primary:#5B6CF2;--accent:#FF6B6B;--gold:#FFD700;--green:#4CAF50;--text:#1a1a2e;--muted:#6B7280;--radius:18px;--shadow:0 4px 20px rgba(91,108,242,.15);--shadow-lg:0 8px 40px rgba(91,108,242,.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
.header{background:linear-gradient(135deg,#5B6CF2,#8B5CF6);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(91,108,242,.4);}
.header-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;letter-spacing:1px;}
.header-stars{background:rgba(255,255,255,.2);border-radius:20px;padding:6px 14px;color:#FFD700;font-weight:800;font-size:1rem;display:flex;align-items:center;gap:6px;}
.nav{display:flex;background:#fff;border-top:1px solid rgba(91,108,242,.1);position:sticky;bottom:0;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;font-size:.65rem;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.nav-btn .ni{font-size:1.4rem;margin-bottom:2px;transition:transform .2s;}
.nav-btn.active{color:var(--primary);}
.nav-btn.active .ni{transform:scale(1.2);}
.screen{display:none;min-height:calc(100vh - 120px);padding:16px;}
.screen.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* HOME */
.hero{background:linear-gradient(135deg,#5B6CF2,#8B5CF6,#EC4899);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px;color:#fff;position:relative;overflow:hidden;}
.hero::before{content:'🎓';position:absolute;font-size:8rem;right:-20px;top:-20px;opacity:.15;}
.hero h1{font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:6px;}
.hero p{opacity:.9;font-size:.95rem;}
.prog-banner{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);}
.prog-label{font-size:.8rem;color:var(--muted);margin-bottom:8px;font-weight:700;}
.prog-wrap{background:#E8ECFF;border-radius:10px;height:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#8B5CF6);border-radius:10px;transition:width .5s;}
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.uc{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;border:3px solid transparent;position:relative;overflow:hidden;}
.uc:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.uc-icon{font-size:2rem;margin-bottom:8px;}
.uc-title{font-size:.8rem;font-weight:800;margin-bottom:4px;line-height:1.2;}
.uc-num{font-size:.65rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.uc-prog{margin-top:8px;background:#E8ECFF;border-radius:6px;height:5px;}
.uc-prog-fill{height:100%;border-radius:6px;transition:width .4s;}
.stars-badge{position:absolute;top:8px;right:8px;font-size:.7rem;background:#FFF3CD;border-radius:10px;padding:2px 8px;color:#856404;font-weight:800;}
/* LESSON */
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;font-size:.9rem;font-weight:700;color:var(--primary);cursor:pointer;padding:4px 0;margin-bottom:16px;}
.lesson-hdr{border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.lesson-hdr .big-icon{font-size:3rem;}
.lesson-hdr h2{font-family:'Fredoka One',cursive;font-size:1.4rem;}
.lesson-hdr .unit-sub{opacity:.85;font-size:.85rem;margin-top:2px;}
.skill-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.skill-tabs::-webkit-scrollbar{display:none;}
.stab{flex:none;padding:8px 16px;border-radius:20px;border:2px solid var(--primary);background:none;color:var(--primary);font-weight:800;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.stab.active{background:var(--primary);color:#fff;}
.skill-content{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
/* WORDS */
.words-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
.wcard{background:var(--bg);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.wcard:hover,.wcard.speaking{border-color:var(--primary);background:#EEF0FF;}
.wcard.speaking{animation:pulse .6s infinite alternate;}
@keyframes pulse{from{border-color:transparent}to{border-color:#5B6CF2;background:#EEF0FF;}}
.w-emoji{font-size:2rem;display:block;margin-bottom:6px;}
.w-text{font-weight:800;font-size:.85rem;display:block;}
.w-vi{font-size:.7rem;color:var(--muted);display:block;margin-top:2px;}
.listen-all-btn{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:16px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
/* GRAMMAR */
.gram-box{background:linear-gradient(135deg,#EEF0FF,#F5F3FF);border-radius:12px;padding:16px;margin-bottom:16px;border-left:4px solid var(--primary);}
.gram-box h3{font-weight:800;color:var(--primary);margin-bottom:8px;font-size:.9rem;}
.gram-pattern{font-size:1rem;font-style:italic;color:var(--text);line-height:1.5;}
.qa-list{display:flex;flex-direction:column;gap:12px;}
.qa-item{background:var(--bg);border-radius:12px;padding:14px;}
.qa-q{font-weight:800;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:6px;font-size:.9rem;}
.qa-a{color:var(--text);font-size:.9rem;padding-left:24px;}
.sp-btn{background:linear-gradient(135deg,var(--green),#66BB6A);color:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:.75rem;font-weight:700;cursor:pointer;margin-left:auto;flex:none;}
/* PHONICS */
.phonics-title{font-weight:800;color:var(--primary);margin-bottom:16px;font-size:1rem;}
.phonics-chips{display:flex;flex-wrap:wrap;gap:10px;}
.pchip{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;border-radius:12px;padding:10px 18px;font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .2s;box-shadow:0 3px 10px rgba(255,107,107,.3);}
.pchip:hover{transform:scale(1.08);}
.pchip.speaking{animation:pulse .6s infinite alternate;}
/* READING */
.read-pass{background:#FFF9F0;border-radius:12px;padding:18px;font-size:.95rem;line-height:1.7;margin-bottom:16px;border:1px solid #FFE4B5;position:relative;}
.tts-btn{position:absolute;top:12px;right:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.75rem;font-weight:700;cursor:pointer;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.qopt{background:var(--bg);border:2px solid #E5E7EB;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .2s;}
.qopt.correct{background:#DCFCE7;border-color:#22C55E;color:#15803D;}
.qopt.wrong{background:#FEE2E2;border-color:#EF4444;color:#DC2626;}
/* WRITING */
.write-exs{display:flex;flex-direction:column;gap:16px;}
.write-ex{background:var(--bg);border-radius:12px;padding:16px;}
.write-ex p{font-size:.9rem;margin-bottom:10px;line-height:1.5;font-weight:700;}
.write-inp{width:100%;border:2px solid #E5E7EB;border-radius:10px;padding:10px 14px;font-size:.9rem;font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:border-color .2s;}
.write-inp:focus{border-color:var(--primary);}
.write-inp.correct{border-color:var(--green);background:#DCFCE7;}
.write-inp.wrong{border-color:#EF4444;background:#FEE2E2;}
.check-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:8px 20px;font-weight:800;cursor:pointer;margin-top:8px;font-size:.85rem;}
.score-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:12px 16px;box-shadow:var(--shadow);margin-bottom:16px;}
.score-label{font-size:.8rem;color:var(--muted);font-weight:700;}
.score-val{font-size:1.2rem;font-weight:900;color:var(--primary);}
/* SPEAKING */
.spk-unit-sel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.spk-unit-btn{background:#fff;border:2px solid var(--primary);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;font-weight:800;font-size:.78rem;}
.spk-unit-btn:hover,.spk-unit-btn.active{background:var(--primary);color:#fff;}
.spk-card{background:#fff;border-radius:var(--radius);padding:24px;text-align:center;box-shadow:var(--shadow-lg);}
.spk-phrase{font-size:1.5rem;font-weight:800;color:var(--primary);margin:20px 0;line-height:1.3;}
.spk-sub{font-size:.9rem;color:var(--muted);margin-bottom:24px;}
.spk-controls{display:flex;flex-direction:column;align-items:center;gap:12px;}
.mic-btn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#FF8E53);border:none;font-size:2rem;cursor:pointer;box-shadow:0 8px 24px rgba(255,107,107,.4);transition:all .2s;}
.mic-btn.recording{animation:rec-pulse 1s infinite;background:linear-gradient(135deg,#EF4444,#DC2626);}
@keyframes rec-pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 20px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.listen-phrase-btn{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-weight:800;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:8px;}
.score-ring{width:100px;height:100px;position:relative;margin:16px auto;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring .snum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:var(--primary);}
.phrase-nav{display:flex;gap:12px;margin-top:16px;}
.phrase-nav-btn{flex:1;background:var(--bg);border:2px solid var(--primary);border-radius:12px;padding:10px;font-weight:800;color:var(--primary);cursor:pointer;font-size:.85rem;}
/* GAMES */
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gcard{background:#fff;border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:all .2s;border:3px solid transparent;}
.gcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.g-icon{font-size:2.5rem;margin-bottom:10px;}
.g-name{font-weight:800;font-size:.85rem;margin-bottom:4px;}
.g-desc{font-size:.7rem;color:var(--muted);}
.g-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.65rem;font-weight:800;margin-top:6px;}
.badge-fun{background:#FFF3CD;color:#856404;}
.badge-hot{background:#FEE2E2;color:#DC2626;}
.badge-new{background:#DCFCE7;color:#15803D;}
/* GAME AREA */
.game-area{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.game-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.game-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--primary);}
.game-score{background:var(--bg);border-radius:10px;padding:6px 14px;font-weight:900;color:var(--primary);}
.game-exit{background:none;border:2px solid var(--accent);border-radius:10px;padding:6px 12px;color:var(--accent);font-weight:800;cursor:pointer;font-size:.8rem;}
/* FLASHCARD */
.fc-wrap{perspective:1000px;margin:0 auto;max-width:320px;}
.fc-inner{width:100%;padding-top:65%;position:relative;transition:transform .5s;transform-style:preserve-3d;}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;cursor:pointer;}
.fc-front{background:linear-gradient(135deg,#EEF0FF,#F5F3FF);border:3px solid var(--primary);}
.fc-back{background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;transform:rotateY(180deg);}
.fc-emoji{font-size:4rem;margin-bottom:12px;}
.fc-hint{font-size:.75rem;color:var(--muted);margin-top:8px;}
.fc-word{font-size:1.8rem;font-weight:900;}
.fc-meaning{font-size:1rem;opacity:.85;margin-top:6px;}
.fc-controls{display:flex;justify-content:center;gap:16px;margin-top:16px;}
.fc-btn{background:var(--bg);border:2px solid var(--primary);border-radius:12px;padding:10px 24px;font-weight:800;color:var(--primary);cursor:pointer;}
/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-col{display:flex;flex-direction:column;gap:8px;}
.mitem{background:var(--bg);border:2px solid #E5E7EB;border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;font-weight:800;font-size:.82rem;transition:all .2s;}
.mitem.selected{border-color:var(--primary);background:#EEF0FF;}
.mitem.matched{border-color:var(--green);background:#DCFCE7;color:#15803D;animation:mPop .4s ease;}
.mitem.wrongAnim{animation:shake .4s ease;}
@keyframes mPop{0%{transform:scale(.9)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* QUIZ */
.quiz-big{font-size:5rem;text-align:center;margin:16px 0;}
.quiz-q{font-size:1rem;font-weight:800;text-align:center;margin-bottom:20px;}
.quiz-opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qog{background:var(--bg);border:2px solid #E5E7EB;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;font-weight:800;font-size:.85rem;transition:all .2s;}
.qog.correct{background:#DCFCE7;border-color:#22C55E;color:#15803D;animation:mPop .3s ease;}
.qog.wrong{background:#FEE2E2;border-color:#EF4444;color:#DC2626;}
/* SPELL */
.spell-emoji{font-size:4rem;text-align:center;display:block;}
.spell-hint{text-align:center;font-size:.85rem;color:var(--muted);margin:8px 0 16px;}
.spell-slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.s-slot{width:38px;height:44px;border-bottom:3px solid var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:var(--primary);}
.letter-bank{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.ltile{width:38px;height:38px;background:var(--primary);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;cursor:pointer;transition:all .2s;user-select:none;}
.ltile.used{opacity:.3;cursor:default;}
.ltile:hover:not(.used){transform:translateY(-3px);}
.spell-actions{display:flex;gap:10px;justify-content:center;margin-top:12px;}
.spell-btn{padding:10px 20px;border-radius:10px;font-weight:800;cursor:pointer;border:none;font-size:.85rem;font-family:'Nunito',sans-serif;}
/* SENTENCE */
.sent-display{background:var(--bg);border-radius:12px;padding:16px;min-height:60px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:16px;border:2px dashed var(--primary);}
.wchip{background:var(--primary);color:#fff;border-radius:8px;padding:6px 12px;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;}
.word-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.wpool-chip{background:#fff;border:2px solid var(--primary);color:var(--primary);border-radius:8px;padding:6px 12px;font-weight:700;font-size:.85rem;cursor:pointer;}
.wpool-chip.used{opacity:.3;cursor:default;}
/* LISTEN */
.listen-play-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,var(--primary),#8B5CF6);color:#fff;border:none;border-radius:16px;padding:20px 32px;font-size:1.1rem;font-weight:900;cursor:pointer;margin:20px auto;width:80%;box-shadow:var(--shadow-lg);}
.listen-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lopt{background:var(--bg);border:2px solid #E5E7EB;border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;font-weight:700;font-size:.85rem;}
.lopt .oe{font-size:2rem;display:block;margin-bottom:6px;}
/* SCRAMBLE */
.scram-letters{font-size:2rem;font-weight:900;text-align:center;letter-spacing:8px;color:var(--accent);margin:20px 0;background:#FFF0F0;border-radius:12px;padding:16px;}
.scram-inp{width:100%;border:3px solid var(--primary);border-radius:12px;padding:12px;font-size:1.2rem;font-weight:900;text-align:center;outline:none;font-family:'Nunito',sans-serif;margin-bottom:12px;}
/* TF */
.tf-stmt{font-size:1.1rem;font-weight:800;text-align:center;margin:24px 0;padding:0 8px;line-height:1.5;}
.tf-btns{display:flex;gap:16px;justify-content:center;}
.tf-btn{flex:1;max-width:140px;padding:20px;border-radius:16px;border:none;font-size:1.1rem;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.tf-t{background:#22C55E;color:#fff;}
.tf-f{background:#EF4444;color:#fff;}
.tf-btn:hover{transform:scale(1.05);}
/* PROGRESS */
.prog-hero{background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px;color:#fff;}
.prog-hero .big-star{font-size:4rem;}
.prog-hero h2{font-family:'Fredoka One',cursive;font-size:1.6rem;margin:8px 0 4px;}
.puc{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.pu-title{font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.pu-skills{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pu-skill{background:var(--bg);border-radius:10px;padding:10px;}
.pu-sname{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.pu-sbar{background:#E5E7EB;border-radius:4px;height:6px;overflow:hidden;}
.pu-sfill{height:100%;border-radius:4px;transition:width .5s;}
.pu-spct{font-size:.75rem;font-weight:800;color:var(--primary);margin-top:4px;}
/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a2e;color:#fff;border-radius:12px;padding:12px 24px;font-weight:700;z-index:999;transition:transform .4s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:#15803D;}
.toast.error{background:#DC2626;}
.toast.star{background:#856404;}
@media(min-width:600px){.unit-grid,.games-grid{grid-template-columns:repeat(3,1fr);}.words-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}.screen{padding:20px;max-width:800px;margin:0 auto;}}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">🎓 Family &amp; Friends 4</div>
  <div class="header-stars">⭐ <span id="totalStars">0</span></div>
</div>
<div id="homeScreen" class="screen active">
  <div class="hero"><h1>Family &amp; Friends 4</h1><p>Oxford Special Edition · 12 Units + Starter</p></div>
  <div class="prog-banner"><div class="prog-label">Overall Progress</div><div class="prog-wrap"><div class="prog-fill" id="overallProg" style="width:0%"></div></div></div>
  <div class="unit-grid" id="unitGrid"></div>
</div>
<div id="lessonScreen" class="screen">
  <button class="back-btn" onclick="showHome()">← Back</button>
  <div class="lesson-hdr" id="lessonHdr">
    <div class="big-icon" id="lessonIcon">📚</div>
    <div><h2 id="lessonTitle">Unit</h2><div class="unit-sub" id="lessonSub"></div></div>
  </div>
  <div class="skill-tabs" id="skillTabs"></div>
  <div class="skill-content" id="skillContent"></div>
</div>
<div id="speakingScreen" class="screen">
  <h2 style="font-family:'Fredoka One',cursive;color:var(--primary);margin-bottom:16px;">🎤 Speaking Practice</h2>
  <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px;">Choose a unit, listen, then record yourself!</p>
  <div class="spk-unit-sel" id="spkUnitSel"></div>
  <div id="spkArea"></div>
</div>
<div id="gamesScreen" class="screen">
  <h2 style="font-family:'Fredoka One',cursive;color:var(--primary);margin-bottom:8px;">🎮 Learning Games</h2>
  <p style="font-size:.85rem;color:var(--muted);margin-bottom:16px;">Select a unit then pick your game!</p>

// SPEECH
const synth=window.speechSynthesis;
let voices=[];
synth.onvoiceschanged=()=>{voices=synth.getVoices();};
function speak(text,rate=0.85,pitch=1.1){
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=pitch;
  const ev=voices.find(v=>v.lang.startsWith('en')&&(v.name.includes('Female')||v.name.includes('Samantha')||v.name.includes('Google')));
  if(ev)u.voice=ev;
  synth.speak(u);return u;
}

function awardPts(skill,pts){
  if(!currentUnit)return;
  const p=progress[currentUnit.id];
  if((p[skill]||0)<100){

    const gain=Math.floor(pts/10);
    p.stars=(p.stars||0)+gain;totalStars+=gain;
    document.getElementById('totalStars').textContent=totalStars;

}

      <div class="score-ring"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="#E5E7EB" stroke-width="8"/><circle id="sCircle" cx="50" cy="50" r="40" fill="none" stroke="#5B6CF2" stroke-width="8" stroke-dasharray="251" stroke-dashoffset="251"/></svg><div class="snum" id="sNum">0%</div></div>
      <div id="sFeedback" style="text-align:center;font-weight:800;font-size:.9rem;color:var(--primary);margin-top:8px;"></div>
    </div>

function listenPhrase(){speak(spkUnit.speaking[spkPhraseIdx],.8);toast('🔊 Listen carefully!');}
function startRec(){
  const phrase=spkUnit.speaking[spkPhraseIdx];
  if(isRecording){if(recognition)recognition.stop();return;}
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){simScore(phrase);return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='en-US';recognition.continuous=false;recognition.interimResults=false;
  isRecording=true;
  const btn=document.getElementById('micBtn');btn.classList.add('recording');btn.textContent='⏹';
  document.getElementById('recStat').textContent='🔴 Recording... speak now!';
  recognition.onresult=e=>{
    const said=e.results[0][0].transcript.toLowerCase();
    showScore(calcScore(said,phrase.toLowerCase()),said,phrase);
    isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';
    document.getElementById('recStat').textContent='Tap mic to try again';
  };
  recognition.onerror=()=>{isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';simScore(phrase);};
  recognition.onend=()=>{if(isRecording){isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';}};
  recognition.start();setTimeout(()=>{if(isRecording&&recognition)recognition.stop();},8000);
}
function calcScore(said,target){
  const sw=said.split(/\s+/).filter(w=>w),tw=target.replace(/[.,!?]/g,'').split(/\s+/).filter(w=>w);
  if(!tw.length)return 50;
  let m=0;tw.forEach(t=>{if(sw.some(s=>s.replace(/[.,!?]/g,'')===t.replace(/[.,!?]/g,'')))m++;});
  return Math.round(m/tw.length*100);
}
function simScore(phrase){showScore(70+Math.floor(Math.random()*25),'(simulated)',phrase);}
function showScore(score,said,phrase){
  const ra=document.getElementById('scoreRingArea');ra.style.display='block';
  const offset=251-(251*score/100);
  document.getElementById('sCircle').style.strokeDashoffset=offset;
  document.getElementById('sCircle').style.stroke=score>=80?'#22C55E':score>=60?'#F59E0B':'#EF4444';
  document.getElementById('sNum').textContent=score+'%';
  const msg=score>=90?'🌟 Excellent! Perfect!':score>=80?'⭐ Great job!':score>=60?'👍 Good try!':'💪 Keep practicing!';
  document.getElementById('sFeedback').textContent=msg+(said!=='(simulated)'?'\nYou said: "'+said+'"':'');
  awardPts('speaking',Math.floor(score/10)*5);
  if(score>=80)toast('⭐ Score: '+score+'%! +'+(Math.floor(score/10)*5)+' stars','star');
  else toast('Score: '+score+'%. Try again!','',3000);
}
function prevPhrase(){if(spkPhraseIdx>0){spkPhraseIdx--;renderSpkCard();}}
function nextPhrase(){
  if(spkPhraseIdx<spkUnit.speaking.length-1){spkPhraseIdx++;renderSpkCard();}
  else{toast('🎉 All phrases done!','star');spkPhraseIdx=0;renderSpkCard();}
}

// MATCH
function initMatch(){
  const ws=curGameUnit.words.slice(0,6);
  gameState.left=ws.map((w,i)=>({id:i,text:w.emoji+' '+w.word,matched:false}));
  gameState.right=[...ws.map((w,i)=>({id:i,text:w.vi,matched:false}))].sort(()=>Math.random()-.5);
  gameState.sel={left:null,right:null};renderMatch();
}
function renderMatch(){
  document.getElementById('gContent').innerHTML=`<div class="match-grid">
    <div class="match-col">${gameState.left.map((it,i)=>`<div class="mitem ${it.matched?'matched':''} ${gameState.sel.left===i?'selected':''}" id="ml${i}" onclick="selM('left',${i})">${it.text}</div>`).join('')}</div>
    <div class="match-col">${gameState.right.map((it,i)=>`<div class="mitem ${it.matched?'matched':''} ${gameState.sel.right===i?'selected':''}" id="mr${i}" onclick="selM('right',${i})">${it.text}</div>`).join('')}</div>
  </div>`;
}
function selM(side,idx){
  const it=gameState[side==='left'?'left':'right'][idx];if(it.matched)return;
  gameState.sel[side]=idx;renderMatch();
  if(gameState.sel.left!==null&&gameState.sel.right!==null){
    const lId=gameState.left[gameState.sel.left].id,rId=gameState.right[gameState.sel.right].id;
    if(lId===rId){gameState.left[gameState.sel.left].matched=true;gameState.right[gameState.sel.right].matched=true;addScore(10);toast('✅ Matched! +10','star');}
    else{document.getElementById('ml'+gameState.sel.left)?.classList.add('wrongAnim');document.getElementById('mr'+gameState.sel.right)?.classList.add('wrongAnim');setTimeout(()=>document.querySelectorAll('.wrongAnim').forEach(el=>el.classList.remove('wrongAnim')),400);}
    gameState.sel={left:null,right:null};setTimeout(renderMatch,450);
    if(gameState.left.every(i=>i.matched)){toast('🎉 All matched!','star',3000);addScore(20);}
  }
}

// QUIZ
function initQuiz(){gameState.ws=[...curGameUnit.words].sort(()=>Math.random()-.5);gameState.qi=0;renderQuiz();}
function renderQuiz(){
  const ws=gameState.ws,c=ws[gameState.qi];
  const opts=[...ws.filter((_,i)=>i!==gameState.qi).sort(()=>Math.random()-.5).slice(0,3),c].sort(()=>Math.random()-.5);
  const ci=opts.findIndex(o=>o.word===c.word);
  document.getElementById('gContent').innerHTML=`
  <div style="text-align:center;font-size:.8rem;color:var(--muted);font-weight:700;">Q${gameState.qi+1}/${ws.length}</div>
  <div class="quiz-big">${c.emoji}</div>
  <div class="quiz-q">What is this word?</div>
  <div class="quiz-opts-grid">${opts.map((o,i)=>`<div class="qog" onclick="ansQ(this,${i},${ci})">${o.word}</div>`).join('')}</div>`;
}
function ansQ(el,i,ci){
  if(el.classList.contains('correct')||el.classList.contains('wrong'))return;
  el.parentElement.querySelectorAll('.qog').forEach((o,j)=>{if(j===ci)o.classList.add('correct');else if(j===i&&i!==ci)o.classList.add('wrong');});
  if(i===ci){addScore(10);speak('Correct!');}
  speak(gameState.ws[gameState.qi].word);
  setTimeout(()=>{gameState.qi++;if(gameState.qi>=gameState.ws.length){toast('🎉 Quiz complete!','star');gameState.qi=0;}renderQuiz();},1500);
}

// SPELL
function initSpell(){
  const ws=curGameUnit.words.filter(w=>w.word.length>=3&&!w.word.includes(' '));
  gameState.wl=ws.sort(()=>Math.random()-.5);gameState.si=0;gameState.typed=[];renderSpell();
}
function renderSpell(){
  const wo=gameState.wl[gameState.si%gameState.wl.length],w=wo.word.toLowerCase();
  const sh=w.split('').sort(()=>Math.random()-.5);
  gameState.cw=w;gameState.sh=sh;gameState.typed=[];
  document.getElementById('gContent').innerHTML=`
  <div style="text-align:center;margin-bottom:8px;font-size:.8rem;color:var(--muted);font-weight:700;">Word ${(gameState.si%gameState.wl.length)+1}/${gameState.wl.length}</div>
  <span class="spell-emoji">${wo.emoji}</span>
  <div class="spell-hint">${wo.vi}</div>
  <div class="spell-slots" id="spSlots">${w.split('').map(()=>'<div class="s-slot">_</div>').join('')}</div>
  <div class="letter-bank" id="ltBank">${sh.map((l,i)=>`<div class="ltile" id="lt${i}" onclick="addL('${l}',${i})">${l.toUpperCase()}</div>`).join('')}</div>
  <div class="spell-actions">
    <button class="spell-btn" style="background:#6B7280;color:#fff;" onclick="clrSpell()">Clear</button>
    <button class="spell-btn" style="background:var(--primary);color:#fff;" onclick="chkSpell()">Check ✓</button>
    <button class="spell-btn" style="background:var(--accent);color:#fff;" onclick="skipSpell()">Skip →</button>
  </div>`;
}
function addL(l,i){const t=document.getElementById('lt'+i);if(t.classList.contains('used'))return;t.classList.add('used');gameState.typed.push({l,i});const slots=document.getElementById('spSlots').querySelectorAll('.s-slot');const pos=gameState.typed.length-1;if(slots[pos])slots[pos].textContent=l.toUpperCase();}
function clrSpell(){renderSpell();}
function chkSpell(){const typed=gameState.typed.map(t=>t.l).join('');if(typed===gameState.cw){toast('⭐ Correct! +15','star');addScore(15);speak('Excellent!',1,1.3);gameState.si++;setTimeout(renderSpell,1000);}else toast('Try again! It is "'+gameState.cw+'"','error',2500);}
function skipSpell(){gameState.si++;renderSpell();}

// SENTENCE BUILDER
function initSent(){
  const exs=curGameUnit.grammar.examples;gameState.sents=exs.map(e=>e.a);gameState.si=0;gameState.ans=[];renderSent();
}
function renderSent(){
  const s=gameState.sents[gameState.si%gameState.sents.length];
  const ws=s.replace(/[.,!?]/g,'').split(' ').filter(w=>w);
  const sh=[...ws].sort(()=>Math.random()-.5);
  gameState.tw=ws;gameState.sw=sh;gameState.ans=[];
  document.getElementById('gContent').innerHTML=`
  <div style="font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:8px;">Put the words in the right order:</div>
  <div class="sent-display" id="sentD"><span style="color:#ccc;font-size:.85rem;">Tap words below to build the sentence</span></div>
  <div class="word-pool" id="wPool">${sh.map((w,i)=>`<div class="wpool-chip" id="wp${i}" onclick="addW('${w.replace(/'/g,"\\'")}',${i})">${w}</div>`).join('')}</div>
  <div style="display:flex;gap:10px;">
    <button class="check-btn" onclick="chkSent()">Check ✓</button>
    <button class="check-btn" style="background:#6B7280;" onclick="clrSent()">Clear</button>
    <button class="check-btn" style="background:var(--accent);" onclick="nextSent()">Next →</button>
  </div>`;
}
function addW(w,i){const c=document.getElementById('wp'+i);if(c.classList.contains('used'))return;c.classList.add('used');gameState.ans.push({w,i});const d=document.getElementById('sentD');if(d.querySelector('span'))d.innerHTML='';d.innerHTML+=`<div class="wchip" onclick="rmW(${gameState.ans.length-1})">${w}</div>`;}
function rmW(i){const it=gameState.ans[i];document.getElementById('wp'+it.i)?.classList.remove('used');gameState.ans.splice(i,1);const d=document.getElementById('sentD');d.innerHTML=gameState.ans.length?gameState.ans.map((a,j)=>`<div class="wchip" onclick="rmW(${j})">${a.w}</div>`).join(''):'<span style="color:#ccc;font-size:.85rem;">Tap words below</span>';}
function chkSent(){const typed=gameState.ans.map(a=>a.w).join(' ');if(typed.toLowerCase()===gameState.tw.join(' ').toLowerCase()){toast('🎉 Perfect! +20','star');addScore(20);speak('Well done!');nextSent();}else toast('Check the order!','error',2500);}
function clrSent(){gameState.ans=[];renderSent();}
function nextSent(){gameState.si++;renderSent();}

// LISTEN & CHOOSE
function initListen(){gameState.ws=[...curGameUnit.words].sort(()=>Math.random()-.5);gameState.li=0;renderListen();}
function renderListen(){
  const c=gameState.ws[gameState.li%gameState.ws.length];
  const opts=[...gameState.ws.filter((_,i)=>i!==(gameState.li%gameState.ws.length)).sort(()=>Math.random()-.5).slice(0,3),c].sort(()=>Math.random()-.5);
  const ci=opts.findIndex(o=>o.word===c.word);
  gameState.clw=c;
  document.getElementById('gContent').innerHTML=`
  <div style="text-align:center;font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:8px;">Listen to the word, then tap the right picture!</div>
  <button class="listen-play-btn" onclick="speak('${c.word.replace(/'/g,"\\'")}')">🔊 Play Word</button>
  <div class="listen-opts">${opts.map((o,i)=>`<div class="lopt" onclick="ansL(this,${i},${ci})"><span class="oe">${o.emoji}</span>${o.word}</div>`).join('')}</div>`;
  setTimeout(()=>speak(c.word,.85),300);
}
function ansL(el,i,ci){
  if(el.classList.contains('correct')||el.classList.contains('wrong'))return;
  el.parentElement.querySelectorAll('.lopt').forEach((o,j)=>{if(j===ci)o.classList.add('correct');else if(j===i&&i!==ci)o.classList.add('wrong');});
  if(i===ci)addScore(10);
  setTimeout(()=>{gameState.li++;renderListen();},1500);
}

// SCRAMBLE
function initScram(){const ws=curGameUnit.words.filter(w=>!w.word.includes(' '));gameState.sw=ws.sort(()=>Math.random()-.5);gameState.sci=0;renderScram();}
function renderScram(){
  const wo=gameState.sw[gameState.sci%gameState.sw.length];
  const sc=wo.word.split('').sort(()=>Math.random()-.5).join('');
  gameState.scrW=wo.word;
  document.getElementById('gContent').innerHTML=`
  <div style="text-align:center;margin-bottom:8px;"><span style="font-size:2.5rem;">${wo.emoji}</span><div style="font-size:.8rem;color:var(--muted);font-weight:700;margin-top:4px;">${wo.vi}</div></div>
  <div class="scram-letters">${sc.toUpperCase()}</div>
  <input class="scram-inp" id="scrInp" type="text" placeholder="Type the correct word..." autocomplete="off" autocorrect="off" autocapitalize="off">
  <div style="display:flex;gap:10px;">
    <button class="spell-btn" style="background:var(--primary);color:#fff;flex:1;" onclick="chkScram()">Check ✓</button>
    <button class="spell-btn" style="background:var(--accent);color:#fff;flex:1;" onclick="skipScram()">Skip →</button>
    <button class="spell-btn" style="background:#6B7280;color:#fff;flex:1;" onclick="speak('${wo.word.replace(/'/g,"\\'")}')">🔊</button>
  </div>`;
  document.getElementById('scrInp').addEventListener('keypress',e=>{if(e.key==='Enter')chkScram();});
}
function chkScram(){const v=document.getElementById('scrInp').value.trim().toLowerCase();if(v===gameState.scrW.toLowerCase()){toast('⭐ Correct! +15','star');addScore(15);speak('Excellent!');gameState.sci++;setTimeout(renderScram,1000);}else toast('Hint: '+gameState.scrW.length+' letters','error');}
function skipScram(){gameState.sci++;renderScram();}

// TRUE OR FALSE
function initTF(){
  const u=curGameUnit;
  const ts=u.grammar.examples.map(ex=>({text:ex.a,c:true}));
  const fs=u.grammar.examples.map(ex=>({text:ex.q,c:false}));
  gameState.tfl=[...ts,...fs].sort(()=>Math.random()-.5);gameState.tfi=0;renderTF();
}
function renderTF(){
  const it=gameState.tfl[gameState.tfi%gameState.tfl.length];
  const pct=Math.round(gameState.tfi/gameState.tfl.length*100);
  document.getElementById('gContent').innerHTML=`
  <div style="margin-bottom:12px;background:#E8ECFF;border-radius:8px;height:8px;"><div style="background:var(--primary);height:100%;border-radius:8px;width:${pct}%;transition:width .3s;"></div></div>
  <div style="text-align:center;font-size:.8rem;color:var(--muted);font-weight:700;">Q${(gameState.tfi%gameState.tfl.length)+1}/${gameState.tfl.length}</div>
  <div class="tf-stmt">"${it.text}"</div>
  <div class="tf-btns">
    <button class="tf-btn tf-t" onclick="ansTF(true,${it.c})">✅ TRUE</button>
    <button class="tf-btn tf-f" onclick="ansTF(false,${it.c})">❌ FALSE</button>
  </div>`;
}
function ansTF(ans,c){
  if(ans===c){toast('⭐ Correct! +10','star');addScore(10);speak('Correct!');}
  else toast('The answer was '+(c?'TRUE':'FALSE')+'!','error');
  gameState.tfi++;setTimeout(renderTF,1200);
}

// PROGRESS
function renderProgress(){
  const levels=[{min:0,msg:'Just getting started! 🌱'},{min:10,msg:'Good progress! 📚'},{min:50,msg:'Well done! Keep it up! 🌟'},{min:100,msg:'Excellent learner! 🏆'},{min:200,msg:'Super star! Amazing! 🌠'}];
  const lv=levels.filter(l=>totalStars>=l.min).pop();
  document.getElementById('progTitle').textContent='⭐ '+totalStars+' Stars!';
  document.getElementById('progMsg').textContent=lv.msg;
  const sc={words:'#5B6CF2',grammar:'#8B5CF6',phonics:'#FF6B6B',reading:'#FF9800',writing:'#22C55E',speaking:'#EC4899'};
  document.getElementById('progUnits').innerHTML=UNITS.map((u,i)=>{
    const p=progress[u.id];
    return `<div class="puc">
      <div class="pu-title">${u.icon} ${i===0?'Starter':'Unit '+i}: ${u.title} <span style="margin-left:auto;font-size:.8rem;color:#856404;background:#FFF3CD;padding:2px 10px;border-radius:10px;">⭐${p.stars||0}</span></div>
      <div class="pu-skills">${['words','grammar','phonics','reading','writing'].map(s=>`<div class="pu-skill"><div class="pu-sname">${s}</div><div class="pu-sbar"><div class="pu-sfill" style="width:${Math.min(100,p[s]||0)}%;background:${sc[s]}"></div></div><div class="pu-spct">${Math.min(100,p[s]||0)}%</div></div>`).join('')}</div>
    </div>`;
  }).join('');
}

window.onload=()=>{renderHome();setTimeout(()=>{voices=synth.getVoices();},200);};

</script>

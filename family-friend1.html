
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Nunito',sans-serif;background:#F0F4FF;min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;background:#F0F4FF;min-height:100vh;position:relative}

/* Header */
.hdr{background:linear-gradient(135deg,#6C63FF 0%,#9C8FFF 100%);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(108,99,255,.25)}
.hdr-av{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.hdr-info{flex:1}
.hdr-title{font-family:'Fredoka One',cursive;color:#fff;font-size:18px;line-height:1.1}
.hdr-sub{color:rgba(255,255,255,.8);font-size:11px;margin-top:1px}
.score-pill{background:rgba(255,255,255,.25);border-radius:20px;padding:5px 12px;text-align:center;border:1.5px solid rgba(255,255,255,.4)}
.score-num{font-family:'Fredoka One',cursive;color:#FFE566;font-size:20px;line-height:1}
.score-lbl{color:rgba(255,255,255,.85);font-size:10px}

/* Bottom nav */
.nav{display:flex;background:#fff;border-top:1.5px solid #E8EEFF;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;box-shadow:0 -4px 20px rgba(108,99,255,.1)}
.nb{flex:1;padding:9px 4px 7px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s}
.nb .nbi{font-size:22px;transition:.2s}
.nb .nbl{font-size:10px;font-weight:800;color:#B0B8D4;letter-spacing:.3px}
.nb.on .nbl{color:#6C63FF}
.nb.on .nbi{transform:translateY(-2px)}
.nb-dot{width:5px;height:5px;border-radius:50%;background:#6C63FF;margin:0 auto;opacity:0;transition:.2s}
.nb.on .nb-dot{opacity:1}

/* Pages */
.page{display:none;padding:14px 14px 88px;min-height:calc(100vh - 72px)}
.page.on{display:block}

/* Section title */
.sec{font-family:'Fredoka One',cursive;font-size:15px;color:#6C63FF;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec::after{content:'';flex:1;height:1.5px;background:#E8EEFF}

/* Unit cards */
.unit-card{border-radius:18px;padding:16px 14px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:.15s}
.unit-card:active{transform:scale(.97)}
.uc-bg{position:absolute;right:-10px;top:-10px;font-size:70px;opacity:.18;transform:rotate(-10deg);pointer-events:none}
.uc-badge{background:rgba(255,255,255,.35);border-radius:8px;padding:2px 10px;font-size:10px;font-weight:800;color:#fff;display:inline-block;margin-bottom:6px}
.uc-title{font-family:'Fredoka One',cursive;color:#fff;font-size:20px}
.uc-sub{color:rgba(255,255,255,.88);font-size:12px;margin-top:3px}
.uc-chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 9px;color:#fff;font-size:10px;font-weight:700}
.uc-bar{margin-top:10px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
.uc-fill{height:100%;background:rgba(255,255,255,.75);border-radius:3px}

/* Lesson overlay */
.ls-screen{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100%;background:#F0F4FF;z-index:200;overflow-y:auto;padding-bottom:20px}
.ls-screen.on{display:block}
.ls-hdr{padding:12px 14px;display:flex;align-items:center;gap:8px;background:rgba(240,244,255,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;border-bottom:1.5px solid #E8EEFF}
.back-btn{width:36px;height:36px;border-radius:50%;background:#EEF0FF;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#6C63FF}
.ls-title{font-family:'Fredoka One',cursive;color:#2D2D6E;font-size:17px;flex:1}
.tab-row{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1.5px solid #E8EEFF}
.tab-row::-webkit-scrollbar{display:none}
.tbtn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid #E0E4FF;background:#fff;color:#8892C8;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s;white-space:nowrap}
.tbtn.on{background:#6C63FF;border-color:#6C63FF;color:#fff}
.tab-body{padding:14px}

/* Vocab */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vc{border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;background:#fff;border:2px solid #E8EEFF;box-shadow:0 2px 10px rgba(108,99,255,.07);transition:.15s}
.vc:active{transform:scale(.93)}
.vc.lit{border-color:#6C63FF;background:#F0EEFF;box-shadow:0 4px 16px rgba(108,99,255,.2)}
.vc-em{font-size:46px;margin-bottom:6px;display:block}
.vc-w{font-family:'Fredoka One',cursive;font-size:17px;color:#2D2D6E}
.vc-p{font-size:11px;color:#A0A8CC;margin-top:2px}
.vc-hint{font-size:10px;color:#C8CCED;margin-top:4px}

/* Grammar */
.gc{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #6C63FF;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(108,99,255,.07);transition:.15s}
.gc:active{transform:scale(.97)}
.gc-icon{font-size:26px;flex-shrink:0}
.gc-q{font-size:12px;color:#A0A8CC;margin-bottom:3px}
.gc-a{font-family:'Fredoka One',cursive;font-size:15px;color:#6C63FF}

/* Numbers */
.num-hero{background:linear-gradient(135deg,#6C63FF,#9C8FFF);border-radius:20px;padding:24px;text-align:center;margin-bottom:14px;box-shadow:0 6px 20px rgba(108,99,255,.3)}
.num-big{font-family:'Fredoka One',cursive;font-size:96px;color:#fff;line-height:1;text-shadow:0 4px 15px rgba(0,0,0,.2)}
.num-word{font-family:'Fredoka One',cursive;font-size:28px;color:rgba(255,255,255,.9);margin-top:4px}
.num-objs{font-size:26px;margin:10px 0;letter-spacing:3px;color:#fff;min-height:36px;word-break:break-all}
.num-play{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);color:#fff;font-size:24px;cursor:pointer;margin:8px auto 0;display:flex;align-items:center;justify-content:center;transition:.2s}
.num-play:active{transform:scale(.9)}
.num-controls{display:flex;gap:10px;justify-content:center;margin:14px 0}
.num-arr{width:50px;height:50px;border-radius:50%;background:#fff;border:2px solid #E8EEFF;font-size:20px;cursor:pointer;color:#6C63FF;font-weight:800;box-shadow:0 2px 10px rgba(108,99,255,.15);transition:.15s}
.num-arr:active{transform:scale(.9)}
.num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.ngc{border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;background:#fff;border:2px solid #E8EEFF;transition:.15s}
.ngc:active{transform:scale(.9)}
.ngc-n{font-family:'Fredoka One',cursive;font-size:20px;color:#2D2D6E}
.ngc-w{font-size:9px;color:#A0A8CC;font-weight:700}
.ngc.sel{background:#EEF0FF;border-color:#6C63FF}

/* Writing canvas */
.wc-wrap{background:#fff;border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(108,99,255,.1);margin-bottom:12px}
.wc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.wc-letter{font-family:'Fredoka One',cursive;font-size:40px;color:#6C63FF;line-height:1}
.wc-word{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:800;color:#2D2D6E}
canvas.wcanvas{border-radius:12px;background:#F8F9FF;border:2px dashed #C7D2FE;display:block;touch-action:none;cursor:crosshair;width:100%;height:190px}
.wc-btns{display:flex;gap:8px;margin-top:10px;justify-content:center}
.wb{border-radius:10px;border:none;padding:9px 18px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:.15s}
.wb:active{transform:scale(.94)}
.wb-clr{background:#FEE2E2;color:#991B1B}
.wb-chk{background:#6C63FF;color:#fff;box-shadow:0 4px 12px rgba(108,99,255,.35)}
.wb-hear{background:#FFF4E5;color:#92400E}
.letter-sel-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px}
.letter-sel-row::-webkit-scrollbar{display:none}
.ls-btn{flex-shrink:0;width:52px;height:52px;border-radius:12px;border:2px solid #E8EEFF;background:#fff;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:#2D2D6E;box-shadow:0 2px 8px rgba(108,99,255,.07);transition:.15s}
.ls-btn.on{background:#EEF0FF;border-color:#6C63FF;color:#6C63FF}
.ls-btn span{font-size:9px;font-weight:700;color:#A0A8CC}

/* SPEAK page ★ NEW ★ */
.speak-intro{background:linear-gradient(135deg,#FF6B9D,#FF8E53);border-radius:20px;padding:20px;text-align:center;margin-bottom:14px;box-shadow:0 6px 20px rgba(255,107,157,.3)}
.si-title{font-family:'Fredoka One',cursive;color:#fff;font-size:22px}
.si-sub{color:rgba(255,255,255,.88);font-size:13px;margin-top:4px}
.speak-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 18px rgba(108,99,255,.1);text-align:center;margin-bottom:12px}
.speak-emoji{font-size:80px;margin-bottom:8px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.speak-word{font-family:'Fredoka One',cursive;font-size:38px;color:#2D2D6E;margin-bottom:4px}
.speak-phon{font-size:15px;color:#A0A8CC;margin-bottom:16px}
.speak-hear-btn{background:#EEF0FF;border:none;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:800;color:#6C63FF;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:14px;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.speak-hear-btn:active{transform:scale(.95)}

/* Mic button */
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;transition:.2s;margin:0 auto;position:relative}
.mic-btn.idle{background:linear-gradient(135deg,#6C63FF,#9C8FFF);box-shadow:0 6px 24px rgba(108,99,255,.45)}
.mic-btn.recording{background:linear-gradient(135deg,#FF6B6B,#EF4444);box-shadow:0 0 0 0 rgba(255,107,107,.7);animation:pulse-ring 1.2s infinite}
.mic-btn:active{transform:scale(.92)}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(255,107,107,.7)}70%{box-shadow:0 0 0 18px rgba(255,107,107,0)}100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}}
.mic-label{font-size:13px;font-weight:800;color:#A0A8CC;margin-top:8px;text-align:center}
.mic-label.rec{color:#EF4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Score bar */
.score-result{border-radius:16px;padding:16px;margin-top:14px;text-align:center;display:none}
.score-result.win{background:#F0FFF4;border:2px solid #86EFAC}
.score-result.ok{background:#FFFBEB;border:2px solid #FCD34D}
.score-result.try{background:#FFF5F5;border:2px solid #FCA5A5}
.sr-emoji{font-size:40px;margin-bottom:6px}
.sr-title{font-family:'Fredoka One',cursive;font-size:20px}
.sr-bar-wrap{background:#E8EEFF;border-radius:10px;height:14px;overflow:hidden;margin:10px 0 6px}
.sr-bar{height:100%;border-radius:10px;transition:.8s ease-out}
.sr-heard{font-size:13px;color:#6C63FF;font-weight:700;margin-top:4px}
.sr-pts{font-family:'Fredoka One',cursive;font-size:18px;color:#6C63FF;margin-top:4px}

/* Speak navigation */
.speak-nav{display:flex;gap:10px;justify-content:center;margin-top:12px}
.sp-nav-btn{width:48px;height:48px;border-radius:50%;background:#fff;border:2px solid #E8EEFF;font-size:20px;cursor:pointer;color:#6C63FF;box-shadow:0 2px 10px rgba(108,99,255,.12);transition:.15s}
.sp-nav-btn:active{transform:scale(.9)}

/* Speak unit selector */
.su-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}

/* Quiz */
.qprog{height:8px;background:#E8EEFF;border-radius:4px;overflow:hidden;margin-bottom:10px}
.qpfill{height:100%;background:linear-gradient(90deg,#6C63FF,#A78BFA);border-radius:4px;transition:.4s}
.qcard{background:#fff;border-radius:18px;padding:20px;text-align:center;margin-bottom:14px;box-shadow:0 4px 16px rgba(108,99,255,.1)}
.qemoji{font-size:72px;margin-bottom:6px;display:block}
.qword{font-family:'Fredoka One',cursive;font-size:22px;color:#2D2D6E;margin-bottom:4px}
.qhint{font-size:12px;color:#A0A8CC}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qopt{border-radius:14px;border:2px solid #E8EEFF;background:#fff;padding:14px 8px;font-size:26px;cursor:pointer;transition:.2s;text-align:center;box-shadow:0 2px 8px rgba(108,99,255,.06)}
.qopt:active{transform:scale(.93)}
.qopt.ok{background:#F0FFF4;border-color:#10B981}
.qopt.no{background:#FFF5F5;border-color:#EF4444}

/* Games */
.game-sel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.gsc{border-radius:18px;padding:18px 12px;text-align:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:.15s}
.gsc:active{transform:scale(.95)}
.gsc-em{font-size:40px;margin-bottom:6px}
.gsc-n{font-family:'Fredoka One',cursive;font-size:15px;color:#fff}
.gsc-d{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}

/* Match game */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.mc{border-radius:12px;border:2px solid #E8EEFF;background:#fff;min-height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#2D2D6E;cursor:pointer;transition:.2s;padding:6px;text-align:center;box-shadow:0 2px 8px rgba(108,99,255,.06)}
.mc:active{transform:scale(.9)}
.mc.sel{background:#EEF0FF;border-color:#6C63FF;color:#6C63FF}
.mc.done{background:#F0FFF4;border-color:#10B981;color:#065F46}
.mc.err{animation:shake .35s;border-color:#EF4444}
.mc-em{font-size:26px;margin-bottom:2px;display:block}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}

/* Spell */
.spell-wrap{text-align:center}
.spell-slots{display:flex;gap:6px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.ss{width:40px;height:46px;border-bottom:3px solid #6C63FF;font-family:'Fredoka One',cursive;font-size:22px;color:#6C63FF;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;transition:.2s}
.ss.filled{color:#2D2D6E}
.lpool{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.lpb{width:40px;height:40px;border-radius:10px;border:2px solid #E8EEFF;background:#fff;color:#2D2D6E;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(108,99,255,.07);transition:.15s}
.lpb:active{transform:scale(.88)}
.lpb:disabled{opacity:.25;cursor:not-allowed}

/* Toast */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-50px);background:#2D2D6E;border-radius:12px;padding:9px 20px;color:#fff;font-weight:800;font-size:13px;z-index:600;transition:.3s;opacity:0;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* Congrats */
.cg-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(45,45,110,.7);z-index:1000;align-items:center;justify-content:center}
.cg-overlay.on{display:flex}
.cg-box{background:#fff;border-radius:24px;padding:28px 24px;text-align:center;max-width:300px;width:88%;box-shadow:0 20px 50px rgba(0,0,0,.25);position:relative;z-index:1}
.cg-em{font-size:70px;margin-bottom:10px;display:block;animation:bounce .6s infinite alternate}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
.cg-title{font-family:'Fredoka One',cursive;font-size:26px;color:#2D2D6E;margin-bottom:6px}
.cg-sub{font-size:14px;color:#A0A8CC}
.cg-pts{font-family:'Fredoka One',cursive;font-size:36px;color:#6C63FF;margin:10px 0}
.cg-btn{background:linear-gradient(135deg,#6C63FF,#9C8FFF);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;box-shadow:0 6px 18px rgba(108,99,255,.4)}
.confetti-w{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;border-radius:24px}
</style>

document.getElementById('unit-list').innerHTML=UNITS.map(u=>`

function openUnit(id){
curUnit=UNITS[id];
document.getElementById('ls-title').textContent=curUnit.name+' — '+curUnit.sub;
document.getElementById('ls-em').textContent=curUnit.em;
const tabs=[{id:'vocab',l:'🗣 Words'},{id:'gram',l:'💬 Talk'},{id:'nums',l:'🔢 Count'},{id:'write',l:'✏️ Write'},{id:'quiz',l:'⭐ Quiz'}];
document.getElementById('tab-row').innerHTML=tabs.map((t,i)=>`<button class="tbtn${i===0?' on':''}" onclick="switchTab('${t.id}',this)">${t.l}</button>`).join('');
document.getElementById('ls-screen').classList.add('on');
renderTab('vocab');
}
function closeLesson(){document.getElementById('ls-screen').classList.remove('on');curUnit=null;}
function switchTab(id,btn){document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderTab(id);}

function renderTab(id){
const body=document.getElementById('tab-body');
if(id==='vocab')renderVocab(body);
else if(id==='gram')renderGram(body);
else if(id==='nums')renderNums(body);
else if(id==='write')renderWrite(body);
else if(id==='quiz')renderQuiz(body);
}

function renderVocab(b){
b.innerHTML=`<div class="vgrid">${curUnit.vocab.map((v,i)=>`
<div class="vc" id="vc${i}" onclick="tapVc(${i})">
  <span class="vc-em">${v.e}</span>
  <div class="vc-w">${v.w}</div>
  <div class="vc-p">${v.p}</div>
  <div class="vc-hint">tap to hear</div>
</div>`).join('')}</div>`;
setTimeout(()=>tapVc(0),300);
}
function tapVc(i){
const v=curUnit.vocab[i];speak(v.w);addSc(2);
const el=document.getElementById('vc'+i);
el.classList.add('lit');setTimeout(()=>el.classList.remove('lit'),700);
showToast('🔊 '+v.w);
}

function renderGram(b){

function tapGc(el,txt){speak(txt.replace(/[^\w\s!?',.]/g,''));addSc(3);el.style.background='#EEF0FF';setTimeout(()=>el.style.background='',500);}

function updNum(){const n=numData[numIdx];document.getElementById('nb').textContent=n.n;document.getElementById('nw').textContent=n.w;document.getElementById('no').textContent=n.e;document.querySelectorAll('.ngc').forEach((el,i)=>el.classList.toggle('sel',i===numIdx));}

function renderWrite(b){

curLetIdx=0;curLetObj=letters[0];
b.innerHTML=`<div class="letter-sel-row">${letters.map((l,i)=>`
<button class="ls-btn${i===0?' on':''}" id="lsb${i}" onclick="selLet(${i})">${l.l}<br><span>${l.e}</span></button>`).join('')}</div>

function selLet(i){
const letters=curUnit.letters;if(!letters[i])return;
curLetIdx=i;curLetObj=letters[i];
document.querySelectorAll('.ls-btn').forEach((b,j)=>b.classList.toggle('on',j===i));
document.getElementById('wcl').textContent=letters[i].l;
document.getElementById('wcls').textContent=letters[i].l.toLowerCase();
document.getElementById('wcem').textContent=letters[i].e;
document.getElementById('wcw').textContent=letters[i].w;
clrCanvas();drawGuide();speak(letters[i].l+' for '+letters[i].w);
}
function initCanvas(){
drawCanvas=document.getElementById('wcanvas');
if(!drawCanvas)return;
const r=drawCanvas.getBoundingClientRect();
drawCanvas.width=Math.max(r.width||300,300);drawCanvas.height=190;
drawCtx=drawCanvas.getContext('2d');
drawCtx.strokeStyle='#6C63FF';drawCtx.lineWidth=7;drawCtx.lineCap='round';drawCtx.lineJoin='round';
const pos=e=>{const r2=drawCanvas.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-r2.left,y:src.clientY-r2.top};};
drawCanvas.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);drawCtx.beginPath();drawCtx.moveTo(p.x,p.y);});
drawCanvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=pos(e);drawCtx.lineTo(p.x,p.y);drawCtx.stroke();});
drawCanvas.addEventListener('mouseup',()=>drawing=false);
drawCanvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);drawCtx.beginPath();drawCtx.moveTo(p.x,p.y);},{passive:false});
drawCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=pos(e);drawCtx.lineTo(p.x,p.y);drawCtx.stroke();},{passive:false});
drawCanvas.addEventListener('touchend',()=>drawing=false);
}
function drawGuide(){
if(!drawCtx||!curLetObj)return;
drawCtx.save();drawCtx.strokeStyle='rgba(199,210,254,0.5)';drawCtx.lineWidth=9;drawCtx.setLineDash([8,6]);
try{drawCtx.stroke(new Path2D(curLetObj.path));}catch(x){}
drawCtx.restore();
drawCtx.font='bold 15px Nunito';drawCtx.fillStyle='rgba(160,168,204,0.7)';
drawCtx.fillText(curLetObj.l+'  '+curLetObj.l.toLowerCase()+'  →  '+curLetObj.w,8,182);
}
function clrCanvas(guideOnly){if(!drawCtx||!drawCanvas)return;drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);if(!guideOnly&&curLetObj)drawGuide();}
function chkWrite(){
if(!drawCtx||!drawCanvas)return;
const d=drawCtx.getImageData(0,0,drawCanvas.width,drawCanvas.height).data;
let px=0;for(let i=3;i<d.length;i+=4)if(d[i]>50)px++;
if(px>300){addSc(20);speak('Excellent! Great writing!');showToast('⭐ Great writing! +20 stars');
drawCtx.save();drawCtx.strokeStyle='rgba(16,185,129,.8)';drawCtx.lineWidth=4;drawCtx.strokeRect(3,3,drawCanvas.width-6,drawCanvas.height-6);drawCtx.restore();
}else{speak('Try again!');showToast('✏️ Draw more!');}
}
function hearLetter(){if(curLetObj)speak(curLetObj.l+' for '+curLetObj.w);}

function renderQuiz(b){
const pool=sh([...curUnit.vocab]).slice(0,5);
gState.uq={pool,idx:0,correct:0,b};showUnitQuiz();
}
function showUnitQuiz(){
const s=gState.uq;const b=s.b;
if(s.idx>=s.pool.length){showCg(s.correct===s.pool.length?'🏆':'⭐',s.correct===s.pool.length?'Perfect!':'Good job!',`${s.correct}/${s.pool.length} correct!`,s.correct*15);return;}
const q=s.pool[s.idx];
const opts=sh([q,...sh(ALL_VOCAB.filter(v=>v.w!==q.w)).slice(0,3)]);
b.innerHTML=`<div class="qprog"><div class="qpfill" style="width:${s.idx/s.pool.length*100}%"></div></div>
<div style="text-align:right;font-size:12px;color:#A0A8CC;margin-bottom:10px">${s.idx+1} / ${s.pool.length}</div>
<div class="qcard"><span class="qemoji">${q.e}</span><div class="qword">${q.w}</div><div class="qhint">tap the right picture!</div></div>
<div class="qopts">${opts.map(o=>`<div class="qopt" onclick="ckUQ(this,'${o.w}','${q.w}')">${o.e}</div>`).join('')}</div>`;
speak(q.w);
}
function ckUQ(el,ch,cor){
document.querySelectorAll('.qopt').forEach(b=>b.style.pointerEvents='none');
if(ch===cor){el.classList.add('ok');addSc(15);gState.uq.correct++;showToast('✅ Correct! +15 ⭐');}
else{el.classList.add('no');showToast('❌ Oops!');}
gState.uq.idx++;setTimeout(showUnitQuiz,900);
}

speak(u.vocab[speakIdx].w,0.75);

function speakNav(d){
const u=UNITS[speakUnitId];
speakIdx=(speakIdx+d+u.vocab.length)%u.vocab.length;
document.getElementById('sp-em').textContent=u.vocab[speakIdx].e;
document.getElementById('sp-wd').textContent=u.vocab[speakIdx].w;
document.getElementById('sp-ph').textContent=u.vocab[speakIdx].p;
document.getElementById('sp-counter').textContent=(speakIdx+1)+' / '+u.vocab.length;

document.getElementById('mic-btn').className='mic-btn idle';
document.getElementById('mic-lbl').textContent='Tap mic to speak';
document.getElementById('mic-lbl').className='mic-label';
hearSpeakWord();
}

function toggleMic(){
if(mediaRec&&mediaRec.state==='recording'){stopRec();return;}
if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
simulateSpeak();return;
}
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
startRec(stream);
}).catch(()=>simulateSpeak());
}

function startRec(stream){
recChunks=[];
mediaRec=new MediaRecorder(stream);
mediaRec.ondataavailable=e=>recChunks.push(e.data);
mediaRec.onstop=()=>{analyzeVoice(stream);};
mediaRec.start();
document.getElementById('mic-btn').className='mic-btn recording';
document.getElementById('mic-lbl').textContent='Recording… tap to stop';
document.getElementById('mic-lbl').className='mic-label rec';
document.getElementById('sp-result').style.display='none';
setTimeout(()=>{if(mediaRec&&mediaRec.state==='recording')stopRec();},4000);
}

function stopRec(){
if(mediaRec&&mediaRec.state==='recording'){mediaRec.stop();}
document.getElementById('mic-btn').className='mic-btn idle';
document.getElementById('mic-lbl').textContent='Analyzing…';
document.getElementById('mic-lbl').className='mic-label';
}

function analyzeVoice(stream){
stream.getTracks().forEach(t=>t.stop());
// Use Web Speech API for recognition if available
if('SpeechRecognition' in window||'webkitSpeechRecognition' in window){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const r=new SR();r.lang='en-US';r.interimResults=false;r.maxAlternatives=3;
r.onresult=e=>{
const u=UNITS[speakUnitId];const target=u.vocab[speakIdx].w.toLowerCase();
let best=0;
for(let i=0;i<e.results[0].length;i++){
const heard=e.results[0][i].transcript.toLowerCase().trim();
const sc=scoreMatch(heard,target);
if(sc>best)best=sc;
}
showSpeakResult(best,target);
};
r.onerror=()=>simulateSpeak();
r.onend=()=>{};
try{r.start();}catch(x){simulateSpeak();}
}else{
// Fallback: analyze audio volume as proxy
const blob=new Blob(recChunks);
const url=URL.createObjectURL(blob);
const audio=new Audio(url);
audio.onloadedmetadata=()=>{
const vol=Math.min(1,audio.duration/2);
simulateSpeakWithLevel(vol);
};
audio.load();
setTimeout(simulateSpeak,500);
}
}

function scoreMatch(heard,target){
if(heard===target)return 1;
if(heard.includes(target)||target.includes(heard))return 0.85;
let matches=0;
const hl=heard.split('');const tl=target.split('');
for(let i=0;i<Math.min(hl.length,tl.length);i++)if(hl[i]===tl[i])matches++;
const ratio=matches/Math.max(hl.length,tl.length);
// Check starting sound
if(heard[0]===target[0])return Math.max(ratio,0.5);
return ratio;
}

function simulateSpeak(){
// Friendly fallback: random score between 70-100 for encouraging kids
const score=0.7+Math.random()*0.3;
const u=UNITS[speakUnitId];
showSpeakResult(score,u.vocab[speakIdx].w);
}
function simulateSpeakWithLevel(lv){
showSpeakResult(lv,UNITS[speakUnitId].vocab[speakIdx].w);
}

function showSpeakResult(score,target){
const pct=Math.round(score*100);
const res=document.getElementById('sp-result');
let cls,em,title,msg;
if(pct>=85){cls='win';em='🌟';title='Excellent!';msg='Great pronunciation!';}
else if(pct>=60){cls='ok';em='👍';title='Good job!';msg='Almost perfect!';}
else{cls='try';em='💪';title='Try again!';msg='Listen and repeat!';}
res.className='score-result '+cls;
res.innerHTML=`<div class="sr-emoji">${em}</div>
<div class="sr-title">${title}</div>
<div class="sr-bar-wrap"><div class="sr-bar" style="width:0%;background:${cls==='win'?'#10B981':cls==='ok'?'#F59E0B':'#EF4444'}"></div></div>
<div class="sr-heard">${pct}% — "${target}"</div>
<div class="sr-pts">+${Math.round(pct/5)} ⭐</div>`;
res.style.display='block';
addSc(Math.round(pct/5));
setTimeout(()=>{res.querySelector('.sr-bar').style.width=pct+'%';},50);
document.getElementById('mic-btn').className='mic-btn idle';
document.getElementById('mic-lbl').textContent='Tap mic to speak';
document.getElementById('mic-lbl').className='mic-label';
speak(pct>=85?'Excellent! Well done!':'Try again! '+target);
if(pct>=85){showToast('⭐ +'+Math.round(pct/5)+' stars!');}
}

/* ───── GAMES ───── */
function launchGame(type){
document.getElementById('game-sel').style.display='none';
const area=document.getElementById('game-area');
const backBtn=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
<button onclick="resetGames()" style="background:#EEF0FF;border:none;border-radius:10px;padding:8px 14px;font-weight:800;color:#6C63FF;cursor:pointer;font-family:'Nunito',sans-serif">← Games</button></div>`;
if(type==='quiz'){
const pool=sh([...ALL_VOCAB]).slice(0,8);
gState={type,pool,idx:0,correct:0};
area.innerHTML=backBtn+`<div id="gqi"></div>`;showGQ();
}else if(type==='match'){
const pool=sh([...ALL_VOCAB]).slice(0,4);
const cards=sh([...pool.map(v=>({id:v.w,show:v.e,tp:'pic'})),...pool.map(v=>({id:v.w,show:v.w,tp:'word'}))]);
gState={type,sel:null,done:[],cards};
area.innerHTML=backBtn+`<div style="font-family:'Fredoka One',cursive;font-size:14px;color:#6C63FF;margin-bottom:8px">Match picture to word!</div>
<div class="mgrid">${cards.map((c,i)=>`<div class="mc" id="mc${i}" onclick="mTap(${i})"><span class="mc-em">${c.tp==='pic'?c.show:''}</span>${c.tp==='word'?c.show:''}</div>`).join('')}</div>
<div id="mmsg" style="text-align:center;margin-top:10px;font-family:'Fredoka One',cursive;font-size:16px;color:#6C63FF"></div>`;
}else if(type==='spell'){
startSpell(area,backBtn);
}else if(type==='listenq'){
const pool=sh([...ALL_VOCAB]).slice(0,6);
gState={type,pool,idx:0,correct:0};
area.innerHTML=backBtn+`<div id="lqi"></div>`;showLQ();
}
}
function resetGames(){document.getElementById('game-sel').style.display='grid';document.getElementById('game-area').innerHTML='';}

function showGQ(){
const s=gState;const qi=document.getElementById('gqi');
if(s.idx>=s.pool.length){showCg(s.correct===s.pool.length?'🏆':'🌟',s.correct===s.pool.length?'PERFECT!':'Well done!',`${s.correct}/${s.pool.length}`,s.correct*20);resetGames();return;}
const q=s.pool[s.idx];const opts=sh([q,...sh(ALL_VOCAB.filter(v=>v.w!==q.w)).slice(0,3)]);
qi.innerHTML=`<div class="qprog"><div class="qpfill" style="width:${s.idx/s.pool.length*100}%"></div></div>
<div style="text-align:right;font-size:12px;color:#A0A8CC;margin-bottom:10px">${s.idx+1}/${s.pool.length}</div>
<div class="qcard"><span class="qemoji">${q.e}</span><div class="qword">${q.w}</div></div>
<div class="qopts">${opts.map(o=>`<div class="qopt" onclick="ckGQ(this,'${o.w}','${q.w}')">${o.e}</div>`).join('')}</div>`;
speak(q.w);
}
function ckGQ(el,ch,cor){document.querySelectorAll('#gqi .qopt').forEach(b=>b.style.pointerEvents='none');if(ch===cor){el.classList.add('ok');gState.correct++;addSc(20);showToast('✅ +20 ⭐');}else{el.classList.add('no');showToast('❌ Oops!');} gState.idx++;setTimeout(showGQ,900);}

function showLQ(){
const s=gState;const qi=document.getElementById('lqi');
if(s.idx>=s.pool.length){showCg('🔊',s.correct===s.pool.length?'Super ears!':'Good listening!',`${s.correct}/${s.pool.length}`,s.correct*20);resetGames();return;}
const q=s.pool[s.idx];const opts=sh([q,...sh(ALL_VOCAB.filter(v=>v.w!==q.w)).slice(0,3)]);
qi.innerHTML=`<div class="qprog"><div class="qpfill" style="width:${s.idx/s.pool.length*100}%"></div></div>
<div class="qcard" style="cursor:pointer" onclick="speak('${q.w}')"><span class="qemoji">🔊</span><div class="qword">What did you hear?</div><div class="qhint">tap 🔊 to hear again</div></div>
<div class="qopts">${opts.map(o=>`<div class="qopt" onclick="ckLQ(this,'${o.w}','${q.w}')">${o.e}<br><span style="font-size:11px;font-weight:700">${o.w}</span></div>`).join('')}</div>`;
speak(q.w);
}
function ckLQ(el,ch,cor){document.querySelectorAll('#lqi .qopt').forEach(b=>b.style.pointerEvents='none');if(ch===cor){el.classList.add('ok');gState.correct++;addSc(20);showToast('✅ +20 ⭐');}else{el.classList.add('no');}gState.idx++;setTimeout(showLQ,900);}

function mTap(i){
const s=gState;const c=s.cards[i];const el=document.getElementById('mc'+i);
if(s.done.includes(i)||el.classList.contains('done'))return;
if(s.sel===null){s.sel=i;el.classList.add('sel');speak(c.tp==='word'?c.show:'');return;}
const pi=s.sel;const pc=s.cards[pi];const pel=document.getElementById('mc'+pi);
if(i===pi){s.sel=null;el.classList.remove('sel');return;}
if(c.id===pc.id){
el.classList.add('done');pel.classList.replace('sel','done');s.done.push(i,pi);s.sel=null;addSc(15);speak('Correct!');
document.getElementById('mmsg').textContent='✅ Match! +15 ⭐';
if(s.done.length===s.cards.length)setTimeout(()=>{showCg('🃏','Great matching!','All pairs!',60);resetGames();},600);
}else{
el.classList.add('err');pel.classList.add('err');
setTimeout(()=>{el.classList.remove('sel','err');pel.classList.remove('sel','err');},400);
s.sel=null;document.getElementById('mmsg').textContent='❌ Try again!';speak('Try again!');
}
}

function startSpell(area,backBtn){
const v=sh([...ALL_VOCAB])[0];
const extra=sh('rstlneioaduybcfgmph'.split('')).slice(0,4);
const letters=sh([...v.w.split(''),...extra]);
gState.sv=v;gState.si=[];gState.sl=letters;
if(!area)area=document.getElementById('game-area');
if(!backBtn)backBtn=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><button onclick="resetGames()" style="background:#EEF0FF;border:none;border-radius:10px;padding:8px 14px;font-weight:800;color:#6C63FF;cursor:pointer;font-family:'Nunito',sans-serif">← Games</button></div>`;
area.innerHTML=backBtn+`<div class="spell-wrap">
<div style="font-size:80px;margin-bottom:4px">${v.e}</div>
<div style="font-size:13px;color:#A0A8CC;margin-bottom:10px">Spell this word!</div>
<div class="spell-slots">${v.w.split('').map(()=>`<div class="ss"></div>`).join('')}</div>
<div class="lpool">${letters.map((l,i)=>`<button class="lpb" id="lpb${i}" onclick="spTap(${i},'${l}')">${l}</button>`).join('')}</div>
<button onclick="startSpell()" style="background:#EEF0FF;border:none;border-radius:10px;padding:9px 18px;font-weight:800;color:#6C63FF;cursor:pointer;font-family:'Nunito',sans-serif">🔄 New word</button>
<div id="spres" style="margin-top:12px;font-family:'Fredoka One',cursive;font-size:18px;min-height:24px;text-align:center"></div>
</div>`;
speak(v.w);
}
function spTap(i,l){
const s=gState;if(s.si.length>=s.sv.w.length)return;
s.si.push({i,l});document.getElementById('lpb'+i).disabled=true;
const slots=document.querySelectorAll('.ss');slots[s.si.length-1].textContent=l;slots[s.si.length-1].classList.add('filled');
if(s.si.length===s.sv.w.length){
const typed=s.si.map(x=>x.l).join('');
const r=document.getElementById('spres');
if(typed===s.sv.w){r.innerHTML='🎉 Correct! +30 ⭐';r.style.color='#6C63FF';addSc(30);speak('Excellent!');showToast('⭐ +30 stars!');setTimeout(startSpell,1500);}
else{r.innerHTML='❌ Try again!';r.style.color='#EF4444';speak('Try again!');setTimeout(()=>{s.si=[];document.querySelectorAll('.lpb').forEach(b=>b.disabled=false);slots.forEach(sl=>{sl.textContent='';sl.classList.remove('filled');});r.textContent='';},1200);}
}
}

/* ───── CONGRATS ───── */
function showCg(em,title,sub,pts){
document.getElementById('cg-em').textContent=em;
document.getElementById('cg-title').textContent=title;
document.getElementById('cg-sub').textContent=sub;
document.getElementById('cg-pts').textContent='+'+pts+' ⭐';
document.getElementById('cgov').classList.add('on');
addSc(pts);speak('Excellent! Well done!');
launchConfetti();
}
function closeCg(){document.getElementById('cgov').classList.remove('on');document.getElementById('cwrap').innerHTML='';}
function launchConfetti(){
const w=document.getElementById('cwrap');w.innerHTML='';
const colors=['#6C63FF','#FFD93D','#FF6B6B','#4ECDC4','#A78BFA','#43E97B'];
for(let i=0;i<55;i++){
const c=document.createElement('div');const sz=7+Math.random()*8;
c.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};left:${Math.random()*100}%;top:-20px;animation:cffall ${1.5+Math.random()*2}s linear ${Math.random()*1}s forwards`;
w.appendChild(c);
}
if(!document.getElementById('cfstyle')){const s=document.createElement('style');s.id='cfstyle';s.textContent='@keyframes cffall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(540deg);opacity:0}}';document.head.appendChild(s);}
}

buildHome();
</script>

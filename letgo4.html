#backbtn{display:none;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;font-size:1.1rem;color:#fff;align-items:center;justify-content:center;flex-shrink:0}

.vemoji{font-size:2rem;margin-bottom:5px;display:block}
.vword{font-size:.85rem;font-weight:700}
.dlg{margin-bottom:10px}
.dbbl{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px}

.pwords{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:7px}
.pw{background:var(--rp);border-radius:7px;padding:5px 11px;font-size:.88rem;font-weight:600;color:var(--r);cursor:pointer}

.spk{text-align:center;padding:16px}
.spktxt{font-size:.95rem;background:var(--gp);border-radius:9px;padding:9px 14px;margin:9px 0;font-style:italic;color:#333}

.btn{padding:10px 20px;border-radius:11px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bg{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;box-shadow:0 3px 9px rgba(45,122,58,.3)}
.by{background:linear-gradient(135deg,var(--y),#ffca28);color:#5d4037}

.brow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.qcard{background:var(--card);border-radius:var(--rad);padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.qq{font-size:.97rem;font-weight:700;margin-bottom:12px;line-height:1.4}
.qopts{display:grid;gap:7px}
.qo{background:var(--bg);border:2px solid #e0e0e0;border-radius:9px;padding:10px 13px;font-size:.88rem;cursor:pointer;transition:all .15s;text-align:left;font-weight:500}
.qo:hover{border-color:var(--g);background:var(--gp)}

.gcard{background:var(--card);border-radius:var(--rad);padding:14px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:transform .15s}

.story{font-size:.9rem;line-height:1.85;color:#333}
.nw{color:var(--o);font-weight:700;cursor:pointer;border-bottom:1px dotted var(--o)}

.bdgy{background:var(--yp);color:#795548}

.aslot{width:36px;height:36px;border:2px dashed #ccc;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;cursor:pointer}
.aslot.fill{background:var(--yp);border-color:var(--y)}

.minner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s;border-radius:9px}
.memcard.flip .minner{transform:rotateY(180deg)}
.mfront,.mback{position:absolute;inset:0;border-radius:9px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;padding:4px;text-align:center}
.mfront{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;font-size:1.3rem}
.mback{background:var(--yp);color:var(--tx);transform:rotateY(180deg);font-size:.78rem;font-weight:700}
.memcard.done .mback{background:var(--gp);border:2px solid var(--gl)}
.chip{background:var(--b);color:#fff;border-radius:18px;padding:5px 12px;font-size:.87rem;font-weight:600;cursor:pointer;transition:.15s;border:none;display:inline-block}

.chip.placed{background:#bbb;cursor:default;pointer-events:none}
.builts{min-height:40px;border:2px dashed var(--b);border-radius:9px;padding:7px 11px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin:9px 0}
.bchip{background:var(--bp);border-radius:18px;padding:5px 10px;font-size:.87rem;font-weight:600;cursor:pointer;color:var(--b)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:14px}
.modal.on{display:flex}
.mbox{background:var(--card);border-radius:var(--rad);padding:22px;max-width:380px;width:100%;text-align:center;animation:pop .2s}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.starpu{position:fixed;top:58px;right:14px;background:#fff9e6;border:2px solid var(--y);border-radius:11px;padding:8px 14px;font-weight:800;font-size:.95rem;z-index:300;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:480px){
  .grid4{grid-template-columns:repeat(2,1fr)}
  .grid3{grid-template-columns:repeat(2,1fr)}
  .vgrid{grid-template-columns:repeat(2,1fr)}
}
</style>

// ==================== STATE ====================
var stars = ST.get('lg4_stars', 0);
var prog = ST.get('lg4_prog', {});
var learned = ST.get('lg4_lrn', {});
var curUnit = null;

function addStars(n, lbl) {
  stars += n;
  document.getElementById('starcount').textContent = stars;
  ST.set('lg4_stars', stars);
  var d = document.createElement('div');
  d.className = 'starpu';
  d.textContent = '+' + n + ' \u2B50 ' + (lbl || '');
  document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 1800);
}

// ==================== NAVIGATION ====================
function showScreen(id, unit) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  var bb = document.getElementById('backbtn');
  var nt = document.getElementById('navtitle');
  if (id === 's-home') {
    bb.style.display = 'none';
    nt.innerHTML = '&#x1F408; Let\'s Go 4';
    buildHome();
  } else {
    bb.style.display = 'flex';
    if (unit) {
      curUnit = unit;
      nt.textContent = 'Unit ' + unit.id + ': ' + unit.title;
      buildUnit(unit);
    } else if (id === 's-speak') { nt.textContent = 'Speaking'; buildSpeak(); }
    else if (id === 's-phonics') { nt.textContent = 'Phonics'; buildPhonics(); }
    else if (id === 's-games') { nt.textContent = 'Games'; buildGames(); }
    else if (id === 's-review') { nt.textContent = 'Review'; buildReview(); }
  }
}
function goHome() { showScreen('s-home'); }
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeMod(); });
function showMod(html) { document.getElementById('mcontent').innerHTML = html; document.getElementById('modal').classList.add('on'); }
function closeMod() { document.getElementById('modal').classList.remove('on'); }

// ==================== TTS ====================
function say(txt) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(txt);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

// ==================== HOME ====================
function buildHome() {
  stars = ST.get('lg4_stars', stars);
  prog = ST.get('lg4_prog', prog);
  document.getElementById('starcount').textContent = stars;
  // Progress bars
  var pb = '';
  CUR.units.forEach(function(u) {
    var p = prog[u.id] || 0;
    pb += '<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:.78rem;color:#555"><span>Unit ' + u.id + ': ' + u.title + '</span><span>' + p + '%</span></div><div class="pb"><div class="pbf" style="width:' + p + '%"></div></div></div>';
  });
  document.getElementById('progbars').innerHTML = pb;
  // Unit grid
  var ug = '';
  CUR.units.forEach(function(u) {
    var p = prog[u.id] || 0;
    ug += '<div class="unitcard" onclick="showScreen(\'s-unit\', CUR.units[' + (u.id-1) + '])">'
      + '<div class="unum" style="background:' + u.col + '">' + u.em + '</div>'
      + '<h4>Unit ' + u.id + '<br>' + u.title + '</h4>'
      + '<div class="up">' + p + '% done</div>'
      + '<div class="pb"><div class="pbf" style="width:' + p + '%"></div></div>'
      + '</div>';
  });
  document.getElementById('unitgrid').innerHTML = ug;
}

// ==================== UNIT ====================
var TABS = ['Talk','Learn','Learn More','Phonics','Story','Grammar','Quiz'];
var TAB_IDS = ['tk','l1','l2','ph','st','gr','qz'];
function buildUnit(u) {
  var tabs = '';
  TABS.forEach(function(t, i) {
    tabs += '<button class="stab' + (i===0?' on':'') + '" onclick="switchTab(' + i + ',this)">' + t + '</button>';
  });
  document.getElementById('utabs').innerHTML = tabs;
  showTab(0, u);
}
function switchTab(i, btn) {
  var btns = document.querySelectorAll('.stab');
  for (var b=0;b<btns.length;b++) btns[b].classList.remove('on');
  btn.classList.add('on');
  showTab(i, curUnit);
}
function showTab(i, u) {
  var html = '';
  if (i===0) html = tabTalk(u);
  else if (i===1) html = tabLearn(u, 1);
  else if (i===2) html = tabLearn(u, 2);
  else if (i===3) html = tabPhonics(u);
  else if (i===4) html = tabStory(u);
  else if (i===5) html = tabGrammar(u);
  else if (i===6) { html = '<div id="qzarea"></div>'; }
  document.getElementById('ucontent').innerHTML = html;
  if (i===6) initQuiz(u);
}

// --- TAB: TALK ---
function tabTalk(u) {
  var h = '<div class="card dlg">';
  u.dlg.forEach(function(d, i) {

var QZ = {q:[],cur:0,score:0,unit:null};
function initQuiz(u) {
  QZ.q = makeQuestions(u);

  showQ();
}
function makeQuestions(u) {
  var qs = [];
  var vocab = (u.v1||[]).concat(u.v2||[]).concat(u.wx||[]);
  // Vocab questions
  vocab.slice(0,5).forEach(function(v) {
    var others = vocab.filter(function(x){return x.w!==v.w;}).sort(function(){return Math.random()-.5;}).slice(0,3);
    var opts = others.map(function(x){return x.e + ' ' + x.w;});
    var correct = v.e + ' ' + v.w;
    opts.push(correct);
    opts.sort(function(){return Math.random()-.5;});
    qs.push({q:'What is "' + v.w + '"?', opts:opts, a:opts.indexOf(correct)});
  });
  // Key phrase questions
  u.kp.slice(0,3).forEach(function(p) {
    var others = ["Yes, please!","I don't know.","That's great!","No, thanks."].sort(function(){return Math.random()-.5;}).slice(0,3);
    var opts = [p].concat(others);
    opts.sort(function(){return Math.random()-.5;});
    qs.push({q:'Choose the key phrase for Unit ' + u.id + ':', opts:opts, a:opts.indexOf(p)});
  });
  // Story questions
  if (u.story && u.story.qs) {
    u.story.qs.forEach(function(sq) {
      var opts = sq.os.slice();
      var correct = opts[sq.a];
      opts.sort(function(){return Math.random()-.5;});
      qs.push({q:sq.q, opts:opts, a:opts.indexOf(correct)});
    });
  }
  return qs.filter(function(q){return q.a>=0;}).slice(0,10);
}

    + '<div style="display:flex;justify-content:space-between;font-size:.82rem;color:#777;margin-bottom:4px"><span>Q' + (QZ.cur+1) + '/' + QZ.q.length + '</span><span>Score: ' + QZ.score + '</span></div>'
    + '<div class="pb"><div class="pbf" style="width:'+pct+'%"></div></div></div>'
    + '<div class="qcard"><div class="qq">' + q.q + '</div><div class="qopts">';

// ==================== SPEECH RECOGNITION ====================
function doSpeak(target, btnId, scoreId) {
  var btn = document.getElementById(btnId);
  var scoreEl = document.getElementById(scoreId);
  if (!btn || !scoreEl) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    scoreEl.innerHTML = '<span style="color:var(--o);font-size:.82rem">&#x26A0; Speech recognition not available. Use Chrome browser.</span>';
    return;
  }
  var rec = new SR();
  rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 3;
  btn.classList.add('rec'); btn.innerHTML = '&#x1F534;';
  scoreEl.innerHTML = '<div style="font-size:.8rem;color:#888;text-align:center">Listening...</div>';
  rec.onresult = function(e) {
    var spoken = e.results[0][0].transcript.toLowerCase().trim();
    var score = calcScore(spoken, target.toLowerCase().trim());
    showScore(scoreEl, score, spoken);
    btn.classList.remove('rec'); btn.innerHTML = '&#x1F3A4;';
    if (score>=70) addStars(3,'Speaking!');
    else if (score>=50) addStars(1,'Good try!');
  };
  rec.onerror = function() {
    scoreEl.innerHTML = '<span style="color:var(--r);font-size:.82rem">Could not hear. Try again!</span>';
    btn.classList.remove('rec'); btn.innerHTML = '&#x1F3A4;';
  };
  rec.onend = function() { btn.classList.remove('rec'); btn.innerHTML = '&#x1F3A4;'; };
  rec.start();
}
function calcScore(spoken, target) {
  var sp = spoken.replace(/[^a-z ]/g,'').split(' ').filter(Boolean);
  var tg = target.replace(/[^a-z ]/g,'').split(' ').filter(Boolean);
  var matches = 0;
  sp.forEach(function(w){ if(tg.indexOf(w)>=0) matches++; });
  var p = sp.length>0 ? matches/sp.length : 0;
  var r = tg.length>0 ? matches/tg.length : 0;
  if(p+r===0) return 0;
  return Math.round(2*p*r/(p+r)*100);
}
function showScore(el, score, spoken) {
  var col = score>=80?'var(--g)':score>=60?'var(--y)':score>=40?'var(--o)':'var(--r)';
  var lbl = score>=80?'Excellent! &#x1F31F;':score>=60?'Good! &#x1F44D;':score>=40?'Keep trying! &#x1F4AA;':'Try again! &#x1F504;';
  el.innerHTML = '<div style="font-weight:900;font-size:1.1rem;color:'+col+';text-align:center">'+score+'% &mdash; '+lbl+'</div>'
    + '<div class="sbar"><div class="sbf" style="width:'+score+'%;background:'+col+'"></div></div>'
    + '<div style="font-size:.72rem;color:#888;text-align:center">You said: &ldquo;'+spoken+'&rdquo;</div>';
}

// MEMORY GAME
function gameMem(a, v) {
  var items = v.slice(0,8);
  var pairs = items.map(function(x){return {val:x.w,show:x.w,type:'w'};}).concat(items.map(function(x){return {val:x.w,show:x.e,type:'e'};}));
  pairs.sort(function(){return Math.random()-.5;});
  var mem = {pairs:pairs,fl:[],matched:[],moves:0};
  window._mem = mem;
  var cols = 4;
  var h = '<div class="card"><h3 style="margin-bottom:8px">&#x1F0CF; Memory Match</h3>'
    + '<div id="memstat" style="font-size:.82rem;color:#777;margin-bottom:8px">Moves: 0 | Pairs: 0/' + items.length + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(' + cols + ',1fr);gap:7px" id="memgrid">';
  pairs.forEach(function(p,i){
    h += '<div class="memcard" id="mc' + i + '" onclick="mflip(' + i + ')">'
      + '<div class="minner"><div class="mfront">?</div><div class="mback">' + p.show + '</div></div></div>';
  });
  h += '</div><button class="btn bg sm" onclick="gameMem(document.getElementById(\'garea\'),getGVocab())" style="margin-top:10px">&#x1F504; New Game</button></div>';
  a.innerHTML = h;
}
function mflip(i) {
  var m = window._mem;
  if (!m||m.matched.indexOf(i)>=0||m.fl.indexOf(i)>=0||m.fl.length>=2) return;
  document.getElementById('mc'+i).classList.add('flip');
  m.fl.push(i);
  if (m.fl.length===2) {
    m.moves++;
    var stat = document.getElementById('memstat');
    var ab = m.fl[0], bb = m.fl[1];
    if (stat) stat.textContent = 'Moves: '+m.moves+' | Pairs: '+(m.matched.length/2|0)+'/'+Math.floor(m.pairs.length/2);
    if (m.pairs[ab].val===m.pairs[bb].val && m.pairs[ab].type!==m.pairs[bb].type) {
      m.matched.push(ab,bb);
      document.getElementById('mc'+ab).classList.add('done');
      document.getElementById('mc'+bb).classList.add('done');
      m.fl=[];
      addStars(2,'Match!');
      if (m.matched.length===m.pairs.length) {
        setTimeout(function(){ showMod('<h3>&#x1F389; All matched!</h3><p>'+m.moves+' moves! &#x2B50;&#x2B50;&#x2B50;</p>'); addStars(10,'Memory!'); },400);
      }
    } else {
      setTimeout(function(){
        [ab,bb].forEach(function(x){ var c=document.getElementById('mc'+x); if(c&&m.matched.indexOf(x)<0) c.classList.remove('flip'); });
        m.fl=[];
      },900);
    }
  }
}

var _scr = {};
function gameScramble(a, v) {
  var item = v[Math.floor(Math.random()*v.length)];
  var letters = item.w.split('').sort(function(){return Math.random()-.5;});
  _scr = {word:item.w,ans:[],src:letters.slice()};
  var h = '<div class="card"><h3 style="margin-bottom:8px">&#x1F524; Word Scramble</h3>'
    + '<div style="font-size:2.5rem;text-align:center;margin:8px 0">' + item.e + '</div>'
    + '<div style="font-size:.82rem;color:#777;text-align:center;margin-bottom:8px">Unscramble the letters!</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0" id="scrslots">'
    + item.w.split('').map(function(_,i){return '<div class="aslot" id="as'+i+'" onclick="scrRem('+i+')"></div>';}).join('')
    + '</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0" id="scrtiles">'
    + letters.map(function(l,i){return '<div class="ltile" id="lt'+i+'" onclick="scrAdd(\''+l+'\','+i+')">'+l+'</div>';}).join('')
    + '</div>'
    + '<div class="brow"><button class="btn bg sm" onclick="scrCheck()">Check &#x2713;</button><button class="btn by sm" onclick="say(\''+esc(item.w)+'\')">&#x1F508; Hint</button><button class="btn sm" onclick="gameScramble(document.getElementById(\'garea\'),getGVocab())" style="background:var(--bp);color:var(--b)">&#x1F504; New</button></div>'
    + '<div id="scrres" style="text-align:center;font-weight:700;margin-top:8px"></div></div>';
  a.innerHTML = h;
}
function scrAdd(l,idx) {
  var t = document.getElementById('lt'+idx);
  if (!t||t.classList.contains('used')) return;
  t.classList.add('used');
  var pos = _scr.ans.length;
  if (pos >= _scr.word.length) return;
  _scr.ans.push({l:l,idx:idx});
  var sl = document.getElementById('as'+pos);
  if (sl) { sl.textContent=l; sl.classList.add('fill'); sl.dataset.idx=idx; }
}
function scrRem(pos) {
  var sl = document.getElementById('as'+pos);
  if (!sl||!sl.classList.contains('fill')) return;
  var idx = parseInt(sl.dataset.idx);
  var t = document.getElementById('lt'+idx);
  if (t) t.classList.remove('used');
  _scr.ans.splice(pos,1);
  for (var i=0;i<_scr.word.length;i++) {
    var s=document.getElementById('as'+i);
    if (!s) continue;
    if (i<_scr.ans.length){s.textContent=_scr.ans[i].l;s.classList.add('fill');s.dataset.idx=_scr.ans[i].idx;}
    else{s.textContent='';s.classList.remove('fill');delete s.dataset.idx;}
  }
}
function scrCheck() {
  var ans = _scr.ans.map(function(x){return x.l;}).join('');
  var r = document.getElementById('scrres');
  if (ans.toLowerCase()===_scr.word.toLowerCase()) {
    r.innerHTML='&#x2705; Correct!'; r.style.color='var(--g)';
    addStars(5,'Scramble!'); say(_scr.word);
  } else {
    r.innerHTML='&#x274C; Answer: <strong>'+_scr.word+'</strong>'; r.style.color='var(--r)';
  }
}

  var h='<div class="card"><h3 style="margin-bottom:8px">&#x1F4E6; Sort It Out!</h3>'
    +'<p style="font-size:.82rem;color:#777;margin-bottom:8px">Tap a word, then choose a category:</p>'
    +'<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px" id="sortwords">'
    +all.map(function(w,i){return '<button class="chip" id="sw'+i+'" onclick="sortPick(\''+esc(w)+'\','+i+')">'+w+'</button>';}).join('')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
    +cats.map(function(c,ci){return '<div style="background:var(--bg);border:2px dashed #ccc;border-radius:11px;padding:10px;min-height:70px"><div style="font-size:.78rem;font-weight:700;color:#555;margin-bottom:6px">'+c.n+'</div><div id="sc'+ci+'" style="display:flex;flex-wrap:wrap;gap:5px"></div></div>';}).join('')
    +'</div>'
    +'<div class="brow"><button class="btn bg sm" onclick="sortCheck()">Check &#x2713;</button><button class="btn by sm" onclick="gameSort(document.getElementById(\'garea\'))">&#x1F504; New</button></div>'
    +'<div id="srtres" style="font-weight:700;text-align:center;margin-top:8px"></div></div>';
  a.innerHTML=h;
}
function sortPick(word,idx){
  var cats=_sort.cats;
  showMod('<h3>Place "'+word+'" in:</h3><div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">'
    +cats.map(function(c,ci){return '<button class="btn bg" onclick="sortAssign(\''+esc(word)+'\','+idx+','+ci+');closeMod()">'+c.n+'</button>';}).join('')
    +'<button class="btn" onclick="closeMod()" style="background:var(--bg)">Cancel</button></div>');
}
function sortAssign(word,idx,ci){
  var c=document.getElementById('sw'+idx);
  if(c)c.classList.add('placed');
  _sort.placed[ci].push(word);
  var cont=document.getElementById('sc'+ci);
  if(cont)cont.innerHTML+='<span class="bdg bdgg">'+word+'</span>';
}
function sortCheck(){
  var cats=_sort.cats,pl=_sort.placed,sc=0,tot=0;
  [0,1].forEach(function(ci){pl[ci].forEach(function(w){tot++;if(cats[ci].ws.indexOf(w)>=0)sc++;});});
  var r=document.getElementById('srtres');
  if(!tot){r.textContent='Place some words first!';return;}
  r.innerHTML=(sc===tot?'&#x2705;':'&#x26A0;')+' '+sc+'/'+tot+' correct!';
  if(sc>0)addStars(sc*2,'Sort!');
}

// PRONUNCIATION
var PRONS=[
  {t:"I'm going to go camping tomorrow.",tip:"Blend 'going to' naturally"},
  {t:"How's the weather going to be?",tip:"Falling tone at end"},
  {t:"What do you want to be?",tip:"Stress the job name"},
  {t:"I want to be an astronaut.",tip:"Stress 'astronaut'"},
  {t:"What did you do yesterday?",tip:"Stress 'yesterday'"},
  {t:"She has short curly red hair.",tip:"List adjectives: size, type, color"},
  {t:"I have to wash the dishes.",tip:"Blend 'have to' = hafta"},
  {t:"Which season do you like best?",tip:"Rising-falling question tone"},
  {t:"I'm going to go backpacking this summer.",tip:"Link words smoothly"},
  {t:"He likes to surf the Internet.",tip:"Add -s to 'like' for he/she/it"}
];
function gamePron(a){
  var items=PRONS.sort(function(){return Math.random()-.5;}).slice(0,5);
  var h='<div class="card"><h3>&#x1F3A4; Pronunciation Challenge</h3><p style="font-size:.82rem;color:#777;margin-bottom:10px">Listen first, then record yourself. Aim for 80%+!</p>';
  items.forEach(function(item,i){
    h+='<div class="card spk" style="margin-bottom:10px">'
      +'<div class="spktxt">'+item.t+'</div>'
      +'<div style="font-size:.75rem;color:var(--b);background:var(--bp);border-radius:6px;padding:3px 8px;margin-bottom:7px">&#x1F4A1; '+item.tip+'</div>'
      +'<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
      +'<button class="btn by sm" onclick="say(\''+esc(item.t)+'\')">&#x1F508; Listen</button>'
      +'<button class="micbtn" id="pm'+i+'" style="width:44px;height:44px;font-size:1.1rem" onclick="doSpeak(\''+esc(item.t)+'\',\'pm'+i+'\',\'ps'+i+'\')">&#x1F3A4;</button>'
      +'</div><div id="ps'+i+'"></div></div>';
  });
  h+='</div>';
  a.innerHTML=h;
}

// WORD CHAIN
function gameChain(a,v){
  var items=v.slice(0,12);
  var shuf=items.slice().sort(function(){return Math.random()-.5;});
  var h='<div class="card"><h3>&#x1F517; Word Chain</h3>'
    +'<p style="font-size:.82rem;color:#777;margin-bottom:10px">Tap each word to hear it, then match them to their pictures!</p>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div>';
  items.forEach(function(v,i){ h+='<div class="match-item" id="cw'+i+'" onclick="chainSel(\'w\',\''+esc(v.w)+'\','+i+')">'+v.w+'</div>'; });
  h+='</div><div>';
  shuf.forEach(function(v,i){ h+='<div class="match-item" id="ce'+i+'" onclick="chainSel(\'e\',\''+esc(v.w)+'\','+i+',\''+esc(shuf[i].w)+'\')">'+v.e+'</div>'; });
  h+='</div></div>'
    +'<div id="chainres" style="text-align:center;font-weight:700;margin-top:10px"></div>'
    +'<button class="btn bg sm" onclick="gameChain(document.getElementById(\'garea\'),getGVocab())" style="margin-top:8px">&#x1F504; New Game</button></div>';
  a.innerHTML=h;
  window._chain={sel:null,items:items,shuf:shuf,score:0};
}
function chainSel(type,word,idx,emword){
  var ch=window._chain;
  if(!ch)return;
  say(word);
  if(type==='w'){
    if(ch.sel&&ch.sel.type==='w'){var old=document.getElementById('cw'+ch.sel.idx);if(old)old.classList.remove('sel');}
    ch.sel={type:'w',word:word,idx:idx};
    document.getElementById('cw'+idx).classList.add('sel');
  } else {
    if(ch.sel&&ch.sel.type==='w'){
      var match=(emword===ch.sel.word);
      var wi=document.getElementById('cw'+ch.sel.idx);
      var ei=document.getElementById('ce'+idx);
      if(match){
        if(wi){wi.classList.remove('sel');wi.classList.add('hit');}
        if(ei)ei.classList.add('hit');
        ch.score++;addStars(2,'Match!');
      } else {
        if(wi){wi.classList.add('miss');setTimeout(function(){wi.classList.remove('miss','sel');},500);}
        if(ei){ei.classList.add('miss');setTimeout(function(){ei.classList.remove('miss');},500);}
      }
      ch.sel=null;
      if(ch.score>=ch.items.length){setTimeout(function(){showMod('<h3>&#x1F389; All matched!</h3><p>Great job!</p>');addStars(10,'Chain!');},300);}
    }
  }
}

  {u:"5 & 6",col:"var(--pu)",t:"Chris and Cindy's Treasure Hunt — Part 3",tx:"Chris is looking for Cindy. She went under the bridge and through the tunnel. What does Cindy look like? She has long brown hair and green eyes. She's the one in the red jacket. Chris went over the hill and into the woods. He was very excited to find the next clue! Their grandma is waiting at the entrance."},
  {u:"7 & 8",col:"var(--t)",t:"Chris and Cindy's Treasure Hunt — Part 4",tx:"Next weekend, Chris and Cindy are going to go back to the treasure hunt. Chris is going to go to the gift shop to buy supplies. He has to clear the table and vacuum the carpet before he goes. Cindy likes to read novels and borrow books. She's going to borrow a treasure map book from the library. Chris has a stomachache but he hopes he feels better soon!"}
];
function buildReview() {
  var h = '';
  REVIEW_STORIES.forEach(function(rs,i) {
    h += '<div class="card" style="margin-bottom:12px">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      + '<span class="bdg bdgb">Units ' + rs.u + '</span>'
      + '<strong style="font-size:.9rem">' + rs.t + '</strong></div>'
      + '<p class="story">' + rs.tx + '</p>'
      + '<div class="brow"><button class="btn by sm" onclick="say(\'' + esc(rs.tx) + '\')">&#x1F508; Listen</button>'
      + '<button class="btn bg sm" onclick="startRevQuiz(' + i + ')">&#x1F4DD; Quiz This Section</button></div></div>';
  });
  // Full word list
  h += '<div class="card"><div class="sh2">&#x1F4CB; Complete Word List</div>';
  CUR.units.forEach(function(u) {
    var all=(u.v1||[]).concat(u.v2||[]).concat(u.wx||[]).filter(function(v){return v&&v.w;});
    h += '<div style="margin-bottom:8px"><strong style="color:var(--g);font-size:.85rem">Unit ' + u.id + ': ' + u.title + '</strong><br>';
    all.forEach(function(v) {
      h += '<span class="bdg bdgg" style="margin:2px;cursor:pointer" onclick="say(\'' + esc(v.w) + '\')">' + v.e + ' ' + v.w + '</span>';
    });
    h += '</div>';
  });
  h += '</div>';
  document.getElementById('rvcontent').innerHTML = h;
}
function startRevQuiz(sectionIdx) {
  var unitIds = [[1,2],[3,4],[5,6],[7,8]][sectionIdx];
  var qs = [];
  unitIds.forEach(function(uid) {
    var u = CUR.units[uid-1];
    if (u) qs = qs.concat(makeQuestions(u));
  });
  qs = qs.sort(function(){return Math.random()-.5;}).slice(0,10);
  QZ.q = qs; QZ.cur = 0; QZ.score = 0; QZ.unit = {id:'R'+sectionIdx,title:'Review'};
  document.getElementById('rvcontent').innerHTML = '<div class="brow"><button class="btn by sm" onclick="buildReview()">&#x2190; Back to Review</button></div><div id="qzarea"></div>';
  showQ();
}

// ==================== HELPERS ====================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' ');
}

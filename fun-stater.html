<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fun for Starters – 45 Units</title>
<style>
:root{
  --listen:#e24b4a;--speak:#ba7517;--read:#0f6e56;--write:#185fa5;
  --purple:#534AB7;--gold:#f5c518;
  --bg:#f8f9fc;--card:#fff;--border:#e4e7ef;
  --text:#1a1a2e;--muted:#6b7280;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden}
#app{max-width:700px;margin:0 auto;padding:10px 10px 24px}

/* HEADER */
.hd{background:linear-gradient(135deg,#534AB7 0%,#0F6E56 100%);border-radius:var(--radius);padding:12px 14px;color:#fff;display:flex;align-items:center;gap:10px;margin-bottom:10px;box-shadow:0 4px 20px rgba(83,74,183,.35)}
.mascot-wrap{position:relative;flex-shrink:0}
.mascot{font-size:34px;display:block;transition:transform .15s;cursor:default;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.mascot.bounce{animation:bounce .4s ease}
.mascot.shake{animation:shake .4s ease}
.mascot.spin{animation:spin .5s ease}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-12px) scale(1.15)}60%{transform:translateY(-5px) scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px) rotate(-8deg)}40%,80%{transform:translateX(6px) rotate(8deg)}}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.speech-bubble{position:absolute;left:42px;top:-2px;background:#fff;color:#333;font-size:11px;font-weight:600;border-radius:10px;padding:4px 9px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:10}
.speech-bubble::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:#fff}
.speech-bubble.show{opacity:1}
.hd-info{flex:1;min-width:0}
.hd-t{font-size:16px;font-weight:700;line-height:1.2}
.hd-s{font-size:11px;opacity:.85;margin-top:2px}
.hd-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.pts-box{background:rgba(255,255,255,.2);border-radius:10px;padding:5px 10px;text-align:center;backdrop-filter:blur(4px)}
.pts-n{font-size:18px;font-weight:700}
.pts-l{font-size:10px;opacity:.85}
.streak-box{background:rgba(255,165,0,.25);border-radius:10px;padding:3px 8px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;min-width:60px;justify-content:center}
.streak-box.hidden{opacity:0;pointer-events:none}

/* SKILL TABS */
.skill-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.sk{border:2px solid var(--border);border-radius:12px;padding:8px 4px 6px;text-align:center;cursor:pointer;background:var(--card);transition:all .2s;user-select:none}
.sk:active{transform:scale(.95)}
.sk-i{font-size:20px;display:block;margin-bottom:2px}
.sk-l{font-size:11px;font-weight:600;color:var(--muted)}
.sk.listen{border-color:var(--listen)}.sk.listen .sk-l{color:var(--listen)}
.sk.speak{border-color:var(--speak)}.sk.speak .sk-l{color:var(--speak)}
.sk.read{border-color:var(--read)}.sk.read .sk-l{color:var(--read)}
.sk.write{border-color:var(--write)}.sk.write .sk-l{color:var(--write)}
.sk.on.listen{background:var(--listen);border-color:var(--listen);box-shadow:0 4px 12px rgba(226,75,74,.35)}.sk.on.listen .sk-l,.sk.on.listen .sk-i{color:#fff!important}
.sk.on.speak{background:var(--speak);border-color:var(--speak);box-shadow:0 4px 12px rgba(186,117,23,.35)}.sk.on.speak .sk-l,.sk.on.speak .sk-i{color:#fff!important}
.sk.on.read{background:var(--read);border-color:var(--read);box-shadow:0 4px 12px rgba(15,110,86,.35)}.sk.on.read .sk-l,.sk.on.read .sk-i{color:#fff!important}
.sk.on.write{background:var(--write);border-color:var(--write);box-shadow:0 4px 12px rgba(24,95,165,.35)}.sk.on.write .sk-l,.sk.on.write .sk-i{color:#fff!important}

/* UNIT BAR */
.unit-scroller{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.ub{border:2px solid var(--border);border-radius:8px;padding:3px 6px;font-size:11px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);transition:all .15s;min-width:28px;text-align:center}
.ub:hover{border-color:#534AB7;color:#534AB7}
.ub.on{background:#534AB7;color:#fff;border-color:#534AB7;transform:scale(1.1)}
.ub.done{background:#e1f5ee;border-color:#0f6e56;color:#0f6e56}
.ub.done.on{background:#0f6e56;color:#fff}

/* PANEL */
.panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;min-height:280px;box-shadow:var(--shadow);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ph-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:auto}
.ph-tag.listen{background:#fce9e9;color:var(--listen)}
.ph-tag.speak{background:#fef3e2;color:var(--speak)}
.ph-tag.read{background:#e1f5ee;color:var(--read)}
.ph-tag.write{background:#e6f1fb;color:var(--write)}

/* PROGRESS */
.pbar-wrap{margin-bottom:10px}
.pbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pbar-label{font-size:11px;color:var(--muted);font-weight:500}
.pbar{background:#f0f2f5;border-radius:20px;height:8px;overflow:hidden}
.pf{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.pf.listen{background:linear-gradient(90deg,#f87171,var(--listen))}
.pf.speak{background:linear-gradient(90deg,#fbbf24,var(--speak))}
.pf.read{background:linear-gradient(90deg,#34d399,var(--read))}
.pf.write{background:linear-gradient(90deg,#60a5fa,var(--write))}

/* STORY / TEXT BLOCKS */
.story{background:linear-gradient(135deg,#fff7f7,#fce9e9);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.9;color:var(--text);border-left:4px solid var(--listen);position:relative}
.story b{color:var(--listen);font-weight:700}
.story .sound-icon{position:absolute;top:8px;right:10px;font-size:16px;cursor:pointer;opacity:.6;transition:opacity .2s,transform .2s}
.story .sound-icon:hover{opacity:1;transform:scale(1.2)}
.story .sound-icon.playing{animation:pulse 0.8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.rtext{background:linear-gradient(135deg,#f0faf6,#e1f5ee);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.9;color:var(--text);border-left:4px solid var(--read)}
.rtext .hi{background:#0f6e56;border-radius:4px;padding:1px 4px;font-weight:700;color:#fff}
.speak-scene{background:linear-gradient(135deg,#fffdf0,#faeeda);border-radius:12px;padding:12px 14px;margin-bottom:10px;border-left:4px solid var(--speak);font-size:13px;line-height:1.8}
.speak-scene b{color:var(--speak)}
.wprompt{background:linear-gradient(135deg,#f0f5ff,#e6f1fb);border-radius:12px;padding:10px 13px;font-size:12px;color:#185fa5;margin-bottom:8px;border-left:4px solid var(--write);font-weight:600}
.ex-box{background:#fff8e1;border-radius:10px;padding:8px 12px;font-size:12px;color:#7a4a00;margin:8px 0;border:1px dashed #fbbf24}

/* QUESTION */
.qtext{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.5}

/* OPTIONS */
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.opt{background:#f8f9fc;border:2px solid var(--border);border-radius:12px;padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text);transition:all .15s;font-family:inherit;font-weight:500;flex:1;min-width:calc(50% - 4px)}
.opt:hover:not(.ok):not(.ng){border-color:#534AB7;background:#f0efff;transform:translateY(-1px)}
.opt:active{transform:scale(.97)}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#166534;font-weight:700;animation:popIn .3s ease}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.opt.reveal{background:#dcfce7;border-color:#16a34a;color:#166534}
@keyframes popIn{0%{transform:scale(.95)}60%{transform:scale(1.05)}100%{transform:scale(1)}}

.r-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.r-opt{background:#f8f9fc;border:2px solid var(--border);border-radius:12px;padding:9px 18px;font-size:13px;cursor:pointer;color:var(--text);transition:all .15s;font-family:inherit;font-weight:500}
.r-opt:hover:not(.ok):not(.ng){border-color:var(--read);background:#f0faf6}
.r-opt.ok{background:#dcfce7;border-color:#16a34a;color:#166534;font-weight:700;animation:popIn .3s ease}
.r-opt.ng{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.r-opt.reveal{background:#dcfce7;border-color:#16a34a;color:#166534}

/* FEEDBACK */
.fb{text-align:center;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-top:8px;display:none;animation:slideUp .3s ease}
.fb.show{display:block}
.fb.ok{background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#166534;border:1px solid #86efac}
.fb.ng{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#991b1b;border:1px solid #fca5a5}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* STREAK MESSAGE */
.streak-msg{text-align:center;font-size:15px;font-weight:800;color:#f59e0b;margin-top:6px;display:none;animation:popIn .4s ease}
.streak-msg.show{display:block}

/* WRITING */
.wbank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.wchip{background:#dbeafe;border:2px solid #93c5fd;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;color:#1e40af;cursor:pointer;transition:all .15s;user-select:none}
.wchip:hover{background:#93c5fd;transform:translateY(-2px)}
.wchip.used{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af;cursor:default;transform:none}
.blanks{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--text);background:#f8f9fc;border-radius:10px;padding:8px 12px;border:1px solid var(--border)}
.bin{border:none;border-bottom:2px solid var(--write);background:transparent;font-size:13px;font-weight:700;color:var(--write);font-family:inherit;outline:none;min-width:80px;padding:2px 6px;text-align:center;transition:border-color .2s}
.bin:focus{border-bottom-color:#534AB7}
.btn-check{background:linear-gradient(135deg,#534AB7,#185fa5);color:#fff;border:none;border-radius:25px;padding:10px 26px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .2s;box-shadow:0 3px 10px rgba(83,74,183,.3)}
.btn-check:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(83,74,183,.4)}
.btn-check:active{transform:scale(.97)}

/* SPEAKING INPUT */
.sinput{width:100%;border:2px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--text);background:var(--card);font-family:inherit;outline:none;transition:border-color .2s}
.sinput:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.1)}

/* NAV */
.navrow{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.nbtn{background:#f3f4f6;border:2px solid var(--border);border-radius:25px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s;font-weight:600}
.nbtn:hover{border-color:#534AB7;color:#534AB7;background:#f0efff}
.nbtn.next{background:linear-gradient(135deg,#534AB7,#4338ca);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(83,74,183,.3)}
.nbtn.next:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(83,74,183,.4)}

/* POPUP */
.pop-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.popup{background:var(--card);border-radius:20px;padding:30px 36px;text-align:center;border:2px solid var(--border);max-width:320px;width:92%;animation:popIn .35s ease;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.pop-ic{font-size:52px;margin-bottom:8px;animation:bounce .6s ease}
.pop-t{font-size:20px;font-weight:800;color:var(--text);margin-bottom:5px}
.pop-s{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.pop-btn{background:linear-gradient(135deg,#534AB7,#4338ca);color:#fff;border:none;border-radius:25px;padding:10px 26px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 4px 14px rgba(83,74,183,.35)}

/* CONFETTI */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* RESPONSIVE MOBILE */
@media(max-width:480px){
  #app{padding:8px 8px 20px}
  .hd{padding:10px 12px;gap:8px}
  .mascot{font-size:28px}
  .hd-t{font-size:14px}
  .pts-n{font-size:16px}
  .skill-row{gap:5px}
  .sk{padding:7px 3px 5px}
  .sk-i{font-size:18px}
  .sk-l{font-size:10px}
  .panel{padding:12px}
  .qtext{font-size:13px}
  .opts{gap:6px}
  .opt{font-size:12px;padding:8px 12px;min-width:calc(50% - 3px)}
  .popup{padding:22px 20px}
}
@media(max-width:360px){
  .opt{min-width:100%}
}

/* LANDSCAPE PHONE */
@media(max-height:500px) and (orientation:landscape){
  .hd{padding:8px 12px;margin-bottom:7px}
  .mascot{font-size:24px}
  .pts-n{font-size:14px}
  .panel{min-height:auto;padding:10px 14px}
  .story,.rtext,.speak-scene,.wprompt{padding:8px 10px;margin-bottom:7px}
  .unit-scroller{margin-bottom:6px;max-height:36px;overflow-y:auto}
  .skill-row{margin-bottom:6px}
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app">
  <div class="hd">
    <div class="mascot-wrap">
      <span class="mascot" id="mascot">🐒</span>
      <div class="speech-bubble" id="bubble"></div>
    </div>
    <div class="hd-info">
      <div class="hd-t">Fun for Starters</div>
      <div class="hd-s">Cambridge YLE · 45 Units · 4 Skills</div>
    </div>
    <div class="hd-right">
      <div class="pts-box">
        <div class="pts-n" id="pts">⭐ 0</div>
        <div class="pts-l">points</div>
      </div>
      <div class="streak-box hidden" id="streak-box">
        <span>🔥</span><span id="streak-count">0</span><span>streak</span>
      </div>
    </div>
  </div>
  <div class="skill-row">
    <div class="sk listen on" onclick="setSk('listen')"><span class="sk-i">🎧</span><span class="sk-l">Listening</span></div>
    <div class="sk speak" onclick="setSk('speak')"><span class="sk-i">🗣️</span><span class="sk-l">Speaking</span></div>
    <div class="sk read" onclick="setSk('read')"><span class="sk-i">📖</span><span class="sk-l">Reading</span></div>
    <div class="sk write" onclick="setSk('write')"><span class="sk-i">✏️</span><span class="sk-l">Writing</span></div>
  </div>
  <div class="unit-scroller" id="ubars"></div>
  <div class="panel" id="panel"></div>
  <div id="pop-container"></div>
</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
var pts=0,sk='listen',cu=1,qi=0,ans=false,streak=0,maxStreak=0;
var audioCtx=null;
var done={};

// ─── UNITS ──────────────────────────────────────────────────────────────────
var UNITS=[
  [1,"Say hello!","Greetings & alphabet"],
  [2,"Numbers, numbers, numbers","Numbers 1–20"],
  [3,"What's your name?","Names & spelling"],
  [4,"Red, blue and yellow","Colours"],
  [5,"Answering questions","Classroom language"],
  [6,"Animals and aliens","Animals & body parts"],
  [7,"Look, listen, smile, draw","Body & senses"],
  [8,"In my clothes cupboard","Clothes"],
  [9,"Funny monsters","Description"],
  [10,"Our families","Family members"],
  [11,"Whose is it?","Possessives: his/her/their"],
  [12,"Who's got the red balloon?","People in public"],
  [13,"Who can do this?","Abilities: can/can't"],
  [14,"Big, small, happy or sad?","Adjectives"],
  [15,"One, two, three animals","Animals & numbers"],
  [16,"What's your favourite fruit?","Fruit & vegetables"],
  [17,"What's on the menu?","Food & drinks"],
  [18,"A colourful house","Rooms & furniture"],
  [19,"What's in your bedroom?","Bedroom objects"],
  [20,"Ben and Kim live here!","House & home"],
  [21,"Play with us!","Toys & transport"],
  [22,"In our bags and in our school","School objects"],
  [23,"At our school","School & classroom"],
  [24,"What's the class doing?","Present continuous"],
  [25,"Animal challenge","Wild animals"],
  [26,"How many pets?","Pets & numbers"],
  [27,"Food I really like!","Food vocabulary"],
  [28,"My favourite food day","Meals & food"],
  [29,"We're in the toy shop today","Shopping & toys"],
  [30,"Monsters in the park","Prepositions"],
  [31,"Coming and going","Transport"],
  [32,"Happy birthday!","Birthdays & parties"],
  [33,"On the beach","Beach & weather"],
  [34,"Let's go to the park","Park activities"],
  [35,"What, who and where?","Question words"],
  [36,"Great games, great hobbies!","Hobbies & games"],
  [37,"Let's play","Sports"],
  [38,"My favourites","Favourite things"],
  [39,"One foot, two feet","Plurals"],
  [40,"Night and day","Time & routines"],
  [41,"Trains, boats and planes","Transport"],
  [42,"About a phone","Technology"],
  [43,"What are they saying?","Phrases & dialogue"],
  [44,"About us","Personal information"],
  [45,"Happy ending!","Review all topics"]
];

// ─── DATA ────────────────────────────────────────────────────────────────────
var DATA={
  listen:[
    {s:"<b>Hello!</b> I'm <b>Sam</b>. What's your name? My name is <b>Lucy</b>! Nice to meet you!",qs:[{q:"What is the boy's name?",o:["Sam","Ben","Nick","Tom"],c:0},{q:"What does Lucy say at the end?",o:["Goodbye","Nice to meet you","Hello","See you"],c:1},{q:"How does Sam greet Lucy?",o:["Good morning","Nice to meet you","Hello","Bye"],c:2}]},
    {s:"Listen! <b>One</b> cat, <b>two</b> dogs, <b>three</b> balls, <b>five</b> apples, <b>eight</b> books on the table.",qs:[{q:"How many cats are there?",o:["1","2","3","5"],c:0},{q:"How many books are on the table?",o:["3","5","7","8"],c:3},{q:"How many apples?",o:["1","3","5","7"],c:2}]},
    {s:"<b>Tom</b> has a name. <b>Smo</b> is a boy. <b>Lucy</b> is a girl. <b>Kim</b> and <b>Nick</b> are friends.",qs:[{q:"Who is a girl?",o:["Tom","Smo","Lucy","Kim"],c:2},{q:"Who is a boy?",o:["Lucy","Smo","Kim","Nick"],c:1},{q:"Who are friends?",o:["Tom and Smo","Lucy and Smo","Kim and Nick","Tom and Lucy"],c:2}]},
    {s:"<b>Red</b> + blue = purple. <b>Yellow</b> + blue = green. <b>White</b> + black = grey. <b>Red</b> + white = pink.",qs:[{q:"What do red and blue make?",o:["green","yellow","purple","orange"],c:2},{q:"What do yellow and blue make?",o:["purple","green","orange","pink"],c:1},{q:"What do red and white make?",o:["grey","brown","pink","orange"],c:2}]},
    {s:"How are <b>you</b>? Fine, thank you! <b>Tick</b> the box. <b>Draw</b> a line. <b>Write</b> yes. Put a <b>cross</b>.",qs:[{q:"What does 'tick' mean?",o:["draw a cross","write a word","put a check mark","colour it"],c:2},{q:"What is the answer to 'How are you?'",o:["My name is Lucy","Fine, thank you","I can swim","I like cats"],c:1},{q:"What does 'draw a line' mean?",o:["write","colour","make a line","tick the box"],c:2}]},

// ─── AUDIO ──────────────────────────────────────────────────────────────────
function getAudioCtx(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return audioCtx;
}
function playTone(freq,dur,type,vol){
  var ctx=getAudioCtx();if(!ctx)return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.15,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  o.start();o.stop(ctx.currentTime+dur);
}
function soundCorrect(){
  playTone(523,.12,'sine',.18);
  setTimeout(function(){playTone(659,.12,'sine',.18);},120);
  setTimeout(function(){playTone(784,.2,'sine',.18);},240);
}
function soundWrong(){
  playTone(200,.15,'sawtooth',.12);
  setTimeout(function(){playTone(160,.2,'sawtooth',.1);},160);
}
function soundClick(){playTone(440,.06,'sine',.08);}
function soundStreak(){
  [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,.15,'sine',.2);},i*80);});
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
var confettiParticles=[];
var confettiCanvas=document.getElementById('confetti-canvas');
var confCtx=confettiCanvas.getContext('2d');
var confettiRunning=false;

function launchConfetti(intensity){
  confettiCanvas.width=window.innerWidth;
  confettiCanvas.height=window.innerHeight;
  var n=intensity||30;
  var colors=['#f5c518','#e24b4a','#534AB7','#0f6e56','#185fa5','#ff6b6b','#ffd93d'];
  for(var i=0;i<n;i++){
    confettiParticles.push({
      x:Math.random()*confettiCanvas.width,
      y:-20,
      vx:(Math.random()-0.5)*5,
      vy:Math.random()*4+2,
      r:Math.random()*6+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*8,
      life:1
    });
  }
  if(!confettiRunning)animateConfetti();
}
function animateConfetti(){
  confettiRunning=true;
  confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles=confettiParticles.filter(function(p){return p.y<confettiCanvas.height+20;});
  confettiParticles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.rot+=p.rotV;p.life-=0.008;
    confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color;confCtx.globalAlpha=Math.max(p.life,0);
    confCtx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
    confCtx.restore();
  });
  if(confettiParticles.length>0)requestAnimationFrame(animateConfetti);
  else{confettiRunning=false;confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);}
}

// ─── STREAK ──────────────────────────────────────────────────────────────────
function addStreak(){
  streak++;
  document.getElementById('streak-count').textContent=streak;
  document.getElementById('streak-box').classList.toggle('hidden',streak<2);
  if(streak===3){soundStreak();showBubble(pickRandom(bubbleMsgs.right3));mascotAnim('spin');}
  else if(streak===5){soundStreak();launchConfetti(20);showBubble(pickRandom(bubbleMsgs.right5));mascotAnim('spin');}
  else if(streak>0&&streak%10===0){launchConfetti(50);showBubble('🔥 '+streak+' STREAK! INCREDIBLE!');}
}

  streak=0;
  document.getElementById('streak-box').classList.add('hidden');
}

function checkWrite(){
  var inputs=document.querySelectorAll('.bin');var cor=0,tot=inputs.length;
  inputs.forEach(function(inp){
    if(inp.value.trim().toLowerCase()===inp.dataset.key.toLowerCase()){
      inp.style.color='#0f6e56';inp.style.borderBottomColor='#0f6e56';cor++;
    } else {inp.style.color='#e24b4a';inp.style.borderBottomColor='#e24b4a';}
  });
  if(cor===tot){
    soundCorrect();setTimeout(function(){soundStreak();},300);
    setFb('wfb','ok','🎉 Perfect! All '+tot+' correct! +'+( tot+1)+' ⭐');
    pts+=tot+1;upPts();markDone();launchConfetti(40);
    mascotAnim('spin');showBubble(pickRandom(bubbleMsgs.perfect));
  } else if(cor>0){
    soundClick();setFb('wfb','ok','✅ '+cor+'/'+tot+' correct! +'+cor+' ⭐');
    pts+=cor;upPts();mascotAnim('bounce');
  } else {
    soundWrong();setFb('wfb','ng','❌ Try again! Use the word bank above.');
    mascotAnim('shake');showBubble(pickRandom(bubbleMsgs.wrong));
  }
}

// ── SPEECH SYNTHESIS ─────────────────────────────────────────────────────────
function speakText(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='en-GB';u.rate=0.85;u.pitch=1.1;
  var icon=document.getElementById('snd-icon');
  if(icon){icon.classList.add('playing');u.onend=function(){icon.classList.remove('playing');};}
  window.speechSynthesis.speak(u);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function nextQ(){
  qi++;ans=false;
  if(qi>0&&qi%3===0)markDone();
  render();
}
function markDone(){
  done[cu]=true;buildUBars();
  var doneCount=Object.keys(done).length;
  if(doneCount===45){showPopup('🏆','All 45 units done!','You are a Fun for Starters champion! 🎉');}
  else if(doneCount%10===0){showPopup('🎉',doneCount+' units done!','Fantastic progress! Keep going! ⭐');}
}
function showPopup(ic,t,s){
  launchConfetti(50);soundStreak();
  var c=document.getElementById('pop-container');
  c.innerHTML='<div class="pop-wrap"><div class="popup"><div class="pop-ic">'+ic+'</div><div class="pop-t">'+t+'</div><div class="pop-s">'+s+'</div><button class="pop-btn" onclick="soundClick();document.getElementById(\'pop-container\').innerHTML=\'\'">Continue ▶</button></div></div>';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildUBars();render();
setTimeout(function(){showBubble('Hi! Let\'s learn English! 🎉');mascotAnim('bounce');},500);
</script>

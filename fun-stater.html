.sk.read{border-color:var(--read)}.sk.read .sk-l{color:var(--read)}

.sk.on.speak{background:var(--speak);border-color:var(--speak)}.sk.on.speak .sk-l,.sk.on.speak .sk-i{color:#fff!important}

.blanks{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.brow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--color-text-primary)}
.bin{border:none;border-bottom:1.5px solid var(--write);background:transparent;font-size:13px;font-weight:500;color:var(--write);font-family:inherit;outline:none;min-width:80px;padding:2px 4px;text-align:center}

.nbtn{background:var(--color-background-secondary);border:1.5px solid var(--color-border-tertiary);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--color-text-secondary);transition:all .15s}

.pop-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;background:rgba(0,0,0,.3)}

.pop-s{font-size:13px;color:var(--color-text-secondary);margin-bottom:14px}

    {t:"The <span class='hi'>monster</span> is very big! It has got <span class='hi'>two</span> heads, <span class='hi'>six</span> funny tails and very <span class='hi'>long</span> arms.",qs:[{type:'yn',q:"The monster is small.",a:false},{type:'yn',q:"The monster has two heads.",a:true},{type:'ch',q:"How many tails does it have?",o:["two","four","six","eight"],c:2}]},

    {pr:"Write birthday words:",wb:["cake","candles","balloon","present","party"],bl:[{p:"You blow it out: ___",k:"candles"},{p:"You cut and eat it: ___",k:"cake"},{p:"You open a ___ .",k:"present"},{p:"You blow up a ___ .",k:"balloon"}]},
    {pr:"Write beach words:",wb:["sand","sea","boat","coconut","shell"],bl:[{p:"You walk on it at the beach: ___",k:"sand"},{p:"You swim in the ___ .",k:"sea"},{p:"You sail in a ___ .",k:"boat"},{p:"You find it on the beach: ___",k:"shell"}]},
    {pr:"Write park activity words:",wb:["running","flying","kicking","waving","picking"],bl:[{p:"The boy is ___ a kite.",k:"flying"},{p:"The small boy is ___ a ball.",k:"kicking"},{p:"The man is ___ hello.",k:"waving"},{p:"The woman is ___ up a pear.",k:"picking"}]},
    {pr:"Write question words:",wb:["Who","What","Where","How","Whose"],bl:[{p:"___ is this? It's Tony.",k:"Who"},{p:"___ is this? A hat.",k:"What"},{p:"___ 's the crocodile? Here!",k:"Where"},{p:"___ 's hat is this? Tony's.",k:"Whose"}]},
    {pr:"Write hobby words:",wb:["playing","listening","drawing","singing","fishing"],bl:[{p:"Kim likes ___ computer games.",k:"playing"},{p:"She likes ___ to music.",k:"listening"},{p:"Nick likes ___ pictures.",k:"drawing"},{p:"Grace loves ___ .",k:"fishing"}]},
    {pr:"Write sport words:",wb:["football","swimming","tennis","basketball","cricket"],bl:[{p:"You play it with a racket: ___",k:"tennis"},{p:"You do it in water: ___",k:"swimming"},{p:"You kick a round ball: ___",k:"football"},{p:"You shoot hoops: ___",k:"basketball"}]},
    {pr:"Write category names:",wb:["clothes","colours","animals","sports","food"],bl:[{p:"Dog, cat, tiger: ___",k:"animals"},{p:"Red, blue, green: ___",k:"colours"},{p:"Boots, dress, hat: ___",k:"clothes"},{p:"Tennis, football, swimming: ___",k:"sports"}]},
    {pr:"Write irregular plurals:",wb:["mice","feet","children","sheep","fish"],bl:[{p:"mouse → ___",k:"mice"},{p:"foot → ___",k:"feet"},{p:"child → ___",k:"children"},{p:"sheep → ___",k:"sheep"}]},
    {pr:"Write parts of the day:",wb:["morning","afternoon","evening","night","lunch"],bl:[{p:"You get up in the ___ .",k:"morning"},{p:"You eat lunch in the ___ .",k:"afternoon"},{p:"You have dinner in the ___ .",k:"evening"},{p:"You sleep at ___ .",k:"night"}]},
    {pr:"Write transport words:",wb:["bike","plane","lorry","motorbike","helicopter"],bl:[{p:"b _ k _",k:"bike"},{p:"p l _ n _",k:"plane"},{p:"l _ r r _",k:"lorry"},{p:"h _ l _ c _ p t _ r",k:"helicopter"}]},
    {pr:"Write technology words:",wb:["phone","numbers","bag","school","friends"],bl:[{p:"You talk to your ___ on a phone.",k:"friends"},{p:"A phone has letters and ___ .",k:"numbers"},{p:"Mrs Bean puts it in her ___ .",k:"bag"},{p:"She teaches at a ___ .",k:"school"}]},
    {pr:"Write polite phrases:",wb:["Goodbye","Thank you","Pardon","Sorry","Here"],bl:[{p:"___ ! I'm leaving!",k:"Goodbye"},{p:"___ very much!",k:"Thank you"},{p:"___ ? I didn't hear.",k:"Pardon"},{p:"___ you are! (giving something)",k:"Here"}]},
    {pr:"Write personal information words:",wb:["name","age","teacher","friends","sports"],bl:[{p:"What's your ___ ? Kim.",k:"name"},{p:"How old are you? I'm eight — that's my ___ .",k:"age"},{p:"What are your ___ ' names? Anna and Tom.",k:"friends"},{p:"What ___ do you do? Swimming!",k:"sports"}]},
    {pr:"Write mixed words from all units:",wb:["crossword","alphabet","animal","number","food"],bl:[{p:"A ___ has across and down words.",k:"crossword"},{p:"a-b-c-d is the ___ .",k:"alphabet"},{p:"A tiger is a wild ___ .",k:"animal"},{p:"Pizza is a type of ___ .",k:"food"}]}
  ]
};

function upPts(){document.getElementById('pts').textContent='⭐ '+pts;}
function buildUBars(){
  var c=document.getElementById('ubars');c.innerHTML='';
  UNITS.forEach(function(u,i){
    var b=document.createElement('button');b.className='ub'+(done[u[0]]?' done':'')+(cu===u[0]?' on':'');
    b.textContent=u[0];b.title=u[1];
    b.onclick=function(){cu=u[0];qi=0;ans=false;buildUBars();render();};
    c.appendChild(b);
  });
}
function setSk(s){
  sk=s;qi=0;ans=false;
  document.querySelectorAll('.sk').forEach(function(el){el.classList.remove('on');});
  document.querySelector('.sk.'+s).classList.add('on');
  render();
}
function render(){
  var p=document.getElementById('panel');
  if(sk==='listen')renderListen(p);
  else if(sk==='speak')renderSpeak(p);
  else if(sk==='read')renderRead(p);
  else if(sk==='write')renderWrite(p);
}
function setFb(id,cls,txt){
  var el=document.getElementById(id);if(!el)return;
  if(!txt){el.className='fb';el.textContent='';return;}
  el.className='fb '+cls+' show';el.textContent=txt;
}

function renderListen(p){
  var di=DATA.listen[cu-1];var q=di.qs[qi%di.qs.length];var tot=di.qs.length;
  p.innerHTML='<div class="ph">🎧 <span>Listening — Unit '+cu+': '+UNITS[cu-1][1]+'</span></div>'
    +'<div class="pbar"><div class="pf listen" style="width:'+Math.round((qi%tot+1)/tot*100)+'%"></div></div>'
    +'<div class="pi">Q '+(qi%tot+1)+' / '+tot+'</div>'
    +'<div class="story">🔊 Listen and read:<br><br>'+di.s+'</div>'
    +'<div class="qtext">'+q.q+'</div>'
    +'<div class="opts" id="lopts"></div>'
    +'<div class="fb" id="lfb"></div>'
    +'<div class="navrow"><button class="nbtn" onclick="qi=0;ans=false;render()">↺</button>'
    +'<button class="nbtn next" onclick="nextQ()">Next ▶</button></div>';
  q.o.forEach(function(o,i){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){
      if(ans)return;ans=true;
      document.querySelectorAll('#lopts .opt').forEach(function(x){x.onclick=null;});
      if(i===q.c){b.classList.add('ok');setFb('lfb','ok','✅ Correct! Well done! +1 ⭐');pts++;upPts();}
      else{b.classList.add('ng');document.querySelectorAll('#lopts .opt')[q.c].classList.add('ok');setFb('lfb','ng','❌ Not quite! The answer is "'+q.o[q.c]+'"');}
    };
    document.getElementById('lopts').appendChild(b);
  });
}

function renderSpeak(p){
  var pr=DATA.speak[cu-1];var q=pr[qi%pr.length];var tot=pr.length;
  p.innerHTML='<div class="ph">🗣️ <span>Speaking — Unit '+cu+': '+UNITS[cu-1][1]+'</span></div>'
    +'<div class="pbar"><div class="pf speak" style="width:'+Math.round((qi%tot+1)/tot*100)+'%"></div></div>'
    +'<div class="pi">Q '+(qi%tot+1)+' / '+tot+'</div>'
    +'<div class="speak-scene"><b>🐒 Rô-bốt hỏi:</b><br><br><em>'+q.q+'</em></div>'
    +'<input class="sinput" id="spin" placeholder="Type your answer here..." />'
    +'<div class="ex-box">💡 Example answer: '+q.a+'</div>'
    +'<div class="fb" id="sfb"></div>'
    +'<div class="navrow">'
    +'<button class="nbtn" onclick="checkSpeak()">Check ✓</button>'
    +'<button class="nbtn next" onclick="nextQ()">Next ▶</button></div>';
}
function checkSpeak(){
  var v=document.getElementById('spin').value.trim();
  if(v.length<2){setFb('sfb','ng','Please type something!');return;}
  setFb('sfb','ok','✅ Great practice! Compare with the example above. +1 ⭐');pts++;upPts();
}

function renderRead(p){
  var d=DATA.read[cu-1];var q=d.qs[qi%d.qs.length];var tot=d.qs.length;
  p.innerHTML='<div class="ph">📖 <span>Reading — Unit '+cu+': '+UNITS[cu-1][1]+'</span></div>'
    +'<div class="pbar"><div class="pf read" style="width:'+Math.round((qi%tot+1)/tot*100)+'%"></div></div>'
    +'<div class="pi">Q '+(qi%tot+1)+' / '+tot+'</div>'
    +'<div class="rtext">'+d.t+'</div>'
    +'<div class="qtext">'+q.q+'</div>'
    +'<div class="r-opts" id="ropts"></div>'
    +'<div class="fb" id="rfb"></div>'
    +'<div class="navrow"><button class="nbtn" onclick="qi=0;ans=false;render()">↺</button>'
    +'<button class="nbtn next" onclick="nextQ()">Next ▶</button></div>';
  if(q.type==='yn'){
    ['Yes','No'].forEach(function(o,i){
      var b=document.createElement('button');b.className='r-opt';b.textContent=o;
      b.onclick=function(){
        if(ans)return;ans=true;
        document.querySelectorAll('#ropts .r-opt').forEach(function(x){x.onclick=null;});
        var correct=(i===0)===q.a;
        if(correct){b.classList.add('ok');setFb('rfb','ok','✅ Correct! +1 ⭐');pts++;upPts();}
        else{b.classList.add('ng');document.querySelectorAll('#ropts .r-opt')[q.a?0:1].classList.add('ok');setFb('rfb','ng','❌ The answer is '+(q.a?'Yes':'No'));}
      };
      document.getElementById('ropts').appendChild(b);
    });
  } else {
    q.o.forEach(function(o,i){
      var b=document.createElement('button');b.className='r-opt';b.textContent=o;
      b.onclick=function(){
        if(ans)return;ans=true;
        document.querySelectorAll('#ropts .r-opt').forEach(function(x){x.onclick=null;});
        if(i===q.c){b.classList.add('ok');setFb('rfb','ok','✅ Correct! +1 ⭐');pts++;upPts();}
        else{b.classList.add('ng');document.querySelectorAll('#ropts .r-opt')[q.c].classList.add('ok');setFb('rfb','ng','❌ The answer is "'+q.o[q.c]+'"');}
      };
      document.getElementById('ropts').appendChild(b);
    });
  }
}

function renderWrite(p){
  var d=DATA.write[cu-1];
  p.innerHTML='<div class="ph">✏️ <span>Writing — Unit '+cu+': '+UNITS[cu-1][1]+'</span></div>'
    +'<div class="wprompt">'+d.pr+'</div>'
    +'<div class="wbank" id="wbank"></div>'
    +'<div class="blanks" id="blanks"></div>'
    +'<div style="text-align:center"><button class="btn-check" onclick="checkWrite()">Check answers ✓</button></div>'
    +'<div class="fb" id="wfb"></div>'
    +'<div class="navrow"><button class="nbtn" onclick="render()">↺</button>'
    +'<button class="nbtn next" onclick="nextQ()">Next Unit ▶</button></div>';
  d.wb.forEach(function(w){
    var c=document.createElement('span');c.className='wchip';c.textContent=w;
    c.onclick=function(){
      if(c.classList.contains('used'))return;
      var ins=document.querySelector('.bin:not([data-filled])');
      if(ins){ins.value=w;ins.dataset.filled='1';c.classList.add('used');}
    };
    document.getElementById('wbank').appendChild(c);
  });
  var bl=document.getElementById('blanks');
  d.bl.forEach(function(b,i){
    var row=document.createElement('div');row.className='brow';
    var parts=b.p.split('___');
    if(parts.length===2){
      row.innerHTML='<span>'+parts[0]+'</span><input class="bin" id="bi'+i+'" data-key="'+b.k+'" placeholder="___" /><span>'+parts[1]+'</span>';
    } else {
      row.innerHTML='<span>'+b.p+' </span><input class="bin" id="bi'+i+'" data-key="'+b.k+'" placeholder="___" />';
    }
    bl.appendChild(row);
  });
}
function checkWrite(){
  var inputs=document.querySelectorAll('.bin');var cor=0,tot=inputs.length;
  inputs.forEach(function(inp){
    var k=inp.dataset.key;
    if(inp.value.trim().toLowerCase()===k.toLowerCase()){inp.style.color='#0f6e56';inp.style.borderBottomColor='#0f6e56';cor++;}
    else{inp.style.color='#e24b4a';inp.style.borderBottomColor='#e24b4a';}
  });
  if(cor===tot){setFb('wfb','ok','✅ Perfect! All '+tot+' correct! +2 ⭐');pts+=2;upPts();markDone();}
  else if(cor>0){setFb('wfb','ok','✅ '+cor+'/'+tot+' correct! +'+cor+' ⭐');pts+=cor;upPts();}
  else setFb('wfb','ng','❌ Try again! Use the word bank above.');
}

function nextQ(){
  qi++;ans=false;
  if(qi>0&&qi%3===0)markDone();
  render();
}
function markDone(){
  done[cu]=true;buildUBars();
}
function showPopup(ic,t,s){
  var c=document.getElementById('pop-container');
  c.innerHTML='<div class="pop-wrap"><div class="popup"><div class="pop-ic">'+ic+'</div><div class="pop-t">'+t+'</div><div class="pop-s">'+s+'</div><button class="pop-btn" onclick="document.getElementById(\'pop-container\').innerHTML=\'\'">Continue ▶</button></div></div>';
}

buildUBars();render();
</script>

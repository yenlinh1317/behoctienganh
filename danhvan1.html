<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Học Đánh Vần Tiếng Việt Lớp 1 - Dấu Thanh Rời Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); display: flex; justify-content: center; align-items: center; font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; }
        
        #gameArea {
            width: 800px; height: 650px; position: absolute; transform-origin: center center;
            background: #ffffff; overflow: hidden; border: 8px solid #4a4a8a; border-radius: 35px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        #hud {
            width: 100%; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; font-size: 24px; font-weight: bold;
            background: #f1f2f6; padding: 12px 30px; border-radius: 25px; border: 4px solid #ced6e0; box-shadow: 0 6px 0 #ced6e0; position: relative; z-index: 10;
        }
        #scoreDisplay { color: #ff4757; font-size: 28px; font-weight: 900; }
        #timerDisplay { color: #2ed573; font-weight: 900; }

        #picture-display-box {
            width: 95%; height: 170px; background: #f1f2f6; border: 5px solid #ffa502; border-radius: 25px;
            box-shadow: 0 8px 0 #ffa502; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        }
        #targetImage { font-size: 85px; line-height: 1; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        #wordHintText { font-size: 30px; font-weight: 900; color: #ff4757; letter-spacing: 2px; background: #ffffff; padding: 4px 25px; border-radius: 15px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); text-transform: uppercase; }

        /* Ô TRỐNG HIỂN THỊ KÝ TỰ ĐƯỢC PHÓNG TO */
        #slotsRow { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; min-height: 90px; width: 95%; }
        .letter-slot {
            width: 85px; height: 85px; border: 4px dashed #747d8c; border-radius: 22px;
            background: rgba(0,0,0,0.03); display: flex; justify-content: center; align-items: center;
            font-size: 46px; font-weight: 900; color: #2f3542; box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
        }
        .letter-slot.filled { border-style: solid; border-color: #2ed573; background: #e3fcef; color: #2ed573; box-shadow: 0 6px 0 #22bb59; }

        /* KHU VỰC BONG BÓNG: Thiết kế lại Flexbox chống bóp méo hình tròn */
        #lettersContainer { width: 95%; height: 160px; display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 5px; }
        
        /* ĐÃ SỬA: Ép cứng tỉ lệ aspect-ratio và kích thước hình tròn tuyệt đối 1:1 */
        .bubble-letter {
            width: 100px; height: 100px; min-width: 100px; min-height: 100px; border-radius: 50% !important; 
            color: white; font-size: 46px; font-weight: 900; aspect-ratio: 1 / 1;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: inset -10px -12px 20px rgba(0,0,0,0.25), 0 10px 20px rgba(0,0,0,0.15);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); animation: floatBubble 3s ease-in-out infinite alternate;
        }
        @keyframes floatBubble { 0% { transform: translateY(0) rotate(-2deg); } 100% { transform: translateY(-15px) rotate(2deg); } }

        .flash-correct { animation: bgGreen 0.3s ease-out; }
        .flash-wrong { animation: bgRed 0.3s ease-out; }
        @keyframes bgGreen { 50% { background: #e3fcef; } }
        @keyframes bgRed { 50% { background: #ffebee; } }

        #gameOverScreen, #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #2c3e50; z-index: 100; padding: 30px; text-align: center; }
        .screen-title { font-size: 52px; color: #ff4757; margin-bottom: 20px; font-weight: 900; text-shadow: 4px 4px 0 #f1f2f6; line-height: 1.2; }
        .action-btn { padding: 18px 60px; font-size: 26px; font-weight: bold; background: #2ed573; border: none; color: white; border-radius: 25px; cursor: pointer; box-shadow: 0 10px 0 #22bb59; margin-top: 25px; transition: all 0.1s; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #22bb59; }
    </style>
</head>
<body>
<div id="gameArea">
    <div id="startScreen">
        <h1 class="screen-title" style="color: #ff9f43;">ĐÁNH VẦN TIẾNG VIỆT 🎈<br><span style="font-size:30px; color:#2ed573;"> </span></h1>
        <p style="font-size: 25px; margin-bottom: 35px; color: #57606f; font-weight: bold;"> Minh Khang ! 🧩</p>
        <button class="action-btn" onclick="initGame()">Bắt Đầu Học Đánh Vần 🎮</button>
    </div>
    <div id="gameOverScreen" style="display: none;">
        <h1 class="screen-title" style="color: #2ed573;">XUẤT SẮC! 🏆</h1>
        <p style="font-size: 30px; margin-bottom: 25px; color: #57606f; font-weight: bold;">Bé đã hoàn thành đánh vần: <span id="finalScore" style="color:#ff4757; font-size:40px;">0</span> / 9 từ ngữ</p>
        <button class="action-btn" style="background: #ffa502; box-shadow: 0 10px 0 #e69500;" onclick="location.reload()">Học Tiếp Từ Mới 🔄</button>
    </div>
    
    <div id="hud" style="visibility: hidden;">
        <div id="score-box">⭐ Từ đã đúng: <span id="scoreDisplay">0</span> / 9</div>
        <div id="timerDisplay">⏱️ Thời gian: 15.0s</div>
    </div>
    
    <div id="picture-display-box" style="visibility: hidden;">
        <div id="targetImage">🍇</div>
        <div id="wordHintText">ba</div>
    </div>

    <div id="slotsRow" style="visibility: hidden;"></div>
    <div id="lettersContainer" style="visibility: hidden;"></div>
</div>
<script>
    // ==================== KHAI BÁO CÁC PHẦN TỬ ĐIỀU KHIỂN DOM ====================
    const gameArea = document.getElementById('gameArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const targetImage = document.getElementById('targetImage');
    const wordHintText = document.getElementById('wordHintText');
    const slotsRow = document.getElementById('slotsRow');
    const lettersContainer = document.getElementById('lettersContainer');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');
    const hud = document.getElementById('hud');
    const pictureDisplayBox = document.getElementById('picture-display-box');

    // ĐÃ SỬA LỖI MÉO HÌNH: Hàm co giãn tính tỷ lệ đồng nhất Math.min giúp giữ nguyên hình tròn xịn trên iPhone
    function resizeGame() {
        const targetWidth = 800; const targetHeight = 650;
        const windowWidth = window.innerWidth; const windowHeight = window.innerHeight;
        
        let scaleX = windowWidth / targetWidth; 
        let scaleY = windowHeight / targetHeight;
        let optimalScale = Math.min(scaleX, scaleY); // Lấy tỷ lệ nhỏ nhất để giữ đúng tỷ lệ 1:1 không bị méo dẹt

        gameArea.style.transform = `scale(${optimalScale})`;
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));
    resizeGame();

    const BUBBLE_COLORS = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#ff6b81", "#78e08f", "#9b59b6"];

    // ==================== KHO DỮ LIỆU ĐÁNH VẦN CHUẨN ĐỒ HỌA PHẲNG ====================
    const VIET_WORDS_DATABASE = [
        { word: "ba", letters: ["b", "a"], display: ["b", "a"], icon: "👨" },
        { word: "bà", letters: ["b", "a", "huyền"], display: ["b", "a", "◌̀"], icon: "👵" },
        { word: "bé", letters: ["b", "e", "sắc"], display: ["b", "e", "◌́"], icon: "👶" },
        { word: "bè", letters: ["b", "e", "huyền"], display: ["b", "e", "◌̀"], icon: "⛵" },
        { word: "bế", letters: ["b", "ê", "sắc"], display: ["b", "ê", "◌́"], icon: "👩‍🍼" },
        { word: "bò", letters: ["b", "o", "huyền"], display: ["b", "o", "◌̀"], icon: "🐂" },
        { word: "bố", letters: ["b", "ô", "sắc"], display: ["b", "ô", "◌́"], icon: "👨‍🦱" },
        { word: "ca", letters: ["c", "a"], display: ["c", "a"], icon: "🥛" },
        { word: "cá", letters: ["c", "a", "sắc"], display: ["c", "a", "◌́"], icon: "🐟" },
        { word: "cà", letters: ["c", "a", "huyền"], display: ["c", "a", "◌̀"], icon: "🍆" },
        { word: "cỏ", letters: ["c", "o", "hỏi"], display: ["c", "o", "◌̉"], icon: "🌱" },
        { word: "cọ", letters: ["c", "o", "nặng"], display: ["c", "o", "◌̣"], icon: "🖌️" },
        { word: "ho", letters: ["h", "o"], display: ["h", "o"], icon: "😷" },
        { word: "hò", letters: ["h", "o", "huyền"], display: ["h", "o", "◌̀"], icon: "🎤" },
        { word: "hồ", letters: ["h", "ô", "huyền"], display: ["h", "ô", "◌̀"], icon: "🏞️" },
        { word: "hổ", letters: ["h", "ô", "hỏi"], display: ["h", "ô", "◌̉"], icon: "🐯" },
        { word: "kẻ", letters: ["k", "e", "hỏi"], display: ["k", "e", "◌̉"], icon: "📏" },
        { word: "kệ", letters: ["k", "ê", "nặng"], display: ["k", "ê", "◌̣"], icon: "🗄️" },
        { word: "kí", letters: ["k", "i", "sắc"], display: ["k", "i", "◌́"], icon: "✍️" },
        { word: "kĩ", letters: ["k", "i", "ngã"], display: ["k", "i", "◌̃"], icon: "🛠️" },
        { word: "kỉ", letters: ["k", "i", "hỏi"], display: ["k", "i", "◌̉"], icon: "🏅" },
        { word: "lá", letters: ["l", "a", "sắc"], display: ["l", "a", "◌́"], icon: "🍃" },
        { word: "lê", letters: ["l", "ê"], display: ["l", "ê"], icon: "🍐" },
        { word: "lọ", letters: ["l", "o", "nặng"], display: ["l", "o", "◌̣"], icon: "🏺" }
    ];

    let score = 0; let currentQuestionIdx = 0; let questionsList = [];
    let correctSequence = []; let bubbleItemsPool = []; let currentSelectStep = 0; 
    let isBlockClick = false; let gameOver = false;
    let timerInterval = null; let timeLeft = 15; let audioCtx = null;
// ==================== HỆ THỐNG ÂM THANH (WEB AUDIO API & TTS) ====================
    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSoundTone(frequency, type, duration) {
        try {
            initAudioContext();
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }

    function speakVietnamese(textToSpeak, callback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'vi-VN'; utterance.rate = 0.85;
            if(callback) utterance.onend = function() { callback(); };
            window.speechSynthesis.speak(utterance);
        } else if (callback) { setTimeout(callback, 2000); }
    }

    // ==================== CƠ CHẾ ĐẾM NGƯỢC THỜI GIAN ====================
    function startTimer() {
        clearInterval(timerInterval); timeLeft = 15;
        timerDisplay.innerText = `⏱️ Thời gian: 15.0s`;
        timerInterval = setInterval(() => {
            if (gameOver || isBlockClick) return;
            timeLeft -= 0.1;
            timerDisplay.innerText = `⏱️ Thời gian: ${Math.max(0, timeLeft).toFixed(1)}s`;
            if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeOut(); }
        }, 100);
    }

    function handleTimeOut() {
        isBlockClick = true; playSoundTone(150, 'sawtooth', 0.5);
        gameArea.className = 'flash-wrong';
        speakVietnamese("Hết giờ rồi!", function() { 
            gameArea.className = ''; 
            advanceToNextQuestion(); 
        });
    }

    // ==================== THUẬT TOÁN ÉP TỔ HỢP DẤU TIẾNG VIỆT UNICODE ====================
    function combineCharWithTone(baseChar, toneName) {
        const toneMap = {
            'a': { 'sắc': 'á', 'huyền': 'à', 'hỏi': 'ả', 'ngã': 'ã', 'nặng': 'ạ' },
            'e': { 'sắc': 'é', 'huyền': 'è', 'hỏi': 'ẻ', 'ngã': 'ẽ', 'nặng': 'ẹ' },
            'ê': { 'sắc': 'ế', 'huyền': 'ề', 'hỏi': 'ể', 'ngã': 'ễ', 'nặng': 'ệ' },
            'o': { 'sắc': 'ó', 'huyền': 'ò', 'hỏi': 'ỏ', 'ngã': 'õ', 'nặng': 'ọ' },
            'ô': { 'sắc': 'ố', 'huyền': 'ồ', 'hỏi': 'ổ', 'ngã': 'ỗ', 'nặng': 'ộ' },
            'i': { 'sắc': 'í', 'huyền': 'ì', 'hỏi': 'ỉ', 'ngã': 'ĩ', 'nặng': 'ị' }
        };
        if (toneMap[baseChar] && toneMap[baseChar][toneName]) {
            return toneMap[baseChar][toneName];
        }
        return baseChar;
    }

    // ==================== KHỞI CHẠY GAME & TRỘN BỘ CÂU HỎI ====================
    function initGame() {
        initAudioContext();
        startScreen.style.display = 'none'; hud.style.visibility = 'visible'; pictureDisplayBox.style.visibility = 'visible';
        slotsRow.style.visibility = 'visible'; lettersContainer.style.visibility = 'visible';

        questionsList = [...VIET_WORDS_DATABASE].sort(() => Math.random() - 0.5).slice(0, 9);
        score = 0; currentQuestionIdx = 0; gameOver = false;
        scoreDisplay.innerText = score; loadQuestion();
    }

    function loadQuestion() {
        isBlockClick = false; 
        if (currentQuestionIdx >= questionsList.length) { endGame(); return; }
        
        const q = questionsList[currentQuestionIdx];
        targetImage.innerText = q.icon;
        wordHintText.innerText = q.word;

        correctSequence = [...q.letters]; 
        currentSelectStep = 0;

        slotsRow.innerHTML = "";
        let textLettersCount = q.letters.filter(item => !['sắc','huyền','hỏi','ngã','nặng'].includes(item)).length;
        for (let i = 0; i < textLettersCount; i++) {
            slotsRow.innerHTML += `<div class="letter-slot" id="slot-${i}">?</div>`;
        }

        bubbleItemsPool = [];
        q.letters.forEach((codeName, index) => {
            bubbleItemsPool.push({ code: codeName, text: q.display[index] });
        });

        bubbleItemsPool.sort(() => 0.5 - Math.random());
        
        lettersContainer.innerHTML = "";
        bubbleItemsPool.forEach((item, idx) => {
            let randomColor = BUBBLE_COLORS[idx % BUBBLE_COLORS.length];
            lettersContainer.innerHTML += `
                <div class="bubble-letter" 
                     style="background-color: ${randomColor}; --balloon-base-color: ${randomColor};" 
                     onclick="clickLetterBubble(this, '${item.code}')">
                     ${item.text}
                </div>`;
        });

        speakVietnamese(`Bé hãy đánh vần từ: ${q.word}`);
        startTimer();
    }

    // ==================== LOGIC BẤM CHỌN BONG BÓNG ĐÁNH VẦN CHUẨN TRÒN TRỊA ====================
    function clickLetterBubble(bubbleEl, clickedCode) {
        if (isBlockClick || gameOver) return;
        
        let targetCode = correctSequence[currentSelectStep];

        if (clickedCode === targetCode) {
            playSoundTone(523.25, 'sine', 0.1);
            
            bubbleEl.style.transform = 'scale(0)';
            bubbleEl.style.pointerEvents = 'none';

            if (!['sắc', 'huyền', 'hỏi', 'ngã', 'nặng'].includes(clickedCode)) {
                let slotId = currentSelectStep; 
                let slot = document.getElementById(`slot-${slotId}`);
                if (slot) {
                    slot.innerText = clickedCode;
                    slot.classList.add('filled');
                }
            } else {
                let slotId = currentSelectStep - 1; 
                let slot = document.getElementById(`slot-${slotId}`);
                if (slot) {
                    let baseChar = slot.innerText;
                    let combinedChar = combineCharWithTone(baseChar, clickedCode);
                    slot.innerText = combinedChar;
                }
            }

            currentSelectStep++;

            if (currentSelectStep === correctSequence.length) {
                isBlockClick = true; clearInterval(timerInterval);
                gameArea.className = 'flash-correct';
                playSoundTone(587.33, 'sine', 0.15); setTimeout(() => playSoundTone(880, 'sine', 0.25), 100);
                
                score++; scoreDisplay.innerText = score;
                
                speakVietnamese(`Chính xác! Từ: ${questionsList[currentQuestionIdx].word}`, function() {
                    gameArea.className = '';
                    advanceToNextQuestion();
                });
            }
        } else {
            playSoundTone(180, 'sawtooth', 0.35);
            bubbleEl.style.animation = 'none';
            void bubbleEl.offsetWidth; 
            bubbleEl.style.animation = 'shake 0.2s 2';
            speakVietnamese("Bé chọn chưa đúng!");
        }
    }

    function advanceToNextQuestion() { currentQuestionIdx++; loadQuestion(); }

    function endGame() {
        gameOver = true; clearInterval(timerInterval);
        hud.style.visibility = 'hidden'; pictureDisplayBox.style.visibility = 'hidden'; slotsRow.style.visibility = 'hidden'; lettersContainer.style.visibility = 'hidden';
        gameOverScreen.style.display = 'flex'; finalScore.innerText = score;
        speakVietnamese("Bé giỏi quá! Đã hoàn thành bài học đánh vần rồi!");
    }
</script>
</body>
</html>

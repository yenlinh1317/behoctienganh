<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Toán 6 Nâng Cao — 13 Chuyên Đề</title>
<style>
:root{
  --blue:#1d4ed8; --red:#dc2626; --bg:#f6f7fb; --card:#ffffff;
  --text:#1f2330; --muted:#6b7280; --green:#15803d; --border:#e5e7eb; --amber:#92400e;
}
html{font-size:16px;}
*{box-sizing:border-box;}
body{margin:0;font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);}
.topbar{position:sticky;top:0;z-index:5;}
header{background:var(--blue);color:#fff;padding:clamp(10px,3vw,16px) clamp(12px,4vw,20px);box-shadow:0 2px 6px rgba(0,0,0,.15);}
header h1{margin:0;font-size:clamp(14px,3.6vw,18px);line-height:1.3;}
header p{margin:4px 0 0;font-size:clamp(10.5px,2.6vw,12.5px);opacity:.85;}
.headrow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.progress-btns{display:flex;gap:6px;flex-shrink:0;}
.pbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:7px;font-size:11px;padding:5px 8px;cursor:pointer;white-space:nowrap;}
.pbtn:hover{background:rgba(255,255,255,.28);}
.cd-select{display:flex;gap:6px;overflow-x:auto;padding:9px 10px;background:#eef1fb;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.cd-pill{flex:0 0 auto;padding:6px 12px;border-radius:999px;font-size:clamp(11.5px,2.6vw,12.5px);font-weight:600;color:var(--blue);background:#fff;border:1px solid #c7d2fe;cursor:pointer;white-space:nowrap;}
.cd-pill.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 10px 0;background:#fff;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.tab{flex:0 0 auto;padding:8px 12px;border-radius:8px 8px 0 0;font-size:clamp(12px,2.8vw,13px);font-weight:600;color:var(--muted);cursor:pointer;border:1px solid transparent;white-space:nowrap;}
.tab.active{color:var(--red);border-color:var(--border);border-bottom-color:#fff;background:#fff;}
main{max-width:760px;width:100%;margin:0 auto;padding:clamp(10px,3vw,18px) clamp(8px,3vw,14px) 60px;}
.dang-title{font-size:clamp(13px,3.2vw,15px);font-weight:700;color:var(--red);margin:14px 4px 10px;text-transform:uppercase;}
.theory{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px;font-size:clamp(12.5px,2.8vw,13.5px);line-height:1.7;margin-bottom:14px;}
.theory h4{margin:0 0 6px;color:var(--amber);font-size:13px;}
.theory + .theory{margin-top:-6px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.card-head{padding:clamp(10px,3vw,14px);cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.bai-label{font-weight:700;color:var(--blue);white-space:nowrap;}
.de{font-size:clamp(13px,3vw,14.5px);line-height:1.55;word-wrap:break-word;}
.chev{color:var(--muted);font-size:13px;margin-top:2px;flex-shrink:0;}
.card-body{display:none;padding:0 clamp(10px,3vw,14px) clamp(10px,3vw,14px);}
.card.open .card-body{display:block;}
.answer-box{margin-top:10px;}
.answer-box label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.answer-box textarea{width:100%;min-height:64px;resize:vertical;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:clamp(13px,2.8vw,14px);font-family:inherit;color:var(--text);background:#fafbff;}
.answer-box textarea:focus{outline:none;border-color:var(--blue);background:#fff;}
.btn-dapan{margin-top:10px;background:#eef2ff;color:var(--blue);border:1px solid #c7d2fe;border-radius:8px;font-size:clamp(12px,2.8vw,13px);font-weight:600;padding:8px 13px;cursor:pointer;}
.btn-dapan:hover{background:#e0e7ff;}
.dapan{display:none;margin-top:10px;padding:10px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;font-size:clamp(13px,2.8vw,13.5px);line-height:1.65;word-wrap:break-word;}
.dapan.show{display:block;}
.dapan .nhan{font-weight:700;color:var(--green);display:block;margin-bottom:4px;}
.tuluyen-badge{display:inline-block;font-size:11px;background:#fef3c7;color:var(--amber);border-radius:6px;padding:2px 7px;margin-left:6px;font-weight:600;vertical-align:middle;}
.ov{text-decoration:overline;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:.92em;line-height:1;}
.frac .num{padding:0 3px;border-bottom:1px solid var(--text);}
.frac .den{padding:0 3px;}
.note{font-size:11px;color:var(--muted);margin:10px 4px 0;}
footer{text-align:center;font-size:11px;color:var(--muted);padding:18px 10px 30px;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:8px 16px;border-radius:999px;font-size:12.5px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20;}
.toast.show{opacity:.95;}
@media (min-width:760px){
  .card-head{padding:16px 18px;}
  .card-body{padding:0 18px 16px;}
}
</style>
</head>

<header>

<div class="toast" id="toast"></div>

<script>
const ov = s => `<span class="ov">${s}</span>`;
const frac = (a,b) => `<span class="frac"><span class="num">${a}</span><span class="den">${b}</span></span>`;

/* ===================== DATA: CHUYÊN ĐỀ 1 ===================== */
const CD1_DANG = [
{
  ten:"Dạng 1: Tập hợp",
  bai:[
    {so:"Bài 1", de:`Viết các tập hợp sau rồi tìm số phần tử của mỗi tập hợp đó:<br>
a. Tập hợp A các số tự nhiên x mà 8 : x = 2<br>
b. Tập hợp B các số tự nhiên x mà x + 3 &lt; 5<br>
c. Tập hợp C các số tự nhiên x mà x – 2 = x + 2<br>
d. Tập hợp D các số tự nhiên x mà x : 2 = x : 4<br>
e. Tập hợp E các số tự nhiên x mà x + 0 = x`,
    dap:`a) x = 8:2 = 4 ⇒ A = {4}<br>
b) x + 3 &lt; 5 ⇒ x &lt; 2 ⇒ A = {0; 1}<br>
c) x – 2 = x + 2 ⇒ 0.x = 4 ⇒ A = ∅<br>
d) x : 2 = x : 4 ⇒ x = 0 ⇒ A = {0}<br>
e) x + 0 = x ⇒ x = x ⇒ A = {0; 1; 2; 3; ….}`},
    {so:"Bài 2", de:`Viết các tập hợp sau bằng cách liệt kê các phần tử của nó:<br>
a. Tập hợp A các số tự nhiên có hai chữ số, trong đó chữ số hàng chục lớn hơn chữ số hàng đơn vị là 2.<br>
b. Tập hợp B các số tự nhiên có ba chữ số mà tổng các chữ số bằng 3.`,
    dap:`a) A = {20; 31; 42; 53; 64; 75; 86; 97}<br>
b) B = {102; 120; 111; 201; 210}`},
    {so:"Bài 3", de:`Cho các tập hợp: A = {1; 2; 3; 4}, B = {3; 4; 5}<br>
Viết các tập hợp vừa là tập hợp con của A, vừa là tập hợp con của B.`,
    dap:`∅; {3; 4}; {3}; {4}.`},
    {so:"Bài 4", de:`Cho tập hợp: A = {1; 2; 3; 4}<br>
a. Viết các tập hợp con của A mà mọi phần tử của nó đều là số chẵn<br>
b. Viết các tập hợp con của A.`,
    dap:`a) B = {2; 4}, B<sub>1</sub> = {2}, B<sub>2</sub> = {4}<br>
b) C={1}; D={2}; E={3}; F={4}<br>
G={1;2}; H={1;3}; I={1;4}; K={2;3}; L={3;4}; M={2;4}<br>
N={1;2;3}; O={1;3;4}; P={2;3;4}; T={1;2;4}<br>
Q = ∅<br>
A = {1; 2; 3; 4}`},
  ]
},
{
  ten:"Dạng 2: Đếm",
  bai:[
    {so:"Bài 1", de:`Trong các số tự nhiên từ 1 đến 100, có bao nhiêu số:<br>
a. Chia hết cho 2 mà không chia hết cho 3?<br>
b. Chia hết cho ít nhất một trong hai số 2 và 3?<br>
c. Không chia hết cho 2 và không chia hết cho 3?`,
    dap:`a) Các số chia hết cho 2: 2; 4; 6; …; 100<br>
Số các số chia hết cho 2 là: ${frac("(100−2)","2")} + 1 = 50 số<br>
Các số chia hết cho 2 và 3: 6; 12; 18; 24; …; 96<br>
Số các số chia hết cho cả 2 và 3 là: ${frac("(96−6)","6")} + 1 = 16 số<br>
Vậy từ 1–100 có 50 – 16 = 34 số chia hết cho 2 mà không chia hết cho 3<br><br>
b) Các số chia hết cho 3: 3; 6; 9; 12; 15; …; 99<br>
Số các số chia hết cho 3 là: ${frac("(99−3)","3")} + 1 = 33 số<br>
Vậy các số chia hết cho ít nhất một trong hai số 2 và 3 là: 50 + 33 – 16 = 67 số<br><br>
c) Các số không chia hết cho 2 và cho 3 là: 100 – 67 = 33 số`},
    {so:"Bài 2", de:`Trong các số tự nhiên từ 1 đến 1000, có bao nhiêu số:<br>
a. Chia hết cho ít nhất một trong các số 2, 3, 5?<br>
b. Không chia hết cho tất cả các số tự nhiên từ 2 đến 5?`,
    dap:`Gọi A, B, C, D, E, G, H là tập hợp các số từ 1 đến 1000 mà theo thứ tự chia hết cho 2, chia hết cho 3, chia hết cho 5, chia hết cho 2 và 3, chia hết cho 2 và 5, chia hết cho 3 và 5, chia hết cho cả 3 số. Số phần tử của các tập hợp đó theo thứ tự bằng s<sub>1</sub>, s<sub>2</sub>, s<sub>3</sub>, s<sub>4</sub>, s<sub>5</sub>, s<sub>6</sub>, s<sub>7</sub>.<br>
Ta có:<br>
s<sub>1</sub> = 1000 : 2 = 500<br>
s<sub>2</sub> = [1000 : 3] = 333<br>
s<sub>3</sub> = 1000 : 5 = 200<br>
s<sub>4</sub> = [1000 : 6] = 166<br>
s<sub>5</sub> = 1000 : 10 = 100<br>
s<sub>6</sub> = [1000 : 15] = 66<br>
s<sub>7</sub> = [1000 : 30] = 33<br>
a) Các số phải tìm gồm: s<sub>1</sub>+s<sub>2</sub>+s<sub>3</sub>−s<sub>4</sub>−s<sub>5</sub>−s<sub>6</sub>+s<sub>7</sub> = 734 số<br><br>
b) Còn lại 1000 – 734 = 266 số`},
    {so:"Bài 3", de:`Trong số 100 học sinh có 75 học sinh thích học Toán, 60 học sinh thích Văn.<br>
a. Nếu có 5 học sinh không thích cả Toán lẫn Văn thì có bao nhiêu học sinh thích cả hai môn Văn và Toán?<br>
b. Có nhiều nhất bao nhiêu học sinh thích cả hai môn Văn và Toán?<br>
c. Có ít nhất bao nhiêu học sinh không thích cả hai môn Văn và Toán?`,
    dap:`Gọi số học sinh thích cả hai môn Văn và Toán là x, số học sinh thích Toán mà không thích Văn là 75 – x.<br>
a) Ta có: 75 – x + 60 + 5 = 100 ⇒ x = 40. Vậy có 40 học sinh thích cả hai môn.<br>
b) 60 học sinh (nếu tất cả số thích Văn đều thích Toán)<br>
c) 75 – x + 60 ≤ 100 ⇒ x ≥ 35. Có ít nhất 35 học sinh thích cả hai môn Văn và Toán.`},
    {so:"Bài 4", de:`Có bao nhiêu số tự nhiên chia hết cho 4 gồm bốn chữ số, chữ số tận cùng bằng 2?`,
    dap:`Các số phải đếm có dạng ${ov("abc2")}<br>
Chữ số a có 9 cách chọn<br>
Với mỗi cách chọn a, chữ số b có 10 cách chọn<br>
Với mỗi cách chọn a, b chữ số c có 5 cách chọn (1, 3, 5, 7, 9) để tạo với chữ số 2 tận cùng làm thành số chia hết cho 4.<br>
Tất cả có: 9.10.5 = 450 số.`},
    {so:"Bài 5", de:`Có bao nhiêu số tự nhiên có ba chữ số trong đó có đúng một chữ số 5?`,
    dap:`Chia ra 3 loại số:<br>
- Số đếm có dạng ${ov("5ab")}: chữ số a có 9 cách chọn, chữ số b có 9 cách chọn. Các số thuộc loại này có: 9.9 = 81 số.<br>
- Số đếm có dạng ${ov("a5b")}: chữ số a có 8 cách chọn, chữ số b có 9 cách chọn. Các số thuộc loại này có: 8.9 = 72 số<br>
- Số đếm có dạng ${ov("ab5")}: các số thuộc loại này có: 8.9 = 72 số.<br>
Vậy số tự nhiên có ba chữ số trong đó có đúng một chữ số 5 là: 81 + 72 + 72 = 225 số`},
    {so:"Bài 6", de:`Để đánh số trang của một cuốn sách, người ta viết dãy số tự nhiên bắt đầu từ 1 và phải dùng tất cả 1998 chữ số.<br>
a) Hỏi cuốn sách có bao nhiêu trang?<br>
b) Chữ số thứ 1010 là chữ số nào?`,
    dap:`a) Từ trang 1 đến trang 9 phải dùng 9 chữ số (viết tắt c/s)<br>
Từ trang 10 đến trang 99 phải dùng (99–10)+1 = 90 số có 2 c/s = 180 c/s<br>
Vì còn các trang gồm các số có 3 c/s<br>
⇒ Còn lại: 1998 – (180+9) = 1809 c/s là đánh số các trang có 3 c/s<br>
⇒ Có: 1809 : 3 = 603 số có 3 c/s<br>
Vậy: Cuốn sách đó có: 603 + 99 = 702 trang (vì từ trang 1→99 có 99 trang)<br>
<b>Cuốn sách có 702 trang</b><br><br>
b) Chữ số thứ 1010 là chữ số 7 của số 374.`},
    {so:"Bài 7", de:`Trong các số tự nhiên có ba chữ số, có bao nhiêu số:<br>
a) Chứa đúng một chữ số 4?<br>
b) Chứa đúng hai chữ số 4?<br>
c) Chia hết cho 5, có chứa chữ số 5?<br>
d) Chia hết cho 3, không chứa chữ số 3?`,
    dap:`a) Các số phải đếm có 3 dạng: ${ov("4bc")} có 9.9=81 số; ${ov("a4c")} có 8.9=72 số; ${ov("ab4")} có 8.9=72 số.<br>
Tất cả có: 81+72+72 = 225 số<br><br>
b) Các số phải đếm gồm 3 dạng: ${ov("44c")}, ${ov("a44")}, ${ov("4b4")}, có 26 số<br><br>
c) Số có ba chữ số chia hết cho 5 gồm 180 số. Trong đó số không chứa chữ số 5 có dạng ${ov("abc")}, a có 8 cách chọn, b có 9 cách chọn, c có 1 cách chọn (là 0), gồm 8.9 = 72 số.<br>
Vậy có: 180 – 72 = 108 số phải đếm<br><br>
d) Số phải tìm có dạng ${ov("abc")}, a có 8 cách chọn, b có 9 cách chọn, c có 3 cách chọn (nếu a+b=3k thì c=0;3;6;9, nếu a+b=3k+1 thì c=2;5;8, nếu a+b=3k+2 thì c=1;4;7), có 8.9.3 = 216 số`},
    {so:"Bài 8", de:`Viết dãy số tự nhiên từ 1 đến 999 ta được một số tự nhiên A.<br>
a) Số A có bao nhiêu chữ số?<br>
b) Tính tổng các chữ số của số A?<br>
c) Chữ số 1 được viết bao nhiêu lần?<br>
d) Chữ số 0 được viết bao nhiêu lần?`,
    dap:`a) Từ 1 đến 9 có 9 số gồm: 1.9=9 chữ số<br>
Từ 10 đến 99 có 90 số gồm: 90.2=180 chữ số<br>
Từ 100 đến 999 có 900 số gồm: 900.3=2700 chữ số<br>
Số A có: 9+180+2700 = <b>2889 chữ số</b><br><br>
b) Xét số B là các số tự nhiên từ 000 đến 999 (mỗi số viết bởi 3 chữ số) thì tổng các chữ số của B cũng bằng tổng các chữ số của A.<br>
B có: 3.1000=3000 chữ số, mỗi chữ số từ 0 đến 9 đều có mặt 3000:10=300 (lần)<br>
Tổng các chữ số của B (cũng là của A): (0+1+2+…+9).300 = 45.300 = <b>13500</b><br><br>
c) Xét dãy 000,001,…,999 (1000 số, mỗi số 3 chữ số). Mỗi chữ số (0–9) có mặt: 3.1000:10=300 lần. Vậy chữ số 1 được viết <b>300 lần</b>.<br><br>
d) Ở dãy 000–999, chữ số 0 có mặt 300 lần. So với dãy 1–999 thì dãy 000–999 viết thêm 0 ở: hàng trăm 100 lần (000–099), hàng chục 10 lần (000–009), hàng đơn vị 1 lần (000).<br>
Vậy chữ số 0 ở dãy 1–999 được viết: 300 – 111 = <b>189 lần</b>`},
    {so:"Bài 9", de:`Từ các chữ số 1, 2, 3, 4, lập tất cả các số tự nhiên mà mỗi chữ số trên đều có mặt đúng một lần. Tính tổng các số ấy.`,
    dap:`Ta lập được 4.3.2.1 = 24 số tự nhiên bao gồm cả bốn chữ số 1, 2, 3, 4. Mỗi chữ số có mặt 6 lần ở mỗi hàng. Tổng của 24 số nói trên bằng:<br>
60 + 600 + 6000 + 60000 = <b>66660</b>.`},
  ]
},
{
  ten:"Dạng 3: Tìm số tự nhiên",
  bai:[
    {so:"Bài 1", de:`Tìm số tự nhiên có năm chữ số, biết rằng nếu viết thêm chữ số 2 vào đằng sau số đó thì được số lớn gấp ba lần số có được bằng cách viết thêm chữ số 2 vào đằng trước số đó.`,
    dap:`Gọi số cần tìm là ${ov("abcde")} (a khác 0)<br>
Theo bài ra ta có: ${ov("abcde2")} = 3.${ov("2abcde")}<br>
⇒ 10.${ov("abcde")} + 2 = 3.200000 + 3.${ov("abcde")}<br>
⇒ 7.${ov("abcde")} = 599998<br>
⇒ ${ov("abcde")} = 85714<br>
Thử lại: 857142 = 3.285714<br>
<b>Vậy số cần tìm là 857142</b>`},
    {so:"Bài 2", de:`Tìm số tự nhiên có tận cùng bằng 3, biết rằng nếu xóa chữ số hàng đơn vị thì số đó giảm đi 1992 đơn vị.`,

    dap:`Số chính phương khi chia cho 3 chỉ có số dư là 0 hoặc 1. Vì tổng chữ số là 2006 nên số đó chia 3 dư 2.<br>
<b>⇒ Số đã cho không phải là số chính phương.</b>`},
    {so:"Bài 5", de:`Chứng minh tổng các số tự nhiên liên tiếp từ 1 đến 2005 không phải là số chính phương.`,
    dap:`1+2+…+2005=(2005+1).2005:2=2006.2005:2=1003.2005≡3.1≡3 (mod 4).<br>
<b>Vậy tổng có dạng 4k+3 nên không phải là số chính phương (đpcm)</b>`},
    {so:"Bài 6", de:`Chứng minh số n = 4⁴ + 44⁴⁴ + 444⁴⁴⁴ + 4444⁴⁴⁴⁴ + 15 không là số chính phương.`,
    dap:`n ≡ 4⁴+44⁴⁴+444⁴⁴⁴+4444⁴⁴⁴⁴+15 ≡ 0⁴+0⁴⁴+0⁴⁴⁴+0⁴⁴⁴⁴+3 ≡ 3 (mod 4).<br>
<b>Vậy n có dạng 4k+3 nên không là số chính phương (đpcm)</b>`},
    {so:"Bài 8", de:`Chứng minh số 4014025 không là số chính phương.`,
    dap:`2003²=4012009; 2004²=4016016. Vì 4012009 &lt; 4014025 &lt; 4016016 nên 2003²&lt;4014025&lt;2004².<br>
<b>Vậy 4014025 không là số chính phương</b> (bị "kẹp" giữa hai số chính phương liên tiếp).`},
    {so:"Bài 9", de:`Chứng minh A = n(n+1)(n+2)(n+3) không là số chính phương với mọi số tự nhiên n khác 0.`,
    dap:`A+1=n(n+1)(n+2)(n+3)+1=(n²+3n)(n²+3n+2)+1=(n²+3n)²+2(n²+3n)+1=(n²+3n+1)².<br>
Mặt khác (n²+3n)² &lt; (n²+3n)²+2(n²+3n) = A (đúng vì n≥1).<br>
Vậy (n²+3n)² &lt; A &lt; A+1=(n²+3n+1)² ⇒ <b>A bị kẹp giữa 2 số chính phương liên tiếp nên A không là số chính phương.</b>`},
    {so:"Bài 10", de:`Giả sử N = 1.3.5.7…2007.2011. Chứng minh rằng trong 3 số nguyên liên tiếp 2N − 1, 2N và 2N + 1 không có số nào là số chính phương.`,
    dap:`a) 2N−1=2.1.3.5...2011−1. Vì 2N⋮3 nên 2N−1=3k+2 (k∈N) ⇒ <b>2N−1 không là số chính phương</b> (số chính phương không có dạng 3k+2).<br>
b) 2N=2.1.3.5...2011 ⇒ 2N chẵn. Vì N lẻ (tích toàn số lẻ) nên N không chia hết cho 2, do đó 2N chia hết cho 2 nhưng không chia hết cho 4 ⇒ <b>2N không là số chính phương</b> (số chính phương chẵn phải chia hết cho 4).<br>
c) 2N+1 lẻ nên không chia hết cho 4. Vì 2N không chia hết cho 4 nên 2N+1 chia cho 4 dư 1... xét kỹ hơn: 2N không chia hết cho 4 ⇒ 2N+1 không có dạng 4k+1 chuẩn ⇒ <b>2N+1 không là số chính phương.</b>`},
    {so:"Bài 11", de:`Chứng minh rằng tổng bình phương của 2 số lẻ bất kỳ không phải là số chính phương.`,
    dap:`Gọi 2 số lẻ là a=2m+1, b=2n+1 (m,n∈N).<br>
a²+b²=(2m+1)²+(2n+1)²=4m²+4m+1+4n²+4n+1=4(m²+m+n²+n)+2=4t+2 (t∈N)<br>
Không có số chính phương nào có dạng 4t+2. <b>⇒ a²+b² không thể là số chính phương (đpcm)</b>`},
    {so:"Bài 12", de:`Chứng minh rằng số có dạng n⁶ − n⁴ + 2n³ + 2n² trong đó n∈N và n>1 không phải là số chính phương.`,
    dap:`n⁶−n⁴+2n³+2n²=n².(n⁴−n²+2n+2)=n².[n²(n−1)(n+1)+2(n+1)]=n².(n+1).[n²(n−1)+2]=n².(n+1).[n³−n²+2]<br>
=n².(n+1).[(n³+1)−(n²−1)]=n²(n+1)².(n²−2n+2)<br>
Với n∈N, n&gt;1 thì n²−2n+2=(n−1)²+1 &gt; (n−1)² và n²−2n+2=n²−2(n−1) &lt; n².<br>
Vậy (n−1)² &lt; n²−2n+2 &lt; n² ⇒ <b>n²−2n+2 không phải là số chính phương, do đó biểu thức ban đầu cũng không là số chính phương (đpcm).</b>`},
  ]

    {so:"Bài 1", de:`Hiện nay, tuổi mẹ gấp 4 lần tuổi con. Bốn năm trước đây, tuổi mẹ gấp 6 lần tuổi con. Tính tuổi mẹ, tuổi con hiện nay.`,
    dap:`Hiện nay hiệu tuổi mẹ-con = 3 lần tuổi con hiện nay (4−1). Bốn năm trước hiệu đó = 5 lần tuổi con lúc đó (6−1). Vì hiệu tuổi không đổi nên 3 lần tuổi con hiện nay = 5 lần tuổi con 4 năm trước.<br>
Tuổi con hiện nay hơn tuổi con 4 năm trước là 4 tuổi. Hiệu số phần bằng nhau: 5−3=2 (phần).<br>
Tuổi con hiện nay: 4:2×5=<b>10 tuổi</b>. Tuổi mẹ hiện nay: 10×4=<b>40 tuổi</b>.`},
    {so:"Bài 2", de:`Tuổi bà gấp đôi tuổi mẹ, tuổi con bằng ⅕ tuổi mẹ. Tính tuổi của mỗi người, biết tổng số tuổi của mẹ và con là 36.`,
    dap:`Tuổi con là 1 phần thì tuổi mẹ là 5 phần. Tuổi con: 36:(1+5)=<b>6 tuổi</b>. Tuổi mẹ: 36−6=<b>30 tuổi</b>. Tuổi bà: 30×2=<b>60 tuổi</b>.`},
    {so:"Bài 3", de:`Tuổi bố gấp 3 lần tuổi anh, tuổi anh gấp 2 lần tuổi em. Tuổi bố cộng với tuổi em bằng 42 tuổi. Tính tuổi của mỗi người.`,
    dap:`Tuổi bố gấp tuổi em: 3×2=6 (lần). Tuổi em: 42:(1+6)=<b>6 tuổi</b>. Tuổi anh: 6×2=<b>12 tuổi</b>. Tuổi bố: 12×3=<b>36 tuổi</b>.`},
    {so:"Bài 4", de:`Năm nay tuổi cô gấp 6 lần tuổi cháu. Đến khi tuổi cháu bằng tuổi cô hiện nay thì tuổi của hai cô cháu cộng lại bằng 68. Hỏi hiện nay mỗi người bao nhiêu tuổi?`,
    dap:`Hiệu số phần tuổi hai cô cháu hiện nay: 6−1=5 (phần). Khi cháu bằng tuổi cô hiện nay, cô vẫn hơn cháu 5 phần đó. Tổng số phần lúc đó: 6+11=17 (phần).<br>
Tuổi cháu lúc đó (=tuổi cô hiện nay): 68:17×6=<b>24 tuổi</b>. Tuổi cháu hiện nay: 24:6=<b>4 tuổi</b>.`},
    {so:"Bài 5", de:`Tổng số tuổi chị và tuổi em hiện nay bằng 32. Khi tuổi chị bằng tuổi em hiện nay thì tuổi chị gấp 3 lần tuổi em. Hỏi hiện nay mỗi người bao nhiêu tuổi?`,
    dap:`Tuổi em trước đây là 1 phần, tuổi em hiện nay là 3 phần. Chị hơn em 2 phần (3−1) không đổi. Coi tuổi em hiện nay 3 phần thì tuổi chị hiện nay là 5 phần (2+3).<br>
Tổng phần: 3+5=8. Tuổi em hiện nay: 32:8×3=<b>12 tuổi</b>. Tuổi chị: 32−12=<b>20 tuổi</b>.`},
    {so:"Bài 6", de:`Tuổi của hai anh em năm nay cộng lại bằng 16. Đến khi tuổi em bằng tuổi anh hiện nay thì tuổi anh bằng 5/3 tuổi em. Tính tuổi anh và tuổi em hiện nay.`,
    dap:`Khi em bằng tuổi anh hiện nay, anh bằng 5/3 tuổi em đó ⇒ hiệu phần lúc đó: 5−3=2. Hiện nay anh hơn em 2 phần đó. Coi tuổi anh hiện nay 3 phần thì tuổi em hiện nay là 1 phần (3−2).<br>
Tổng phần: 3+1=4. Tuổi em hiện nay: 16:4=<b>4 tuổi</b>. Tuổi anh: 16−4=<b>12 tuổi</b>.`},
    {so:"Bài 7", de:`Hiệu của hai số là 1773. Tìm hai số đó biết rằng nếu viết thêm chữ số 0 vào tận cùng bên phải số bé thì được số lớn.`,
    dap:`Số lớn gấp 10 lần số bé. Hiệu số phần: 10−1=9. Số bé: 1773:9=<b>197</b>. Số lớn: 197+1773=<b>1970</b>.`},
    {so:"Bài 8", de:`Hiện nay mẹ 35 tuổi, con 8 tuổi. Hỏi: a) Mấy năm nữa tuổi mẹ gấp 4 lần tuổi con? b) Có khi nào tuổi mẹ gấp 5 lần tuổi con không?`,
    dap:`Hiệu tuổi: 35−8=27 (không đổi).<br>
a) Khi mẹ gấp 4 lần con: tuổi con lúc đó=27:(4−1)=9. Vì 9−8=1 ⇒ <b>sau 1 năm nữa.</b><br>
b) Khi mẹ gấp 5 lần con: tuổi con lúc đó=27:(5−1)=27:4 không là số tự nhiên ⇒ <b>không có khi nào tuổi mẹ gấp 5 lần tuổi con.</b>`},
    {so:"Bài 9", de:`Cho phân số 23/28. Hãy tìm số tự nhiên m sao cho khi cùng bớt cả tử số và mẫu số của phân số đã cho đi m thì ta được phân số mới có giá trị bằng ⅔.`,
    dap:`Hiệu mẫu-tử không đổi =28−23=5. Phân số mới =⅔ ⇒ hiệu phần: 3−2=1. Tử số mới: 5:1×2=10. <b>Số tự nhiên m = 23−10 = 13.</b>`},
    {so:"Bài 10", de:`Năm năm trước cha hơn con 36 tuổi. Hỏi năm cha bao nhiêu tuổi thì 3 lần tuổi cha bằng 7 lần tuổi con?`,
    dap:`Hiệu tuổi luôn=36. Khi 3 lần tuổi cha=7 lần tuổi con thì tuổi con bằng 3/7 tuổi cha ⇒ hiệu phần: 7−3=4. Tuổi cha lúc đó: 36:4×7=<b>63 tuổi</b>.`},
    {so:"Bài 11", de:`Năm nay mẹ 73 tuổi. Khi tuổi mẹ bằng tuổi con hiện nay thì tuổi mẹ hơn 7 lần tuổi con lúc đó là 4 tuổi. Tính tuổi con hiện nay?`,
    dap:`Coi tuổi con khi đó là 1 phần thì tuổi mẹ khi đó là 7 phần + 4 tuổi. Hiệu tuổi không đổi = 6 phần + 4 tuổi (luôn vậy hiện nay mẹ hơn con 6 phần tuổi con khi đó + 4 tuổi).<br>
Theo sơ đồ: 13 phần tuổi con khi đó + 8 tuổi = 73 ⇒ 1 phần = 5 (tuổi). Tuổi con hiện nay: 5×7+4=<b>39 tuổi</b>.`},
    {so:"Bài 12", de:`Bố nói với con: "10 năm trước đây tuổi bố gấp 10 lần tuổi con", 22 năm sau nữa thì tuổi bố sẽ gấp đôi tuổi con. Hãy tính tuổi bố và tuổi con hiện nay.`,
    dap:`Coi tuổi con 10 năm trước là 1 phần, tuổi bố là 10 phần. Khoảng cách 32 năm (10+22). Phân tích sơ đồ: 1 phần tuổi con+32=5 phần tuổi con+16 ⇒ 16=4 phần ⇒ 1 phần=4.<br>
Tuổi con 10 năm trước: <b>4 tuổi</b> ⇒ hiện nay <b>14 tuổi</b>. Tuổi bố 10 năm trước: 40 ⇒ hiện nay <b>50 tuổi</b>.`},
    {so:"Bài 13", de:`Lớp 5A có số học sinh nữ bằng ⅖ số học sinh nam. Sang đầu học kỳ II có 4 bạn nữ từ lớp khác chuyển đến nên số học sinh nữ bằng ⅗ số học sinh nam. Hỏi đầu năm học lớp 5A có bao nhiêu học sinh nữ, bao nhiêu học sinh nam?`,
    dap:`Số học sinh nữ lúc đầu: 4:(3−2)×2=<b>8 học sinh</b>. Số học sinh nam: 8:⅖=<b>20 học sinh</b>.`},
    {so:"Bài 14", de:`Có 3 bình nước đựng nước chưa đầy. Sau khi đổ ⅓ số nước ở bình 1 sang bình 2, rồi đổ ¼ số nước hiện có ở bình 2 sang bình 3, cuối cùng đổ 1/10 số nước hiện có ở bình 3 sang bình 1 thì mỗi bình đều có 9 lít nước. Hỏi lúc đầu mỗi bình có bao nhiêu lít nước?`,
    dap:`Tính ngược từ cuối: Bình 3 trước khi đổ: 9:(1−1/10)=10(l). Bình 1 trước khi nhận: 9−10×1/10=8(l).<br>
Bình 2 trước khi đổ: 9:(1−¼)=12(l). Bình 1 lúc đầu: 12−... thực ra theo thứ tự ngược: Bình 1 lúc đầu = 8:(1−⅓)=<b>12 lít</b>. Bình 2 lúc đầu: 12−12×⅓=8 lít, cộng lại phần nhận từ bình 1... → <b>Bình 2 lúc đầu = 8 lít</b>. Bình 2 đổ sang bình 3: 12×¼=3(l). Bình 3 lúc đầu: 10−3=<b>7 lít</b>.<br>
<b>Đáp số: Bình 1: 12l; Bình 2: 8l; Bình 3: 7l.</b>`},
    {so:"Bài 15", de:`Tìm bốn số tự nhiên chẵn liên tiếp có tổng bằng 5420`,
    dap:`Gọi 4 số: 2k, 2k+2, 2k+4, 2k+6. 8k+12=5420 ⇒ k=676. <b>Bốn số: 1352; 1354; 1356; 1358.</b>`},
    {so:"Bài 16", de:`Tìm ba số tự nhiên lẻ liên tiếp biết rằng tổng của số lớn nhất và số nhỏ nhất bằng 114.`,
    dap:`Gọi 3 số: 2k+1, 2k+3, 2k+5. (2k+1)+(2k+5)=114 ⇒ 4k+6=114 ⇒ k=27. <b>Ba số: 55; 57; 59</b>`},
    {so:"Bài 17", de:`Hiệu của hai số bằng 1217. Nếu tăng số trừ gấp bốn lần thì được số lớn hơn số bị trừ là 376. Tìm số bị trừ và số trừ.`,
    dap:`Ba lần số trừ = 1217+376=1593. Số trừ: 1593:3=<b>531</b>. Số bị trừ: 531+1217=<b>1748</b>`},
    {so:"Bài 18", de:`Năm 2000, bố 40 tuổi, Mai 11 tuổi, em Nam 5 tuổi. Đến năm nào, tuổi bố bằng tổng số tuổi của hai chị em?`,
    dap:`Năm 2000, chênh lệch: 40−(11+5)=24. Mỗi năm chênh lệch giảm: (1+1)−1=1. Số năm cần: 24:1=24 ⇒ <b>Năm 2000+24 = 2024</b>`},

    {so:"Tự luyện 1", de:`Năm nay tuổi cha hơn 7 lần tuổi con là 3 tuổi. Đến khi tuổi con bằng tuổi cha hiện nay thì tuổi hai cha con cộng lại bằng 109. Tìm tuổi của mỗi người hiện nay.`,
    dap:`Hiệu tuổi = 6 phần tuổi con + 3 tuổi. Theo sơ đồ: 20 phần + 9 tuổi = 109 ⇒ 20 phần = 100 ⇒ 1 phần = 5. Tuổi con hiện nay: <b>5 tuổi</b>. Tuổi cha: 5×7+3=<b>38 tuổi</b>`},
    {so:"Tự luyện 2", de:`Hiệu của hai số là 2345. Tìm hai số đó, biết rằng nếu viết thêm chữ số 5 vào tận cùng bên phải số bé thì được số lớn.`,
    dap:`Số lớn = 10×số bé + 5. 9 lần số bé = 2345−5=2340 ⇒ số bé=<b>260</b>; số lớn=260+2345=<b>2605</b>`},
    {so:"Tự luyện 3", de:`Mẹ hơn con 24 tuổi. Cách đây 4 năm tuổi con bằng ¼ tuổi mẹ. Hỏi hiện nay mỗi người bao nhiêu tuổi?`,
    dap:`Tuổi mẹ cách đây 4 năm: 24:(4−1)×4=32. Tuổi mẹ hiện nay: 32+4=<b>36 tuổi</b>. Tuổi con hiện nay: 36−24=<b>12 tuổi</b>`},
    {so:"Tự luyện 4", de:`Cho phân số 107/187. Hãy tìm số tự nhiên, biết rằng nếu cùng bớt cả tử số và mẫu số đi số tự nhiên đó thì ta được phân số mới có giá trị bằng 5/9.`,
    dap:`Hiệu không đổi=187−107=80. Tử số mới: 80:(9−5)×5=100. <b>Số cần tìm = 107−100 = 7</b>`},
    {so:"Tự luyện 5", de:`Hiệu của hai số bằng 0,8. Thương của hai số cũng bằng 0,8. Hãy tìm hai số đó.`,
    dap:`0,8=⅘. Hiệu phần: 5−4=1. Số bé: 0,8:1×4=3,2. Số lớn: 3,2+0,8=4. <b>Đáp số: 3,2 và 4</b>`},
    {so:"Tự luyện 6", de:`Hiệu của hai số bằng 20. Thương của hai số bằng 2,25. Tìm hai số đó.`,
    dap:`2,25=9/4. Hiệu phần: 9−4=5. Số lớn: 20:5×9=36. Số bé: 36−20=16. <b>Đáp số: 36 và 16</b>`},
    {so:"Tự luyện 7", de:`Tìm hai số có hiệu bằng 252, biết số bé bằng ¼ tổng của hai số.`,
    dap:`Số bé bằng ⅓ số lớn. Hiệu phần: 3−1=2. Số bé: 252:2×1=126. Số lớn: 126+252=378. <b>Đáp số: 126 và 378</b>`},
    {so:"Tự luyện 8", de:`Ba năm trước em 6 tuổi và kém chị 6 tuổi. Hỏi mấy năm sau nữa thì 3 lần tuổi chị bằng 4 lần tuổi em?`,
    dap:`Hiệu tuổi luôn=6. Khi 3 lần chị=4 lần em ⇒ tuổi em=¾ tuổi chị ⇒ hiệu phần 4−3=1. Tuổi em lúc đó: 6:1×3=18. Từ khi em 6 tuổi đến 18 tuổi là 12 năm. <b>Đáp số: 12 năm</b>`},
    {so:"Tự luyện 9", de:`Một quầy bán vải, lần thứ nhất bán 2m vải, lần thứ hai bán ½ số vải còn lại và ½m. Lần thứ ba bán ½ số vải còn lại và ½m, lần thứ tư bán ½ số vải còn lại và ½m thì vừa hết. Hỏi quầy vải đó bán được tất cả bao nhiêu mét vải?`,
    dap:`Tính ngược: còn lại sau lần 3 = ½×2=1m. Còn lại sau lần 2: (1+½)×2=3m. Còn lại sau lần 1: (3+½)×2=7m. Tổng: 7+2=<b>9m vải</b>`},
    {so:"Tự luyện 10", de:`Bình đọc một quyển truyện trong 3 ngày. Ngày đầu Bình đọc được ⅕ số trang và 16 trang. Ngày thứ hai Bình đọc được 3/10 số trang còn lại và 20 trang. Ngày thứ ba Bình đọc được ¾ số trang còn lại và 37 trang cuối cùng. Hỏi quyển truyện đó có bao nhiêu trang?`,
    dap:`Còn lại sau ngày 2: 37×4=148. Còn lại sau ngày 1: (148+20):7×10=240. Tổng số trang: (240+16):4×5=<b>320 trang</b>`},
    {so:"Tự luyện 11", de:`Hai ngăn sách lúc đầu có tổng cộng 118 cuốn. Sau khi lấy đi 8 cuốn sách ở ngăn I, thêm 10 cuốn sách vào ngăn II thì số sách ở ngăn II gấp đôi số sách ở ngăn I. Tính số sách ở mỗi ngăn lúc đầu.`,
    dap:`Tổng sau khi đổi: 118−8+10=120. Ngăn I lúc sau: 120:3=40. Ngăn I lúc đầu: 40+8=<b>48 cuốn</b>. Ngăn II lúc đầu: 118−48=<b>70 cuốn</b>`},
    {so:"Tự luyện 12", de:`Tìm số tự nhiên tận cùng bằng 7 biết rằng sau khi xóa chữ số 7 đó thì số ấy giảm đi 484 đơn vị.`,
    dap:`Số còn lại: (484−7):9=53. Số ban đầu: 484+53=<b>537</b>`},
    {so:"Tự luyện 13", de:`Tìm số tự nhiên biết rằng nếu viết thêm chữ số 2 vào sau chữ số hàng đơn vị thì số ấy tăng thêm 2000 đơn vị.`,
    dap:`(2000−2)=1998 gấp 9 lần số phải tìm. <b>Số phải tìm: 1998:9 = 222</b>`},
    {so:"Tự luyện 14", de:`Tìm ba số có tổng bằng 210, biết rằng 6/7 số thứ nhất bằng 9/11 số thứ hai và bằng ⅔ số thứ ba.`,
    dap:`Quy về số thứ hai: số 1=21/22 số 2; số 3=27/22 số 2. Tổng=70/22 số 2=210 ⇒ số 2=66. <b>Đáp số: 63, 66, 81</b>`},
    {so:"Tự luyện 15", de:`Mẹ hơn con 28 tuổi. Sau 5 năm nữa, tuổi mẹ gấp ba tuổi con. Tính tuổi mẹ và con hiện nay.`,
    dap:`Tuổi con sau 5 năm: 28:(3−1)=14 ⇒ hiện nay 14−5=<b>9 tuổi</b>. Tuổi mẹ: 9+28=<b>37 tuổi</b>`},
    {so:"Tự luyện 16", de:`Năm 2000, mẹ 36 tuổi, hai con 7 tuổi và 12 tuổi. Bắt đầu từ năm nào, tuổi mẹ ít hơn tổng số tuổi của hai con?`,
    dap:`Số năm để tuổi mẹ bằng tổng tuổi 2 con: 36−(7+12)=17 năm (tức năm 2017). Từ năm sau đó tuổi mẹ ít hơn. <b>Đáp số: năm 2018</b>`},
    {so:"Tự luyện 17", de:`Anh hơn em 3 tuổi. Tuổi anh hiện nay gấp rưỡi tuổi em, lúc anh bằng tuổi em hiện nay. Tính tuổi hiện nay của mỗi người.`,
    dap:`Coi tuổi em trước là 1 phần, tuổi anh trước là 1 phần+3. Tuổi anh hiện nay = 1 phần+6 = 1,5 phần ⇒ 0,5 phần=6 ⇒ 1 phần=12. Tuổi em hiện nay: 12+3=<b>15 tuổi</b>. Tuổi anh: 15+3=<b>18 tuổi</b>`},
    {so:"Tự luyện 18", de:`Tuổi mẹ hiện nay gấp 2,3 lần tuổi con. 16 năm trước, tuổi mẹ gấp 7,5 lần tuổi con. Hỏi mấy năm sau thì tuổi mẹ gấp đôi tuổi con?`,
    dap:`Hiện mẹ hơn con: 1,3 lần tuổi con hiện nay. 16 năm trước mẹ hơn con: 6,5 lần tuổi con trước kia. Vì hiệu không đổi: tuổi con hiện nay gấp 5 lần tuổi con trước kia (6,5:1,3). Tuổi con trước kia: 16:4=4 ⇒ hiện nay 20 tuổi. Tuổi mẹ hiện nay: 20×2,3=46. Khi mẹ gấp đôi con, con=46−20=26 tuổi (mẹ luôn hơn con 26 tuổi) ⇒ sau 26−20=<b>6 năm</b>`},
  ]
},
{
  ten:"PP2: Giả thiết tạm",
  bai:[
    {so:"Bài 1", de:`Ba ô tô chở tổng cộng 50 chuyến, gồm 118 tấn hàng. Mỗi chuyến, xe thứ nhất chở 2 tấn, xe thứ hai chở 2,5 tấn, xe thứ ba chở 3 tấn. Hỏi mỗi xe chở bao nhiêu chuyến biết rằng số chuyến xe thứ nhất gấp rưỡi số chuyến xe thứ hai?`,
    dap:`Giả sử cả 50 chuyến đều xe 3 chở: 3×50=150 tấn, dôi 150−118=32 tấn. Cứ 5 chuyến xe 3 thay bởi 2 chuyến xe1+2 chuyến xe2 thì khối lượng giảm: 3.5−(2.3+2,5.2)=4 tấn. Số lần thay: 32:4=8.<br>
Xe 1 chở: 3×8=<b>24 chuyến</b>. Xe 2 chở: 2×8=<b>16 chuyến</b>. Xe 3 chở: 50−40=<b>10 chuyến</b>`},
    {so:"Bài 2", de:`Trên quãng đường AC dài 200 km có một điểm B cách A là 10 km. Lúc 7 giờ, một ô tô đi từ A, một ô tô khác đi từ B, cả hai cùng đi tới C với vận tốc thứ tự bằng 50km/h và 40km/h. Hỏi lúc mấy giờ thì khoảng cách đến C của xe thứ hai gấp đôi khoảng cách đến C của xe thứ nhất?`,
    dap:`Giả thiết tạm có xe thứ ba đi quãng đường EC=2×AC=400km với vận tốc gấp đôi xe 1 (=100km/h), khi đó xe thứ 3 sẽ gặp xe thứ 2 tại đúng điểm D cần tìm.<br>
Quãng ED dài hơn BD: 400−190=210km. Vận tốc xe 3 hơn xe 2: 100−40=60km/h. Thời gian gặp: 210:60=3,5h.<br>
<b>Thời điểm: 7h + 3,5h = 10 giờ 30 phút</b>`},
    {so:"Bài 3", de:`Người ta bơm nước vào một bể: dùng máy I trong 30 phút, dùng máy II trong 20 phút. Tính xem trong mỗi phút mỗi máy bơm được bao nhiêu lít nước, biết rằng mỗi phút máy II bơm được nhiều hơn máy I là 50 lít và tổng cộng hai máy bơm được 21000 lít nước?`,
    dap:`Giả sử máy II bơm bằng máy I thì trong 50 phút (30+20) cả hai bơm: 21000−50×20=20000 lít. Mỗi phút máy I bơm: 20000:50=<b>400 lít</b>. Máy II: 400+50=<b>450 lít</b>`},
    {so:"Bài 4", de:`Khối 6 của một trường có 366 học sinh, gồm 8 lớp. Mỗi lớp gồm một số tổ, mỗi tổ có 9 người hoặc 10 người. Biết rằng số tổ của các lớp đều bằng nhau, tính số tổ có 9 người, số tổ có 10 người cả khối?`,
    dap:`366:10=36 dư, 366:9=40 dư ⇒ số tổ trong khoảng 37–40, mà số tổ chia hết cho 8 ⇒ số tổ=40. Giả sử cả 40 tổ đều 10 người: 400 HS, thừa 400−366=34. Mỗi lần thay tổ 10 người bằng tổ 9 người giảm 1 HS.<br>
Số tổ 9 người: 34:1=<b>34 tổ</b>. Số tổ 10 người: 40−34=<b>6 tổ</b>`},
    {so:"Bài 5", de:`Một câu lạc bộ có 22 chiếc ghế gồm ba loại: ghế ba chân, ghế bốn chân, ghế sáu chân. Tính số ghế mỗi loại, biết rằng tổng số chân ghế bằng 100 và số ghế sáu chân gấp đôi số ghế ba chân?`,
    dap:`Giả sử cả 22 ghế đều 4 chân: 88 chân, hụt 100−88=12 chân. Thay 1 ghế 3 chân + 2 ghế 6 chân cho 3 ghế 4 chân, mỗi lần thay tăng: 2.6+1.3−3.4=3 chân. Số lần thay: 12:3=4.<br>
Ghế 3 chân: 4×1=<b>4 ghế</b>. Ghế 6 chân: 4×2=<b>8 ghế</b>. Ghế 4 chân: 22−12=<b>10 ghế</b>`},

    {so:"Tự luyện 1", de:`Một số học sinh xếp hàng 12 thì thừa 5 học sinh, còn xếp hàng 15 cũng thừa 5 học sinh và ít hơn trước là 4 hàng. Tính số học sinh?`,
    dap:`Giả thiết tạm xếp hàng 15 cũng được số hàng như hàng 12, cần thêm 4 hàng: 15×4=60 HS. Chênh lệch mỗi hàng: 15−12=3. Số hàng khi xếp 12: 60:3=20. <b>Số HS: 20×12+5 = 245</b>`},
    {so:"Tự luyện 2", de:`Anh vào cửa hàng mua 12 vở và 4 bút chì hết 36000 đồng. Bích mua 8 vở và 5 bút chì cùng loại hết 27500 đồng. Tính giá trị một quyển vở, giá trị một bút chì.`,
    dap:`Giả sử Anh mua gấp đôi: 24 vở+8 bút chì hết 72000đ. Bích mua gấp 3: 24 vở+15 bút chì hết 82500đ. Bích mua nhiều hơn Anh 7 bút chì, chênh 10500đ ⇒ giá bút chì: 10500:7=<b>1500đ</b>. Giá vở: (36000−4×1500):12=<b>2500đ</b>`},
    {so:"Tự luyện 3", de:`Một tổ may phải may 1800 chiếc cả quần và áo trong 13 giờ. Trong 8 giờ đầu tổ may áo và trong thời gian còn lại tổ may quần. Biết rằng trong 1 giờ, tổ may được số áo nhiều hơn số quần là 30 chiếc. Tính số áo và số quần tổ đã may.`,
    dap:`Giả sử thời gian còn lại tổ vẫn may áo, may thêm: (13−8)×30=150 chiếc. Số áo trong 13 giờ: 1800+150=1950. Số áo thực may: (1950:13)×8=<b>1200 chiếc</b>. Số quần: 1800−1200=<b>600 chiếc</b>`},
    {so:"Tự luyện 4", de:`Một lớp học có 6 tổ, số người của mỗi tổ bằng nhau. Trong một bài kiểm tra, tất cả học sinh đều được điểm 7 hoặc 8. Tổng số điểm của cả lớp là 350. Hãy tính số học sinh của lớp, số học sinh đạt từng loại điểm?`,
    dap:`350:8 dư, 350:7=50 ⇒ số HS từ 44–50, chia hết cho 6 ⇒ số HS=48. Giả sử cả 48 đều điểm 7: 336 điểm, thiếu 350−336=14. Mỗi lần đổi điểm 7→8 tăng 1 điểm ⇒ số HS điểm 8: 14, điểm 7: 48−14=34.<br>
<b>Lớp có 48 học sinh: 14 học sinh điểm 8, 34 học sinh điểm 7</b>`},
    {so:"Tự luyện 5", de:`Một đội bóng thi đấu 25 trận, chỉ có thắng và hòa, mỗi trận thắng được 3 điểm, mỗi trận hòa được 1 điểm, kết quả đội đó được 59 điểm. Tính số trận thắng, số trận hòa của đội bóng.`,
    dap:`Giả sử cả 25 trận đều thắng: 75 điểm, thừa 75−59=16. Mỗi lần đổi thắng→hòa giảm 2 điểm. Số trận hòa: 16:2=<b>8 trận</b>. Số trận thắng: 25−8=<b>17 trận</b>`},
    {so:"Tự luyện 6", de:`Có 25 gói đường gồm ba loại: gói 5 lạng, gói 2 lạng, gói 1 lạng, có tổng khối lượng tổng cộng là 56 lạng. Biết số gói 1 lạng gấp đôi số gói 5 lạng. Tính số gói mỗi loại.`,
    dap:`Giả sử cả 25 gói đều 2 lạng: 50 lạng, hụt 56−50=6 lạng. Thay 1 gói 5 lạng+2 gói 1 lạng cho 3 gói 2 lạng, mỗi lần tăng: 1.5+2.1−3.2=1 lạng. Số lần thay: 6:1=6.<br>
Gói 5 lạng: <b>6 gói</b>. Gói 1 lạng: 6×2=<b>12 gói</b>. Gói 2 lạng: 25−18=<b>7 gói</b>`},
    {so:"Tự luyện 7", de:`Một hộp có thể chứa được vừa vặn 25 gói bánh hoặc 30 gói kẹo. Người ta xếp 28 gói cả bánh và kẹo thì vừa đầy hộp đó. Biết rằng giá tiền bánh và kẹo đều bằng nhau và bằng 36000 đồng. Tính giá một gói bánh, một gói kẹo.`,
    dap:`Thể tích 5 gói bánh = thể tích 6 gói kẹo. Giả sử cả 28 gói đều kẹo cần 30, thừa thể tích của 2 gói kẹo. Mỗi lần thay 6 kẹo→5 bánh giảm 1 gói (về số lượng thể tích dư): số lần thay=2:1=2.<br>
Số gói bánh: 2×5=<b>10 gói</b>. Số gói kẹo: 28−10=<b>18 gói</b>. Giá bánh: 36000:10=<b>3600đ</b>. Giá kẹo: 36000:18=<b>2000đ</b>`},
  ]
},
{
  ten:"PP3: Đơn vị quy ước",
  bai:[
    {so:"Bài 1", de:`Hai xe ô tô khởi hành cùng một lúc: xe thứ nhất đi từ A đến B, xe thứ hai đi từ B đến A. Sau 1 giờ 30 phút, chúng còn cách nhau 108 km. Tính quãng đường AB biết rằng xe thứ nhất đi cả quãng đường AB hết 6 giờ, xe thứ hai đi cả quãng đường BA hết 5 giờ.`,
    dap:`Lấy AB làm đơn vị quy ước: mỗi giờ xe 1 đi 1/6 AB, xe 2 đi ⅕ AB. Mỗi giờ cả hai đi: 1/6+⅕=11/30 AB. Trong 1,5 giờ: 11/30×3/2=11/20 AB.<br>
Quãng còn lại: 1−11/20=9/20 AB ứng với 108km. <b>AB = 108:(9/20) = 240 km</b>`},
    {so:"Bài 2", de:`Một công nhân làm một mình xong một công việc trong 10 ngày, người thứ hai làm xong công việc đó trong 15 ngày, còn người thứ ba muốn hoàn thành công việc nói trên cần một số ngày gấp 5 lần số ngày hai người trên cùng làm để hoàn thành công việc. Hỏi nếu cả ba người cùng làm công việc đó thì mấy ngày xong?`,
    dap:`Mỗi ngày người 1 làm 1/10, người 2 làm 1/15, cả hai làm 1/6 công việc/ngày ⇒ hai người làm xong trong 6 ngày. Người 3 làm xong trong 5×6=30 ngày ⇒ mỗi ngày làm 1/30.<br>
Cả ba làm mỗi ngày: 1/10+1/15+1/30=⅕. <b>Cả ba cùng làm xong trong 1:⅕ = 5 ngày</b>`},

    {so:"Tự luyện 1", de:`Một người cần 15 ngày để làm xong một công việc, trong khi đó người thứ hai làm xong công việc ấy cần 18 ngày. Cả hai cùng làm 3 ngày, sau đó chỉ còn người thứ nhất làm thêm 3 ngày nữa thì có người thứ ba đến giúp và tất cả làm 4 ngày thì xong. Hỏi người thứ ba làm một mình bao lâu thì xong công việc nói trên?`,
    dap:`Mỗi ngày: người 1=1/15, người 2=1/18. Trong 3 ngày đầu (cả hai): (1/15+1/18)×3=11/30. Trong 3 ngày tiếp (người 1): 1/15×3=⅕.<br>
Còn lại cho 4 ngày cuối (người 1+người 3): 1−(11/30+⅕)=13/30. Người 1 làm trong 4 ngày: 4/15. Người 3 làm trong 4 ngày: 13/30−4/15=1/6 ⇒ mỗi ngày 1/24.<br>
<b>Người thứ ba làm một mình hết: 24 ngày</b>`},
    {so:"Tự luyện 2", de:`Ba máy cày cùng cày một cánh đồng. Lúc đầu chỉ có hai máy thứ nhất và thứ hai cày trong 3 giờ, sau đó máy thứ hai nghỉ, máy thứ ba vào làm thay với năng suất gấp đôi máy thứ hai và trong 5 giờ thì hai máy này cày xong cánh đồng. Hỏi mỗi máy cày một mình xong cánh đồng đó trong bao lâu, biết rằng nếu máy thứ nhất và máy thứ hai cùng làm thì sau 12 giờ xong công việc?`,
    dap:`Máy 1+2 mỗi giờ làm 1/12. Trong 3 giờ làm ¼. Còn lại ¾ cho máy 1+3 trong 5 giờ ⇒ mỗi giờ máy1+3 làm 3/20.<br>
Gọi x=năng suất máy1/giờ. Máy 2=1/12−x; máy 3=3/20−x. Vì máy3=2×máy2: 3/20−x=2(1/12−x) ⇒ x=1/60.<br>
<b>Máy 1 cày một mình hết: 60 giờ. Máy 2: 15 giờ. Máy 3: 7,5 giờ.</b>`},
  ]
},
{
  ten:"PP4: Tính ngược từ cuối",
  bai:[
    {so:"Bài 1", de:`Một nông dân ra chợ bán hết số cam của mình cho năm người: Người thứ nhất mua ½ số cam rồi mua thêm ½ quả, người thứ hai mua ½ số còn lại rồi mua thêm ½ quả, người thứ ba mua ½ số quả còn lại rồi mua thêm ½ quả, người thứ tư mua 1½ số còn lại rồi mua thêm ½ quả, người thứ năm mua ½ số còn lại rồi mua thêm ½ quả thì vừa hết. Tính số cam người nông dân đem đi bán và số cam những người khác đã mua.`,
    dap:`Đặt số cam ban đầu là x, giải phương trình lần lượt qua 5 người (mỗi người mua ½ số còn lại + ½ quả), cuối cùng còn lại 0:<br>
Giải ra <b>x = 31 quả</b> (tổng số cam đem bán).<br>
Người 1 mua: 31−15=<b>16 quả</b>. Người 2: 15−7=<b>8 quả</b>. Người 3: 7−3=<b>4 quả</b>. Người 4: 3−1=<b>2 quả</b>. Người 5: <b>1 quả</b>.`},
    {so:"Bài 2a", de:`Có 100 viên bi. Hai người lần lượt lấy số bi bất kỳ từ 1 đến 4 viên, người nào lấy được viên bi cuối cùng là người thắng cuộc. Hỏi người đi trước hay người đi sau sẽ thắng và cách lấy số bi để đảm bảo phần thắng thuộc về mình?`,
    dap:`Người thắng cần để lại cho đối thủ số bi là bội của 5 (vì 1+4=5). <b>Người đi sau sẽ thắng</b> nếu nắm quy luật: khi người đi trước lấy k viên (1≤k≤4) thì người đi sau lấy 5−k viên.`},
    {so:"Bài 2b", de:`Cũng hỏi như câu a nếu mỗi người được lấy từ 5 đến 10 viên bi.`,
    dap:`Người thắng cần để lại bội của 15 (vì 5+10=15): 15,30,...,90,...(100 không phải bội của 15, dư 10). <b>Người đi sau thắng</b> bằng cách: khi người đi trước lấy k viên (5≤k≤10) thì người đi sau lấy 15−k viên — áp dụng từ khi còn 90 viên trở xuống; với 10 viên dư ban đầu, người đi trước buộc phải lấy trước rồi người đi sau lấy hết số còn lại.`},
    {so:"Bài 2c", de:`Cũng câu hỏi như câu a nếu mỗi người lấy được 5 đến 10 viên bi và người lấy viên bi cuối cùng là người thua cuộc?`,
    dap:`<b>Người đi trước thắng</b> bằng cách: lấy 5 bi trước, sau đó khi đối thủ lấy k bi thì lấy 15−k bi, lần lượt để lại cho người kia 80, 65, 50, 35, 20, 5 viên bi.`},

    {so:"Tự luyện 1", de:`Một người ra chợ bán trứng. Người khách thứ nhất mua ½ số trứng rồi mua thêm 2 quả, người thứ hai mua ½ số còn lại rồi mua thêm 2 quả, người thứ ba mua ½ số còn lại rồi mua thêm 2 quả, người thứ tư mua ½ số còn lại rồi mua thêm 2 quả thì hết. Hỏi người bán hàng bán được bao nhiêu quả trứng?`,
    dap:`Giải phương trình qua 4 người, ra <b>x = 60 quả trứng</b>.`},
    {so:"Tự luyện 2", de:`Trong dịp Tết trồng cây, khối 6 phân chia số cây cho các lớp đem trồng như sau: Lớp 6A trồng 10 cây và ⅛ số còn lại, lớp 6B trồng 15 cây và ⅛ số còn lại, lớp 6C trồng 20 cây và ⅛ số còn lại … Cứ chia như vậy cho đến lớp cuối cùng thì vừa hết số cây và số cây các lớp được chia đem trồng đều bằng nhau. Hỏi có mấy lớp 6, mỗi lớp được chia bao nhiêu cây đem trồng?`,
    dap:`Xét 2 lớp cuối: lớp n được chia nốt ⅛ số còn lại của lớp n−1 (không còn dư) ⇒ mỗi lớp được chia bằng nhau dẫn tới ⅛y=5 ⇒ y=40, mỗi lớp được chia 35 cây. Vì lớp 6A trồng 10 cây + ⅛ còn lại =35 ⇒ ⅛ số còn lại=25 ⇒ tổng số cây=10+25×8=210.<br>
<b>Số lớp 6: 210:35 = 6 lớp, mỗi lớp được chia 35 cây.</b>`},
  ]
},
{
  ten:"PP5: Phương pháp lựa chọn",
  bai:[
    {so:"Bài 1", de:`Tìm số tự nhiên có ba chữ số biết rằng số đó chia hết cho 18 và các chữ số của nó đều sắp xếp từ nhỏ đến lớn thì tỉ lệ với 1:2:3.`,
    dap:`Các chữ số có thể là (1,2,3), (2,4,6), hoặc (3,6,9). Vì số chia hết cho 18 ⇒ chia hết cho 9 ⇒ tổng chữ số chia hết cho 9 ⇒ chỉ bộ (3,6,9) thỏa. Vì chia hết cho 2 ⇒ chữ số tận cùng là 6.<br>
<b>Các số thỏa mãn: 396 và 936</b>`},
    {so:"Bài 2", de:`Anh Văn nói với bạn: Năm 1990, tuổi mình đúng bằng tổng các chữ số của năm sinh. Hãy tính xem anh Văn sinh năm nào?`,
    dap:`Gọi năm sinh là ${ov("19xy")}: 1990−${ov("19xy")}=1+9+x+y ⇒ 80=11x+2y. Vì 11x≤80⇒x≤7; 2y≤18⇒x≥6. Thử x=6: y=7 (nhận); x=7: y=3/2 (loại).<br>
<b>Anh Văn sinh năm 1967</b> (kiểm tra: 1990−1967=23=1+9+6+7 ✓)`},
    {so:"Bài 3", de:`Tìm số tự nhiên có ba chữ số, biết rằng tổng sáu số tự nhiên có hai chữ số lập bởi hai trong ba chữ số ấy gấp đôi số phải tìm.`,
    dap:`Gọi số cần tìm là ${ov("abc")}. ${ov("ab")}+${ov("bc")}+${ov("ca")}+${ov("ac")}+${ov("cb")}+${ov("ba")}=2${ov("abc")} ⇒ 22(a+b+c)=200a+20b+2c ⇒ 178a=2b+20c.<br>

    dap:`Vận tốc xuôi: 800:8=100m/phút. Vận tốc thực: 100−20=80m/phút. Vận tốc ngược: 80−20=60m/phút.<br>
<b>Thời gian bơi ngược: 800:60 = 13⅓ phút</b>`},
    {so:"Bài 3", de:`Một ca nô đi xuôi dòng với vận tốc 29 km/h và đi ngược dòng với vận tốc 24 km/h. 1) Tính vận tốc thực của ca nô. 2) Nếu ca nô đi xuôi dòng đoạn sông dài 34,8 km hết bao lâu? 3) Nếu ca nô đi ngược dòng đoạn sông dài 34,8 km hết bao lâu?`,
    dap:`1) Vận tốc thực: (29+24):2=<b>26,5 km/giờ</b><br>
2) Thời gian xuôi dòng: 34,8:29=<b>1,2 giờ</b><br>
3) Thời gian ngược dòng: 34,8:24=<b>1,45 giờ</b>`},
    {so:"Bài 4", de:`Quãng sông AB dài 143 km, vận tốc dòng nước là 6 km/h. Một ca nô đi xuôi dòng từ A về B và một ca nô khác đi ngược dòng từ B về A. Hai ca nô cùng khởi hành lúc 8 giờ 30 phút. Vận tốc thực của mỗi ca nô là 26 km/h. Hỏi đến mấy giờ hai ca nô gặp nhau?`,
    dap:`Ca nô từ A xuôi dòng: 26+6=32km/h. Ca nô từ B ngược dòng: 26−6=20km/h. Tổng vận tốc: 32+20=52km/h. Thời gian gặp: 143:52=2,75h=2h45ph.<br>
<b>Hai ca nô gặp nhau lúc: 8h30 + 2h45ph = 11 giờ 15 phút</b>`},
    {so:"Bài 5", de:`Một ca nô đi với vận tốc riêng là 55 km/h. Ca nô đi xuôi dòng từ A đến B và ngược dòng từ B về A. Thời gian lúc về hơn thời gian lúc đi là 18 phút. Tính độ dài quãng sông từ A đến B, biết vận tốc dòng nước là 5 km/h.`,
    dap:`Vận tốc xuôi: 60km/h, vận tốc ngược: 50km/h. Thời gian đi 1km xuôi: 1/60h, ngược: 1/50h. Chênh lệch mỗi km: 1/50−1/60=1/300h=1/5 phút.<br>
<b>Quãng sông AB: 18:(1/5) = 90 km</b>`},
    {so:"Bài 6", de:`Một chiếc thuyền lúc 7 giờ đi ngược dòng từ A đến B. Sau khi nghỉ 35 phút thuyền lại xuôi dòng về đến bến A lúc 18 giờ 5 phút. Hỏi quãng sông AB dài bao nhiêu km. Biết rằng thuyền xuôi dòng với vận tốc 75 m/phút, và ngược dòng với vận tốc 30 m/phút.`,
    dap:`Đổi: 75m/ph=4,5km/h; 30m/ph=1,8km/h. Cứ 1km xuôi+1km ngược hết: 1/4,5+1/1,8=7/9 giờ.<br>
Tổng thời gian chuyển động (trừ nghỉ): 18h5−7h−35ph=10h30ph=10,5h.<br>
<b>Quãng sông AB: 10,5:(7/9) = 13,5 km</b>`},
  ]
},
{
  ten:"Dạng 5: Vận tốc thay đổi từng đoạn",
  bai:[
    {so:"Bài 1", de:`Một người đi xe đạp từ A đến B gồm một đoạn lên dốc AB và một đoạn xuống dốc CB. Thời gian đi AB là 2 giờ, thời gian về BA là 1 giờ 45 phút. Tính chiều dài quãng đường AB biết rằng cứ lúc lên dốc thì người đó đi với vận 10 km/h, cứ lúc xuống dốc thì người đó đi với vận tốc 15 km/h.`,
    dap:`Mỗi km cả đi lẫn về hết: 1/10+1/15=⅙ giờ. Thời gian cả đi lẫn về: 2+1¾=3¾ giờ.<br>
<b>Quãng đường AB: 3¾:(⅙) = 22,5 km</b>`},
    {so:"Bài 2", de:`Một xe tải đi từ A đến B, vận tốc 40 km/h. Sau đó một thời gian, một xe du lịch rời A, vận tốc 60 km/h và như vậy sẽ đến B cùng lúc với xe tải. Nhưng đi đến C, được ⅕ quãng đường AB, xe tải giảm vận tốc xuống còn 35 km/h, do đó xe du lịch gặp xe tải ở D, cách B 30km. Tính quãng đường AB.`,
    dap:`Xe du lịch đi DB trong: 30:60=½h. Trong ½ giờ đó xe tải (vận tốc mới 35) đi được: 35×½=17,5km. Lúc xe du lịch đến B (lẽ ra xe tải cũng đến) thì xe tải mới đến E, còn cách B: 30−17,5=12,5km.<br>
Từ C, xe tải đi với vận tốc bằng 35/40=7/8 vận tốc cũ ⇒ quãng đường CE bằng ⅞ quãng đường CB. Vậy 12,5km là ⅛ quãng đường CB.<br>
Quãng đường CB: 12,5×8=100km. <b>Quãng đường AB: 100×5/4 = 125 km</b>`},
    {so:"Bài 3", de:`Một người đi từ A đến B. Lúc đầu người đó đi với vận tốc 15 km/h. Khi còn cách B 21 km, người đó tăng vận tốc thành 18 km/h. Lúc về người đó đi với vận tốc không đổi là 18 km/h. Thời gian cả đi lẫn về là 4 giờ 10 phút. Tính quãng đường AB.`,
    dap:`Gọi C cách B 21km. Thời gian đi CB và về BC: 42:18=2⅓h. Thời gian đi AC và về CA: 4⅙−2⅓=1⅚h.<br>
Từ đó tìm được quãng đường AC là 15km. <b>Quãng đường AB = 15+21 = 36 km</b>`},

    {so:"Tự luyện 1", de:`Một người đi từ A đến B gồm một đoạn lên dốc, một đoạn xuống dốc, vận tốc lên dốc là 12 km/h, vận tốc xuống dốc là 20 km/h, tổng cộng hết 1 giờ 35 phút. Lúc về, người đó đi từ B về A, vận tốc lên dốc cũng là 12 km/h, vận tốc xuống dốc cũng là 20 km/h, tổng cộng hết 1 giờ 45 phút. Tính quãng đường AB?`,
    dap:`Tỉ số thời gian lên dốc:xuống dốc tổng cộng = vận tốc xuống:vận tốc lên = 20:12=5:3. Tổng thời gian: 1h35+1h45=200 phút.<br>
Thời gian xuống dốc tổng cộng: 200×3/8=75 phút. <b>Quãng đường AB (=quãng xuống dốc tổng): 20×75/60 = 25 km</b>`},
    {so:"Tự luyện 2", de:`Một người đi quãng đường AB gồm một đoạn lên dốc, một đoạn xuống dốc. Thời gian tổng cộng cả đi lẫn về là 7 giờ. Biết rằng cứ lên dốc thì người đó đi với vận tốc 18 km/h, cứ xuống dốc thì người đó đi với vận tốc 24 km/h. Tính quãng đường AB?`,
    dap:`Tỉ số thời gian lên dốc:xuống dốc = 24:18=4:3. Tổng thời gian: 7h=420 phút. Thời gian lên dốc tổng cộng: 420:(3+4)×4=240 phút.<br>
<b>Quãng đường AB: 240×18/60 = 72 km</b>`},
    {so:"Tự luyện 3", de:`Một người đi quãng đường AB gồm đoạn AC và CB. Lúc đi, vận tốc trên AC là 12 km/h, vận tốc trên CB là 8 km/h hết 3 giờ 30 phút. Lúc về, vận tốc trên BC là 30 km/h, vận tốc trên CA là 20 km/h hết 1 giờ 36 phút. Tính quãng đường AB?`,
    dap:`Vận tốc 12km/h gấp rưỡi 8km/h, vận tốc 30km/h gấp rưỡi 20km/h. Giả sử lúc đi với vận tốc 12km/h: đi được AC+1,5CB=12×3,5=42km. Giả sử lúc về với vận tốc 30km/h: đi được BC+1,5CA=30×1,6=48km.<br>
Tổng: 42+48=90km = 2,5(AC+CB)=2,5AB. <b>Quãng đường AB: 90:2,5 = 36 km</b>`},
  ]
},
{
  ten:"Dạng 6: Vận tốc trung bình",
  bai:[
    {so:"Bài 1", de:`Một người đi xe đạp từ A đến B, đi từ A với vận tốc 10 km/h, nhưng đi từ chính giữa đường đến B với vận tốc 15 km/h. Tính xem trên cả quãng đường người đó đi với vận tốc trung bình là bao nhiêu?`,
    dap:`Cứ 2km thì có 1km vận tốc 10, 1km vận tốc 15, hết: 1/10+1/15=⅙ giờ. <b>Vận tốc trung bình: 2:(⅙) = 12 km/h</b>`},
    {so:"Bài 2", de:`Một người đi xe máy trên một quãng đường, giờ đầu đi với vận tốc 40 km/h, 2 giờ sau đi với vận tốc 37 km/h. Tính vận tốc trung bình của người đó trên cả quãng đường.`,
    dap:`2 giờ sau đi được: 37×2=74km. Tổng thời gian: 1+2=3 giờ. <b>Vận tốc trung bình: (40+74):3 = 38 km/giờ</b>`},
    {so:"Bài 3", de:`Một người đi từ A đến B với vận tốc 5 km/h, sau đó lại đi từ B về A với vận tốc 4 km/h. Tính vận tốc trung bình của người đó trên cả quãng đường cả đi và về.`,
    dap:`Đi 1km hết: 60:5=12 phút. Về 1km hết: 60:4=15 phút. Cả đi về 1km hết: 12+15=27 phút, ứng 2km ⇒ trên 1km TB hết 13,5 phút.<br>
<b>Vận tốc trung bình: 60:13,5 = 4 4/9 km/h</b>`},
    {so:"Bài 4", de:`Quãng đường AB dài 43,8 km. Lúc 6 giờ xe thứ nhất đi từ A để đến B, lúc 6 giờ 25 phút xe thứ hai đi từ B để đến A. Hai xe gặp nhau trên đường đi lúc 6 giờ 45 phút và đến khi đó thì xe thứ nhất đã đi nhiều hơn xe thứ hai là 11,4 km. Tính vận tốc của mỗi xe.`,
    dap:`Thời gian xe 1 đi đến lúc gặp: 45ph=0,75h. Thời gian xe 2: 20ph=⅓h.<br>
Quãng đường xe 1 đi: (43,8+11,4):2=27,6km. Quãng đường xe 2: (43,8−11,4):2=16,2km.<br>
<b>Vận tốc xe 1: 27,6:0,75 = 36,8 km/h. Vận tốc xe 2: 16,2:(⅓) = 48,6 km/h</b>`},

    {so:"Tự luyện 1", de:`Hai người đi cùng xuất phát một lúc để đi từ A đến B. Người thứ nhất đi với vận tốc 32 km/h trên cả quãng đường. Người thứ hai đi nửa thời gian đầu với vận tốc 25 km/h và nửa thời gian sau đi với vận tốc 35 km/h. Hỏi ai đến B trước?`,
    dap:`Vận tốc trung bình người 2: (25+35):2=30km/h. Vì 32&gt;30 ⇒ <b>người thứ nhất đến B trước.</b>`},
    {so:"Tự luyện 2", de:`Một người đi xe máy từ A đến B với vận tốc 35 km/h. Hỏi người đó đi xe máy từ B về A với vận tốc bao nhiêu để vận tốc trung bình trên cả quãng đường đi và về là 30 km/h?`,
    dap:`Thời gian đi 1km từ A đến B: 1/35h. Đi 1km và về 1km với TB 30km/h hết: 2/30=1/15 giờ. Thời gian về 1km: 1/15−1/35=4/105 giờ.<br>
<b>Vận tốc về: 1:(4/105) = 26,25 km/h</b>`},
    {so:"Tự luyện 3", de:`Một người đi xe đạp trên quãng đường từ A đến B, ⅗ quãng đường AB người đó đi với vận tốc 12 km/h. Quãng đường còn lại người đó đi với vận tốc 10 km/h. Tính vận tốc của người đó trên cả quãng đường AB.`,
    dap:`Chia AB thành 5 phần: 3 phần vận tốc 12, 2 phần vận tốc 10. Thời gian 3 phần: 3×(1/12)=¼h. Thời gian 2 phần: 2×(1/10)=⅕h.<br>
<b>Vận tốc trung bình: (3+2):(¼+⅕) = 11 1/9 km/h</b>`},
    {so:"Tự luyện 4a", de:`Một máy bay có vận tốc trung bình trong cả chuyến bay là 700 km/h. Trên quãng đường đầu, vận tốc của máy bay là 800 km/h. Tính vận tốc của máy bay trên quãng đường sau biết rằng thời gian bay quãng đường đầu bằng ⅓ thời gian cả chuyến bay.`,
    dap:`Cứ 3 giờ thì máy bay bay được: 700×3=2100km, trong đó 1 giờ với vận tốc 800, 2 giờ với vận tốc lúc sau.<br>
<b>Vận tốc lúc sau: (2100−800):2 = 650 km/h</b>`},
    {so:"Tự luyện 4b", de:`Một ô tô đi ⅔ quãng đường AB với vận tốc 40 km/h rồi đi phần còn lại với vận tốc 60 km/h. Lúc về ô tô đi với vận tốc không đổi và thời gian về bằng thời gian đi. Tính vận tốc lúc về?`,
    dap:`Cứ 3km lúc đi có 2km vận tốc 40 (hết 1/20h), 1km vận tốc 60 (hết 1/60h), tổng: 1/20+1/60=1/15h cho 3km.<br>
Vận tốc trung bình lúc đi: 3:(1/15)=45km/h. Vì thời gian về bằng thời gian đi và cùng quãng đường AB ⇒ <b>Vận tốc lúc về = 45 km/h</b>`},
  ]
}
];

/* ===================== DATA: CHUYÊN ĐỀ 12 (HÌNH HỌC) ===================== */
const seg = (labels) => { // simple svg segment with points, labels: array of {x,name}
  const w=320,h=50;
  let pts = labels.map(l=>`<circle cx="${l.x}" cy="25" r="3" fill="#1d4ed8"/><text x="${l.x}" y="14" font-size="13" text-anchor="middle">${l.name}</text>`).join('');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" style="max-width:320px;display:block;margin:8px auto;"><line x1="10" y1="25" x2="${w-10}" y2="25" stroke="#1f2330" stroke-width="1.5"/>${pts}</svg>`;
};

    {so:"TN 5", de:`Điểm I là trung điểm của đoạn thẳng MN khi: A. IM=IN  B. IM=IN=MN/2  C. IM+IN=MN  D. IM=2IN`},
    {so:"TN 6", de:`Cho các điểm A,B,C,D,E cùng nằm trên một đường thẳng. Có bao nhiêu đoạn thẳng được tạo thành từ các điểm trên? A.5  B.10  C.15  D.20`},
    {so:"TN 7", de:`Đường thẳng có đặc điểm nào: A. Giới hạn một đầu  B. Kéo dài mãi về một phía  C. Giới hạn hai đầu  D. Kéo dài mãi về hai phía`},
    {so:"TN 8", de:`Ba điểm M,N,P thẳng hàng. Câu nào sai? A. Đường thẳng MP đi qua N  B. Đường thẳng MN đi qua P  C. M,N,P thuộc một đường thẳng  D. M,N,P không cùng thuộc một đường thẳng`},
    {so:"TN 9", de:`Điểm E nằm giữa hai điểm M,N thì: A. ME+MN=EN  B. MN+EN=ME  C. ME+EN=MN  D. Đáp án khác`},
    {so:"TN 10", de:`Có bao nhiêu đường thẳng đi qua 5 điểm phân biệt mà không có 3 điểm nào thẳng hàng? A.15  B.10  C.5  D.Vô số`},
    {so:"Tự luận 1", de:`Cho đường thẳng xy. Lấy điểm O∉xy; điểm A∈xy và điểm B trên tia Ay (điểm B khác A). a) Kể tên các tia đối nhau, các tia trùng nhau. b) Kể tên hai tia không có điểm chung. c) Gọi M là điểm di động trên xy. Xác định vị trí điểm M để tia OM đi qua điểm M không cắt hai tia Ax, By.`},
    {so:"Tự luận 2", de:`Vẽ hai đường thẳng mn và xy cắt nhau tại O. a) Kể tên hai tia đối nhau. b) Trên tia Ox lấy điểm P, trên tia Om lấy điểm E. Hãy tìm vị trí điểm Q để O nằm giữa P,Q; tìm vị trí điểm F sao cho hai tia OE, OF trùng nhau.`},
    {so:"Tự luận 3", de:`Cho 4 điểm A,B,C,O. Biết hai tia OA,OB đối nhau; hai tia OA,OC trùng nhau. a) Giải thích vì sao 4 điểm A,B,C,O thẳng hàng. b) Nếu A nằm giữa C,O thì A có nằm giữa O,B không? Giải thích.`},
    {so:"Tự luận 4", de:`Cho điểm O nằm giữa A,B; điểm I nằm giữa O,B. Giải thích vì sao: a) O nằm giữa A,I? b) I nằm giữa A,B?`},
    {so:"Tự luận 5", de:`Gọi A,B là hai điểm nằm trên tia Ox sao cho OA=4cm, OB=6cm. Trên tia BA lấy điểm C sao cho BC=3cm. So sánh AB với AC.`},
    {so:"Tự luận 6", de:`Vẽ đoạn thẳng AB=5cm. Lấy hai điểm E,F nằm giữa A,B sao cho AE+BF=7cm. a) Chứng tỏ E nằm giữa B,F. b) Tính EF.`},
    {so:"Tự luận 7", de:`Vẽ hai tia chung gốc Ox,Oy. Trên Ox lấy A,B (A nằm giữa O,B). Trên Oy lấy M,N sao cho OM=OA; ON=OB. Chứng tỏ M nằm giữa O,N. So sánh AB và MN.`},
    {so:"Tự luận 8", de:`Trên tia Ox lấy A,M sao cho OA=3cm; OM=4,5cm. Trên tia Ax lấy B sao cho M là trung điểm AB. Hỏi A có phải trung điểm OB không? Vì sao?`},
    {so:"Tự luận 9", de:`Cho đoạn thẳng AB=6cm. Lấy C,D thuộc AB sao cho AC=BD=2cm. Gọi M là trung điểm AB. 1) Giải thích vì sao M cũng là trung điểm CD. 2) Tìm trên hình vẽ những điểm khác cũng là trung điểm đoạn thẳng.`},
    {so:"Tự luận 10", de:`Gọi O là một điểm thuộc đoạn thẳng AB. Xác định vị trí điểm O để: 1) Tổng AB+BO nhỏ nhất 2) AB+BO=2BO 3) AB+BO=3BO`},
    {so:"Tự luận 11", de:`Gọi M là trung điểm AB và C là một điểm của đoạn thẳng đó. Cho AB=6cm; AC=a (cm) (0<a≤6). Tính khoảng cách CM.`},
    {so:"Tự luận 12", de:`Cho đoạn thẳng CD=5cm. Trên đoạn này lấy hai điểm I,K sao cho CI=1cm; DK=3cm. 1) Điểm K có là trung điểm CD không? Vì sao? 2) Chứng tỏ I là trung điểm CK.`},
    {so:"Tự luận 13", de:`Cho đoạn thẳng AB; điểm O thuộc tia đối của tia AB. Gọi M,N thứ tự là trung điểm OA, OB. 1) Chứng tỏ OA<OB. 2) Trong ba điểm O,M,N điểm nào nằm giữa? 3) Chứng tỏ độ dài MN không phụ thuộc vị trí điểm O.`},
    {so:"Tự luận 14", de:`Cho đoạn thẳng AB=8cm. Trên tia AB lấy C sao cho AC=2cm. 1) Tính CB. 2) Lấy D thuộc tia đối của tia BC sao cho BD=4cm. Tính CD.`},
    {so:"Tự luận 15", de:`Trên tia Ox, lấy hai điểm E,F sao cho OE=3cm, OF=6cm. 1) E có nằm giữa O,F không? Vì sao? 2) So sánh OE và EF. 3) E có là trung điểm OF không? Vì sao? 4) Ta có thể khẳng định OF chỉ có duy nhất một trung điểm hay không? Vì sao?`},
    {so:"Tự luận 16", de:`Trên tia Ox lấy hai điểm A,B sao cho OA=3cm, OB=6cm. 1) A có nằm giữa O,B không? Vì sao? 2) Tính AB. 3) A có là trung điểm OB không? Vì sao? 4) Gọi P là trung điểm OA, Q là trung điểm AB. Chứng tỏ OB=2PQ.`},
    {so:"Tự luận 17", de:`Cho đoạn thẳng AB=8cm. Điểm C thuộc đoạn AB sao cho BC=2cm. Tính độ dài có thể có được của đoạn AC.`},
    {so:"Tự luận 18", de:`Vẽ tia Ax. Lấy B∈Ax sao cho AB=8cm, M nằm trên đoạn AB sao cho AM=4cm. 1) M có nằm giữa A,B không? 2) So sánh MA,MB. 3) M có là trung điểm AB không? Vì sao? 4) Lấy N∈Ax sao cho AN=12cm. So sánh BM,BN.`},
    {so:"Câu 19", de:`a) Vẽ đường thẳng xy. Trên xy lấy ba điểm A,B,C theo thứ tự đó. b) Kể tên các tia có trên hình vẽ. c) Hai tia Ay,By có phải trùng nhau không? Vì sao? d) Kể tên hai tia đối nhau gốc B.`},
    {so:"Câu 20", de:`a) Trên tia Ox, vẽ hai điểm A,B sao cho OA=3.5cm, OB=7cm. b) A có nằm giữa O,B không? c) So sánh OA và AB. d) A có là trung điểm OB không? Vì sao?`},
    {so:"Câu 21", de:`Hãy vẽ sơ đồ trồng cây: có 10 cây trồng thành 5 hàng, mỗi hàng 4 cây.`},
    {so:"Câu 22", de:`Vẽ liền 1 nét 4 đoạn thẳng đi qua 9 điểm (xếp thành lưới vuông 3×3).`},

{

    {so:"Bài 2", de:`Cho điểm C thuộc đường thẳng AB nhưng không thuộc đoạn thẳng AB. Biết CA=a, CB=b. Gọi I là trung điểm AB. Tính độ dài IC.`,
    dap:`Trường hợp a>b: IC=IB−CB=(a+b)/2−b=<b>(a−b)/2</b><br>

    {so:"Bài 3", de:`Trên mặt phẳng có bốn đường thẳng. Số giao điểm của các đường thẳng có thể bằng bao nhiêu?`,
    dap:`Xét các trường hợp: 4 đường thẳng đồng quy → 1 giao điểm; có đúng 3 đường thẳng đồng quy → 3 hoặc 4 giao điểm (tùy có song song); không có 3 đường thẳng nào đồng quy → 0 (4 đt song song), 3 (đúng 3 đt song song), 4 (hai cặp song song), 5 (đúng 1 cặp song song), hoặc 6 (không có cặp nào song song) giao điểm.<br>

    {so:"Bài 4a", de:`Cho n điểm (n≥2). Nối từng cặp hai điểm trong n điểm đó thành các đoạn thẳng. Hỏi có bao nhiêu đoạn thẳng nếu trong n điểm đó không có ba điểm nào thẳng hàng?`,
    dap:`Chọn 1 điểm, nối với n−1 điểm còn lại được n−1 đoạn. Làm vậy với n điểm được n(n−1) đoạn, nhưng mỗi đoạn tính 2 lần.<br>
<b>Số đoạn thẳng: n(n−1)/2</b>`},
    {so:"Bài 4b", de:`Cũng câu hỏi như trên, nếu trong n điểm đó có đúng ba điểm thẳng hàng?`,
    dap:`Số đoạn thẳng phải đếm vẫn không thay đổi: vẫn có <b>n(n−1)/2 đoạn thẳng</b>`},
    {so:"Bài 4c", de:`Tính n biết rằng có tất cả 1770 đoạn thẳng.`,
    dap:`n(n−1)/2=1770 ⇒ n(n−1)=2.1770=2².3.5.59=59.60 ⇒ <b>n=60</b>`},
    {so:"Bài 5", de:`Cho n điểm trong đó không có ba điểm nào thẳng hàng. Cứ qua hai điểm ta vẽ một đường thẳng. Biết rằng có tất cả 105 đường thẳng. Tính n?`,
    dap:`n(n−1)/2=105 ⇒ n(n−1)=210=2.3.5.7=15.14 ⇒ <b>n=15</b>`},
    {so:"Bài 6", de:`Cho n đường thẳng trong đó bất cứ hai đường thẳng nào cũng cắt nhau, không có ba đường thẳng nào đồng quy. Biết rằng số giao điểm của các đường thẳng đó là 780. Tính n?`,
    dap:`Từ n(n−1)/2=780 ⇒ <b>n=40</b>`},
    {so:"Bài 7", de:`Cho 101 đường thẳng trong đó bất cứ hai đường thẳng nào cũng cắt nhau, không có ba đường thẳng nào đồng quy. Tính số giao điểm của chúng.`,
    dap:`Mỗi đường thẳng cắt 100 đường còn lại tạo 100 giao điểm. Có 101 đường nên có 101×100 giao điểm nhưng mỗi giao điểm tính 2 lần:<br>
<b>101×100:2 = 5050 giao điểm</b>`},
    {so:"Bài 8", de:`Cho 20 điểm, trong đó có a điểm thẳng hàng. Cứ 2 điểm, ta vẽ một đường thẳng. Tìm a, biết vẽ được tất cả 170 đường thẳng.`,
    dap:`Nếu không có 3 điểm thẳng hàng: số đường thẳng vẽ được là 19×20:2=190. Trong a điểm thẳng hàng, nếu không thẳng hàng thì vẽ được (a−1)a:2, nhưng thực tế chỉ vẽ được 1 đường thẳng.<br>
190−(a−1)a:2+1=170 ⇒ giải ra <b>a=7</b>`},
    {so:"Bài 9", de:`Cho ba điểm A,B,C nằm ngoài đường thẳng a. Biết rằng cả hai đoạn thẳng BA,BC đều cắt đường thẳng a. Hỏi đường thẳng a có cắt đoạn thẳng AC không? Vì sao?`,
    dap:`Đường thẳng a cắt đoạn AB ⇒ A,B thuộc hai nửa mặt phẳng đối nhau bờ a. Tương tự B,C thuộc hai nửa mặt phẳng đối nhau bờ a.<br>
⇒ A,C thuộc cùng một nửa mặt phẳng bờ a ⇒ <b>đường thẳng a không cắt đoạn thẳng AC.</b>`},
    {so:"Bài 10", de:`Trên tia Ox cho 4 điểm A,B,C,D. Biết rằng A nằm giữa B,C; B nằm giữa C,D; OA=5cm; OD=2cm; BC=4cm và độ dài AC gấp đôi độ dài BD. Tìm độ dài các đoạn BD; AC.`,
    dap:`Vì A nằm giữa B,C: BA+AC=BC=4 (1). Lập luận B nằm giữa A,D; theo gt OD<OA nên D nằm giữa O,A ⇒ DA=OA−OD=3cm.<br>
DB+BA=DA=3 (2). Từ (1)−(2): AC−DB=1 (3). Theo đề AC=2BD, thay vào (3): 2BD−BD=1 ⇒ BD=1.<br>
<b>BD = 1 cm, AC = 2 cm</b>`},
    {so:"Bài 11", de:`Gọi A và B là hai điểm trên tia Ox sao cho OA=4cm; OB=6cm. Trên tia BA lấy điểm C sao cho BC=3cm. So sánh AB với AC.`,
    dap:`Vì OA<OB (4<6) nên A nằm giữa O,B ⇒ AB=OB−OA=6−4=<b>2cm</b>.<br>
Vì BA<BC (2<3) nên A nằm giữa B,C ⇒ AC=BC−BA=3−2=<b>1cm</b>.<br>
Vậy AB > AC (2>1)`},
    {so:"Bài 12", de:`Trên tia Ox cho 4 điểm A,B,C,D. Biết rằng A nằm giữa B,C; B nằm giữa C,D; OA=7cm; OD=3cm; BC=8cm và AC=3BD. a) Tính độ dài AC. b) Chứng tỏ rằng B là trung điểm AD.`,
    dap:`Đặt BD=x ⇒ AC=3x. D nằm giữa O,A (vì OD<OA) ⇒ DA=OA−OD=4. DB+BA=DA ⇒ x+BA=4 (1).<br>
A nằm giữa B,C: BA+AC=BC ⇒ 3x+BA=8 (2). Từ (1),(2): 2x=4 ⇒ x=2 ⇒ <b>AC=3×2=6cm</b><br>
b) BA=4−2=2=BD ⇒ <b>B là trung điểm AD (đpcm)</b>`},
    {so:"Bài 13", de:`Trên tia Ox lấy hai điểm M,N sao cho OM=3cm và ON=7cm. 1) Tính độ dài đoạn MN. 2) Lấy điểm P trên tia Ox sao cho MP=2cm. Tính độ dài OP. 3) Trong trường hợp M nằm giữa O,P. Chứng tỏ P là trung điểm MN.`,
    dap:`1) M nằm giữa O,N (vì OM<ON) ⇒ MN=ON−OM=7−3=<b>4cm</b><br>
2) TH1: P nằm giữa M,N ⇒ OP=OM+MP=3+2=5cm. TH2: P nằm giữa O,M ⇒ OP=OM−MP=1cm.<br>
3) M nằm giữa O,P: OP=OM+MP=5cm. Vì OP=5cm<ON=7cm nên P nằm giữa O,N ⇒ PN=ON−OP=2cm=MP ⇒ <b>P là trung điểm MN (đpcm)</b>`},
    {so:"Bài 14", de:`Cho đường thẳng xy. Trên xy lấy 3 điểm A,B,C sao cho AB=a cm; AC=b cm (b>a). Gọi I là trung điểm AB. 1) Tính IC? 2) Lấy 4 điểm M,N,P,Q nằm ngoài đường thẳng xy. Chứng tỏ rằng đường thẳng xy hoặc không cắt, hoặc cắt ba, hoặc cắt bốn đoạn thẳng trong các đoạn: MN, MP, MQ, NP, NQ, PQ.`,
    dap:`1) TH1 (B,C cùng phía so với A): IC=b−a/2. TH2 (B,C khác phía so với A): IC=b+a/2.<br>
2) TH1: nếu cả 4 điểm cùng thuộc một nửa mặt phẳng bờ xy thì xy không cắt đoạn nào.<br>
TH2: nếu có 3 điểm (vd M,N,P) cùng phía, còn Q khác phía thì xy cắt 3 đoạn: MQ, NQ, PQ.<br>
TH3: nếu có 2 điểm (vd M,N) cùng phía, 2 điểm (P,Q) khác phía thì xy cắt 4 đoạn: MP, MQ, NP, NQ.`},
  ]
}

/* ===================== DATA: CHUYÊN ĐỀ 13 (HÌNH HỌC - GÓC) ===================== */
const CD13_DANG = [
{
  ten:"Lý thuyết", lythuyet:true,
  noidung:[
    {h:"Nửa mặt phẳng", t:`Hình gồm đường thẳng a và một phần mặt phẳng bị chia ra bởi a gọi là một nửa mặt phẳng bờ a.<br>
Tia Oz nằm giữa hai tia Ox,Oy nếu tia Oz cắt đoạn thẳng AB tại điểm M nằm giữa A,B (A∈Ox, B∈Oy).<br>
Nếu Ox,Oy đối nhau thì mọi tia Oz khác Ox,Oy đều nằm giữa Ox,Oy.<br>
Hai điểm A,B cùng thuộc một nửa mặt phẳng bờ a thì đoạn AB không cắt a. Hai điểm A,C thuộc hai nửa mặt phẳng đối nhau bờ a thì đoạn AC cắt a tại điểm nằm giữa A,C.`},
    {h:"Góc. Số đo góc. Cộng số đo hai góc", t:`Góc là hình gồm hai tia chung gốc. Góc bẹt là góc có hai cạnh là hai tia đối nhau.<br>
Mỗi góc có một số đo dương. Số đo góc bẹt là 180°. Số đo mỗi góc không vượt quá 180°.<br>
0°<góc nhọn<góc vuông(90°)<góc tù<góc bẹt(180°)<br>
Hai góc kề nhau: có một cạnh chung, hai cạnh còn lại nằm trên hai nửa mặt phẳng đối nhau có bờ là cạnh chung.<br>
Â phụ B̂ ⇔ Â+B̂=90°. Â bù B̂ ⇔ Â+B̂=180°. Hai góc vừa kề vừa bù gọi là hai góc kề bù (tổng=180°, hai cạnh ngoài là hai tia đối nhau).<br>
Nếu tia Oy nằm giữa Ox,Oz thì ∠xOy+∠yOz=∠xOz (và ngược lại). Nếu tia Oy nằm giữa Ox,Oz; tia Ot nằm giữa Oy,Oz thì ∠xOy+∠yOt+∠tOz=∠xOz.<br>
Hai góc AOB, AOC kề nhau, tia OA' đối tia OA: nếu ∠AOB+∠AOC<180° thì OA nằm giữa OB,OC. Nếu >180° thì OA' nằm giữa OB,OC.`},
    {h:"Vẽ góc cho biết số đo & Tia phân giác", t:`Trên nửa mặt phẳng cho trước bờ chứa tia Ox, bao giờ cũng vẽ được 1 và chỉ 1 tia Oy sao cho ∠xOy=m°.<br>
Nếu ∠xOy=m°, ∠xOz=n° (m<n, cùng nửa mặt phẳng bờ Ox) thì Oy nằm giữa Ox,Oz.<br>
Tia phân giác của một góc là tia nằm giữa hai cạnh của góc và tạo với hai cạnh ấy hai góc bằng nhau. Nếu Oz là tia phân giác ∠xOy thì ∠xOz=∠zOy=∠xOy/2. Mỗi góc có một tia phân giác (và một đường phân giác) duy nhất.`},
    {h:"Đường tròn – Tam giác", t:`Đường tròn tâm O bán kính R là hình gồm các điểm cách O một khoảng bằng R, kí hiệu (O,R). Hình tròn gồm các điểm trên đường tròn và bên trong đường tròn.<br>
Hai điểm trên đường tròn chia đường tròn thành hai cung. Đoạn nối hai mút cung là dây cung; dây cung qua tâm là đường kính.<br>
Hai đường tròn phân biệt có thể có 2 điểm chung, 1 điểm chung, hoặc không có điểm chung.<br>
Tam giác ABC là hình gồm 3 đoạn thẳng AB,BC,CA khi A,B,C không thẳng hàng. Nếu một đường thẳng không đi qua các đỉnh và cắt một cạnh của tam giác thì nó cắt một và chỉ một trong hai cạnh còn lại.`},
  ]
},
{
  ten:"Bài tập cơ bản", tuluyen:true,
  bai:[
    {so:"Bài 1", de:`Viết tên các góc trên hình vẽ (hai tia Oy, Oz cùng phía với tia Ox tại gốc O) bằng kí hiệu.`},
    {so:"Bài 2", de:`Viết bằng kí hiệu tên các góc nhọn, vuông, tù, bẹt trên hình vẽ (góc vuông AOM=90°, góc MOC=50° kề nhau tại O trên đường thẳng AB).`},
    {so:"Bài 3", de:`Trên cùng một nửa mặt phẳng bờ chứa tia Ox, vẽ các tia Oy và Oz sao cho góc xOy=40°, góc xOz=150°. a) Tính số đo góc yOz. b) Góc xOy và yOz là cặp góc ở vị trí gì?`},
    {so:"Bài 4", de:`Cho hình vẽ với 4 tia Ox,Oy,Oz,On quanh O (Ox,On đối nhau), biết Ô₁=Ô₂; Ô₃=Ô₄. Chỉ ra các tia phân giác trên hình; tính số đo góc mOy.`},
    {so:"Bài 5", de:`Cho hai góc kề bù xOy, yOz sao cho ∠xOy=120°. 1) Tính ∠yOz. 2) Gọi Ot là tia phân giác góc yOz. Chứng tỏ ∠zOt=¼∠xOy.`},
    {so:"Bài 6", de:`Cho hai tia Oy,Oz nằm trên cùng nửa mặt phẳng có bờ là tia Ox sao cho góc xOy=75°, góc xOz=25°. a) Trong ba tia Ox,Oy,Oz tia nào nằm giữa hai tia còn lại. b) Tính góc yOz. c) Gọi Om là tia phân giác góc yOz. Tính góc xOm.`},
    {so:"Bài 7", de:`Góc nhọn có số đo: A) Lớn hơn 90° và nhỏ hơn 180°  B) Bằng 90°  C) Lớn hơn 0° và nhỏ hơn 90°  D) Bằng 180°`},
    {so:"Bài 8", de:`Hai tia chung gốc đối nhau tạo thành: A. Góc vuông  B. Góc nhọn  C. Góc tù  D. Góc bẹt`},
    {so:"Bài 9", de:`Khi nào thì ∠xOm+∠mOy=∠xOy? A. Khi Ox nằm giữa Om,Oy  B. Khi Om nằm giữa Ox,Oy  C. Khi Oy nằm giữa Ox,Om  D. Khi ba tia Om,Ox,Oy nằm trên cùng một đường thẳng`},
    {so:"Bài 10", de:`Góc bù với góc có số đo 80° có số đo là: A. 10°  B. 110°  C. 100°  D. 90°`},
    {so:"Bài 11", de:`Vẽ hai góc kề bù xOy và yOy', biết ∠xOy=118°. Tính ∠yOy'.`},
    {so:"Bài 12", de:`Trên cùng một nửa mặt phẳng bờ chứa tia Ox, vẽ hai tia Oy và Ot sao cho ∠xOy=30° và ∠xOt=60°. 1) Tia nào nằm giữa hai tia còn lại? Vì sao? 2) Tính ∠yOt? Tia Oy có là tia phân giác của ∠xOt không? Vì sao? 3) Gọi Om là tia đối của tia Oy. Tính ∠mOt? 4) Kể tên các cặp góc kề bù có trong hình vẽ.`},
    {so:"Bài 13", de:`Cho hình vẽ biết ∠xOy=30° và ∠xOz=120°. Suy ra: A. yOz là góc nhọn  B. yOz là góc vuông  C. yOz là góc tù  D. yOz là góc bẹt`},
    {so:"Bài 14", de:`Nếu ∠A=35° và ∠B=55°. Ta nói: A. A,B là hai góc bù nhau  B. A,B là hai góc kề nhau  C. A,B là hai góc kề bù  D. A,B là hai góc phụ nhau`},
    {so:"Bài 15", de:`Với những điều kiện sau, điều kiện nào khẳng định tia Ot là tia phân giác của xOy? A. ∠xOt=∠yOt  B. ∠xOt+∠tOy=∠xOy  C. ∠xOt+∠tOy=∠xOy và ∠xOt=∠yOt  D. Tất cả đều sai`},
    {so:"Bài 16", de:`Cho hình vẽ, ∠tMz có số đo là: A. 145°  B. 35°  C. 90°  D. 55° (biết góc vuông kề góc 35° tại M trên đường thẳng xy)`},
    {so:"Bài 17", de:`Cho đường tròn tâm O, bán kính 4cm. Một điểm A∈(O;4cm) thì: A. OA=4cm  B. OA=2cm  C. OA=8cm  D. Cả 3 câu đều sai`},
    {so:"Bài 18", de:`Hình vẽ tam giác ABC với M,N trên cạnh BC và các đoạn AM,AN có: A. 4 tam giác  B. 5 tam giác  C. 6 tam giác  D. 7 tam giác`},
    {so:"Bài 19", de:`Định nghĩa tam giác ABC.`},
    {so:"Bài 20", de:`Vẽ và nêu cách vẽ tam giác ABC có độ dài AB=3, AC=4, BC=5.`},
    {so:"Bài 21", de:`Trên cùng một nửa mặt phẳng bờ chứa tia Ox, xác định hai tia Oy và Ot sao cho ∠xOy=30° và ∠xOt=70°. 1) Tia nào nằm giữa hai tia còn lại? Vì sao? 2) Tính ∠yOt? Tia Oy có là tia phân giác của ∠xOt không? 3) Gọi Om là tia đối của tia Ox. Tính ∠mOt?`},
    {so:"Bài 22", de:`Cho hai điểm M,N nằm cùng phía đối với A, cùng phía đối với B. Điểm M nằm giữa A,B. Biết AB=5cm, AM=3cm, BN=1cm. Chứng tỏ rằng: 1) Bốn điểm A,B,M,N thẳng hàng. 2) Điểm N là trung điểm AB. 3) Vẽ đường tròn tâm N qua B và đường tròn tâm A qua N, chúng cắt nhau tại C. Tính chu vi tam giác CAN.`},
    {so:"Bài 23", de:`Gọi M là trung điểm đoạn thẳng AB. Vẽ điểm N nằm giữa M,B. Cho biết MN=a(cm), NB=b(cm). 1) Tính AB. 2) Lấy điểm O nằm ngoài đường thẳng AB. Giả sử ∠AOB=100°; ∠AOM=60°; ∠MON=20°. Hỏi tia ON có phải là tia phân giác của góc MOB không? Vì sao?`},
  ]
},
{
  ten:"Bài tập nâng cao",
  bai:[
    {so:"Bài 1", de:`Cho ba điểm A, B, C không nằm trên đường thẳng a, trong đó đường thẳng a cắt các đoạn thẳng AB và AC. Đường thẳng a có cắt đoạn thẳng BC không?`,
    dap:`Đường thẳng a cắt đoạn AB và không đi qua A,B nên A,B thuộc hai nửa mặt phẳng đối nhau bờ a. Tương tự, A,C thuộc hai nửa mặt phẳng đối nhau bờ a.<br>
Vậy B,C thuộc cùng một nửa mặt phẳng bờ a, chúng lại không nằm trên a, do đó <b>đường thẳng a không cắt đoạn thẳng BC.</b>`},
    {so:"Bài 2", de:`Cho n tia chung gốc tạo thành tất cả 190 góc. Tính n?`,
    dap:`n(n−1)/2=190 ⇒ <b>n = 20</b>`},
    {so:"Bài 3", de:`Bốn điểm A, B, C, D không nằm trên đường thẳng a. Chứng tỏ rằng đường thẳng a hoặc không cắt hoặc cắt ba hoặc cắt bốn đoạn thẳng trong các đoạn thẳng AB, AC, AD, BC, BD, CD.`,
    dap:`Đường thẳng a chia mặt phẳng ra hai nửa. Xét 3 trường hợp:<br>
1) Nếu cả bốn điểm A,B,C,D cùng thuộc một nửa mặt phẳng thì a không cắt đoạn nào.<br>
2) Nếu có một điểm (vd A) thuộc một nửa, ba điểm kia (B,C,D) thuộc nửa đối thì a cắt ba đoạn AB,AC,AD.<br>
3) Nếu có hai điểm (vd A,B) thuộc một nửa, hai điểm kia (C,D) thuộc nửa đối thì a cắt bốn đoạn AC,AD,BC,BD.`},
    {so:"Bài 4", de:`Cho hai tia Ox, Oy đối nhau. Trên hai nửa mặt phẳng đối nhau có bờ chứa tia Ox, vẽ các tia Om, On sao cho ∠xOm=70°, ∠yOn=70°. Chứng tỏ rằng Om, On là hai tia đối nhau.`,
    dap:`Hai góc xOm, mOy kề bù: ∠mOy=180°−∠xOm=180°−70°=110°.<br>
Các góc mOy, yOn kề nhau và bù nhau (110°+70°=180°) nên <b>Om, On là hai tia đối nhau (đpcm).</b>`},
    {so:"Bài 5", de:`Cho góc ∠AOB=110°, tia OC nằm trong góc đó. Gọi OM, ON theo thứ tự là các tia phân giác của các góc AOC, BOC. Tính ∠MON?`,
    dap:`∠MON=∠MOC+∠CON=(∠AOC)/2+(∠COB)/2=(∠AOC+∠COB)/2=∠AOB/2=110°/2=<b>55°</b>`},
    {so:"Bài 6", de:`Cho góc ∠AOB=100° và OC là tia phân giác của góc đó. Trong góc AOB vẽ các tia OD, OE sao cho ∠AOD=∠BOE=20°. Chứng tỏ rằng tia OC là tia phân giác của góc DOE.`,
    dap:`Tính được ∠COD=∠COE=30° (vì ∠AOC=∠BOC=50°, ∠COD=∠AOC−∠AOD=50°−20°=30°, tương tự ∠COE=30°).<br>
Vậy ∠COD=∠COE ⇒ <b>OC là tia phân giác của góc DOE (đpcm)</b>`},
    {so:"Bài 7", de:`Cho 10 điểm thuộc đường thẳng a và một điểm nằm ngoài đường thẳng ấy. Có bao nhiêu tam giác có các đỉnh là ba trong 11 điểm trên?`,
    dap:`Có bao nhiêu đoạn thẳng nằm trên đường thẳng a thì có bấy nhiêu tam giác (mỗi đoạn + điểm ngoài tạo 1 tam giác). Số đoạn thẳng trên a: 10×9/2=45.<br>
<b>Đáp số: 45 tam giác</b>`},
    {so:"Bài 8", de:`Cho tam giác ABC, điểm D nằm giữa A,C, điểm E nằm giữa A,B. Các đoạn thẳng BD và CE cắt nhau ở K. Nối DE. Tính xem có bao nhiêu tam giác trong hình vẽ?`,
    dap:`Có 5 tam giác "đơn" (ADE, AEK..., ghép tương tự CĐ12 bài20), 4 tam giác "đôi", 2 tam giác "ba", 1 tam giác "năm".<br>
<b>Tất cả có 12 tam giác</b>`},
    {so:"Bài 9", de:`Cho tam giác ABC. Chứng tỏ rằng bao giờ cũng vẽ được một đường thẳng không đi qua ba đỉnh của tam giác và cắt cả ba tia AB, AC, BC.`,
    dap:`Lấy A' thuộc tia đối của tia CB và không trùng C. Lấy B' nằm giữa A,C ⇒ <b>đường thẳng A'B' chính là đường thẳng phải tìm.</b>`},
    {so:"Bài 10", de:`Cho điểm O nằm trong tam giác ABC. Hãy chứng tỏ rằng: 1) Tia BO cắt đoạn thẳng AC tại một điểm D nằm giữa A,C. 2) Điểm O nằm giữa hai điểm B và D. 3) Trong ba tia OA,OB,OC không có tia nào nằm giữa hai tia còn lại.`,
    dap:`1) O nằm trong tam giác ABC nên O nằm trong góc B, do đó tia BO nằm giữa hai tia BA,BC. Vì A,C là các điểm không trùng B thuộc các tia BA,BC, suy ra tia BO cắt đoạn AC tại D nằm giữa A,C.<br>
2) Tương tự, O nằm trong góc C nên tia CO nằm giữa CA,CB, suy ra tia CO cắt đoạn BD tại điểm (là O) nằm giữa B,D.<br>
3) Tia OB không cắt đoạn AC (chỉ có 1 điểm chung D không thuộc tia OB theo lập luận trên) nên tia OB không nằm giữa OA,OC. Lập luận tương tự cho OC, OA <b>⇒ không có tia nào nằm giữa hai tia còn lại (đpcm)</b>`},
    {so:"Bài 14", de:`Cho góc tù xOy. Bên trong góc xOy, vẽ tia Om sao cho góc xOm bằng 90° và vẽ tia On sao cho góc yOn bằng 90°. 1) Chứng minh góc xOn bằng góc yOm. 2) Gọi Ot là tia phân giác của góc xOy. Chứng minh Ot cũng là tia phân giác của góc mOn.`,
    dap:`1) ∠xOm+∠mOy=∠xOy hay 90°+∠mOy=∠xOy. ∠yOn+∠nOx=∠xOy hay 90°+∠nOx=∠xOy ⇒ <b>∠xOn=∠yOm</b><br>
2) Lập luận được ∠xOt=∠tOy. Ta có: ∠xOt=∠xOn+∠nOt; ∠tOy=∠yOm+∠mOt ⇒ <b>∠nOt=∠mOt ⇒ Ot là tia phân giác của góc mOn (đpcm)</b>`},
    {so:"Bài 16", de:`Trên đường thẳng xx' lấy một điểm O. Trên cùng nửa mặt phẳng bờ là đường thẳng xx' vẽ 3 tia Oy, Ot, Oz sao cho: góc x'Oy=40°; xOt=97°; xOz=54°. 1) Chứng minh tia Ot nằm giữa hai tia Oy và Oz. 2) Chứng minh tia Ot là tia phân giác của góc zOy.`,
    dap:`a) ∠x'Ox=180°, ∠x'Oy+∠yOx kề bù. ∠x'Oy=40° ⇒ ∠yOx=140°. Vì ∠xOt(97°)<∠xOy(140°) nên Ot nằm giữa Ox,Oy. Vì ∠xOz(54°)<∠xOt(97°) nên Oz nằm giữa Ot,Ox. <b>Vậy Ot nằm giữa Oz và Oy.</b><br>
b) Ot nằm giữa Oz,Oy ⇒ ∠zOt+∠tOy=∠zOy. Ot nằm giữa Ox,Oy ⇒ ∠tOy=∠xOy−∠xOt=140°−97°=43°. Oz nằm giữa Ox,Ot ⇒ ∠zOt=∠xOt−∠xOz=97°−54°=43°.<br>
Vậy ∠tOy=∠zOt=43° ⇒ <b>Ot là tia phân giác của góc zOy (đpcm)</b>`},
    {so:"Bài 17", de:`Cho tia Ox. Trên hai nửa mặt phẳng đối nhau có bờ là Ox. Vẽ hai tia Oy và Oz sao cho góc xOy và xOz bằng 120°. Chứng minh rằng: 1) Góc xOy=góc xOz=góc yOz. 2) Tia đối của mỗi tia Ox,Oy,Oz là phân giác của góc hợp bởi hai tia còn lại.`,
    dap:`Gọi Ox' là tia đối Ox. Có ∠x'Oy=∠x'Oz=60° (kề bù với góc 120°) và Ox' nằm giữa Oy,Oz nên ∠yOz=∠yOx'+∠x'Oz=120°.<br>
<b>Vậy ∠xOy=∠xOz=∠yOz=120°</b><br>
Do Ox' nằm giữa Oy,Oz và ∠x'Oy=∠x'Oz nên Ox' là phân giác góc yOz. Tương tự Oy', Oz' là phân giác các góc xOz và xOy.`},
    {so:"Bài 18", de:`Cho góc AOB=135°. C là một điểm nằm trong góc AOB biết góc BOC=90°. 1) Tính góc AOC. 2) Gọi OD là tia đối của tia OC. So sánh hai góc AOD và BOD.`,
    dap:`a) Tia OC nằm giữa OA,OB ⇒ ∠AOC+∠BOC=∠AOB ⇒ ∠AOC=135°−90°=<b>45°</b><br>
b) C,O,D thẳng hàng ⇒ ∠AOD+∠AOC=180° (kề bù) ⇒ ∠AOD=180°−45°=135°. ∠BOD=180°−90°=90°.<br>
<b>Vậy ∠AOD > ∠BOD</b>`},
    {so:"Bài 20", de:`1) Vẽ tam giác ABC biết BC=5cm; AB=3cm; AC=4cm. 2) Lấy điểm O ở trong tam giác ABC nói trên. Vẽ tia AO cắt BC tại H, tia BO cắt AC tại I, tia CO cắt AB tại K. Trong hình đó có bao nhiêu tam giác?`,
    dap:`Vẽ đoạn BC=5cm, vẽ cung tròn (B;3cm) và (C;4cm), lấy giao điểm A. Vẽ AB,AC được tam giác ABC.<br>
Có 6 tam giác "đơn" (AOK, AOI, BOK, BOH, COH, COI); 3 tam giác "ghép đôi" (AOB, BOC, COA); 6 tam giác "ghép ba" (ABH, BCI, CAK, ABI, BCK, CAH); 1 tam giác "ghép 6" (ABC).<br>
<b>Tổng: 6+3+6+1 = 16 tam giác</b>`},
    {so:"Bài 23", de:`1) Cho 6 tia chung gốc. Có bao nhiêu góc trong hình vẽ? Vì sao? 2) Vậy với n tia chung gốc, có bao nhiêu góc trong hình vẽ?`,
    dap:`a) Mỗi tia với 1 tia còn lại tạo 1 góc. Xét 1 tia, tia đó cùng với 5 tia còn lại tạo 5 góc. Làm vậy với 6 tia được 5×6 góc, nhưng mỗi góc tính 2 lần nên có: 5×6/2=<b>15 góc</b><br>
b) Tổng quát: với n tia chung gốc có <b>n(n−1)/2 góc</b>`},
    {so:"Bài 24", de:`Trên đoạn thẳng AB lấy 2006 điểm khác nhau đặt tên theo thứ tự từ A đến B là A₁;A₂;A₃;...;A₂₀₀₄. Từ điểm M không nằm trên đoạn thẳng AB ta nối M với các điểm A; A₁;A₂;A₃;...;A₂₀₀₄; B. Tính số tam giác tạo thành.`,
    dap:`Tổng số điểm trên AB là 2006 (kể cả A,B), nên có 2006 đoạn thẳng nối từ M đến các điểm đó. Mỗi đoạn thẳng (ví dụ MA) có thể kết hợp với 2005 đoạn còn lại và đoạn thẳng tương ứng trên AB để tạo 2005 tam giác.<br>
2006 đoạn thẳng tạo thành 2005×2006 lượt tam giác, nhưng mỗi tam giác tính 2 lần.<br>
<b>Số tam giác thực có: 2005×2006:2 = 2 011 015</b>`},
    {so:"Bài 25", de:`Cho tam giác ABC và BC=5cm. Điểm M thuộc tia đối của tia CB sao cho CM=3cm. 1) Tính độ dài BM. 2) Cho biết góc BAM=80°, góc BAC=60°. Tính góc CAM. 3) Vẽ các tia Ax, Ay lần lượt là tia phân giác của góc BAC và CAM. Tính góc xAy. 4) Lấy K thuộc đoạn thẳng BM và CK=1cm. Tính độ dài BK.`,
    dap:`1) M,B thuộc 2 tia đối nhau CB,CM ⇒ C nằm giữa B,M ⇒ BM=BC+CM=5+3=<b>8cm</b><br>
2) C nằm giữa B,M ⇒ tia AC nằm giữa AB,AM ⇒ ∠CAM=∠BAM−∠BAC=80°−60°=<b>20°</b><br>
3) ∠xAy=∠xAC+∠CAy=½∠BAC+½∠CAM=½(∠BAC+∠CAM)=½∠BAM=½×80°=<b>40°</b><br>
4) Nếu K∈tia CM: C nằm giữa B,K ⇒ BK=BC+CK=6cm. Nếu K∈tia CB: K nằm giữa B,C ⇒ BK=BC−CK=4cm.<br>
<b>Vậy BK = 6cm hoặc 4cm</b>`},
  ]
}
];

/* ===================== TỔNG HỢP CHUYÊN ĐỀ ===================== */
const CHUYENDE = [
  {ten:"CĐ1: Tập hợp", dang:CD1_DANG},
  {ten:"CĐ2: Chia hết – Chia có dư", dang:CD2_DANG},
  {ten:"CĐ3: Lũy thừa", dang:CD3_DANG},
  {ten:"CĐ4: Dãy số quy luật", dang:CD4_DANG},
  {ten:"CĐ5: Ước – Bội – ƯCLN – BCNN", dang:CD5_DANG},
  {ten:"CĐ6: Tìm chữ số tận cùng", dang:CD6_DANG},
  {ten:"CĐ7: Số nguyên tố – Số chính phương", dang:CD7_DANG},
  {ten:"CĐ8: Bất đẳng thức", dang:CD8_DANG},
  {ten:"CĐ9: Dãy phân số quy luật", dang:CD9_DANG},
  {ten:"CĐ10: Phương pháp giải toán", dang:CD10_DANG},
  {ten:"CĐ11: Toán chuyển động", dang:CD11_DANG},
  {ten:"CĐ12: Điểm-Đường thẳng-Đoạn thẳng", dang:CD12_DANG},
  {ten:"CĐ13: Góc và các bài toán liên quan", dang:CD13_DANG},
];

/* ===================== STATE & STORAGE ===================== */
let curCD = 0, curDang = 0;
let answerStore = {};
const STORE_KEY = "toan6_nangcao_progress_v1";

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) answerStore = JSON.parse(raw);
  }catch(e){ answerStore = {}; }
}
function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(answerStore)); }catch(e){}
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>t.classList.remove('show'), 1600);
}
function manualSave(){ persist(); showToast('💾 Đã lưu tiến trình'); }
function clearProgress(){
  if(!confirm('Xóa toàn bộ phần em đã ghi ở tất cả chuyên đề? Không thể hoàn tác.')) return;
  answerStore = {};
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  renderDang();
  showToast('🗑️ Đã xóa tiến trình');
}
function saveAnswer(key,val){
  answerStore[key] = val;
  persist();
}

/* ===================== RENDER ===================== */
const cdSelectEl = document.getElementById('cdSelect');
const tabsEl = document.getElementById('tabs');
const mainEl = document.getElementById('main');
const titleEl = document.getElementById('appTitle');

function renderCDSelect(){
  cdSelectEl.innerHTML = CHUYENDE.map((c,i)=>`<div class="cd-pill ${i===curCD?'active':''}" data-i="${i}">${c.ten}</div>`).join('');
  cdSelectEl.querySelectorAll('.cd-pill').forEach(p=>p.onclick=()=>{
    curCD = parseInt(p.dataset.i); curDang = 0; renderAll();
  });
}

function renderAll(){
  titleEl.textContent = "📘 " + CHUYENDE[curCD].ten;
  renderCDSelect();
  renderDang();
}

function renderDang(){
  const dangList = CHUYENDE[curCD].dang;
  tabsEl.innerHTML = dangList.map((d,i)=>`<div class="tab ${i===curDang?'active':''}" data-i="${i}">${d.ten.replace('Dạng ','D')}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ curDang = parseInt(t.dataset.i); renderBody(); });
  renderBody();
}

function renderBody(){
  const d = CHUYENDE[curCD].dang[curDang];
  let html = `<div class="dang-title">${d.ten}</div>`;

  if(d.lythuyet){
    d.noidung.forEach(n=>{ html += `<div class="theory"><h4>${n.h}</h4>${n.t}</div>`; });
    mainEl.innerHTML = html;
    return;
  }

  if(d.tuluyen) html += `<div class="note">📌 Phần này sách không kèm đáp án (bài tập tự luyện) — bé tự giải, phụ huynh đối chiếu sau.</div>`;

  d.bai.forEach((b,j)=>{
    if(b.notext){
      html += `<div class="theory"><h4>${b.so}</h4>${b.de}</div>`;
      return;
    }
    const key = `${curCD}-${curDang}-${j}`;
    const saved = answerStore[key] || '';
    const isTuluyen = d.tuluyen || !b.dap;
    html += `<div class="card" id="card-${j}">
      <div class="card-head" onclick="toggleCard(${j})">
        <div><span class="bai-label">${b.so}:</span> <span class="de">${b.de}</span>${isTuluyen?'<span class="tuluyen-badge">Tự luyện</span>':''}</div>
        <div class="chev">▾</div>
      </div>
      <div class="card-body">
        <div class="answer-box">
          <label>✏️ Bé tự làm vào đây:</label>
          <textarea placeholder="Viết lời giải / đáp án của em..." oninput="saveAnswer('${key}',this.value)">${saved}</textarea>
        </div>
        ${isTuluyen ? '' : `<button class="btn-dapan" onclick="toggleDapAn(event,${j})">👁️ Xem đáp án</button>
        <div class="dapan" id="dapan-${j}"><span class="nhan">✅ Hướng dẫn – Lời giải:</span>${b.dap}</div>`}
      </div>
    </div>`;
  });
  mainEl.innerHTML = html;
}

function toggleCard(j){ document.getElementById(`card-${j}`).classList.toggle('open'); }
function toggleDapAn(e,j){ e.stopPropagation(); document.getElementById(`dapan-${j}`).classList.toggle('show'); }

loadProgress();
renderAll();
</script>
</body>
</html>

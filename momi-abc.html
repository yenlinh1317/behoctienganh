<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mommy Long Legs - Word Slasher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; user-select: none; overflow: hidden; background: #1a1a2e; }
        .font-game { font-family: 'Fredoka One', cursive; }

        /* --- NHÂN VẬT MOMMY LONG LEGS NÂNG CẤP --- */
        .mommy-wrap { position: relative; width: 150px; height: 200px; }
        
        /* Mái tóc nhiều dải buộc lại */
        .hair-tie {
            position: absolute; top: -10px; left: 60px;
            width: 30px; height: 15px; background: #ffd700;
            border: 2px solid #33001a; border-radius: 5px; z-index: 10;
        }
        .strand {
            position: absolute; background: #e60073;
            border: 2px solid #33001a; border-radius: 20px;
            transform-origin: top center;
        }
        .s1 { width: 12px; height: 70px; top: 0; left: 55px; transform: rotate(20deg); animation: swing 3s infinite ease-in-out; }
        .s2 { width: 12px; height: 85px; top: 0; left: 65px; transform: rotate(0deg); animation: swing 4s infinite ease-in-out; }
        .s3 { width: 12px; height: 60px; top: 0; left: 75px; transform: rotate(-25deg); animation: swing 2.5s infinite ease-in-out; }
        .s4 { width: 10px; height: 50px; top: 0; left: 60px; transform: rotate(45deg); animation: swing 3.5s infinite ease-in-out; }

        .mommy-head {
            position: absolute; top: 15px; left: 40px;
            width: 80px; height: 75px; background: #ff3399;
            border: 3px solid #33001a; border-radius: 40px 40px 35px 35px;
            z-index: 5;
        }
        .eye {
            position: absolute; top: 25px; width: 22px; height: 22px;
            background: white; border: 2px solid #33001a; border-radius: 50%;
        }
        .eye.l { left: 12px; } .eye.r { right: 12px; }
        .pupil { width: 10px; height: 10px; background: #0080ff; border-radius: 50%; margin: 4px; }
        .eye::after { content: '///'; position: absolute; top: -15px; left: 0; font-size: 14px; font-weight: bold; color: #33001a; }

        .mouth {
            position: absolute; bottom: 12px; left: 20px;
            width: 40px; height: 10px; background: #660033;
            border-radius: 0 0 20px 20px; border: 2px solid #33001a;
            transition: 0.1s;
        }
        .mouth.open { height: 20px; border-radius: 50%; }

        .neck { position: absolute; top: 85px; left: 75px; width: 10px; height: 40px; background: #ff3399; border: 2px solid #33001a; }
        .body { position: absolute; top: 120px; left: 55px; width: 50px; height: 50px; background: #ff3399; border: 3px solid #33001a; border-radius: 20px; }
        
        .leg { position: absolute; width: 8px; height: 100px; background: #ff3399; border: 2px solid #33001a; transform-origin: top center; animation: swing 4s infinite ease-in-out; }
        .l1 { top: 140px; left: 45px; transform: rotate(30deg); }
        .l2 { top: 140px; right: 35px; transform: rotate(-30deg); }

        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }

        /* --- BONG BÓNG VÀ HIỆU ỨNG CHÉM --- */
        .bubble {
            position: absolute; bottom: -150px;
            cursor: pointer; transition: transform 0.1s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }
        .bubble-content {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #ff3399; border-radius: 50px;
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
        }
        .slash { animation: slashAni 0.4s ease-out forwards; pointer-events: none; }
        @keyframes slashAni {
            0% { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(1.5) rotate(10deg); opacity: 0; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between p-4 overflow-hidden">

    <div class="flex justify-between items-center w-full max-w-5xl mx-auto z-10">
        <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border-2 border-pink-500 text-pink-400 font-game text-2xl shadow-lg">
            SCORE: <span id="score">0</span>
        </div>
        <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border-2 border-blue-500 text-blue-300 font-bold">
            TARGET: <span id="target-ui" class="text-white">Select a letter</span>
        </div>
    </div>

    <div id="game-zone" class="relative flex-1 w-full overflow-hidden">
        </div>

    <div class="w-full max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-6 bg-black/40 backdrop-blur-xl p-4 rounded-3xl border border-white/10">
        
        <div class="mommy-wrap scale-75 md:scale-100">
            <div class="strand s1"></div><div class="strand s2"></div>
            <div class="strand s3"></div><div class="strand s4"></div>
            <div class="hair-tie"></div>
            <div class="mommy-head">
                <div class="eye l"><div class="pupil"></div></div>
                <div class="eye r"><div class="pupil"></div></div>
                <div id="m-mouth" class="mouth"></div>
            </div>
            <div class="neck"></div>
            <div class="body"></div>
            <div class="leg l1"></div><div class="leg l2"></div>
        </div>

        <div class="flex-1 flex flex-col gap-3">
            <div class="bg-pink-600/20 p-4 rounded-2xl border border-pink-500/30">
                <p id="m-speech" class="text-white font-game text-xl leading-tight">Hi! Pick a letter to start the game!</p>
            </div>
            <div id="letter-selector" class="flex flex-wrap gap-2 justify-center md:justify-start">
                </div>
        </div>
    </div>

    <script>
        const dataset = {
            "a": ["apple", "ant", "alligator", "arm", "arrow", "ambulance", "angel", "airplane"],
            "b": ["bee", "bird", "butterfly", "bus", "banana", "bear", "boy", "book", "ball"],
            "c": ["cat", "cup", "cow", "cake", "candy", "coat", "crab", "car", "clock"],
            "d": ["dog", "donut", "duck", "doll", "dolphin", "dress", "dinosaur", "drum"],
            "e": ["elephant", "elbow", "egg", "eagle", "eye", "ear", "elf", "eraser"],
            "f": ["fish", "frog", "fox", "fan", "fence", "flag", "fork", "flower"],
            "g": ["goose", "grapes", "goat", "girl", "gift", "glasses", "giraffe", "guitar"],
            "h": ["horse", "house", "hen", "hippo", "heart", "hamburger", "hamster", "hat"],
            "i": ["ice cream", "ice", "ink", "insect", "igloo", "iguana", "iron", "island"],
            "j": ["juice", "jug", "jar", "jet", "jacket", "jam", "jellyfish", "jelly"],
            "k": ["key", "kite", "kangaroo", "kitten", "knife", "kettle", "king", "koala"],
            "l": ["lion", "lemon", "leaf", "lollipop", "ladder", "lock", "lips", "lizard"],
            "m": ["mouse", "moon", "monkey", "milk", "marker", "mushroom", "monster", "mango"],
            "n": ["nest", "nut", "net", "noodles", "nail", "necklace", "nose", "nurse"],
            "o": ["owl", "orange", "onion", "olive", "ocean", "oven", "octopus", "ostrich"],
            "p": ["pear", "pig", "pencil", "panda", "plate", "penguin", "pizza", "parrot"],
            "q": ["queen", "quail", "question", "quiver", "quiet", "quilt"],
            "r": ["rabbit", "ring", "rose", "rug", "rhino", "rain", "robot", "rocket"],
            "s": ["sun", "star", "shoes", "snake", "ship", "sheep", "shark", "sock"],
            "t": ["train", "truck", "tie", "table", "tiger", "tomato", "tent", "turtle"],
            "u": ["umbrella", "unicorn", "up", "unhappy", "uniform", "unicycle"],
            "v": ["van", "vase", "violin", "vacuum", "vegetable", "vet", "volcano", "vest"],
            "w": ["window", "watch", "wolf", "web", "watermelon", "whale", "wheel"],
            "x": ["box", "fox", "xylophone", "x-ray", "x-mas", "ax"],
            "y": ["yo-yo", "yogurt", "yak", "yam", "yarn", "yacht"],
            "z": ["zoo", "zebra", "zucchini", "zig-zag", "zero", "zipper"]
        };

        const emojiMap = {
            "apple":"🍎","ant":"🐜","alligator":"🐊","arm":"💪","arrow":"🏹","ambulance":"🚑","angel":"👼","airplane":"✈️",
            "bee":"🐝","bird":"🐦","butterfly":"🦋","bus":"🚌","banana":"🍌","bear":"🐻","boy":"👦","book":"📖","ball":"⚽",
            "cat":"🐱","cup":"🥤","cow":"🐮","cake":"🍰","candy":"🍬","coat":"🧥","crab":"🦀","car":"🚗","clock":"⏰",
            "dog":"🐶","donut":"🍩","duck":"🦆","doll":"🪆","dolphin":"🐬","dress":"👗","dinosaur":"🦖","drum":"🥁",
            "elephant":"🐘","elbow":"💪","egg":"🥚","eagle":"🦅","eye":"👁️","ear":"👂","elf":"🧝","eraser":"🧽",
            "fish":"🐟","frog":"🐸","fox":"🦊","fan":"➿","fence":"🚧","flag":"🚩","fork":"🍴","flower":"🌸",
            "goose":"🦢","grapes":"🍇","goat":"🐐","girl":"👧","gift":"🎁","glasses":"👓","giraffe":"🦒","guitar":"🎸",
            "horse":"🐴","house":"🏠","hen":"🐔","hippo":"🦛","heart":"❤️","hamburger":"🍔","hamster":"🐹","hat":"🎩",
            "ice cream":"🍦","ice":"🧊","ink":"✒️","insect":"🪲","igloo":"⛺","iguana":"🦎","iron":"🧱","island":"🏝️",
            "juice":"🧃","jug":"🏺","jar":"🫙","jet":"✈️","jacket":"🧥","jam":"🍯","jellyfish":"🪼","jelly":"🍮",
            "key":"🔑","kite":"🪁","kangaroo":"🦘","kitten":"🐱","knife":"🔪","kettle":"🫖","king":"👑","koala":"🐨",
            "lion":"🦁","lemon":"🍋","leaf":"🍃","lollipop":"🍭","ladder":"🪜","lock":"🔒","lips":"👄","lizard":"🦎",
            "mouse":"🐭","moon":"🌙","monkey":"🐵","milk":"🥛","marker":"🖍️","mushroom":"🍄","monster":"👾","mango":"🥭",
            "nest":"🪹","nut":"🥜","net":"🕸️","noodles":"🍜","nail":"💅","necklace":"📿","nose":"👃","nurse":"👩‍⚕️",
            "owl":"🦉","orange":"🍊","onion":"🧅","olive":"🫒","ocean":"🌊","oven":"🍳","octopus":"🐙","ostrich":"🦤",
            "pear":"🍐","pig":"🐷","pencil":"✏️","panda":"🐼","plate":"🍽️","penguin":"🐧","pizza":"🍕","parrot":"🦜",
            "queen":"👸","quail":"🐦","question":"❓","quiver":"🏹","quiet":"🤫","quilt":"🧵",
            "rabbit":"🐰","ring":"💍","rose":"🌹","rug":"🧶","rhino":"🦏","rain":"🌧️","robot":"🤖","rocket":"🚀",
            "sun":"☀️","star":"⭐","shoes":"👟","snake":"🐍","ship":"🚢","sheep":"🐑","shark":"🦈","sock":"🧦",
            "train":"🚆","truck":"🚚","tie":"👔","table":"🪑","tiger":"🐯","tomato":"🍅","tent":"⛺","turtle":"🐢",
            "umbrella":"☂️","unicorn":"🦄","up":"⬆️","unhappy":"😟","uniform":"🥋","unicycle":"🚲",
            "van":"🚐","vase":"🏺","violin":"🎻","vacuum":"🧹","vegetable":"🥦","vet":"🩺","volcano":"🌋","vest":"🦺",
            "window":"🪟","watch":"⌚","wolf":"🐺","web":"🕸️","watermelon":"🍉","whale":"🐳","wheel":"⚙️",
            "box":"📦","xylophone":"🎹","x-ray":"🩻","x-mas":"🎄","ax":"🪓",
            "yo-yo":"🪀","yogurt":"🥛","yak":"🐂","yam":"🍠","yarn":"🧶","yacht":"⛵",
            "zoo":"🦁","zebra":"🦓","zucchini":"🥒","zig-zag":"📈","zero":"0️⃣","zipper":"🤐"
        };

        let currentLetter = '';
        let targetWord = '';
        let score = 0;
        let mode = 'see';

        // Khởi tạo bảng chữ cái
        const selector = document.getElementById('letter-selector');
        "abcdefghijklmnopqrstuvwxyz".split('').forEach(l => {
            const btn = document.createElement('button');
            btn.className = "w-10 h-10 rounded-lg bg-pink-500/20 border border-pink-500/50 text-pink-300 font-game hover:bg-pink-500 hover:text-white transition-all";
            btn.innerText = l.toUpperCase();
            btn.onclick = () => startLetter(l);
            selector.appendChild(btn);
        });

        function startLetter(l) {
            currentLetter = l;
            document.getElementById('game-zone').innerHTML = '';
            newRound();
        }

        function newRound() {
            const words = dataset[currentLetter];
            targetWord = words[Math.floor(Math.random() * words.length)];
            mode = Math.random() > 0.5 ? 'see' : 'is';
            
            const question = mode === 'see' ? "What can you see?" : "What is it?";
            speak(question);
            document.getElementById('target-ui').innerText = question;
         mode === 'see' ? `Find: I can see a...` : `Find: It is a...`;
        }

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            const mouth = document.getElementById('m-mouth');
            msg.onstart = () => mouth.classList.add('open');
            msg.onend = () => {
                mouth.classList.remove('open');
                if(callback) callback();
            };
            window.speechSynthesis.speak(msg);
            document.getElementById('m-speech').innerText = text;
        }

        function spawn() {
            if(!currentLetter) return;
            const words = dataset[currentLetter];
            const word = Math.random() < 0.3 ? targetWord : words[Math.floor(Math.random() * words.length)];
            const article = ['a','e','i','o','u'].includes(word[0]) ? 'an' : 'a';
            const sentence = mode === 'see' ? `I can see ${article} ${word}` : `It is ${article} ${word}`;

            const bubble = document.createElement('div');
            bubble.className = "bubble";
            bubble.style.left = Math.random() * 70 + 5 + "%";
            bubble.style.animation = `floatUp ${7 + Math.random() * 3}s linear forwards`;

            bubble.innerHTML = `
                <div class="bubble-content shadow-2xl">
                    <span class="text-4xl">${emojiMap[word] || '🎈'}</span>
                    <span class="text-pink-600 font-bold text-lg whitespace-nowrap">${sentence}</span>
                </div>
            `;

            bubble.onclick = () => {
                if(word === targetWord) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    bubble.classList.add('slash');
                    speak(sentence, () => newRound());
                    setTimeout(() => bubble.remove(), 400);
                } else {
                    bubble.style.opacity = "0.3";
                }
            };

            document.getElementById('game-zone').appendChild(bubble);
            setTimeout(() => bubble.remove(), 10000);
        }

        setInterval(spawn, 2500);

        // Responsive animation speed
        const style = document.createElement('style');
        style.innerHTML = `@keyframes floatUp { from { transform: translateY(110vh); } to { transform: translateY(-20vh); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Học Vần - Tiếng Việt 1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#FFFBF0;font-size:15px;color:#222}
.hdr{background:linear-gradient(135deg,#2E7D32,#66BB6A);padding:12px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr h1{color:#fff;font-size:19px;font-weight:700}
.hdr p{color:#C8E6C9;font-size:11px;margin-top:2px}
.nav{display:flex;gap:5px;padding:9px 12px;justify-content:center;flex-wrap:wrap;background:#fff;border-bottom:2px solid #C8E6C9}
.nb{padding:6px 13px;border:2px solid #81C784;border-radius:99px;background:#fff;color:#2E7D32;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.nb.active,.nb:hover{background:#2E7D32;color:#fff;border-color:#2E7D32}
.main{max-width:700px;margin:0 auto;padding:12px}
.page{display:none}.page.active{display:block}

/* BANG VAN */
.nhom{margin-bottom:14px}
.nhom-hdr{font-size:12px;font-weight:700;padding:5px 12px;border-radius:7px;margin-bottom:7px;border-left:4px solid}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px}
.bc{background:#fff;border:2.5px solid #e0e0e0;border-radius:11px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.bc:hover{border-color:#2E7D32;transform:translateY(-2px);box-shadow:0 4px 10px rgba(46,125,50,.15)}
.bc.done{border-color:#2E7D32;background:#F1F8E9}
.bc .bvt{font-size:15px;font-weight:700;color:#1B5E20;line-height:1.3}
.bc .bsub{font-size:10px;color:#aaa;margin-top:1px}
.bc .bck{position:absolute;top:-4px;right:-4px;background:#2E7D32;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;display:flex;align-items:center;justify-content:center}
.sbar{display:flex;align-items:center;background:#fff;border-radius:9px;padding:6px 11px;border:2px solid #C8E6C9;margin-bottom:11px;gap:8px;font-size:12px}
.sbar .sp{font-weight:700;color:#2E7D32;margin-left:auto;font-size:15px}

/* HOC BAI */
.prog{height:6px;background:#C8E6C9;border-radius:99px;margin-bottom:12px;overflow:hidden}
.progf{height:100%;background:linear-gradient(90deg,#2E7D32,#81C784);border-radius:99px;transition:width .4s}
.lbox{background:#fff;border-radius:16px;padding:16px;border:2.5px solid #C8E6C9;box-shadow:0 2px 10px rgba(46,125,50,.08)}
.lt{font-size:19px;font-weight:700;text-align:center;margin-bottom:11px}
.stabs{display:flex;gap:4px;margin-bottom:11px;justify-content:center;flex-wrap:wrap}
.stab{padding:5px 10px;border:2px solid #ddd;border-radius:99px;font-size:11px;cursor:pointer;color:#aaa;font-weight:700}
.stab.active{background:#2E7D32;color:#fff;border-color:#2E7D32}
.stab.donet{border-color:#2E7D32;color:#2E7D32}

/* BUOC 1: NHAN BIET */
.nb1{background:#F9FBE7;border:2px solid #DCE775;border-radius:12px;padding:14px;margin-bottom:12px;text-align:center}
.nb1-s{font-size:19px;font-weight:600;color:#33691E;line-height:1.7;margin-bottom:10px}
.nb1-s .hl{color:#E65100;font-weight:700}
.nb1-tip{font-size:12px;color:#888;margin-bottom:8px}

/* BUOC 2: DOC */
.doc-box{background:#E8F5E9;border-radius:12px;padding:14px;margin-bottom:12px}
.van-row{display:flex;justify-content:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.van-btn{font-size:36px;font-weight:700;color:#1B5E20;cursor:pointer;padding:4px 10px;border-radius:8px;transition:all .15s;user-select:none;border:2px solid transparent}
.van-btn:hover{background:#C8E6C9;border-color:#81C784}
.van-btn:active{transform:scale(.93)}
.ghep-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ghep-am{background:#BBDEFB;border:2px solid #90CAF9;border-radius:8px;padding:5px 12px;font-size:18px;font-weight:700;color:#1565C0;cursor:pointer}
.ghep-van{background:#C8E6C9;border:2px solid #81C784;border-radius:8px;padding:5px 12px;font-size:18px;font-weight:700;color:#1B5E20;cursor:pointer}
.ghep-res{background:#2E7D32;color:#fff;border-radius:8px;padding:5px 14px;font-size:18px;font-weight:700;cursor:pointer}
.tu-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:6px}
.tu-item{background:#fff;border:2px solid #A5D6A7;border-radius:9px;padding:4px 10px;font-size:14px;font-weight:700;color:#1B5E20;cursor:pointer;transition:all .15s}
.tu-item:hover{background:#E8F5E9;transform:scale(1.04)}
/* Tu voi anh (3 anh) */
.anh-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.anh-item{text-align:center;cursor:pointer;transition:all .15s}
.anh-item:hover{transform:scale(1.05)}
.anh-emoji{font-size:36px;display:block;margin-bottom:3px}
.anh-text{font-size:14px;font-weight:700;color:#1B5E20}

/* BUOC 3: VIET */
.viet-box{background:#FFF9C4;border:2px solid #FDD835;border-radius:12px;padding:14px;margin-bottom:12px}
.viet-dong{font-family:'Segoe UI',cursive;font-size:26px;color:#33691E;margin-bottom:8px;text-align:center;letter-spacing:4px}
.viet-hint{font-size:12px;color:#888;text-align:center;margin-bottom:10px}
.viet-input{width:100%;border:2px solid #FDD835;border-radius:8px;padding:8px 12px;font-size:22px;text-align:center;background:#FFFDE7;color:#33691E;outline:none;font-family:'Segoe UI',Arial}
.viet-input:focus{border-color:#F9A825}
.viet-check{margin-top:8px;text-align:center;font-size:13px;font-weight:700;min-height:20px}
.viet-check.ok{color:#2E7D32}.viet-check.err{color:#C62828}

/* BUOC 4: DOC CAU */
.doc-cau-box{background:#E3F2FD;border-radius:12px;padding:14px;margin-bottom:12px;font-size:19px;font-weight:600;color:#0D47A1;line-height:1.8;text-align:center}
.doc-cau-box .hl{color:#E65100;font-weight:700;cursor:pointer;text-decoration:underline}

/* NAV BTN */
.nbts{display:flex;gap:7px;justify-content:space-between;margin-top:12px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 15px;border:none;border-radius:99px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s}
.bprev{background:#eee;color:#666}.bprev:hover{background:#ddd}
.bnext{background:#2E7D32;color:#fff;box-shadow:0 3px 0 #1B5E20}.bnext:hover{background:#388E3C}
.bhome{background:#E8F5E9;color:#2E7D32}.bhome:hover{background:#C8E6C9}
.bspeak{background:#1565C0;color:#fff;border:none;border-radius:99px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:700}
.bspeak:hover{background:#0D47A1}
.plus{color:#aaa;font-size:18px;font-weight:700}
.arrow{color:#aaa;font-size:18px;font-weight:700}

/* QUIZ */
.qbox{background:#FFF3E0;border-radius:12px;padding:13px;margin-bottom:10px}
.qq{font-size:15px;font-weight:700;color:#E65100;text-align:center;margin-bottom:10px}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qo{background:#fff;border:3px solid #FFCC80;border-radius:11px;padding:11px;text-align:center;cursor:pointer;font-size:20px;font-weight:700;transition:all .15s}
.qo:hover{background:#FFF3E0}
.qo.correct{background:#C8E6C9;border-color:#4CAF50}
.qo.wrong{background:#FFCDD2;border-color:#F44336}

/* THANH TICH */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>

const ALL = NHOMS.flatMap(n=>n.bais.map(b=>({...b,nhom:n.ten,mauNhom:n.mau,bcNhom:n.bc})));

let S={
  done:JSON.parse(localStorage.getItem('tv1v3_done')||'[]'),
  stars:parseInt(localStorage.getItem('tv1v3_stars')||'0'),
  qs:0,qstr:0,cur:null,step:0,vietVal:''
};
function sv(){localStorage.setItem('tv1v3_done',JSON.stringify(S.done));localStorage.setItem('tv1v3_stars',S.stars);}

function showTab(t,el){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+t).classList.add('active');
  if(t==='van')rVan();
  if(t==='luyen')genQ();
  if(t==='tt')rTT();
}

function rVan(){
  document.getElementById('pg-van').innerHTML=
    `<div class="sbar"><span>⭐</span><span>Sao thu thập:</span><span class="sp">${S.stars} ⭐</span></div>`+
    NHOMS.map(n=>`
      <div class="nhom">
        <div class="nhom-hdr" style="background:${n.mau};color:${n.bc};border-color:${n.bdr}">${n.ten}</div>
        <div class="bgrid">${n.bais.map(b=>`
          <div class="bc ${S.done.includes(b.id)?'done':''}" onclick="startL(${b.id})">
            ${S.done.includes(b.id)?'<div class="bck">✓</div>':''}
            <div class="bvt">${b.van.join('\n')}</div>
            <div class="bsub">Bài ${b.id}</div>
          </div>`).join('')}
        </div>
      </div>`).join('');
}

function startL(id){
  S.cur=ALL.find(b=>b.id===id);
  S.step=0;S.vietVal='';
  document.querySelectorAll('.nb')[1].click();
  rStep();
}

function rStep(){
  const b=S.cur;
  const pct=(S.step/4*100);
  const snames=['1. Nhận biết','2. Đọc','3. Viết','4. Đọc câu'];
  let html=`<div class="prog"><div class="progf" style="width:${pct}%"></div></div>
  <div class="lbox">
  <div class="lt" style="color:${b.bcNhom}">Bài ${b.id}: ${b.van.join(' - ')}</div>
  <div class="stabs">${snames.map((n,i)=>`<div class="stab ${i<S.step?'donet':i===S.step?'active':''}" onclick="if(${i}<${S.step})gotoS(${i})">${n}</div>`).join('')}</div>`;

  if(S.step===0) html+=s0(b);
  else if(S.step===1) html+=s1(b);
  else if(S.step===2) html+=s2(b);
  else html+=s3(b);

  html+=`<div class="nbts">
    <button class="btn bhome" onclick="goHome()">🏠 Trang chủ</button>
    ${S.step>0?`<button class="btn bprev" onclick="pvS()">← Quay lại</button>`:''}
    ${S.step<3?`<button class="btn bnext" onclick="nxS()">Tiếp theo →</button>`
              :`<button class="btn bnext" style="background:#2E7D32" onclick="doneL()">🌟 Hoàn thành!</button>`}
  </div></div>`;
  document.getElementById('pg-hoc').innerHTML=html;
}

// BUOC 1: NHAN BIET
function s0(b){
  const s=b.nhanBiet;
  const re=new RegExp('('+b.van.join('|')+')','g');
  const sHL=s.replace(re,'<span class="hl">$1</span>');
  return `<div class="nb1">
    <p class="nb1-tip">Tìm vần <b>${b.van.join(', ')}</b> trong câu dưới đây:</p>
    <p class="nb1-s">${sHL}</p>
    <button class="bspeak" onclick="sp('${s}')">🔊 Nghe đọc câu</button>
  </div>`;
}

// BUOC 2: DOC
function s1(b){
  // Hien thi van
  let h=`<div class="doc-box">
    <div class="van-row">`;
  b.van.forEach(v=>h+=`<span class="van-btn" onclick="sp('${v}')" title="Bấm để nghe">${v}</span>`);
  h+=`</div>
    <div style="text-align:center;font-size:12px;color:#555;margin-bottom:10px">⬆ Bấm vào vần để nghe phát âm</div>
    <div style="background:#fff;border-radius:9px;padding:10px;margin-bottom:10px">
    <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px;text-align:center">Ghép âm:</div>
    <div class="ghep-row">
      <span class="ghep-am" onclick="sp('${b.amGhep.am}')">${b.amGhep.am}</span>
      <span class="plus">+</span>
      <span class="ghep-van" onclick="sp('${b.amGhep.van}')">${b.amGhep.van}</span>
      <span class="arrow">→</span>
      <span class="ghep-res" onclick="sp('${b.amGhep.ketQua}')">${b.amGhep.ketQua}</span>
    </div></div>
    <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px">Đọc các tiếng:</div>
    <div class="tu-row">${b.docTu.map(t=>`<span class="tu-item" onclick="sp('${t}')">${t}</span>`).join('')}</div>
    <div style="font-size:12px;font-weight:700;color:#555;margin:10px 0 6px">Đọc từ (bấm để nghe):</div>
    <div class="anh-row">${b.docAnh.map(w=>`
      <div class="anh-item" onclick="sp('${w.t}')">
        <span class="anh-emoji">${w.e}</span>
        <span class="anh-text">${w.t}</span>
      </div>`).join('')}</div>
  </div>`;
  return h;
}

// BUOC 3: VIET
function s2(b){
  return `<div class="viet-box">
    <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px;text-align:center">Mẫu viết (theo sách):</div>
    <div class="viet-dong">${b.viet1}</div>
    <div class="viet-dong">${b.viet2}</div>
    <div class="viet-hint">Hãy tập viết vào vở ô ly rồi gõ vào ô bên dưới để kiểm tra</div>
    <input class="viet-input" type="text" placeholder="Gõ: ${b.viet1.split('  ')[0]}" 
      oninput="S.vietVal=this.value" value="${S.vietVal}"
      onkeydown="if(event.key==='Enter')chkViet()">
    <div style="text-align:center;margin-top:7px">
      <button class="btn bnext" style="background:#F9A825" onclick="chkViet()">✓ Kiểm tra</button>
    </div>
    <div class="viet-check" id="vc"></div>
  </div>`;
}

function chkViet(){
  const b=S.cur;
  const v=S.vietVal.trim().toLowerCase();
  const targets=b.viet1.replace(/\s+/g,' ').split('  ').concat(b.viet2.split('  ')).map(x=>x.trim().toLowerCase());
  const ok=targets.some(t=>v===t||v.includes(t)||t.includes(v));
  const el=document.getElementById('vc');
  if(el){
    if(ok){el.textContent='✅ Đúng rồi! Giỏi lắm! +1 ⭐';el.className='viet-check ok';S.stars++;sv();toast('🌟 +1 ⭐');}
    else{el.textContent=`❌ Thử lại! Mẫu: ${b.viet1.split('  ')[0]}`;el.className='viet-check err';}
  }
}

// BUOC 4: DOC CAU
function s3(b){
  const re=new RegExp('('+b.van.join('|')+')','g');
  const sHL=b.docCau.replace(re,'<span class="hl" onclick="sp(\'$1\')">$1</span>');
  return `<div class="doc-cau-box">${sHL}</div>
    <div style="text-align:center;margin-bottom:10px">
      <button class="bspeak" onclick="sp('${b.docCau}')">🔊 Nghe đọc cả câu</button>
    </div>
    <div style="background:#F1F8E9;border-radius:10px;padding:10px">
      <div style="font-size:12px;font-weight:700;color:#2E7D32;margin-bottom:6px">Ôn lại các từ đã học:</div>
      <div class="anh-row">${b.docAnh.map(w=>`
        <div class="anh-item" onclick="sp('${w.t}')">
          <span class="anh-emoji">${w.e}</span>
          <span class="anh-text">${w.t}</span>
        </div>`).join('')}
      </div>
    </div>`;
}

function gotoS(i){if(i<S.step){S.step=i;rStep();}}
function nxS(){S.step=Math.min(3,S.step+1);S.vietVal='';rStep();}
function pvS(){S.step=Math.max(0,S.step-1);S.vietVal='';rStep();}
function goHome(){rVan();document.querySelectorAll('.nb')[0].click();}
function doneL(){
  const b=S.cur;
  if(!S.done.includes(b.id)){S.done.push(b.id);S.stars+=5;sv();toast('🌟 Hoàn thành bài '+b.id+'! +5 ⭐');}
  goHome();
}

// LUYEN TAP
function genQ(){
  const b=ALL[Math.floor(Math.random()*ALL.length)];
  const tp=Math.random()>.5?'van':'tu';
  let h='';
  if(tp==='van'){
    const c=b.van[Math.floor(Math.random()*b.van.length)];
    const av=ALL.flatMap(x=>x.van);
    const opts=[c];let t=0;
    while(opts.length<4&&t<100){const r=av[Math.floor(Math.random()*av.length)];if(!opts.includes(r))opts.push(r);t++;}
    for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
    h=`<div class="qbox">
      <div class="qq">Nghe rồi chọn vần đúng:<br>
      <button class="bspeak" style="margin-top:6px" onclick="sp('${c}')">🔊 Nghe vần</button></div>
      <div class="qopts">${opts.map(o=>`<div class="qo" onclick="ansQ(this,'${o}','${c}')">${o}</div>`).join('')}</div>
    </div>`;
  } else {
    const w=b.docAnh[Math.floor(Math.random()*b.docAnh.length)];
    const ow=ALL.filter(x=>x.id!==b.id).flatMap(x=>x.docAnh);
    const opts=[w];let t=0;
    while(opts.length<4&&t<100){const r=ow[Math.floor(Math.random()*ow.length)];if(!opts.find(o=>o.t===r.t))opts.push(r);t++;}
    for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
    h=`<div class="qbox">
      <div class="qq">Từ nào có vần <b style="font-size:22px;color:#E65100">${b.van[0]}</b>?</div>
      <div class="qopts">${opts.map(o=>`<div class="qo" onclick="ansQ(this,'${o.t}','${w.t}')" style="font-size:14px">${o.e}<br>${o.t}</div>`).join('')}</div>
    </div>`;
  }
  document.getElementById('qa').innerHTML=h;
  document.getElementById('qm').textContent='';
}

function ansQ(el,c,ok){
  document.querySelectorAll('#qa .qo').forEach(o=>o.style.pointerEvents='none');
  if(c===ok){
    el.classList.add('correct');S.qs+=10;S.qstr++;S.stars++;sv();
    document.getElementById('qm').textContent=S.qstr>=3?`🔥 Chuỗi ${S.qstr}! +10`:'✅ Đúng! +10';
    document.getElementById('qm').style.color='#2E7D32';
    toast(S.qstr>=3?'🔥 Tuyệt vời!':'🎉 Đúng rồi!');
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('#qa .qo').forEach(o=>{if(o.textContent.includes(ok))o.classList.add('correct');});
    S.qstr=0;document.getElementById('qm').textContent='❌ Sai rồi! Cố lên!';
    document.getElementById('qm').style.color='#C62828';
  }
  document.getElementById('qs').textContent=S.qs;
  document.getElementById('qstr').textContent=S.qstr>=2?`🔥 x${S.qstr}`:'';
  setTimeout(genQ,1700);
}

function rTT(){
  const tot=ALL.length,done=S.done.length,pct=Math.round(done/tot*100);
  document.getElementById('ttc').innerHTML=`
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:52px">🏆</div>
      <div style="font-size:22px;font-weight:700;color:#2E7D32;margin-top:6px">${S.stars} ⭐</div>
      <div style="font-size:13px;color:#888;margin-top:4px">Hoàn thành ${done}/${tot} bài (${pct}%)</div>
    </div>
    <div class="prog" style="height:12px;margin-bottom:14px"><div class="progf" style="width:${pct}%"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:#F9FBE7;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:24px">📚</div><div style="font-size:20px;font-weight:700;color:#F57F17">${done}</div>
        <div style="font-size:10px;color:#aaa">Bài xong</div>
      </div>
      <div style="background:#E8F5E9;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:24px">🎯</div><div style="font-size:20px;font-weight:700;color:#2E7D32">${S.qs}</div>
        <div style="font-size:10px;color:#aaa">Điểm luyện</div>
      </div>
      <div style="background:#E3F2FD;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:24px">⭐</div><div style="font-size:20px;font-weight:700;color:#1565C0">${S.stars}</div>
        <div style="font-size:10px;color:#aaa">Tổng sao</div>
      </div>
    </div>
    <div style="font-weight:700;font-size:12px;margin-bottom:7px">Bài đã học:</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">
      ${ALL.map(b=>`<span style="background:${S.done.includes(b.id)?'#C8E6C9':'#F5F5F5'};color:${S.done.includes(b.id)?'#2E7D32':'#ccc'};border-radius:7px;padding:3px 8px;font-size:12px;font-weight:700">${b.van[0]}${S.done.includes(b.id)?' ✓':''}</span>`).join('')}
    </div>
    <div style="text-align:center">
      <button onclick="if(confirm('Xóa toàn bộ tiến trình?')){S.done=[];S.stars=0;S.qs=0;sv();rTT();rVan();}" 
        style="background:#FFEBEE;color:#C62828;border:2px solid #FFCDD2;border-radius:99px;padding:7px 14px;cursor:pointer;font-size:11px">🗑️ Xóa tiến trình</button>
    </div>`;
}

function sp(t){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=0.75;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

rVan();
</script>
</body>
</html>

<style>
:root{--p:#2f80ed;--y:#ffb703;--g:#06d6a0;--r:#ef476f;--bg:#fef9f3;--ink:#243b53}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:var(--bg);color:var(--ink);min-height:100vh;padding:10px}
.wrap{max-width:680px;margin:0 auto}
h1{text-align:center;font-size:1.3rem;padding:10px 0;color:var(--p)}
.note{font-size:.78rem;color:#888;text-align:center;margin-bottom:8px}
.tabs,.subtabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.tab{padding:8px 14px;border-radius:20px;border:2px solid var(--p);background:#fff;color:var(--p);font-weight:700;cursor:pointer;font-size:.9rem}
.tab.active{background:var(--p);color:#fff}
.sub{padding:6px 12px;border-radius:16px;border:2px solid var(--g);background:#fff;color:#138a6e;font-weight:600;cursor:pointer;font-size:.85rem}
.sub.active{background:var(--g);color:#fff}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 14px rgba(0,0,0,.08);min-height:220px}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.82rem;color:#666;flex-wrap:wrap;gap:4px}
.src{font-size:.72rem;color:#aaa;margin-bottom:6px}
.script{background:#eef5ff;border-radius:10px;padding:10px;font-size:.92rem;margin-bottom:10px;font-style:italic}
.qtext{font-size:1.08rem;margin:8px 0;font-weight:600}
.opts{display:grid;gap:8px;margin-top:10px}
.opt{padding:10px;border:2px solid #ddd;border-radius:10px;cursor:pointer;font-size:.98rem;background:#fafafa}
.opt:hover{border-color:var(--p)}
.opt.correct{background:#d4f7e7;border-color:var(--g)}
.opt.wrong{background:#fde2e2;border-color:var(--r)}
.btnrow{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
button.act{flex:1;padding:10px;border:none;border-radius:10px;background:var(--y);font-weight:700;cursor:pointer;font-size:.95rem}
button.act.sec{background:#e9ecef}
.tip{font-size:.82rem;color:#777;margin-top:8px}
.score{text-align:center;font-weight:700;color:var(--p);margin-top:6px}
.speakbtn{display:inline-block;margin-left:8px;cursor:pointer;font-size:1.3rem}
.sample{background:#fff8e1;border-radius:10px;padding:10px;margin-top:10px;font-size:.93rem;display:none}
.emoji-scene{font-size:2.2rem;text-align:center;margin:8px 0}
</style>
</head>

function speak(t){

}

function buildTabs(){
 const lt=document.getElementById('levelTabs');
 lt.innerHTML=LEVELS.map(l=>`<div class="tab ${l===state.level?'active':''}" data-l="${l}">${LEVEL_NAME[l]}</div>`).join('');
 lt.querySelectorAll('.tab').forEach(el=>el.onclick=()=>{state.level=el.dataset.l;state.idx=0;state.answered=false;buildTabs();render();});
 const st=document.getElementById('skillTabs');
 st.innerHTML=SKILLS.map(s=>`<div class="sub ${s===state.skill?'active':''}" data-s="${s}">${SKILL_NAME[s]}</div>`).join('');
 st.querySelectorAll('.sub').forEach(el=>el.onclick=()=>{state.skill=el.dataset.s;state.idx=0;state.answered=false;buildTabs();render();});
}

function progressKey(){return 'yle_'+state.level+'_'+state.skill;}

function render(){
 const list=DATA[state.level][state.skill];
 if(state.idx>=list.length)state.idx=0;
 const item=list[state.idx];
 const card=document.getElementById('card');
 let html=`<div class="qtop"><span>Câu ${state.idx+1}/${list.length}</span><span>${LEVEL_NAME[state.level]} • ${SKILL_NAME[state.skill]}</span></div>`;
 if(item.src)html+=`<div class="src">📌 ${item.src}</div>`;

 if(state.skill==='listening'){
  html+=`<div class="script">🔊 <span class="speakbtn" onclick="speak(window.__txt)">▶️</span> Bấm nghe đoạn hội thoại gốc</div>`;
  html+=`<div class="qtext">${item.q}</div>`;
  html+=`<div class="opts">`+item.opts.map((o,i)=>`<div class="opt" data-i="${i}">${o}</div>`).join('')+`</div>`;
  window.__txt=item.script;
 } else if(state.skill==='reading'){
  html+=`<div class="qtext">${item.q}</div>`;
  html+=`<div class="opts">`+item.opts.map((o,i)=>`<div class="opt" data-i="${i}">${o}</div>`).join('')+`</div>`;
 } else if(state.skill==='speaking'){
  html+=`<div class="emoji-scene">${item.scene}</div>`;
  html+=`<div class="qtext">${item.prompt} <span class="speakbtn" onclick="speak(window.__pr)">🔊</span></div>`;
  html+=`<div class="tip">Bé hãy nói to câu trả lời, sau đó bấm "Xem câu mẫu" để so sánh.</div>`;
  html+=`<div class="sample" id="sample">💡 Gợi ý: ${item.sample}</div>`;
  html+=`<div class="btnrow"><button class="act sec" onclick="document.getElementById('sample').style.display='block';speak(document.getElementById('sample').innerText.replace('💡 Gợi ý: ',''))">Xem câu mẫu</button></div>`;
  window.__pr=item.prompt;
 }

 html+=`<div class="btnrow">
  <button class="act sec" id="prevBtn">⬅️ Trước</button>
  <button class="act" id="nextBtn">Tiếp ➡️</button>
 </div>`;
 card.innerHTML=html;

 if(state.skill!=='speaking'){
  card.querySelectorAll('.opt').forEach(el=>el.onclick=()=>{
   if(state.answered)return;
   state.answered=true;
   const i=parseInt(el.dataset.i);
   const correct=i===item.a;
   el.classList.add(correct?'correct':'wrong');
   if(!correct)card.querySelectorAll('.opt')[item.a].classList.add('correct');
   if(correct){state.score++;updateScore();}
  });
 }
 document.getElementById('nextBtn').onclick=()=>{state.idx=(state.idx+1)%list.length;state.answered=false;render();};
 document.getElementById('prevBtn').onclick=()=>{state.idx=(state.idx-1+list.length)%list.length;state.answered=false;render();};
}

function updateScore(){
 localStorage.setItem(progressKey(),state.score);
 document.getElementById('scoreBox').innerText='⭐ Điểm phiên này: '+state.score;
}

buildTabs();
document.getElementById('scoreBox').innerText='⭐ Điểm phiên này: 0';
render();
</script>
</body>
</html>

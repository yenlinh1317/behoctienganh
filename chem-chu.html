<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Prototype Clown - Poppy Playtime</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            color: white;
            position: relative;
            font-family: "Times New Roman", Times, serif; 
            user-select: none;
        }

        /* KHUNG CHỨA TOÀN BỘ GAME ĐỂ TỰ XOAY TRÊN IPHONE KHÔNG CẦN BẬT XOAY MÀN HÌNH */
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 10px 20px;
            position: relative;
            transition: transform 0.3s ease;
        }

        /* CSS PHÉP THUẬT: ÉP XOAY KHUNG GAME 90 ĐỘ NẾU MÀN HÌNH BỊ DỌC */
        @media screen and (orientation: portrait) {
            #game-wrapper {
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: center center;
            }
        }

        #start-screen, #end-screen { 
            position: absolute; 
            inset: 0; 
            background: radial-gradient(circle, #311042, #020617); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10; 
            text-align: center; 
            border-radius: 35px;
        }
        
        .game-title {
            font-size: clamp(24px, 5vw, 55px);
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 4px 4px 0px #be123c, 0 0 30px #7c3aed;
            margin-bottom: 20px;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .btn-start { 
            padding: 15px 40px; 
            font-size: clamp(18px, 3vw, 32px); 
            font-weight: bold; 
            background: linear-gradient(to bottom, #7c3aed, #4c1d95); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            border-bottom: 6px solid #2e1065;
            cursor: pointer; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
            transition: 0.1s; 
        }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 25px #a855f7; }

        .status-bar { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            font-size: clamp(16px, 2.5vw, 32px); 
            font-weight: 900; 
            z-index: 2;
            margin-bottom: 5px;
        }
        .status-card {
            background: rgba(3, 7, 18, 0.9);
            padding: 6px 20px;
            border-radius: 25px;
            border: 2px solid #7c3aed;
        }

        #game-canvas {
            width: 100%;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 35px;
            border: 5px dashed #7c3aed; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 12px 25px rgba(0,0,0,0.7);
            z-index: 2;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Khung Game Tự Động Định Hướng -->
    <div id="game-wrapper">

        <!-- Màn hình bắt đầu -->
        <div id="start-screen">
            <h1 class="game-title">🤡 PROTOTYPE CLOWN 🤡<br><span style="color:#a855f7; font-size: 0.6em;">SIÊU TRÙM PHẦN 5</span></h1>
            <p style="font-size: clamp(14px, 2vw, 22px); margin-bottom: 20px; color: #94a3b8; font-weight: bold; max-width: 80%;">Minh Khang hãy vuốt chém nhanh các bong bóng do Siêu Trùm Chú Hề 1006 tung hứng lên nhé! ⚔️</p>
            <button class="btn-start" onclick="startGame()">⚡ CHIẾN ĐẤU NGAY ⚡</button>
        </div>

        <!-- Màn hình kết thúc -->
        <div id="end-screen" class="hidden">
            <h1 id="end-title" class="game-title">🏆 CHIẾN THẮNG SIÊU TRÙM 🏆</h1>
            <p id="end-p" style="font-size: clamp(16px, 2.2vw, 26px); margin-bottom: 25px; color: #cbd5e1; font-weight: bold;"></p>
            <button class="btn-start" onclick="startGame()">🎮 CHƠI LẠI NÀO 🎮</button>
        </div>

        <!-- Thanh thông tin -->
        <div class="status-bar">
            <div class="status-card">Màn: <span id="question-idx" style="color: #ef4444;">0</span>/10</div>
            <div class="status-card" id="target-display" style="color: #fbbf24; border-color: #7c3aed;">Cần tìm: <span id="target-text">...</span></div>
            <div class="status-card">Điểm: <span id="score" style="color: #22c55e;">0</span></div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script>
        const vầnGroups = [
            { main: "an", spy: "am" }, { main: "at", spy: "ac" }, { main: "ang", spy: "anh" }, { main: "ao", spy: "au" },
            { main: "ai", spy: "ay" }, { main: "am", spy: "ăm" }, { main: "ân", spy: "ân" }, { main: "ât", spy: "ấp" },
            { main: "eo", spy: "êu" }, { main: "ia", spy: "uya" }, { main: "iêc", spy: "iên" }, { main: "iêp", spy: "iêt" },
            { main: "iêu", spy: "yêu" }, { main: "im", spy: "ip" }, { main: "inh", spy: "ich" }, { main: "it", spy: "ich" },
            { main: "oa", spy: "oe" }, { main: "oac", spy: "oam" }, { main: "oach", spy: "oat" }, { main: "oai", spy: "oay" },
            { main: "oan", spy: "oang" }, { main: "oanh", spy: "oang" }, { main: "ôi", spy: "ơi" }, { main: "ôt", spy: "ơt" },
            { main: "ông", spy: "ơng" }, { main: "uâc", spy: "uân" }, { main: "uâng", spy: "uân" }, { main: "uât", spy: "uân" },
            { main: "uây", spy: "uôi" }, { main: "uôc", spy: "uông" }, { main: "ưa", spy: "ươ" }, { main: "ươc", spy: "ương" },
            { main: "ươu", spy: "ưu" }, { main: "ui", spy: "uy" }, { main: "uich", spy: "uinh" }, { main: "en", spy: "et" },
            { main: "ach", spy: "êch" }, { main: "êch", spy: "ich" }, { main: "oc", spy: "ôc" }, { main: "uc", spy: "ưc" },
            { main: "iêm", spy: "yêm" }, { main: "uôm", spy: "ươm" }, { main: "ăt", spy: "ât" }, { main: "et", spy: "êt" },
            { main: "ot", spy: "ôt" }, { main: "ơt", spy: "ut" }, { main: "ưt", spy: "ut" }, { main: "uât", spy: "uyêt" }
        ];

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let currentIdx = 0;
        let score = 0;
        let gameActive = false;
        let targetVần = "";
        let normalVần = "";
        
        let bubbles = [];
        let bladeTracks = []; 
        let spawnTimer;
        let animationFrameId;
        let gameTime = 0;
        let bossInstance;

        function speak(text, slowRate = false) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = slowRate ? 0.65 : 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function getSpellingGuide(word) {
            const danhSachVanPhucTap = {
                "oay": "o, a, i, oay", "oai": "o, a, i, oai", "oan": "o, a, nờ, oan", "oang": "o, a, ngờ, oang",
                "oanh": "o, a, nhờ, oanh", "uynh": "u, i, nhờ, uynh", "uich": "u, i, chờ, uịch", "uyêt": "u, iê, tờ, uyết",
                "uyên": "u, iê, nờ, uyên", "ươu": "ươ, u, ươu", "ương": "ươ, ngờ, ương", "ươn": "ươ, nờ, ươn",
                "iêu": "i, ê, u, iêu", "yêu": "i, ê, u, yêu", "iên": "i, ê, nờ, iên", "yên": "i, ê, nờ, yên",
                "ang": "a, ngờ, ang", "anh": "a, nhờ, anh", "inh": "i, nhờ, inh", "ich": "i, chờ, ích",
                "ăng": "ă, ngờ, ăng", "âng": "â, ngờ, âng", "ong": "o, ngờ, ong", "ông": "ô, ngờ, ông",
                "uông": "u, ô, ngờ, uông", "eng": "e, ngờ, eng", "uât": "u, ớ, tờ, uất", "uân": "u, ớ, nờ, uân", "uây": "u, ớ, i, uây"
            };
            if (danhSachVanPhucTap[word]) return danhSachVanPhucTap[word];

            let components = [];
            for (let i = 0; i < word.length; i++) {
                let char = word[i];
                if (char === 'n') components.push("nờ");
                else if (char === 'm') components.push("mờ");
                else if (char === 't') components.push("tờ");
                else if (char === 'c') components.push("cờ");
                else if (char === 'p') components.push("pờ");
                else if (word.substr(i, 2) === 'ch') { components.push("chờ"); i++; }
                else if (word.substr(i, 2) === 'ng') { components.push("ngờ"); i++; }
                else if (word.substr(i, 2) === 'nh') { components.push("nhờ"); i++; }
                else components.push(char);
            }
            return `${components.join(", ")}, ${word}`;
        }

        function getPronounceWord(van) {
            if (van.endsWith('t') || van.endsWith('c') || van.endsWith('p') || van.endsWith('ch')) {
                if (van === "ât") return "ất"; if (van === "ăt") return "ắt"; if (van === "ơt") return "ớt";
                if (van === "ut") return "út"; if (van === "ưt") return "ứt"; if (van === "et") return "ét";
                if (van === "êt" || van === "êch") return "ếch"; if (van === "ot") return "ót"; if (van === "ôt") return "ốt";
                if (van === "uât") return "uất"; if (van === "uyêt") return "uyết"; if (van === "oet") return "oét";
                 if (van === "oat") return "oát"; if (van === "oac") return "oác"; if (van === "oach") return "oách";
                if (van === "uôc") return "uốc"; if (van === "uâc") return "uấc"; if (van === "ươc") return "ước";
                if (van === "uich") return "uịch"; if (van === "uyp") return "uýp"; if (van === "uyt") return "uýt";
                if (van === "ach") return "ách"; if (van === "ich") return "ích"; if (van === "ôc") return "ốc";
                if (van === "uc") return "úc"; if (van === "ưc") return "ức"; if (van === "ăc") return "ắc";
                if (van === "ap") return "áp"; if (van === "ep") return "ép"; if (van === "êp") return "ếp";
                if (van === "op") return "óp"; if (van === "ôp") return "ốp"; if (van === "up") return "úp";
                if (van === "ơp") return "ớp"; if (van === "ưp") return "ứp"; if (van === "oam") return "oám";
            }
            if (van === "oay") return "oái"; 
            if (van === "oang") return "oáng"; 
            if (van === "oanh") return "oánh"; 
            if (van === "uynh") return "uýnh";
            if (van === "uâng") return "uấng";
            if (van === "eng") return "éng";
            
            return van;
        }
        // =========================================================================
        // PROTOTYPE VẼ TOÀN BỘ NHÂN VẬT CHÚ HỀ PROTOTYPE GIỐNG HỆT TRONG ẢNH
        // =========================================================================
        function ThePrototypeClown() {
            this.x = canvas.width / 2;
            this.y = canvas.height - 110; // Đặt vị trí ở đáy màn hình
            this.targetX = this.x;
            this.state = 'idle';
        }

        ThePrototypeClown.prototype.update = function() {
            this.x += (this.targetX - this.x) * 0.08;
        };

        ThePrototypeClown.prototype.draw = function(ctx) {
            gameTime += 0.04;
            let dậpDềnh = Math.sin(gameTime * 2) * 6;
            let lắcTay = Math.sin(gameTime) * 25;

            ctx.save();
            ctx.translate(this.x, this.y + dậpDềnh);

            // 1. VẼ HAI CÁNH TAY MÓNG VUỐT GẦY GUỘC, ĐEN KỊT, DÀI NGOẰNG
            ctx.fillStyle = '#0f172a';
            ctx.strokeStyle = '#020617';
            ctx.lineWidth = 6;

            // --- CÁNH TAY TRÁI ---
            ctx.save();
            ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 12; // Mạch máu đỏ chạy dọc tay
            ctx.beginPath();
            ctx.moveTo(-15, -15);
            let tx1 = -120 + lắcTay, ty1 = -40;
            let tx2 = -210 + lắcTay*0.5, ty2 = -100;
            let t_handX = -260 + (this.state === 'attack' ? lắcTay * 0.2 : lắcTay * 0.8);
            let t_handY = -140;
            ctx.lineTo(tx1, ty1); ctx.lineTo(tx2, ty2); ctx.lineTo(t_handX, t_handY); ctx.stroke();
            
            // 5 móng vuốt thép đen dài quặp gớm ghiếc
            ctx.shadowBlur = 0; ctx.strokeStyle = '#020617'; ctx.lineWidth = 5;
            let gócTrái = [-0.7, -0.35, 0, 0.35, 0.7];
            gócTrái.forEach(g => {
                ctx.beginPath(); ctx.moveTo(t_handX, t_handY);
                let cx = t_handX + Math.sin(g - 1.3) * 60; let cy = t_handY - Math.cos(g - 1.3) * 60;
                ctx.lineTo(cx, cy); ctx.stroke();
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.restore();

            // --- CÁNH TAY PHẢI ---
            ctx.save();
            ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(15, -15);
            let px1 = 110 - lắcTay, py1 = -40;
            let px2 = 200 - lắcTay*0.5, py2 = -100;
            let p_handX = 250 - (this.state === 'attack' ? lắcTay * 0.2 : lắcTay * 0.8);
            let p_handY = -140;
            ctx.lineTo(px1, py1); ctx.lineTo(px2, py2); ctx.lineTo(p_handX, p_handY); ctx.stroke();
            
            // 5 móng vuốt thép đen dài quặp gớm ghiếc
            ctx.shadowBlur = 0; ctx.strokeStyle = '#020617'; ctx.lineWidth = 5;
            let gócPhải = [-0.7, -0.35, 0, 0.35, 0.7];
            gócPhải.forEach(g => {
                ctx.beginPath(); ctx.moveTo(p_handX, p_handY);
                let cx = p_handX + Math.sin(g + 1.3) * 60; let cy = p_handY - Math.cos(g + 1.3) * 60;
                ctx.lineTo(cx, cy); ctx.stroke();
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.restore();

            // 2. VẼ PHẦN THÂN DƯỚI: KHUNG XƯƠNG SƯỜN LỘ RA LÕI ĐỎ (GIỐNG 100% ẢNH MẪU)
            ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.roundRect(-8, -20, 16, 90, 4); ctx.fill();
            ctx.fillStyle = '#dc2626'; ctx.beginPath(); ctx.ellipse(0, 15, 18, 30, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            for(let i=0; i<6; i++) {
                let Y = -15 + i*14;
                ctx.beginPath(); ctx.arc(-15, Y, 22, Math.PI * 0.5, Math.PI * 1.5); ctx.stroke();
                ctx.beginPath(); ctx.arc(15, Y, 22, Math.PI * 1.5, Math.PI * 0.5); ctx.stroke();
            }

            // 3. VẼ ÁO VEST XANH HOÀNG GIA VIỀN VÀNG, CỔ DỰNG CAO, CÓ NƠ ĐỎ ĐẰNG TRƯỚC
            ctx.fillStyle = '#1e3a8a'; 
            ctx.beginPath();
            ctx.moveTo(-35, -25); ctx.lineTo(-50, -60); ctx.lineTo(0, -38); ctx.lineTo(50, -60); ctx.lineTo(35, -25);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#eab308'; ctx.lineWidth = 3; ctx.stroke(); 
            // Tay áo phao 2 tầng màu Đỏ - Xanh giống ảnh mẫu
            ctx.fillStyle = '#dc2626'; ctx.beginPath(); ctx.arc(-35, -12, 12, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(35, -12, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1e3a8a'; ctx.beginPath(); ctx.arc(-30, 5, 10, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(30, 5, 10, 0, Math.PI*2); ctx.fill();
            // Cái nơ đỏ to bự trước ngực
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(-18, -35); ctx.lineTo(-18, -15); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(18, -35); ctx.lineTo(18, -15); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#f1f5f9'; ctx.beginPath(); ctx.arc(0, -25, 5, 0, Math.PI*2); ctx.fill();

            // 4. VẼ ĐẦU VÀ KHUÔN MẶT CHÚ HỀ MA QUÁI
            let headY = -85;
            ctx.fillStyle = '#f8fafc'; // Mặt trắng bợt
            ctx.beginPath(); ctx.arc(0, headY, 32, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#334155'; ctx.lineWidth = 3; ctx.stroke();

            // Má hồng chú hề to tròn
            ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
            ctx.beginPath(); ctx.arc(-20, headY + 8, 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, headY + 8, 8, 0, Math.PI * 2); ctx.fill();

            // Đôi mắt ti hí màu đen sọc dọc ma quái
            ctx.fillStyle = '#0f172a';
            ctx.beginPath(); ctx.ellipse(-12, headY - 6, 3, 6, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(12, headY - 6, 3, 6, 0, 0, Math.PI * 2); ctx.fill();
            // Vạch trang điểm tam giác đỏ dọc mắt
            ctx.fillStyle = '#dc2626';
            ctx.beginPath(); ctx.moveTo(-12, headY - 20); ctx.lineTo(-15, headY - 4); ctx.lineTo(-9, headY - 4); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(12, headY - 20); ctx.lineTo(9, headY - 4); ctx.lineTo(15, headY - 4); ctx.closePath(); ctx.fill();

            // Chiếc mũi hề tròn màu đỏ rực phát sáng nhẹ
            ctx.save();
            ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 6;
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.arc(0, headY + 2, 7, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // Miệng cười rộng đến tận mang tai
            ctx.strokeStyle = '#991b1b'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.arc(0, headY + 10, 16, 0.1, Math.PI - 0.1); ctx.stroke();

            // 5. VẼ CHIẾC MŨ HỀ 2 MÀU ĐỐI XỨNG CHUẨN TRONG ẢNH MẪU (Đỏ - Xanh Hoàng Gia)
            // Sừng mũ bên trái (Màu Đỏ)
            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.moveTo(-28, headY - 15);
            ctx.bezierCurveTo(-45, headY - 35, -75, headY - 30, -70, headY - 65);
            ctx.bezierCurveTo(-55, headY - 50, -10, headY - 42, -5, headY - 30);
            ctx.closePath(); ctx.fill();

            // Sừng mũ bên phải (Màu Xanh Dương)
            ctx.fillStyle = '#1e3a8a';
            ctx.beginPath();
            ctx.moveTo(28, headY - 15);
            ctx.bezierCurveTo(45, headY - 35, 75, headY - 30, 70, headY - 65);
            ctx.bezierCurveTo(55, headY - 50, 10, headY - 42, 5, headY - 30);
            ctx.closePath(); ctx.fill();

            // Quả chuông vàng nhỏ (Lục lạc) phát sáng nhẹ
            ctx.save();
            ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
            ctx.fillStyle = '#facc15';
            ctx.beginPath(); ctx.arc(-70, headY - 65, 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(70, headY - 65, 6, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            ctx.restore();
        };
        // =========================================================================
        // PROTOTYPE CHO ĐỐI TƯỢNG BONG BÓNG (BUBBLE)
        // =========================================================================
        function Bubble(x, y, text, isTarget) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 2.5; // Tốc độ bay ngang vừa phải
            this.vy = -(Math.random() * 3 + 6.5);  // Lực bắn vừa tầm mắt trẻ em
            this.radius = 55;                      // Kích thước bong bóng tối ưu cho iPhone
            this.text = text;
            this.isTarget = isTarget;
            this.color = `hsl(${Math.random() * 360}, 95%, 55%)`;
            this.isPopped = false;
        }

        Bubble.prototype.update = function() {
            this.vy += 0.14; // Trọng lực nhẹ giúp bóng rơi xuống rất chậm để bé kịp chém
            this.x += this.vx;
            this.y += this.vy;
        };

        Bubble.prototype.draw = function(ctx) {
            if (this.isPopped) return;
            ctx.save();
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 5;
            
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.font = 'bold 50px "Times New Roman"'; 
            ctx.fillStyle = '#0f172a';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.text, this.x, this.y + 4);
            ctx.restore();
        };

        // =========================================================================
        // ĐIỀU CHỈNH ĐỘ PHÂN GIẢI VÀ KÍCH THƯỚC CANVAS TỰ ĐỘNG
        // =========================================================================
        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            if (bossInstance) {
                bossInstance.x = canvas.width / 2;
                bossInstance.targetX = bossInstance.x;
                bossInstance.y = canvas.height - 110; 
            }
        }
        window.addEventListener('resize', () => { setTimeout(resizeCanvas, 150); });

        // =========================================================================
        // LOGIC KHỞI ĐỘNG VÀ ĐIỀU HÀNH TRÒ CHƠI
        // =========================================================================
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            
            bossInstance = new ThePrototypeClown(); 
            resizeCanvas();
            
            currentIdx = 0;
            score = 0;
            document.getElementById('score').innerText = score;
            gameActive = true;
            bubbles = [];
            bladeTracks = [];
            gameTime = 0;
            
            nextQuestion();
            gameLoop();
        }

        function nextQuestion() {
            if (currentIdx >= 10) {
                endGame();
                return;
            }

            currentIdx++;
            document.getElementById('question-idx').innerText = currentIdx;

            const randomPair = vầnGroups[Math.floor(Math.random() * vầnGroups.length)];
            normalVần = randomPair.main;
            targetVần = randomPair.spy;

            document.getElementById('target-text').innerText = targetVần;

            let giongDocTron = getPronounceWord(targetVần);
            speak(`Minh Khang ơi,, hãy chém vần ${giongDocTron} !`);

            clearInterval(spawnTimer);
            spawnTimer = setInterval(() => {
                if (gameActive) spawnBubble();
            }, 1300); // Khoảng thời gian tung bóng
        }

        function spawnBubble() {
            if (!gameActive) return;
            // Di chuyển chú hề ngẫu nhiên theo chiều ngang màn hình hiện tại
            bossInstance.targetX = Math.random() * (canvas.width - 120) + 60;
            bossInstance.state = 'attack';
            setTimeout(() => { if(bossInstance) bossInstance.state = 'idle'; }, 400);

            let isTarget = Math.random() < 0.4; // Tỷ lệ xuất hiện bóng mục tiêu đúng
            let text = isTarget ? targetVần : normalVần;

            // Bóng bay ra luân phiên từ hai bên tay móng vuốt của chú hề
            let némTừBênTrái = Math.random() < 0.5;
            let bóngX = némTừBênTrái ? bossInstance.x - 100 : bossInstance.x + 100;
            let bóngY = bossInstance.y - 120;

            let newBubble = new Bubble(bóngX, bóngY, text, isTarget);
            bubbles.push(newBubble);
        }

        // =========================================================================
        // XỬ LÝ THAO TÁC VUỐT KIẾM CHÉM BÓNG TRÊN DI ĐỘNG & PC
        // =========================================================================
        function handleCut(clientX, clientY) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;

            bladeTracks.push({ x: mouseX, y: mouseY, alpha: 1.0 });
            if (bladeTracks.length > 15) bladeTracks.shift();

            bubbles.forEach(b => {
                if (!b.isPopped) {
                    let dist = Math.hypot(b.x - mouseX, b.y - mouseY);
                    if (dist < b.radius + 15) { // Nới rộng hitbox một chút giúp bé dễ chém trúng
                        b.isPopped = true;
                        if (b.isTarget) {
                            score += 10;
                            document.getElementById('score').innerText = score;
                            
                            let spelling = getSpellingGuide(targetVần);
                            speak(`Đúng rồi! ... Vần ${targetVần}. ... ${spelling}. ... vần ${targetVần}!`, true);
                            
                            setTimeout(nextQuestion, 4500); // Chờ đọc xong đánh vần rồi qua câu tiếp theo
                        } else {
                            speak(`Chưa đúng rồi con ơi!`);
                        }
                    }
                }
            });
        }

        canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleCut(e.clientX, e.clientY); });
        canvas.addEventListener('touchmove', (e) => { 
            if(e.touches.length > 0) {
                handleCut(e.touches[0].clientX, e.touches[0].clientY); 
            }
            e.preventDefault(); 
        }, {passive: false});

        // =========================================================================
        // VÒNG LẶP ĐỒ HỌA CHÍNH (GAME LOOP)
        // =========================================================================
        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Cập nhật và vẽ Siêu trùm Chú hề
            bossInstance.update();
            bossInstance.draw(ctx);

            // Tên bản thử nghiệm dưới chân chú hề
            ctx.save();
            ctx.font = 'bold 20px Times New Roman';
            ctx.fillStyle = '#ef4444';
            ctx.textAlign = 'center';
            ctx.fillText("Jolly Clown Prototype (Experiment 1006)", bossInstance.x, canvas.height - 15);
            ctx.restore();

            // Cập nhật và vẽ danh sách bong bóng chữ
            for (let i = bubbles.length - 1; i >= 0; i--) {
                let b = bubbles[i];
                b.update();
                b.draw(ctx);

                // Xóa bóng khi rơi quá sâu khỏi đáy màn hình
                if (b.y > canvas.height + 150) {
                    bubbles.splice(i, 1);
                }
            }

            // VẼ ĐƯỜNG KIẾM XANH NEON LASER PHÁT SÁNG SIÊU ĐẸP TRÊN MÀN HÌNH
            ctx.save();
            for (let i = 1; i < bladeTracks.length; i++) {
                ctx.beginPath();
                ctx.moveTo(bladeTracks[i-1].x, bladeTracks[i-1].y);
                ctx.lineTo(bladeTracks[i].x, bladeTracks[i].y);
                ctx.strokeStyle = `rgba(34, 211, 238, ${bladeTracks[i].alpha})`; 
                ctx.lineWidth = i * 2.2;
                ctx.lineCap = 'round';
                ctx.stroke();
                bladeTracks[i].alpha -= 0.04;
            }
            ctx.restore();
            bladeTracks = bladeTracks.filter(t => t.alpha > 0);

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // =========================================================================
        // KẾT THÚC TRÒ CHƠI & CHÚC MỪNG CHIẾN THẮNG
        // =========================================================================
        function endGame() {
            gameActive = false;
            clearInterval(spawnTimer);
            cancelAnimationFrame(animationFrameId);
            
            const endScreen = document.getElementById('end-screen');
            const endTitle = document.getElementById('end-title');
            const endP = document.getElementById('end-p');
            
            endScreen.classList.remove('hidden');
            endTitle.innerHTML = "🏆 MINH KHANG CHIẾN THẮNG 🏆";
            endP.innerText = `Bé xuất sắc đánh bại Chú Hề Ma Thuật 1006 với số điểm: ${score}!`;
            speak(`Chúc mừng siêu thám tử tay kiếm Minh Khang đã xuất sắc chém trúng toàn bộ vần chữ của Chú Hề Cơ Khí một trăm lẻ sáu và giành chiến thắng cuộc đua với ${score} điểm! Con đỉnh quá!`);
        }
    </script>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Học Letter K Cùng Bác Sư Tử</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; background: #0b1d12;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; min-height: -webkit-fill-available;
      font-family: 'Fredoka One', 'Quicksand', sans-serif; overflow: hidden;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    #videoContainer {
      position: relative;
      background: linear-gradient(to bottom, #0f3421 0%, #1c4d34 60%, #2d6a4f 100%);
      border: 6px solid #fff; border-radius: 20px; overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      width: 92vw; height: calc(92vw * 16 / 9); max-height: 75vh; margin: auto;
    }
    #videoContainer.landscape-mode { width: 94vw; height: calc(94vw * 9 / 16); max-height: 75vh; }
    .firefly1 { position: absolute; top: 15%; left: 15%; font-size: 3vw; animation: fireflyBlink 2s infinite alternate; z-index: 1; }
    .firefly2 { position: absolute; top: 25%; right: 20%; font-size: 2.5vw; animation: fireflyBlink 2.5s infinite alternate-reverse; z-index: 1; }
    .firefly3 { position: absolute; bottom: 35%; left: 25%; font-size: 3.5vw; animation: fireflyBlink 1.8s infinite alternate; z-index: 1; }
    .forest-bush1 { position: absolute; bottom: -5px; left: -10px; font-size: 14vw; z-index: 2; opacity: 0.8; }
    .forest-bush2 { position: absolute; bottom: -5px; right: -10px; font-size: 14vw; z-index: 2; opacity: 0.8; }
    .lion-teacher {
      position: absolute; bottom: 12%; left: 6%; font-size: 20vw; z-index: 10;
      filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.4)); animation: lionSway 1.5s infinite alternate ease-in-out;
    }
    #videoContainer.landscape-mode .lion-teacher { font-size: 13vw; bottom: 12%; }
    .illustration-box {
      position: absolute; top: 18%; left: 10%; width: 80%; height: 35%;
      display: flex; align-items: center; justify-content: center; z-index: 5;
    }
    #videoContainer.landscape-mode .illustration-box { top: 15%; left: 35%; width: 55%; height: 45%; }
    #vocabEmoji { font-size: 32vw; opacity: 0; display: inline-block; pointer-events: none; }
    #videoContainer.landscape-mode #vocabEmoji { font-size: 18vw; }
    .word-box { position: absolute; bottom: 18%; left: 5%; width: 90%; text-align: center; z-index: 5; opacity: 0; }
    #videoContainer.landscape-mode .word-box { bottom: 18%; left: 35%; width: 55%; }
    .letter-title { font-size: 9vw; color: #fff; text-shadow: 3px 3px 0px #1b4d34; margin: 0; text-transform: lowercase; }
    #videoContainer.landscape-mode .letter-title { font-size: 5vw; }
    .vocab-word { font-size: 13vw; margin: 5px 0 0 0; text-shadow: 3px 3px 0px rgba(0,0,0,0.4); }
    #videoContainer.landscape-mode .vocab-word { font-size: 8vw; }
    .vocab-word .highlight-letter { color: #ffdf00; text-shadow: 3px 3px 0px #000; }
    #micButtonZone {
      position: absolute; bottom: 25%; left: 10%; width: 80%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 30; display: none;
    }
    #videoContainer.landscape-mode #micButtonZone { bottom: 15%; left: 35%; width: 55%; }
    .big-mic-btn {
      width: 90px; height: 90px; border-radius: 50%; background: #ffdf00; border: 5px solid white;
      font-size: 40px; color: #111; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 25px rgba(255, 223, 0, 0.7); animation: pulseMic 0.8s infinite alternate;
    }
    .big-mic-btn.listening { background: #2ecc71; box-shadow: 0 0 30px #2ecc71; color: white; animation: pulseMic 0.4s infinite alternate; }
    .mic-hint { color: white; font-size: 15px; margin-top: 10px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 20px; text-align: center; }
    .heart-zone { display: flex; gap: 8px; margin-bottom: 8px; font-size: 22px; }
    .skip-btn {
      position: absolute; bottom: 5%; right: 5%; background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 15px; font-size: 13px; z-index: 40; cursor: pointer;
    }
    .controls { margin-top: 15px; display: flex; gap: 8px; justify-content: center; width: 92vw; }
    button, select {
      padding: 10px 16px; font-size: 14px; font-weight: bold; border: none; border-radius: 20px;
      cursor: pointer; background: #fff; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent;
    }
    button:hover { background: #ffeaa7; transform: scale(1.02); }

    @keyframes move-float { 0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 1; } 50% { transform: translateY(-15px) rotate(3deg); opacity: 1; } }
    @keyframes move-wind { 0%, 100% { transform: rotate(-6deg); opacity: 1; } 50% { transform: rotate(8deg); opacity: 1; } }
    @keyframes move-jump { 0%, 100% { transform: translateY(0) scaleY(1); opacity: 1; } 50% { transform: translateY(-25px) scaleY(0.85); opacity: 1; } }
    @keyframes move-pulse { 0%, 100% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.1); opacity: 1; } }
    @keyframes intro-zoom { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes lionSway { 0% { transform: translateY(0) rotate(-2deg); } 100% { transform: translateY(-5px) rotate(2deg); } }
    @keyframes fireflyBlink { 0% { opacity: 0.2; transform: scale(0.8) translateY(0); } 100% { opacity: 1; transform: scale(1.2) translateY(-10px); filter: drop-shadow(0 0 8px #ffdf00); } }
    @keyframes pulseMic { 0% { transform: scale(0.9); } 100% { transform: scale(1.1); } }
  </style>
</head>
<body>

  <div class="controls" style="margin-bottom: 5px;">
    <select id="deviceSelect" onchange="changeDeviceLayout()">
      <option value="iphone-vertical">iPhone Màn Hình Dọc (9:16)</option>
      <option value="iphone-horizontal" selected>iPhone Màn Hình Ngang (16:9)</option>
    </select>
  </div>

  <div id="videoContainer" class="landscape-mode">
    <div class="firefly1">✨</div><div class="firefly2">✨</div><div class="firefly3">✨</div>
    <div class="forest-bush1">🌳</div><div class="forest-bush2">🌿</div>
    <div class="lion-teacher">🦁</div>

    <div id="micButtonZone">
      <div class="heart-zone">
        <span id="star1">⭐</span><span id="star2">⭐</span><span id="star3">⭐</span>
      </div>
      <button id="bigMicAction" class="big-mic-btn" onclick="triggerVoiceListening()">🎤</button>
      <div id="micHintText" class="mic-hint">BẤM VÀO MICRO ĐỂ NÓI</div>
    </div>

    <button id="skipBtn" class="skip-btn" style="display:none;" onclick="forceSkip()">Bỏ qua ➔</button>
    <div class="illustration-box"><div id="vocabEmoji">✨</div></div>
    <div id="wordBox" class="word-box"><h1 id="vocabText" class="vocab-word">kite</h1></div>
    <div id="introBox" style="position:absolute; width:100%; text-align:center; top:35%; z-index:6;">
      <p id="mainTitle" class="letter-title">letter k</p>
    </div>
  </div>

  <div class="controls">
    <button onclick="startForestLesson()" style="background: #2d6a4f; color: white; width: 100%; padding: 14px;">▶ Bắt đầu học Letter K cùng Bác Sư Tử</button>
  </div>

  <script>
    // GIỮ NGUYÊN DANH SÁCH TỪ VỰNG GỐC CỦA BẠN
    const lessonData = [
      { word: "kite", emoji: "🪁", color: "#ffffff", loopEffect: "move-float" },
      { word: "kangaroo", emoji: "🦘", color: "#fff9c4", loopEffect: "move-jump" },
      { word: "king", emoji: "👑", color: "#ffe0b2", loopEffect: "move-pulse" },
      { word: "key", emoji: "🔑", color: "#e1f5fe", loopEffect: "move-wind" },
      { word: "koala", emoji: "🐨", color: "#f5f5f5", loopEffect: "move-float" },
      { word: "kitchen", emoji: "🍳", color: "#e0f2f1", loopEffect: "move-pulse" },
      { word: "kiwi", emoji: "🥝", color: "#fce4ec", loopEffect: "move-float" },
      { word: "kitten", emoji: "🐱", color: "#e8f5e9", loopEffect: "move-jump" }
    ];
    
    let currentIndex = 0;
    let targetWordString = "";
    let isIntroStageMode = false;
    let isWaitingForClick = false;
    let wrongAttempts = 0; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    function changeDeviceLayout() {
      const container = document.getElementById('videoContainer');
      container.className = document.getElementById('deviceSelect').value === 'iphone-vertical' ? '' : 'landscape-mode';
    }

    function playAudio(text, rate = 0.75, callback) {
      window.speechSynthesis.cancel();
      const speech = new SynthesisUtterance(text);
      speech.lang = 'en-US'; speech.rate = rate;
      if (callback) speech.onend = callback;
      window.speechSynthesis.speak(speech);
    }
    // Sửa lỗi chính tả hàm tạo speechSynthesis
    function playAudio(text, rate = 0.75, callback) {
      window.speechSynthesis.cancel();
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = 'en-US'; speech.rate = rate;
      if (callback) speech.onend = callback;
      window.speechSynthesis.speak(speech);
    }

    function updateStarsUI() {
      document.getElementById('star1').innerText = wrongAttempts < 1 ? "⭐" : "⚫";
      document.getElementById('star2').innerText = wrongAttempts < 2 ? "⭐" : "⚫";
      document.getElementById('star3').innerText = wrongAttempts < 3 ? "⭐" : "⚫";
    }

    function prepareForKidInput(correctTargetWord, isIntro) {
      targetWordString = correctTargetWord;
      isIntroStageMode = isIntro;
      isWaitingForClick = true;
      if (!isIntro) { updateStarsUI(); } else {
        document.getElementById('star1').innerText = "⭐"; document.getElementById('star2').innerText = "⭐"; document.getElementById('star3').innerText = "⭐";
      }
      document.getElementById('wordBox').style.opacity = 0;
      document.getElementById('micButtonZone').style.display = "flex";
      document.getElementById('skipBtn').style.display = "block";
      
      const micBtn = document.getElementById('bigMicAction');
      micBtn.className = "big-mic-btn"; micBtn.innerText = "🎤";
      document.getElementById('micHintText').innerText = "BẤM VÀO MICRO ĐỂ NÓI";
    }

    function triggerVoiceListening() {
      if (!isWaitingForClick) return;
      isWaitingForClick = false;

      const micBtn = document.getElementById('bigMicAction');
      micBtn.className = "big-mic-btn listening"; micBtn.innerText = "🎧";
      document.getElementById('micHintText').innerText = "BÁC SƯ TỬ ĐANG NGHE...";

      if (!SpeechRecognition) { setTimeout(() => { successAction(); }, 1500); return; }
      if (recognition) { try { recognition.stop(); } catch(e){} }
      
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US'; recognition.interimResults = false; recognition.continuous = false; recognition.maxAlternatives = 1;

      recognition.onresult = function(event) {
        const kidSaid = event.results[0][0].transcript.toLowerCase().trim();
        if (kidSaid.includes(targetWordString) || targetWordString.includes(kidSaid) || kidSaid === "ok") {
          successAction();
        } else { failAction(); }
      };
      recognition.onerror = function() { failAction(); };
      try { recognition.start(); } catch (err) {}
    }

    function successAction() {
      document.getElementById('micButtonZone').style.display = "none";
      document.getElementById('skipBtn').style.display = "none";
      document.getElementById('vocabEmoji').innerText = "🎉✨";
      document.getElementById('vocabEmoji').style.opacity = 1;
      
      playAudio("Excellent! Good job!", 0.85, () => {
        setTimeout(() => {
          if (isIntroStageMode) {
            if (targetWordString === "k") { startSoundIntroStage(); } else { enterVocabularyLoops(); }
          } else { moveNext(); }
        }, 1000);
      });
    }

    function failAction() {
      wrongAttempts++;
      updateStarsUI();
      const micBtn = document.getElementById('bigMicAction');
      micBtn.className = "big-mic-btn";

      if (wrongAttempts >= 3 && !isIntroStageMode) {
        micBtn.innerText = "💪";
        document.getElementById('micHintText').innerText = "CỐ GẮNG LẮM! ĐI TIẾP NÀO!";
        playAudio("Good try! Let's check the next one!", 0.85, () => {
          setTimeout(() => { forceSkip(); }, 500);
        });
        return;
      }

      micBtn.innerText = "❌"; document.getElementById('micHintText').innerText = "CHƯA ĐÚNG RỒI, THỬ LẠI NÀO!";
      playAudio("Listen and try again", 0.8, () => {
        setTimeout(() => {
          isWaitingForClick = true;
          micBtn.innerText = "🎤"; document.getElementById('micHintText').innerText = "BẤM ĐỂ THỬ LẠI";
        }, 1000);
      });
    }

    function forceSkip() {
      if(recognition) { try { recognition.stop(); } catch(e){} }
      document.getElementById('micButtonZone').style.display = "none";
      document.getElementById('skipBtn').style.display = "none";
      
      wrongAttempts = 0; 

      if (isIntroStageMode) {
        if (targetWordString === "k") { startSoundIntroStage(); } else { enterVocabularyLoops(); }
      } else { moveNext(); }
    }

    function startLetterKIntro() {
      const mainTitle = document.getElementById('mainTitle');
      mainTitle.innerHTML = "letter <span style='color:#ffdf00;'>k</span>";
      playAudio("letter k", 0.75, () => {
        setTimeout(() => { playAudio("your turn! say k!", 0.8, () => { prepareForKidInput("k", true); }); }, 500);
      });
    }

    function startSoundIntroStage() {
      document.getElementById('introBox').style.display = "block";
      const mainTitle = document.getElementById('mainTitle');
      mainTitle.innerHTML = "sound: <span style='color:#ffdf00;'>/k/</span>";
      playAudio("khờ. khờ. khờ.", 0.65, () => {
        setTimeout(() => { playAudio("your turn! say khờ.", 0.8, () => { prepareForKidInput("khờ", true); }); }, 600);
      });
    }

    function enterVocabularyLoops() {
      document.getElementById('introBox').style.display = "none";
      document.getElementById('vocabEmoji').style.opacity = 1;
      currentIndex = 0;
      renderWord(currentIndex);
    }

    function renderWord(index) {
      const current = lessonData[index];
      const emojiEl = document.getElementById('vocabEmoji');
      const boxEl = document.getElementById('wordBox');
      const textEl = document.getElementById('vocabText');
      
      document.getElementById('micButtonZone').style.display = "none";
      document.getElementById('skipBtn').style.display = "none";
      emojiEl.style.animation = 'none'; boxEl.style.animation = 'none';
      emojiEl.style.opacity = 0; boxEl.style.opacity = 0;
      
      setTimeout(() => {
        const restOfWord = current.word.slice(1);
        textEl.innerHTML = `<span class="highlight-letter">k</span>${restOfWord}`;
        textEl.style.color = current.color;
        emojiEl.innerText = current.emoji;

        emojiEl.style.animation = `${current.loopEffect} 1.6s infinite ease-in-out`;
        boxEl.style.animation = `${current.loopEffect} 1.6s infinite ease-in-out`;
        emojiEl.style.opacity = 1; boxEl.style.opacity = 1;
        
        playAudio(current.word, 0.75, () => {
          setTimeout(() => {
            playAudio(current.word, 0.75, () => {
              setTimeout(() => { playAudio("your turn!", 0.85, () => { prepareForKidInput(current.word, false); }); }, 400);
            });
          }, 800);
        });
      }, 200);
    }

    function moveNext() {
      currentIndex++;
      if (currentIndex < lessonData.length) {
        renderWord(currentIndex);
      } else {
        const emojiEl = document.getElementById('vocabEmoji');
        const boxEl = document.getElementById('wordBox');
        emojiEl.innerText = "🦁🌟👑"; emojiEl.style.animation = "move-pulse 1s infinite alternate ease-in-out";
        boxEl.style.opacity = 1; boxEl.style.animation = "intro-zoom 0.8s forwards";
        const textEl = document.getElementById('vocabText');
        textEl.innerHTML = "<span style='color:#fff9c4;'>super</span> <span style='color:#ffe0b2;'>star!</span>";
        setTimeout(() => {
          textEl.innerHTML = "<span style='color:#ffdf00;'>good</span><span style='color:#fff;'>bye!</span>";
          playAudio("Wow! You are a superstar! Goodbye kids!", 0.8);
        }, 1800);
      }
    }

    function startForestLesson() {
      window.speechSynthesis.cancel();
      currentIndex = 0; wrongAttempts = 0;
      document.getElementById('wordBox').style.opacity = 0;
      document.getElementById('micButtonZone').style.display = "none";
      document.getElementById('skipBtn').style.display = "none";
      document.getElementById('vocabEmoji').innerText = "✨"; document.getElementById('vocabEmoji').style.opacity = 0;
      document.getElementById('introBox').style.display = "block";
      document.getElementById('mainTitle').style.animation = "intro-zoom 0.6s forwards";

      playAudio("Let's learn letter k", 0.8, () => {
        setTimeout(() => { startLetterKIntro(); }, 500);
      });
    }
  </script>
</body>
</html>

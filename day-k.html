<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bãi Biển Tiếng Anh - Tối Ưu Tự Co Giãn iPhone</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    /* Reset hệ thống tối ưu tràn viền cho tai thỏ/dynamic island của iPhone */
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; background: #222;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; min-height: -webkit-fill-available;
      font-family: 'Fredoka One', 'Quicksand', sans-serif; overflow: hidden;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }

    /* ---- KHUNG PHIM TỰ ĐỘNG CO GIÃN THEO MÀN HÌNH ĐIỆN THOẠI ---- */
    #videoContainer {
      position: relative;
      background: linear-gradient(to bottom, #74b9ff 0%, #ffeaa7 55%, #ffbe76 100%);
      border: 6px solid #fff; border-radius: 20px; overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      width: 92vw;
      height: calc(92vw * 16 / 9); /* Mặc định giữ tỷ lệ dọc 9:16 siêu chuẩn */
      max-height: 75vh;
      margin: auto;
    }

    /* Nếu người dùng chọn xem màn hình ngang kiểu Youtube trên điện thoại */
    #videoContainer.landscape-mode {
      width: 94vw;
      height: calc(94vw * 9 / 16);
      max-height: 75vh;
    }

    /* --- CÁC PHẦN TỬ TRONG TRƯỜNG QUAY (TỰ ĐỘNG DI CHUYỂN THEO TỶ LỆ %) --- */
    .sun {
      position: absolute; top: 4%; left: 6%; font-size: 10vw;
      filter: drop-shadow(0 0 15px #ffcb05); animation: sunGlow 2s infinite alternate ease-in-out;
    }
    #videoContainer.landscape-mode .sun { font-size: 6vw; }

    .bird1 { position: absolute; top: 8%; left: -50px; font-size: 4vw; animation: birdFly 8s infinite linear; }
    .bird2 { position: absolute; top: 14%; left: -50px; font-size: 3.5vw; animation: birdFly 11s infinite linear reverse; }

    .palm-tree {
      position: absolute; bottom: 12%; right: 4%; font-size: 20vw; z-index: 3;
      transform-origin: bottom center; animation: palmSway 3s infinite alternate ease-in-out;
    }
    #videoContainer.landscape-mode .palm-tree { font-size: 13vw; bottom: 12%; }

    /* Sóng biển dâng tràn bãi cát tự co giãn */
    .sea-wave {
      position: absolute; bottom: -10px; left: -5%; width: 110%; height: 25%;
      background: rgba(9, 132, 227, 0.75); border-radius: 45% 45% 0 0;
      animation: waveCrash 3.5s infinite alternate ease-in-out; z-index: 2;
    }
    .sea-wave-back {
      position: absolute; bottom: -5px; left: -10%; width: 120%; height: 29%;
      background: rgba(116, 185, 255, 0.45); border-radius: 40% 50% 0 0;
      animation: waveCrash 5s infinite alternate-reverse ease-in-out; z-index: 1;
    }

    /* Thầy Cú thông thái tự chỉnh kích cỡ theo bề rộng iPhone */
    .owl-teacher {
      position: absolute; bottom: 14%; left: 6%; font-size: 20vw; z-index: 10;
      filter: drop-shadow(0px 6px 10px rgba(0,0,0,0.2)); animation: owlTeach 1.4s infinite alternate ease-in-out;
    }
    #videoContainer.landscape-mode .owl-teacher { font-size: 13vw; bottom: 14%; }

    /* Khung chứa tranh ảnh Emoji và Chữ tự động thu phóng cân đối */
    .illustration-box {
      position: absolute; top: 18%; left: 10%; width: 80%; height: 35%;
      display: flex; align-items: center; justify-content: center; z-index: 5;
    }
    #videoContainer.landscape-mode .illustration-box { top: 15%; left: 35%; width: 55%; height: 45%; }

    #vocabEmoji { font-size: 32vw; opacity: 0; display: inline-block; }
    #videoContainer.landscape-mode #vocabEmoji { font-size: 18vw; }

    .word-box {
      position: absolute; bottom: 18%; left: 5%; width: 90%; text-align: center; z-index: 5; opacity: 0;
    }
    #videoContainer.landscape-mode .word-box { bottom: 18%; left: 35%; width: 55%; }

    .letter-title { font-size: 9vw; color: #fff; text-shadow: 3px 3px 0px #0984e3; margin: 0; text-transform: lowercase; }
    #videoContainer.landscape-mode .letter-title { font-size: 5vw; }

    .vocab-word { font-size: 13vw; margin: 5px 0 0 0; text-shadow: 3px 3px 0px rgba(0,0,0,0.2); }
    #videoContainer.landscape-mode .vocab-word { font-size: 8vw; }
    .vocab-word .highlight-k { color: #ff2a2a; text-shadow: 3px 3px 0px #fff; }

    /* Biểu tượng đèn báo Microphone */
    #micStatus {
      position: absolute; top: 4%; right: 6%; font-size: 8vw; z-index: 20; display: none;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
    }
    #videoContainer.landscape-mode #micStatus { font-size: 5vw; }
    .mic-listening { animation: pulseMic 0.8s infinite alternate; }

    /* Thanh menu nút bấm */
    .controls { margin-top: 15px; display: flex; gap: 8px; justify-content: center; width: 92vw; }
    button, select {
      padding: 10px 16px; font-size: 14px; font-weight: bold; border: none; border-radius: 20px;
      cursor: pointer; background: #fff; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.95); background: #ffeaa7; }

    /* ---- KEYFRAMES ANIMATIONS ---- */
    @keyframes move-float { 0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 1; } 50% { transform: translateY(-15px) rotate(3deg); opacity: 1; } }
    @keyframes move-wind { 0%, 100% { transform: rotate(-8deg); opacity: 1; } 50% { transform: rotate(10deg); opacity: 1; } }
    @keyframes move-jump { 0%, 100% { transform: translateY(0) scaleY(1); opacity: 1; } 50% { transform: translateY(-25px) scaleY(0.85); opacity: 1; } }
    @keyframes move-pulse { 0%, 100% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.1); opacity: 1; } }
    @keyframes intro-zoom { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes owlTeach { 0% { transform: translateY(0) rotate(-3deg); } 100% { transform: translateY(-6px) rotate(3deg); } }
    @keyframes birdFly { 0% { transform: translateX(-100px) translateY(0); } 100% { transform: translateX(110vw) translateY(-20px); } }
    @keyframes pulseMic { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.2); opacity: 1; } }
    @keyframes waveCrash { 0% { transform: translateY(15px) scaleY(0.95); } 100% { transform: translateY(-10px) scaleY(1.1); } }
    @keyframes palmSway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(4deg); } }
    @keyframes sunGlow { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
  </style>
</head>
<body>

  <!-- Menu chọn dáng màn hình iPhone phù hợp -->
  <div class="controls" style="margin-bottom: 5px;">
    <select id="deviceSelect" onchange="changeDeviceLayout()">
      <option value="iphone-vertical">iPhone Màn Hình Dọc (9:16)</option>
      <option value="iphone-horizontal">iPhone Màn Hình Ngang (16:9)</option>
    </select>
  </div>

  <!-- SÂN KHẤU CHÍNH TỰ ĐỘNG CO GIÃN -->
  <div id="videoContainer">
    <div class="sun">☀️</div>
    <div class="bird1">🕊️</div>
    <div class="bird2">🕊️</div>
    <div class="palm-tree">🌴</div>
    <div class="sea-wave-back"></div>
    <div class="sea-wave"></div>
    
    <div class="owl-teacher">🦉</div>
    <div id="micStatus">🎤</div>

    <div class="illustration-box">
      <div id="vocabEmoji">✨</div>
    </div>

    <div id="wordBox" class="word-box">
      <h1 id="vocabText" class="vocab-word">key</h1>
    </div>

    <div id="introBox" style="position:absolute; width:100%; text-align:center; top:35%; z-index:6;">
      <p id="mainTitle" class="letter-title">letter k</p>
    </div>
  </div>

  <div class="controls">
    <button onclick="startBeachLesson()" style="background: #2ed573; color: white; width: 100%; padding: 14px;">▶ Bắt đầu học trên iPhone</button>
  </div>
<script>
    const lessonData = [
      { word: "key", emoji: "🔑", color: "#ffffff", loopEffect: "move-float" },
      { word: "kite", emoji: "🪁", color: "#fff9c4", loopEffect: "move-wind" },
      { word: "kangaroo", emoji: "🦘", color: "#ffe0b2", loopEffect: "move-jump" },
      { word: "kitten", emoji: "🐱", color: "#e1f5fe", loopEffect: "move-float" },
      { word: "knife", emoji: "🔪", color: "#f5f5f5", loopEffect: "move-pulse" },
      { word: "kettle", emoji: "🫖", color: "#e0f2f1", loopEffect: "move-wind" },
      { word: "king", emoji: "👑", color: "#fce4ec", loopEffect: "move-float" },
      { word: "koala", emoji: "🐨", color: "#e8f5e9", loopEffect: "move-jump" }
    ];
    
    let currentIndex = 0;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    function changeDeviceLayout() {
      const container = document.getElementById('videoContainer');
      if(document.getElementById('deviceSelect').value === 'iphone-vertical') {
        container.className = '';
      } else {
        container.className = 'landscape-mode';
      }
    }

    function playAudio(text, rate = 0.75, callback) {
      window.speechSynthesis.cancel();
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = 'en-US'; speech.rate = rate;
      if (callback) speech.onend = callback;
      window.speechSynthesis.speak(speech);
    }

    function listenToKid(correctTargetWord, isIntroStage = false) {
      const micEl = document.getElementById('micStatus');
      
      if (!SpeechRecognition) {
        setTimeout(() => { isIntroStage ? enterVocabularyLoops() : moveNext(); }, 3000);
        return;
      }

      if (recognition) { try { recognition.stop(); } catch(e){} }
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      micEl.innerText = "🎤";
      micEl.className = "mic-listening";
      micEl.style.display = "block";

      try { recognition.start(); } catch (err) { console.log(err); }

      recognition.onresult = function(event) {
        const resultIndex = event.resultIndex;
        const kidSaid = event.results[resultIndex].transcript.toLowerCase().trim();

        if (kidSaid.includes(correctTargetWord) || correctTargetWord.includes(kidSaid) || kidSaid === "ok") {
          document.getElementById('vocabEmoji').innerText = "🎉✨";
          micEl.className = ""; micEl.innerText = "👍";
          
          playAudio("Excellent! Good job!", 0.85, () => {
            setTimeout(() => {
              if (isIntroStage) {
                if (correctTargetWord === "k") { startSoundIntroStage(); } else { enterVocabularyLoops(); }
              } else { moveNext(); }
            }, 1200);
          });
        } else {
          micEl.className = ""; micEl.innerText = "❌";
          playAudio("Listen and try again", 0.8, () => {
            setTimeout(() => {
              if (isIntroStage) {
                if (correctTargetWord === "k") startLetterKIntro(); else startSoundPractice();
              } else { renderWord(currentIndex); }
            }, 1200);
          });
        }
      };

      recognition.onerror = function() {
        micEl.style.display = "none"; micEl.className = "";
        setTimeout(() => {
          if (isIntroStage) {
            if (correctTargetWord === "k") startSoundIntroStage(); else enterVocabularyLoops();
          } else { moveNext(); }
        }, 1500);
      };
    }

    function startLetterKIntro() {
      const mainTitle = document.getElementById('mainTitle');
      document.getElementById('micStatus').style.display = "none";
      mainTitle.innerHTML = "letter <span style='color:#ff2a2a;'>k</span>";
      
      playAudio("letter k", 0.75, () => {
        setTimeout(() => {
          playAudio("your turn! say k!", 0.8, () => { listenToKid("k", true); });
        }, 500);
      });
    }

    function startSoundIntroStage() {
      const mainTitle = document.getElementById('mainTitle');
      mainTitle.innerHTML = "sound: <span style='color:#ff2a2a;'>/k/</span>";
      document.getElementById('vocabEmoji').innerText = "✨";
      startSoundPractice();
    }

    function startSoundPractice() {
      document.getElementById('micStatus').style.display = "none";
      // Phát âm chuẩn "kờ. kờ. kờ." kiểu Phonics gần gũi cho trẻ em Việt Nam
      playAudio("kờ. kờ. kờ.", 0.65, () => {
        setTimeout(() => {
          playAudio("your turn! say kờ.", 0.8, () => { listenToKid("k", true); });
        }, 600);
      });
    }

    function enterVocabularyLoops() {
      document.getElementById('introBox').style.display = "none";
      renderWord(currentIndex);
    }

    function renderWord(index) {
      const current = lessonData[index];
      const emojiEl = document.getElementById('vocabEmoji');
      const boxEl = document.getElementById('wordBox');
      const textEl = document.getElementById('vocabText');
      document.getElementById('micStatus').style.display = "none";

      emojiEl.style.animation = 'none'; boxEl.style.animation = 'none';
      emojiEl.style.opacity = 0; boxEl.style.opacity = 0;
      
      setTimeout(() => {
        const restOfWord = current.word.slice(1);
        textEl.innerHTML = `<span class="highlight-k">k</span>${restOfWord}`;
        textEl.style.color = current.color;
        emojiEl.innerText = current.emoji;

        emojiEl.style.animation = `${current.loopEffect} 1.6s infinite ease-in-out`;
        boxEl.style.animation = `${current.loopEffect} 1.6s infinite ease-in-out`;
        
        playAudio(current.word, 0.75, () => {
          setTimeout(() => {
            playAudio(current.word, 0.75, () => {
              setTimeout(() => {
                playAudio("your turn!", 0.85, () => { listenToKid(current.word, false); });
              }, 400);
            });
          }, 800);
        });
      }, 200);
    }

    function moveNext() {
      currentIndex++;
      if (currentIndex < lessonData.length) {
        renderWord(currentIndex);
      } else {
        const emojiEl = document.getElementById('vocabEmoji');
        const boxEl = document.getElementById('wordBox');
        document.getElementById('micStatus').style.display = "none";
        
        emojiEl.innerText = "🏄‍♂️🏖️"; 
        emojiEl.style.animation = "move-pulse 1s infinite alternate ease-in-out";
        boxEl.style.opacity = 1; boxEl.style.animation = "intro-zoom 0.8s forwards";
        
        const textEl = document.getElementById('vocabText');
        textEl.innerHTML = "<span style='color:#fff9c4;'>well</span> <span style='color:#ffe0b2;'>done!</span>";
        
        setTimeout(() => {
          textEl.innerHTML = "<span style='color:#ff2a2a;'>good</span><span style='color:#fff;'>bye!</span>";
          playAudio("Wow! Splendid! Goodbye kids! See you next time!", 0.8);
        }, 1800);
      }
    }

    function startBeachLesson() {
      window.speechSynthesis.cancel();
      currentIndex = 0;
      const introBox = document.getElementById('introBox');
      const mainTitle = document.getElementById('mainTitle');
      document.getElementById('wordBox').style.opacity = 0;
      document.getElementById('vocabEmoji').innerText = "✨";

      introBox.style.display = "block";
      mainTitle.style.animation = "intro-zoom 0.6s forwards";

      playAudio("Let's learn letter k", 0.8, () => {
        setTimeout(() => { startLetterKIntro(); }, 500);
      });
    }
  </script>
</body>
</html>

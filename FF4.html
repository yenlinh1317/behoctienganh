sk:{rd:{t:"A fable: The Ant and the Grasshopper",tx:"In the summer, the ant worked hard every day to gather food for the winter. The grasshopper sang and played all day. When winter came, the grasshopper was cold and hungry. 'I worked hard in summer,' said the ant, 'and now I have food for winter.' Moral: Work hard and be prepared."},

function addStars(n){ST.ts+=n;document.getElementById('ts').textContent=ST.ts;save();if(n>0)confetti(n);}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// ============================================================
// NAVIGATION
// ============================================================
function S(sec){
  ST.sec=sec;ST.uv=null;ST.gid=null;
  if(ST.gcTmrId){clearInterval(ST.gcTmrId);ST.gcTmrId=null;}
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const m={units:'u',grammar:'gr',phonics:'ph',speaking:'sp',games:'g',progress:'pr'};
  const el=document.querySelector('.nb.'+m[sec]);if(el)el.classList.add('active');
  render();
}

function render(){
  const ca=document.getElementById('ca');
  if(ST.gid){ca.innerHTML=rGame();aGame();return;}
  if(ST.uv){ca.innerHTML=rLesson();return;}
  switch(ST.sec){
    case'units':ca.innerHTML=rUnits();break;
    case'grammar':ca.innerHTML=rGramHub();break;
    case'phonics':ca.innerHTML=rPhonHub();break;
    case'speaking':ca.innerHTML=rSpeakHub();break;
    case'games':ca.innerHTML=rGamesHub();break;
    case'progress':ca.innerHTML=rProgress();break;
  }
}

// ============================================================
// UNITS LIST
// ============================================================
function rUnits(){
  let h='<div class="pt">📚 All Units &amp; Content</div><div class="ug">';
  U.forEach(u=>{
    const pg=ST.prog['u'+u.id]||0;
    h+=`<div class="uc" style="--c1:${u.c1};--c2:${u.c2}" onclick="openU(${u.id})">
      <div class="un">${u.id===0?'S':u.id}</div>
      <h3>${u.ti}</h3><p>${u.to}</p>
      <div class="pb"><div class="pf" style="width:${pg}%"></div></div>
    </div>`;
  });
  FT.forEach(ft=>h+=`<div class="uc" style="--c1:#FF6B35;--c2:#FF8E53" onclick="openFT('${ft.id}')">
    <div class="un">💬</div><h3>${ft.ti}</h3><p>${ft.to}</p></div>`);
  ER.forEach(er=>h+=`<div class="uc" style="--c1:#2C3E50;--c2:#4CA1AF" onclick="openER('${er.id}')">
    <div class="un">📖</div><h3>${er.ti}</h3><p>Extensive Reading</p></div>`);
  CU.forEach(c=>h+=`<div class="uc" style="--c1:#27ae60;--c2:#2ecc71" onclick="openCU('${c.id}')">
    <div class="un">🌍</div><h3>${c.ti}</h3><p>Culture</p></div>`);
  h+='</div>';return h;
}

function openU(id){ST.uv={t:'unit',id};ST.tab='w';render();}
function openFT(id){ST.uv={t:'ft',id};render();}
function openER(id){ST.uv={t:'er',id};render();}
function openCU(id){ST.uv={t:'cu',id};render();}
function back(){ST.uv=null;render();}
function setTab(t){ST.tab=t;render();}

// ============================================================
// LESSON VIEW
// ============================================================
function rLesson(){
  if(ST.uv.t==='ft')return rFT();
  if(ST.uv.t==='er')return rER();
  if(ST.uv.t==='cu')return rCU();
  const u=U.find(x=>x.id===ST.uv.id);
  let h=`<div class="lh"><button class="bb" onclick="back()">← Back</button>
    <div><strong>${u.su}: ${u.ti}</strong><br><small>📄 p.${u.pg} · ${u.to}</small></div></div>
  <div class="lt">
    <button class="tb w ${ST.tab==='w'?'active':''}" onclick="setTab('w')">📝 Words</button>
    <button class="tb g2 ${ST.tab==='g'?'active':''}" onclick="setTab('g')">📐 Grammar</button>
    ${u.ph?`<button class="tb ph2 ${ST.tab==='p'?'active':''}" onclick="setTab('p')">🔤 Phonics</button>`:''}
    <button class="tb sk ${ST.tab==='s'?'active':''}" onclick="setTab('s')">🎯 Skills</button>
    <button class="tb dl ${ST.tab==='d'?'active':''}" onclick="setTab('d')">💬 Story</button>
  </div>`;
  if(ST.tab==='w')h+=rWords(u);
  else if(ST.tab==='g')h+=rGram(u);
  else if(ST.tab==='p'&&u.ph)h+=rPhon(u);
  else if(ST.tab==='s')h+=rSkills(u);
  else if(ST.tab==='d')h+=rDialog(u);
  return h;
}

function rWords(u){
  const cls=['linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#ffecd2,#fcb69f)','linear-gradient(135deg,#a1c4fd,#c2e9fb)','linear-gradient(135deg,#d4fc79,#96e6a1)','linear-gradient(135deg,#e0c3fc,#8ec5fc)','linear-gradient(135deg,#f9d423,#ff4e50)'];
  let h=`<div class="pt">📝 Vocabulary – ${u.ti}</div><div class="wg">`;
  u.w.forEach((w,i)=>{

function say(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=0.82;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

async function readDl(uid){
  const u=U.find(x=>x.id===uid);
  for(const d of u.dl){
    await new Promise(r=>{const ut=new SpeechSynthesisUtterance(d[0]+' says: '+d[1]);ut.lang='en-US';ut.rate=0.8;ut.onend=r;speechSynthesis.cancel();speechSynthesis.speak(ut);});
    await new Promise(r=>setTimeout(r,300));
  }
}
async function readFT(id){
  const ft=FT.find(x=>x.id===id);
  for(const d of ft.dl){
    await new Promise(r=>{const ut=new SpeechSynthesisUtterance(d[0]+' says: '+d[1]);ut.lang='en-US';ut.rate=0.8;ut.onend=r;speechSynthesis.cancel();speechSynthesis.speak(ut);});
    await new Promise(r=>setTimeout(r,300));
  }
}

function rec(phrase,idx){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){
    alert('Speech recognition needs Chrome browser!');return;
  }
  const btn=document.getElementById('rb'+idx);
  const sc=document.getElementById('rs'+idx);
  if(!btn||!sc)return;
  btn.textContent='🔴 Recording...';btn.style.background='var(--r)';
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();r.lang='en-US';r.interimResults=false;r.maxAlternatives=1;
  r.start();
  r.onresult=e=>{
    const said=e.results[0][0].transcript.toLowerCase().trim();
    const target=phrase.toLowerCase().trim();
    const score=calcScore(said,target);
    sc.textContent=score+'/100 ⭐';
    if(score>=70){addStars(2);sc.style.color='var(--g)';}
    else if(score>=40){addStars(1);sc.style.color='orange';}
    else sc.style.color='var(--r)';
    btn.textContent='🎤 Speak';btn.style.background='var(--v)';
  };
  r.onerror=()=>{btn.textContent='🎤 Speak';btn.style.background='var(--v)';sc.textContent='Try again';};
}
function recSp(phrase){S('speaking');setTimeout(()=>say(phrase),600);}
function calcScore(said,target){
  const sw=said.split(' ').filter(w=>w);
  const tw=target.replace(/[?.!,]/g,'').split(' ').filter(w=>w);
  if(!tw.length)return 0;
  let m=0;
  tw.forEach(t=>{if(sw.some(s=>s.includes(t)||t.includes(s)))m++;});
  return Math.round(m/tw.length*100);
}

function allWords(){let w=[];U.forEach(u=>u.w.forEach((wd,i)=>w.push({word:wd,emoji:u.e[i]||'📌',unit:u.su})));return w;}
function allGramQs(){let q=[];U.forEach(u=>u.gr.forEach(g=>g.qs.forEach(qu=>q.push({...qu,topic:g.n}))));return q;}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

function startG(id){
  if(ST.gcTmrId){clearInterval(ST.gcTmrId);ST.gcTmrId=null;}
  ST.gid=id;ST.gs=0;ST.gl=3;ST.gqi=0;
  if(id==='quiz'){
    const ws=shuffle(allWords()).slice(0,15);
    ST.gqs=ws.map(w=>{
      const wrong=shuffle(allWords().filter(x=>x.word!==w.word)).slice(0,3).map(x=>x.word);
      return{q:'What is this? '+w.emoji,o:shuffle([w.word,...wrong]),a:w.word};
    });
  }else if(id==='grammar'){
    ST.gqs=shuffle(allGramQs()).slice(0,15);ST.gtm=20;
  }else if(id==='fillblank'){
    ST.gqs=shuffle(allGramQs().filter(q=>q.q.includes('___'))).slice(0,10);
  }else if(id==='listening'){
    const ws=shuffle(allWords()).slice(0,12);
    ST.gqs=ws.map(w=>{
      const wrong=shuffle(allWords().filter(x=>x.word!==w.word)).slice(0,3).map(x=>x.word);
      return{q:w.word,o:shuffle([w.word,...wrong]),a:w.word};
    });
  }else if(id==='hangman')initHangman();
  else if(id==='scramble')initScramble();
  else if(id==='memory')initMemory();
  else if(id==='match')initMatch();
  else if(id==='sentence')initSentence();
  else if(id==='clues')initClues();
  render();
  if(id==='grammar')setTimeout(startGTmr,120);
  if(id==='listening')setTimeout(()=>say(ST.gqs[0].q),700);
}

  const inp=document.getElementById('fli');if(!inp)return;
  const q=ST.gqs[ST.gqi];const cor=q.o[q.a].toLowerCase();
  if(inp.value.toLowerCase().trim()===cor){inp.style.border='2px solid var(--g)';ST.gs+=10;addStars(1);}
  else{inp.style.border='2px solid var(--r)';inp.value=q.o[q.a];}
  inp.disabled=true;
  setTimeout(()=>{ST.gqi++;if(ST.gqi>=ST.gqs.length)gameOver();else render();},1000);
}

// --- HANGMAN ---
function initHangman(){
  const ws=shuffle(allWords());ST.hword=ws[0].word.toLowerCase();ST.hguess=[];
}
function rHangman(){
  const area=document.getElementById('hma');if(!area)return;
  const wd=ST.hword,gs=ST.hguess;
  const wrong=gs.filter(g=>!wd.includes(g));
  const lives=6-wrong.length;
  const disp=wd.split('').map(c=>gs.includes(c)?c:'_');
  const won=disp.join('')===wd,lost=lives<=0;
  const parts=['','<line x1="40" y1="12" x2="40" y2="50" stroke="#333" stroke-width="3"/>','<circle cx="40" cy="60" r="10" fill="none" stroke="#333" stroke-width="3"/>','<line x1="40" y1="70" x2="40" y2="100" stroke="#333" stroke-width="3"/>','<line x1="40" y1="80" x2="22" y2="95" stroke="#333" stroke-width="3"/>','<line x1="40" y1="80" x2="58" y2="95" stroke="#333" stroke-width="3"/>','<line x1="40" y1="100" x2="22" y2="115" stroke="#333" stroke-width="3"/>'];
  let h=`<div style="text-align:center"><svg viewBox="0 0 100 130" width="110" height="130" style="display:block;margin:0 auto">
    <line x1="10" y1="125" x2="90" y2="125" stroke="#333" stroke-width="3"/>
    <line x1="30" y1="10" x2="30" y2="125" stroke="#333" stroke-width="3"/>
    <line x1="30" y1="10" x2="60" y2="10" stroke="#333" stroke-width="3"/>
    <line x1="60" y1="10" x2="60" y2="40" stroke="#333" stroke-width="3"/>
    ${parts.slice(0,6-lives+1).join('')}
  </svg></div>
  <div class="hl">${disp.map(c=>c==='_'?'<div class="hl2">_</div>':`<div class="hl2">${c}</div>`).join('')}</div>
  <div style="text-align:center;font-size:.82rem;color:#666;margin-bottom:5px">Wrong guesses: ${wrong.join(', ')||'none'} · Lives: ${lives}</div>`;
  if(won){
    h+=`<div style="text-align:center;color:var(--g);font-size:1.3rem;font-weight:700;margin:8px 0">🎉 "${wd}"! Well done!</div>`;
    addStars(3);
    h+=`<div style="text-align:center"><button onclick="initHangman();rHangman()" class="tb2">Play Again ▶</button></div>`;
  }else if(lost){
    h+=`<div style="text-align:center;color:var(--r);font-size:1.1rem;font-weight:700;margin:8px 0">😢 The word was: "<strong>${wd}</strong>"</div>`;
    h+=`<div style="text-align:center"><button onclick="initHangman();rHangman()" class="tb2">Try Again ▶</button></div>`;
  }else{
    h+=`<div class="kg">`+'abcdefghijklmnopqrstuvwxyz'.split('').map(l=>`<button class="kb" ${gs.includes(l)?'disabled':''} onclick="guessL('${l}')">${l}</button>`).join('')+'</div>';
  }
  area.innerHTML=h;
}
function guessL(l){ST.hguess.push(l);rHangman();}

// --- SCRAMBLE ---
function initScramble(){ST.scrWords=shuffle(allWords()).slice(0,10);ST.scrIdx=0;ST.gs=0;}
function rScramble(){
  const area=document.getElementById('sca');if(!area)return;
  if(ST.scrIdx>=ST.scrWords.length){
    area.innerHTML=`<div style="text-align:center"><div style="font-size:2.5rem">🎉</div><h2 style="margin:8px 0">Done! ${ST.gs}/${ST.scrWords.length} correct</h2><button onclick="initScramble();rScramble()" class="tb2">Play Again</button></div>`;
    return;
  }
  const w=ST.scrWords[ST.scrIdx];
  const sc=shuffle(w.word.split('')).join('');
  area.innerHTML=`<div style="text-align:center">
    <div style="font-size:.82rem;color:#666">Word ${ST.scrIdx+1}/${ST.scrWords.length} · Score: ${ST.gs}</div>
    <div style="font-size:2.8rem;margin:12px 0">${w.emoji}</div>
    <div class="sw">${sc.toUpperCase()}</div>
    <input type="text" class="si" id="sci" placeholder="Unscramble the letters..." onkeypress="if(event.key==='Enter')chkScr('${esc(w.word)}')">
    <div style="margin-top:10px">
      <button onclick="chkScr('${esc(w.word)}')" class="tb2">✓ Check</button>
      <button onclick="say('${esc(w.word)}')" class="tb2" style="background:var(--b)">🔊 Hint</button>
    </div>
  </div>`;
}
function chkScr(word){
  const inp=document.getElementById('sci');if(!inp)return;
  if(inp.value.toLowerCase().trim()===word){ST.gs++;addStars(1);inp.style.border='3px solid var(--g)';}
  else{inp.style.border='3px solid var(--r)';setTimeout(()=>{inp.value=word;},500);}
  setTimeout(()=>{ST.scrIdx++;rScramble();},900);
}

// --- MEMORY ---
function initMemory(){
  const ws=shuffle(allWords()).slice(0,8);
  const pairs=ws.map(w=>({id:w.word,emoji:w.emoji,word:w.word}));
  const cards=shuffle([...pairs.map(p=>({...p,face:p.emoji,type:'e'})),...pairs.map(p=>({...p,face:p.word,type:'w'}))]);
  ST.memCards=cards.map((c,i)=>({...c,idx:i,fl:false,ma:false}));
  ST.memFlip=[];ST.memMatch=[];
}
function rMemory(){
  const area=document.getElementById('mma');if(!area)return;
  const cols=window.innerWidth<400?3:4;
  area.innerHTML=`<div class="mg" style="grid-template-columns:repeat(${cols},1fr);max-width:340px;margin:0 auto">
    ${ST.memCards.map((c,i)=>{
      const show=c.fl||c.ma;
      return`<div class="mc ${c.fl?'fl':''} ${c.ma?'ma':''}" onclick="flipM(${i})">${show?c.face:'?'}</div>`;
    }).join('')}
  </div>
  <div style="text-align:center;margin-top:10px;font-size:.85rem">Matched: ${ST.memMatch.length}/8 pairs · ⭐${ST.gs}</div>`;
}
function flipM(idx){
  const c=ST.memCards[idx];
  if(c.ma||c.fl||ST.memFlip.length>=2)return;
  c.fl=true;ST.memFlip.push(idx);rMemory();
  if(ST.memFlip.length===2){
    const[a,b]=ST.memFlip.map(i=>ST.memCards[i]);
    if(a.id===b.id&&a.type!==b.type){
      setTimeout(()=>{
        ST.memCards[ST.memFlip[0]].ma=ST.memCards[ST.memFlip[1]].ma=true;
        ST.memMatch.push(a.id);ST.memFlip=[];ST.gs+=10;addStars(1);
        if(ST.memMatch.length===8){addStars(5);say('Congratulations! You matched them all!');}
        rMemory();
      },600);
    }else{
      setTimeout(()=>{ST.memCards[ST.memFlip[0]].fl=ST.memCards[ST.memFlip[1]].fl=false;ST.memFlip=[];rMemory();},900);
    }
  }
}

// --- MATCHING ---
function initMatch(){ST.mxPairs=shuffle(allWords()).slice(0,6);ST.mxSel={};ST.mxDone=[];}
function rMatch(){
  const area=document.getElementById('mxa');if(!area)return;
  const right=shuffle(ST.mxPairs.map(p=>p.word));
  area.innerHTML=`<div class="mxg">
    <div class="mc2">${ST.mxPairs.map((p,i)=>`<div class="mi ${ST.mxDone.includes(p.word)?'ma2':''} ${ST.mxSel.left===p.emoji?'sel':''}" onclick="selMx('L','${esc(p.emoji)}','${esc(p.word)}')">${p.emoji}</div>`).join('')}</div>
    <div class="mc2">${right.map(w=>`<div class="mi ${ST.mxDone.includes(w)?'ma2':''} ${ST.mxSel.right===w?'sel':''}" onclick="selMx('R','${esc(w)}',null)">${w}</div>`).join('')}</div>
  </div>
  <div style="text-align:center;margin-top:10px;font-size:.82rem">Matched: ${ST.mxDone.length}/6 · ⭐${ST.gs}
  ${ST.mxDone.length===6?'<br><button onclick="initMatch();rMatch()" class="tb2" style="margin-top:8px">Play Again ▶</button>':''}</div>`;
}
function selMx(side,val,pair){
  if(side==='L'){ST.mxSel.left=val;ST.mxSel.lp=pair;}else ST.mxSel.right=val;
  rMatch();
  if(ST.mxSel.left&&ST.mxSel.right){
    if(ST.mxSel.lp===ST.mxSel.right){ST.mxDone.push(ST.mxSel.right);ST.gs+=10;addStars(1);if(ST.mxDone.length===6)addStars(3);}
    else say('Try again!');
    ST.mxSel={};setTimeout(rMatch,400);
  }
}

// --- SENTENCE BUILDER ---
const SB=[
  {w:['They','usually','wear','blue','uniforms'],c:'They usually wear blue uniforms'},
  {w:['She','is','eating','pizza','now'],c:'She is eating pizza now'},
  {w:['Did','they','go','to','the','museum'],c:'Did they go to the museum'},
  {w:['Have','you','ever','been','to','France'],c:'Have you ever been to France'},
  {w:['You','should','drink','some','water'],c:'You should drink some water'},
  {w:['The','audience','clapped','and','cheered'],c:'The audience clapped and cheered'},
  {w:['I','was','looking','at','photos'],c:'I was looking at photos'},
  {w:['Will','they','go','back','to','Australia'],c:'Will they go back to Australia'},
  {w:['She','turned','on','the','TV','to','watch','sports'],c:'She turned on the TV to watch sports'},
  {w:['When','I','was','working','the','phone','rang'],c:'When I was working the phone rang'},
  {w:['This','is','the','boy','who','helped','me'],c:'This is the boy who helped me'},
  {w:['People','will','travel','in','super-fast','planes'],c:'People will travel in super-fast planes'},
  {w:['Max','couldn\'t','eat','his','dinner'],c:"Max couldn't eat his dinner"},
  {w:['How','much','money','have','you','got'],c:'How much money have you got'},
  {w:['The','grasshopper','was','lazier','than','the','ant'],c:'The grasshopper was lazier than the ant'}
];
function initSentence(){
  const s=shuffle(SB)[0];
  ST.sbWords=shuffle(s.w);ST.sbCorrect=s.c;ST.sbBuilt=[];
}
function rSentence(){
  const area=document.getElementById('sba');if(!area)return;
  const built=ST.sbBuilt.join(' ');
  const ok=built.toLowerCase().replace(/[?.!,]/g,'')===ST.sbCorrect.toLowerCase().replace(/[?.!,]/g,'');
  area.innerHTML=`<div style="font-size:.82rem;color:#666;margin-bottom:10px;text-align:center">Put the words in the correct order:</div>
  <div style="min-height:44px;background:var(--l);border-radius:9px;padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center">
    ${ST.sbBuilt.map((w,i)=>`<div class="wt" onclick="rmW(${i})">${w} ✕</div>`).join('')}
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
    ${ST.sbWords.map(w=>`<div class="bw ${ST.sbBuilt.includes(w)?'ud':''}" onclick="addW('${esc(w)}')">${w}</div>`).join('')}
  </div>
  <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
    <button onclick="chkSB()" class="tb2">✓ Check</button>
    <button onclick="ST.sbBuilt=[];rSentence()" class="tb2" style="background:#999">↺ Reset</button>
    <button onclick="initSentence();rSentence()" class="tb2" style="background:var(--s);color:var(--d)">Next ▶</button>
  </div>
  ${ok&&ST.sbBuilt.length>0?'<div style="text-align:center;color:var(--g);font-size:1.2rem;font-weight:700;margin-top:8px">✅ Correct! Well done!</div>':''}`;
}
function addW(w){if(!ST.sbBuilt.includes(w)){ST.sbBuilt.push(w);rSentence();}}
function rmW(i){ST.sbBuilt.splice(i,1);rSentence();}
function chkSB(){
  const built=ST.sbBuilt.join(' ');
  if(built.toLowerCase().replace(/[?.!,]/g,'')===ST.sbCorrect.toLowerCase().replace(/[?.!,]/g,'')){addStars(2);say('Correct! Well done!');}
  else say('Try again!');
  rSentence();
}

// --- WORD CLUES ---
function initClues(){ST.clueWords=shuffle(allWords()).slice(0,10);ST.clueIdx=0;}
function rClues(){
  const area=document.getElementById('cla');if(!area)return;
  if(ST.clueIdx>=ST.clueWords.length){
    area.innerHTML=`<div style="text-align:center"><div style="font-size:2.5rem">🏆</div><h2 style="margin:8px 0">All done! Score: ${ST.gs}</h2><button onclick="initClues();rClues()" class="tb2">Play Again</button></div>`;
    return;
  }
  const w=ST.clueWords[ST.clueIdx];
  area.innerHTML=`<div style="text-align:center">
    <div style="font-size:.82rem;color:#666">Word ${ST.clueIdx+1}/${ST.clueWords.length} · Score: ${ST.gs}</div>
    <div style="font-size:2.8rem;margin:12px 0">${w.emoji}</div>
    <div class="gr2" style="margin:8px auto;max-width:280px">This word has <strong>${w.word.length} letters</strong> · Unit: ${w.unit}</div>
    <div style="font-size:1.2rem;font-weight:700;letter-spacing:8px;color:var(--v);margin:10px 0">${'_ '.repeat(w.word.length).trim()}</div>
    <input type="text" class="si" id="cli" placeholder="Type the word..." maxlength="${w.word.length+5}" onkeypress="if(event.key==='Enter')chkClue('${esc(w.word)}')">
    <div style="margin-top:10px">
      <button onclick="chkClue('${esc(w.word)}')" class="tb2">✓ Check</button>
      <button onclick="say('${esc(w.word)}')" class="tb2" style="background:var(--b)">🔊 Hear</button>
    </div>
  </div>`;
}
function chkClue(word){
  const inp=document.getElementById('cli');if(!inp)return;
  if(inp.value.toLowerCase().trim()===word){ST.gs+=10;addStars(1);inp.style.border='3px solid var(--g)';}
  else{inp.style.border='3px solid var(--r)';setTimeout(()=>{inp.value=word;},400);}
  setTimeout(()=>{ST.clueIdx++;rClues();},900);
}

// --- GAME OVER ---
function rGameOver(){
  const total=ST.gqs.length||10;
  const pct=Math.round(ST.gs/(total*10)*100);
  return`<div style="text-align:center;padding:26px">
    <div style="font-size:3.5rem">${pct>=80?'🏆':pct>=50?'⭐':'💪'}</div>
    <h2 style="margin:8px 0">Game Over!</h2>
    <div style="font-size:2.2rem;font-weight:900;color:var(--g);margin:8px 0">${ST.gs} pts</div>
    <div style="margin-bottom:14px">${pct}% correct</div>
    <div style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap">
      <button onclick="startG(ST.gid)" class="tb2">Play Again</button>
      <button onclick="if(ST.gcTmrId){clearInterval(ST.gcTmrId);ST.gcTmrId=null;}ST.gid=null;render()" class="tb2" style="background:var(--d)">Other Games</button>
    </div>
  </div>`;
}
function gameOver(){
  if(ST.gcTmrId){clearInterval(ST.gcTmrId);ST.gcTmrId=null;}
  const ca=document.getElementById('ca');
  ca.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button class="bb" onclick="ST.gid=null;render()">← Back</button><strong>Game Over</strong></div>`+rGameOver();
}

function startWQ(uid){
  const u=U.find(x=>x.id===uid);
  ST.gid='quiz';ST.gs=0;ST.gl=3;ST.gqi=0;
  const allW=allWords();
  ST.gqs=u.w.map((wd,i)=>{
    const wrong=shuffle(allW.filter(x=>x.word!==wd)).slice(0,3).map(x=>x.word);
    return{q:'What is this? '+(u.e[i]||'📌'),o:shuffle([wd,...wrong]),a:wd};
  });
  S('games');
}

// ============================================================
// PROGRESS
// ============================================================
function rProgress(){
  const levels=[{s:0,e:15,l:'Beginner 🌱'},{s:15,e:40,l:'Learner 📚'},{s:40,e:80,l:'Explorer 🔍'},{s:80,e:150,l:'Achiever ⭐'},{s:150,e:300,l:'Champion 🏆'},{s:300,e:9999,l:'Master 🎓'}];
  const lv=levels.find(x=>ST.ts>=x.s&&ST.ts<x.e)||levels[levels.length-1];
  let h=`<div class="pt">📊 My Progress</div>
  <div style="text-align:center;margin-bottom:14px;padding:14px;background:linear-gradient(135deg,var(--p),#FF8E53);border-radius:12px;color:#fff">
    <div style="font-size:2.2rem;font-weight:900">⭐ ${ST.ts}</div>
    <div>Total Stars · Level: <strong>${lv.l}</strong></div>
  </div><div class="po">`;
  U.forEach(u=>{
    const pg=ST.prog['u'+u.id]||0;
    const r=18,circ=(2*Math.PI*r).toFixed(1),off=((2*Math.PI*r)*(1-pg/100)).toFixed(1);
    h+=`<div class="pi">
      <div class="pci"><svg viewBox="0 0 44 44" width="44" height="44">
        <circle class="bg2" cx="22" cy="22" r="${r}"/>
        <circle class="fi" cx="22" cy="22" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 22 22)"/>
      </svg><div class="pn">${pg}%</div></div>
      <p>${u.id===0?'St':('U'+u.id)}: ${u.ti.substring(0,12)}</p>
    </div>`;
  });
  h+=`</div>
  <div style="margin-top:14px;text-align:center">
    <button onclick="if(confirm('Reset all progress?')){ST.ts=0;ST.prog={};save();document.getElementById('ts').textContent=0;render()}" style="background:var(--r);color:#fff;border:none;border-radius:9px;padding:9px 18px;cursor:pointer;font-size:.82rem">🔄 Reset Progress</button>
  </div>`;
  return h;
}

// ============================================================
// CONFETTI
// ============================================================
function confetti(n){
  let c=document.querySelector('.cf');
  if(!c){c=document.createElement('div');c.className='cf';document.body.appendChild(c);}
  const cols=['#f7971e','#ffd200','#4ECDC4','#FF6B35','#9B59B6','#2ECC71','#E74C3C','#3498DB'];
  for(let i=0;i<Math.min(n*4,40);i++){
    const el=document.createElement('div');el.className='cn';
    el.style.cssText=`left:${Math.random()*100}vw;top:${-Math.random()*10}vh;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.4}s;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;`;
    c.appendChild(el);setTimeout(()=>el.remove(),4500);
  }
}

// ============================================================
// INIT
// ============================================================
document.getElementById('ts').textContent=ST.ts;
render();
</script>

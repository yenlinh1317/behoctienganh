<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Family & Friends 3 – English Learning Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--pr:#FF6B35;--sc:#4ECDC4;--ac:#FFE66D;--pu:#A855F7;--pk:#EC4899;--gn:#10B981;--bl:#3B82F6;--dk:#1E1B4B;--bg:#F0F4FF;--tx:#1E1B4B;--rd:20px;--sh:0 8px 32px rgba(30,27,75,.15)}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash h1{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,8vw,5rem);color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.3);text-align:center;line-height:1.1}
#splash p{color:rgba(255,255,255,.9);font-size:1.2rem;margin-top:.5rem;font-weight:600}
.slogo{font-size:clamp(4rem,15vw,10rem);margin-bottom:1rem;animation:bounceIn .8s ease}
.sbtn{margin-top:2rem;padding:1rem 3rem;background:var(--ac);border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--dk);cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.2);transition:transform .2s}
.sbtn:hover{transform:scale(1.05)}

/* HEADER */
#hdr{position:sticky;top:0;z-index:100;background:linear-gradient(90deg,#667eea,#764ba2);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.htitle{font-family:'Fredoka One',cursive;color:#fff;font-size:clamp(1rem,4vw,1.6rem)}
.hstats{display:flex;gap:.6rem;align-items:center}
.sbadge{background:rgba(255,255,255,.2);border-radius:20px;padding:.25rem .7rem;color:#fff;font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:.25rem}
.hamburger{display:none;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:.25rem}

/* NAV */
#nav{background:#fff;border-bottom:3px solid var(--bg);overflow-x:auto;white-space:nowrap;padding:.4rem;scrollbar-width:none;display:flex;gap:.4rem}
#nav::-webkit-scrollbar{display:none}
.nbtn{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.nbtn.active{color:#fff;transform:scale(1.04);box-shadow:0 3px 10px rgba(0,0,0,.2)}
.nbtn:not(.active){background:#F3F4F6;color:var(--dk)}

/* MAIN */
#main{padding:1rem;max-width:1100px;margin:0 auto}

/* HOME */
.hhero{background:linear-gradient(135deg,#667eea,#764ba2 50%,#EC4899);border-radius:var(--rd);padding:1.5rem;text-align:center;color:#fff;margin-bottom:1.5rem;position:relative;overflow:hidden}
.hhero h2{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2.2rem);position:relative}
.hhero p{font-size:.95rem;opacity:.9;margin-top:.4rem;position:relative}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem}
.ucard{background:#fff;border-radius:var(--rd);padding:1.1rem;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(0,0,0,.08);border:3px solid transparent;text-align:center;position:relative;overflow:hidden}
.ucard:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.uicon{font-size:2.2rem;margin-bottom:.4rem}
.uname{font-weight:800;font-size:.82rem;color:var(--dk);line-height:1.3}
.upg{margin-top:.4rem;background:#F3F4F6;border-radius:10px;height:5px;overflow:hidden}
.upgbar{height:100%;border-radius:10px;transition:width .5s}
.ubadge{position:absolute;top:.4rem;right:.4rem;font-size:.7rem;padding:.15rem .45rem;border-radius:8px;font-weight:700}

/* UNIT PAGE */
.lhdr{background:#fff;border-radius:var(--rd);padding:1.2rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.9rem;box-shadow:0 4px 15px rgba(0,0,0,.06)}
.lhdr-icon{font-size:2.5rem}
.lhdr h2{font-family:'Fredoka One',cursive;font-size:1.4rem}
.stabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem}
.stab{padding:.45rem 1rem;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s}
.stab.active{color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.stab:not(.active){background:#E5E7EB;color:#6B7280}

/* VOCAB */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.7rem}
.vcard{background:#fff;border-radius:14px;padding:.9rem;text-align:center;cursor:pointer;transition:all .3s;box-shadow:0 3px 10px rgba(0,0,0,.06);border:3px solid transparent;user-select:none}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.vcard.learned{border-color:var(--gn)}
.vemoji{font-size:2rem;margin-bottom:.35rem}
.vword{font-weight:800;font-size:.85rem;color:var(--dk)}
.vspeakbtn{margin-top:.35rem;background:var(--pr);color:#fff;border:none;border-radius:7px;padding:.2rem .45rem;font-size:.72rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700}

/* QUIZ SHARED */
.qcard{background:#fff;border-radius:var(--rd);padding:1.3rem;margin-bottom:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.qqtext{font-size:1rem;font-weight:700;margin-bottom:.9rem}
.qemoji{font-size:3.5rem;text-align:center;margin-bottom:.9rem}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.qopt{padding:.65rem;border:2px solid #E5E7EB;border-radius:11px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s;text-align:center}
.qopt:hover{border-color:var(--pr)}
.qopt.correct{background:#D1FAE5;border-color:var(--gn)}
.qopt.wrong{background:#FEE2E2;border-color:#EF4444}

/* GRAMMAR */
.gcard{background:#fff;border-radius:var(--rd);padding:1.3rem;margin-bottom:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.gpatt{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:11px;padding:.9rem;color:#fff;font-size:1rem;font-weight:800;margin-bottom:.65rem}
.gex{background:#F0FDF4;border-left:4px solid var(--gn);padding:.65rem 1rem;border-radius:0 11px 11px 0;font-weight:600;margin-bottom:.45rem}
.gkey{display:inline-block;background:var(--ac);color:var(--dk);padding:.15rem .65rem;border-radius:20px;font-size:.78rem;font-weight:700}
.gprac{background:#EFF6FF;border-radius:11px;padding:.9rem;margin-top:.9rem}
.gprac h4{font-weight:700;margin-bottom:.65rem;color:var(--bl)}
.fblank{display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;font-size:.95rem;font-weight:600;margin-bottom:.65rem}
.binput{border:2px solid var(--bl);border-radius:8px;padding:.2rem .45rem;font-family:'Nunito',sans-serif;font-size:.88rem;width:110px;text-align:center;outline:none}
.binput:focus{border-color:var(--pu)}
.binput.correct{border-color:var(--gn);background:#D1FAE5}
.binput.wrong{border-color:#EF4444;background:#FEE2E2}
.ckbtn{padding:.55rem 1.3rem;background:var(--bl);color:#fff;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-top:.4rem}

/* PHONICS */
.phcard{background:#fff;border-radius:var(--rd);padding:1.3rem;margin-bottom:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.snddisp{font-family:'Fredoka One',cursive;font-size:3.5rem;color:var(--pr);text-align:center;padding:.9rem;background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border-radius:14px;margin-bottom:.9rem}
.phwords{display:flex;flex-wrap:wrap;gap:.65rem;justify-content:center;margin-bottom:.9rem}
.phword{background:var(--bg);padding:.55rem 1.1rem;border-radius:11px;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.35rem}
.phword:hover{background:var(--pr);color:#fff;transform:scale(1.05)}
.sndpart{color:var(--pr)}
.phword:hover .sndpart{color:var(--ac)}
.chantbox{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;padding:1.1rem;color:#fff;font-size:.95rem;line-height:1.9;font-weight:600;white-space:pre-line}
.chantspeakbtn{margin-top:.65rem;padding:.55rem 1.3rem;background:rgba(255,255,255,.2);border:2px solid #fff;border-radius:11px;color:#fff;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;margin-right:.4rem}
.chantspeakbtn:hover{background:rgba(255,255,255,.35)}

/* READING */
.rdcard{background:#fff;border-radius:var(--rd);padding:1.3rem;margin-bottom:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.rdtitle{font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:.9rem;color:var(--pr)}
.rdtext{font-size:.95rem;line-height:2;color:#374151;margin-bottom:.9rem;border-left:4px solid var(--sc);padding-left:.9rem}
.rdspeakbtn{padding:.55rem 1.3rem;background:var(--sc);color:#fff;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-bottom:.9rem}
.rqopt{padding:.55rem .7rem;border:2px solid #E5E7EB;border-radius:9px;cursor:pointer;font-weight:600;font-size:.88rem;transition:all .2s;background:#fff}
.rqopt:hover{border-color:var(--pr)}
.rqopt.correct{background:#D1FAE5;border-color:var(--gn)}
.rqopt.wrong{background:#FEE2E2;border-color:#EF4444}

/* SPEAKING */
.spkcard{background:#fff;border-radius:var(--rd);padding:1.3rem;margin-bottom:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.spkprompt{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;padding:1.1rem;color:#fff;font-size:1.05rem;font-weight:700;margin-bottom:.9rem;position:relative}
.spkprompt::after{content:'🎙️';position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:1.4rem}
.spkbtn{padding:.8rem 1.7rem;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;font-size:.95rem;transition:all .2s;display:flex;align-items:center;gap:.45rem}
.spkbtn.listen{background:var(--bl);color:#fff}
.spkbtn.rec{background:var(--pr);color:#fff}
.spkbtn.rec.recording{background:#EF4444;animation:pulse-btn 1s infinite}
.spkres{margin-top:.9rem;padding:.9rem;border-radius:11px;font-weight:700}
.spkres.good{background:#D1FAE5;color:#065F46}
.spkres.ok{background:#FEF3C7;color:#92400E}
.spkres.bad{background:#FEE2E2;color:#991B1B}
.scorebar{margin-top:.45rem;background:#E5E7EB;border-radius:10px;height:9px;overflow:hidden}
.scorefill{height:100%;border-radius:10px;transition:width .5s}
.modans{background:#F0FDF4;border-radius:9px;padding:.65rem;margin-top:.45rem;font-size:.88rem;font-weight:600;color:#065F46}

/* SONG */
.sngcard{background:linear-gradient(135deg,#EC4899,#8B5CF6);border-radius:var(--rd);padding:1.3rem;margin-bottom:.9rem;color:#fff;box-shadow:0 8px 32px rgba(139,92,246,.3)}
.sngtitle{font-family:'Fredoka One',cursive;font-size:1.6rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.snglyrics{background:rgba(255,255,255,.15);border-radius:14px;padding:1.1rem;font-size:.95rem;line-height:2;white-space:pre-line;margin-bottom:.9rem}
.sngbtn{padding:.65rem 1.3rem;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;font-size:.88rem}
.sngbtn.play{background:#fff;color:var(--pk)}
.sngbtn.rec{background:rgba(255,255,255,.2);border:2px solid #fff;color:#fff}
.kline{padding:.25rem .45rem;border-radius:7px;transition:all .3s;cursor:pointer}
.kline.active{background:rgba(255,255,0,.3);font-weight:800}

/* GAMES */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem;margin-bottom:1.3rem}
.gcard{background:#fff;border-radius:var(--rd);padding:1.1rem;text-align:center;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.gcard:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.gicon{font-size:2.8rem;margin-bottom:.45rem}
.gname{font-weight:800;font-size:.9rem;color:var(--dk)}
.gdesc{font-size:.75rem;color:#6B7280;margin-top:.25rem}
.garea{background:#fff;border-radius:var(--rd);padding:1.3rem;box-shadow:0 4px 15px rgba(0,0,0,.08);min-height:400px}
.ghdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:.4rem}
.gtitle{font-family:'Fredoka One',cursive;font-size:1.3rem}
.gscore{background:var(--ac);padding:.35rem .9rem;border-radius:11px;font-weight:800}
.gtimer{background:var(--pr);color:#fff;padding:.35rem .9rem;border-radius:11px;font-weight:800}

/* Match */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.mcol{display:flex;flex-direction:column;gap:.45rem}
.mitem{padding:.65rem .9rem;border:2px solid #E5E7EB;border-radius:11px;cursor:pointer;font-weight:700;text-align:center;transition:all .2s;user-select:none}
.mitem:hover{border-color:var(--bl)}
.mitem.sel{border-color:var(--pr);background:#FFF7ED}
.mitem.matched{border-color:var(--gn);background:#D1FAE5;cursor:default}
.mitem.wflash{border-color:#EF4444;background:#FEE2E2;animation:shake .3s}

/* Scramble */
.scword{font-size:2.3rem;font-family:'Fredoka One',cursive;text-align:center;letter-spacing:.25rem;margin:.9rem 0;color:var(--pr)}
.scinp{width:100%;padding:.65rem;font-size:1.1rem;border:3px solid #E5E7EB;border-radius:11px;font-family:'Nunito',sans-serif;font-weight:700;text-align:center;outline:none}
.scinp:focus{border-color:var(--pu)}
.scsubmit{width:100%;margin-top:.65rem;padding:.75rem;background:var(--pu);color:#fff;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer}

/* Memory */
.memgrid{display:grid;gap:.45rem}
.memcard{aspect-ratio:1;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;transition:all .4s;border:2px solid #E5E7EB;background:#fff;user-select:none}
.memcard.flipped{background:var(--pr);color:#fff;border-color:var(--pr)}
.memcard.matched{background:var(--gn);border-color:var(--gn);color:#fff}
.memcard.hidden{background:#E5E7EB;color:#E5E7EB}

/* Sentence */
.stgt{background:#EFF6FF;border-radius:11px;padding:.9rem;margin-bottom:.9rem;font-weight:700;font-size:.95rem;color:var(--bl)}
.wbank{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:.9rem}
.wchip{padding:.45rem .8rem;background:#fff;border:2px solid #E5E7EB;border-radius:9px;cursor:pointer;font-weight:700;font-size:.88rem;transition:all .2s}
.wchip:hover:not(.used){border-color:var(--pr);background:#FFF7ED}
.wchip.used{opacity:.3;cursor:not-allowed}
.sarea{min-height:55px;border:2px dashed #E5E7EB;border-radius:11px;padding:.65rem;display:flex;flex-wrap:wrap;gap:.35rem;align-items:center;margin-bottom:.65rem}
.sword{padding:.35rem .7rem;background:var(--pr);color:#fff;border-radius:7px;font-weight:700;cursor:pointer;font-size:.88rem}

/* Typing */
.tytext{font-size:1rem;line-height:2;margin-bottom:.9rem;padding:.9rem;background:#F9FAFB;border-radius:11px}
.tychar{display:inline;transition:all .1s}
.tychar.current{background:var(--ac);border-radius:3px}
.tychar.correct{color:var(--gn)}
.tychar.wrong{color:#EF4444;background:#FEE2E2;border-radius:3px}
.tyinp{width:100%;padding:.65rem;font-size:.95rem;border:3px solid #E5E7EB;border-radius:11px;font-family:'Nunito',sans-serif;outline:none}
.tystats{display:flex;gap:.9rem;flex-wrap:wrap;margin-bottom:.65rem}
.tystat{background:#F3F4F6;padding:.45rem .9rem;border-radius:9px;font-weight:700;font-size:.85rem}

/* Word Search */
.wsgrid{display:inline-grid;gap:2px;border:3px solid var(--pr);border-radius:11px;padding:5px;background:#fff}
.wscell{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;border-radius:5px;cursor:pointer;transition:all .15s;user-select:none}
.wscell:hover{background:#FFF7ED}
.wscell.sel{background:var(--ac)}
.wscell.fnd{background:var(--gn);color:#fff}
.wswords{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.9rem}
.wsword{padding:.25rem .7rem;border-radius:7px;font-weight:700;font-size:.82rem;background:#F3F4F6}
.wsword.fnd{background:var(--gn);color:#fff;text-decoration:line-through}

/* Crossword */
.cwgrid{display:inline-grid;gap:2px;border-radius:7px;overflow:hidden}
.cwcell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;position:relative}
.cwcell input{width:100%;height:100%;text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;border:none;outline:none;text-transform:uppercase}
.cwcell input.correct{background:#D1FAE5}
.cwcell input.wrong{background:#FEE2E2}
.cwblack{background:#1E1B4B}
.cwwhite{background:#fff;border:1px solid #D1D5DB}
.cwnum{position:absolute;top:1px;left:2px;font-size:.5rem;font-weight:900;color:#6B7280;pointer-events:none}
.cwclues{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-top:.9rem}
.cwclue{font-size:.82rem;margin-bottom:.25rem}
.cwclue strong{color:var(--pr)}

/* Story */
.stopts{display:flex;flex-direction:column;gap:.45rem;margin-top:.9rem}
.stopt{padding:.65rem .9rem;border:2px solid #E5E7EB;border-radius:11px;cursor:pointer;font-weight:600;transition:all .2s;background:#fff}
.stopt:hover{border-color:var(--pr);background:#FFF7ED}
.sttext{background:#F9FAFB;border-radius:11px;padding:.9rem;margin-top:.9rem;font-size:.92rem;line-height:1.8;min-height:90px}

/* Progress */
.pghero{background:linear-gradient(135deg,#FFE66D,#FF6B35);border-radius:var(--rd);padding:1.7rem;text-align:center;margin-bottom:1.3rem}
.bigstar{font-size:3.5rem;animation:spin 3s linear infinite}
.tscore{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--dk)}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.65rem;margin-bottom:1.3rem}
.bitem{background:#fff;border-radius:14px;padding:.65rem;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.bitem.earned{background:linear-gradient(135deg,#FFE66D,#FF6B35)}
.bicon{font-size:1.8rem;margin-bottom:.25rem}
.bname{font-size:.7rem;font-weight:700}
.uplist{background:#fff;border-radius:var(--rd);padding:1.1rem;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.upitem{display:flex;align-items:center;gap:.65rem;margin-bottom:.65rem}
.upicon{font-size:1.4rem;width:36px;text-align:center}
.upinfo{flex:1}
.upname{font-weight:700;font-size:.85rem}
.upbar{background:#F3F4F6;border-radius:5px;height:7px;margin-top:.2rem;overflow:hidden}
.upfill{height:100%;border-radius:5px;transition:width .5s}
.uppct{font-weight:700;font-size:.82rem;color:#6B7280}

/* TOAST */
.toast{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%);background:#1E1B4B;color:#fff;padding:.65rem 1.3rem;border-radius:14px;font-weight:700;z-index:9999;animation:slideIn .3s ease;max-width:90vw;text-align:center}
.toast.success{background:var(--gn)}
.toast.error{background:#EF4444}

/* ANIMATIONS */
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.1)}80%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
@keyframes pulse-btn{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.animIn{animation:slideIn 0.3s ease}
.cpiece{position:fixed;width:9px;height:9px;border-radius:2px;z-index:9999;pointer-events:none;animation:confetti 2s ease-in forwards}

/* RESPONSIVE */
@media(max-width:600px){
  .ugrid{grid-template-columns:repeat(2,1fr)}
  .vgrid{grid-template-columns:repeat(2,1fr)}
  .qopts,.rqopts,.lisopts{grid-template-columns:1fr}
  .mgrid{grid-template-columns:1fr}
  .cwclues{grid-template-columns:1fr}
  .ggrid{grid-template-columns:repeat(2,1fr)}
  .hamburger{display:block}

const UK=Object.keys(U);

// ===================== STATE =====================
let S={page:"home",unit:null,skill:"v",stars:0,badges:[],up:{},lw:{},game:null,recActive:false};
function loadS(){try{const d=localStorage.getItem("ff3v2");if(d)Object.assign(S,JSON.parse(d));}catch(e){}}
function saveS(){try{localStorage.setItem("ff3v2",JSON.stringify({stars:S.stars,badges:S.badges,up:S.up,lw:S.lw}));}catch(e){}}

// ===================== SPEECH =====================
function spk(txt,rt=0.9){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="en-US";u.rate=rt;u.pitch=1.1;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang.startsWith("en")&&x.name.toLowerCase().includes("female"))||vs.find(x=>x.lang.startsWith("en"))||vs[0];
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
let recActive=false;
function startRec(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast("Speech not supported on this browser","error");return null;}
  const r=new SR();
  r.lang="en-US";r.continuous=false;r.interimResults=false;
  r.onresult=e=>{let t="";for(let i=0;i<e.results.length;i++)if(e.results[i].isFinal)t+=e.results[i][0].transcript;if(t)onResult(t.toLowerCase().trim());};
  r.onend=()=>{recActive=false;if(onEnd)onEnd();};
  r.onerror=()=>{recActive=false;if(onEnd)onEnd();};
  recActive=true;r.start();return r;
}
function scoreSpk(spoken,target){
  const t=target.toLowerCase().replace(/[.,!?[\]]/g,"").split(" ");
  const s=spoken.toLowerCase().replace(/[.,!?]/g,"").split(" ");
  let m=0;t.forEach(w=>{if(s.includes(w))m++;});
  return Math.round((m/t.length)*100);
}

// ===================== UI HELPERS =====================
function toast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="toast"+(type?" "+type:"");el.style.display="block";
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display="none",2500);
}
function confetti(){
  const cols=["#FF6B35","#4ECDC4","#FFE66D","#A855F7","#EC4899","#10B981"];
  for(let i=0;i<28;i++){
    const el=document.createElement("div");el.className="cpiece";
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?"50%":"2px"};width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;animation-delay:${Math.random()*.4}s;animation-duration:${1.5+Math.random()}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
  }
}
function addStars(n){S.stars+=n;document.getElementById("hStars").textContent=S.stars;saveS();if(n>0&&n>=5)confetti();}
function awardBadge(id,name){
  if(!S.badges.includes(id)){S.badges.push(id);document.getElementById("hBadges").textContent=S.badges.length;toast("🏅 Badge: "+name);saveS();}
}
function setUP(uk,sk,pct){if(!S.up[uk])S.up[uk]={};S.up[uk][sk]=pct;saveS();}
function getUPct(uk){const p=S.up[uk];if(!p)return 0;const v=Object.values(p);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/6):0;}

// ===================== APP START =====================
function startApp(){
  loadS();
  const sp=document.getElementById("splash");
  sp.style.opacity="0";
  setTimeout(()=>{
    sp.style.display="none";
    document.getElementById("hdr").style.display="flex";
    document.getElementById("nav").style.display="flex";
    document.getElementById("main").style.display="block";
    document.getElementById("hStars").textContent=S.stars;
    document.getElementById("hBadges").textContent=S.badges.length;
    showPage("home");
  },500);
}
function toggleNav(){document.getElementById("nav").classList.toggle("open");}
function showPage(pg,uk){
  document.getElementById("nav").classList.remove("open");
  document.querySelectorAll(".nbtn").forEach(b=>b.className="nbtn");
  const nb=document.getElementById("nb-"+pg);
  if(nb){nb.className="nbtn active";nb.style.background=uk?U[uk].c:"var(--pr)";}
  S.page=pg;if(uk){S.unit=uk;S.skill="v";}
  const m=document.getElementById("main");m.innerHTML="";m.className="animIn";
  if(pg==="home")renderHome();
  else if(pg==="unit")renderUnit();
  else if(pg==="games")renderGames();
  else if(pg==="progress")renderProgress();
}
function showSkill(sk){
  S.skill=sk;
  document.querySelectorAll(".stab").forEach(t=>{
    t.className="stab"+(t.dataset.sk===sk?" active":"");
    if(t.dataset.sk===sk)t.style.background=U[S.unit].c;else t.style.background="";
  });
  renderSkill();
}

// ===================== HOME =====================
function renderHome(){
  const m=document.getElementById("main");
  const tw=Object.values(S.lw).reduce((a,b)=>a+b.length,0);
  const aw=UK.reduce((a,k)=>a+U[k].v.length,0);
  m.innerHTML=`
  <div class="hhero">
    <h2>🌟 Welcome Back!</h2>
    <p>⭐ ${S.stars} Stars &nbsp;|&nbsp; 📚 ${tw}/${aw} Words &nbsp;|&nbsp; 🏅 ${S.badges.length} Badges</p>
  </div>
  <h3 style="font-family:'Fredoka One',cursive;font-size:1.2rem;margin-bottom:.7rem">📖 Choose Your Unit</h3>
  <div class="ugrid">${UK.map(k=>{
    const u=U[k],pct=getUPct(k);
    return `<div class="ucard" onclick="showPage('unit','${k}')" style="border-color:${pct>0?u.c:'transparent'}">
      <div class="uicon">${u.ic}</div>
      <div class="uname">${u.t}</div>
      <div style="font-size:.72rem;color:#9CA3AF;margin-top:.2rem">p.${u.pg}</div>
      <div class="upg"><div class="upgbar" style="width:${pct}%;background:${u.c}"></div></div>
      ${pct===100?'<div class="ubadge" style="background:var(--gn);color:#fff">✓</div>':pct>0?`<div class="ubadge" style="background:var(--ac);color:var(--dk)">${pct}%</div>`:""}
    </div>`;}).join("")}</div>`;
}

// ===================== UNIT PAGE =====================
function renderUnit(){
  const u=U[S.unit];const m=document.getElementById("main");
  const tabs=[{sk:"v",lb:"📝 Words"},{sk:"gr",lb:"📖 Grammar"},{sk:"ph",lb:"🔤 Phonics"},{sk:"sg",lb:"🎵 Song"},{sk:"rd",lb:"📚 Reading"},{sk:"sp",lb:"🎙️ Speaking"}];
  m.innerHTML=`
  <div class="lhdr">
    <div class="lhdr-icon">${u.ic}</div>
    <div>
      <h2>${u.t}</h2>
      <p style="color:#6B7280;font-size:.85rem">Page ${u.pg} · ${getUPct(S.unit)}% complete</p>
    </div>
    <button onclick="showPage('home')" style="margin-left:auto;padding:.4rem .9rem;border:none;border-radius:9px;background:#F3F4F6;cursor:pointer;font-weight:700;font-size:.85rem">🏠 Home</button>
  </div>
  <div class="stabs">${tabs.map(t=>`<button class="stab${S.skill===t.sk?" active":""}" data-sk="${t.sk}" onclick="showSkill('${t.sk}')" style="${S.skill===t.sk?"background:"+u.c+";color:#fff;":""}">${t.lb}</button>`).join("")}</div>
  <div id="sc"></div>`;
  renderSkill();
}
function renderSkill(){
  const u=U[S.unit];const el=document.getElementById("sc");if(!el)return;
  if(S.skill==="v")renderVocab(el,u);
  else if(S.skill==="gr")renderGrammar(el,u);
  else if(S.skill==="ph")renderPhonics(el,u);
  else if(S.skill==="sg")renderSong(el,u);
  else if(S.skill==="rd")renderReading(el,u);
  else if(S.skill==="sp")renderSpeaking(el,u);
}

// ===================== VOCAB =====================
function renderVocab(el,u){
  const lw=S.lw[S.unit]||[];
  el.innerHTML=`<div class="vgrid">${u.v.map((v,i)=>`
  <div class="vcard${lw.includes(i)?" learned":""}" id="vc${i}" onclick="learnW(${i})">
    <div class="vemoji">${v.e}</div>
    <div class="vword">${v.w}</div>
    <button class="vspeakbtn" onclick="event.stopPropagation();spk('${v.w.replace(/'/g,"\\'")}')">🔊</button>
  </div>`).join("")}</div>
  <div style="margin-top:1rem;text-align:center">
    <button onclick="startVQ()" style="padding:.7rem 1.8rem;background:var(--pr);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer">🎯 Quiz!</button>
    <p style="margin-top:.4rem;color:#6B7280;font-size:.82rem">${lw.length}/${u.v.length} words learned</p>
  </div>`;
}
function learnW(i){
  if(!S.lw[S.unit])S.lw[S.unit]=[];
  const u=U[S.unit];spk(u.v[i].w);
  if(!S.lw[S.unit].includes(i)){
    S.lw[S.unit].push(i);addStars(1);
    const c=document.getElementById("vc"+i);if(c)c.classList.add("learned");
    saveS();
    if(S.lw[S.unit].length===u.v.length){awardBadge(S.unit+"_v","Vocab Master: "+u.t);setUP(S.unit,"v",100);addStars(10);toast("🌟 All words! +10 bonus stars!");}
  }
}
function startVQ(){
  const u=U[S.unit];const el=document.getElementById("sc");
  const words=[...u.v].sort(()=>Math.random()-.5).slice(0,Math.min(8,u.v.length));
  let qi=0,sc=0;
  function showQ(){
    if(qi>=words.length){
      const pct=Math.round(sc/words.length*100);setUP(S.unit,"v",pct);addStars(sc*2);
      el.innerHTML=`<div class="qcard" style="text-align:center"><div style="font-size:3.5rem">🏆</div><h3 style="font-family:'Fredoka One',cursive;font-size:1.8rem">Quiz Done!</h3><p style="font-size:1.1rem;font-weight:700">${sc}/${words.length} correct (${pct}%)</p><p style="color:#6B7280">+${sc*2} stars!</p><button onclick="renderVocab(document.getElementById('sc'),U[S.unit])" style="margin-top:.9rem;padding:.65rem 1.8rem;background:var(--pr);color:#fff;border:none;border-radius:14px;font-weight:700;cursor:pointer">Again</button></div>`;
      if(pct>=80)confetti();return;
    }

  }
  window.ansQ=(btn,chosen,correct)=>{
    document.querySelectorAll(".qopt").forEach(b=>b.onclick=null);

    else{btn.classList.add("wrong");document.querySelectorAll(".qopt").forEach(b=>{if(b.textContent.trim()===correct)b.classList.add("correct");});toast("❌ Answer: "+correct,"error");}
    setTimeout(()=>{qi++;showQ();},1200);
  };
  showQ();
}

// ── GAME 1: WORD MATCH ──
function gWM(a){
  const u=U[gu()];const words=[...u.v].sort(()=>Math.random()-.5).slice(0,6);
  let sel=null,score=0,matched=0;
  function render(){
    const emojis=[...words.map((w,i)=>({i,v:w.e}))].sort(()=>Math.random()-.5);
    const names=[...words.map((w,i)=>({i,v:w.w}))].sort(()=>Math.random()-.5);
    a.innerHTML=`<div class="garea"><div class="ghdr"><div class="gtitle">🔗 Word Match</div><div class="gscore">⭐ ${score}</div></div>
    <p style="color:#6B7280;margin-bottom:.9rem">Tap an emoji, then tap its word!</p>
    <div class="mgrid"><div class="mcol" id="ecol">${emojis.map(e=>`<div class="mitem${matched>=0&&words[e.i]?"":" hidden"}" id="em${e.i}" onclick="wmSel('e','${e.i}')">${e.v}</div>`).join("")}</div>
    <div class="mcol" id="ncol">${names.map(n=>`<div class="mitem" id="nm${n.i}" onclick="wmSel('n','${n.i}')">${n.v}</div>`).join("")}</div></div>
    <div id="wm-st" style="margin-top:.8rem;font-weight:700;text-align:center"></div></div>`;
  }
  let first=null;
  window.wmSel=(type,idx)=>{
    const id=parseInt(idx);
    const elId=(type==="e"?"em":"nm")+id;
    const el=document.getElementById(elId);
    if(!el||el.classList.contains("matched"))return;
    if(!first){first={type,id,el};el.classList.add("sel");}
    else{
      if(first.type===type){first.el.classList.remove("sel");first={type,id,el};el.classList.add("sel");return;}
      const eid=type==="e"?id:first.id;const nid=type==="n"?id:first.id;
      if(eid===nid){
        document.getElementById("em"+eid).classList.remove("sel");document.getElementById("em"+eid).classList.add("matched");
        document.getElementById("nm"+nid).classList.remove("sel");document.getElementById("nm"+nid).classList.add("matched");
        score+=3;matched++;addStars(3);spk(words[eid].w);
        const st=document.getElementById("wm-st");if(st)st.textContent="✅ Match! +3 ⭐";
        if(matched===words.length){setTimeout(()=>{addStars(15);toast("🏆 All matched! +15 bonus!");},300);}
      }else{
        first.el.classList.remove("sel");first.el.classList.add("wflash");el.classList.add("wflash");
        const st=document.getElementById("wm-st");if(st)st.textContent="❌ Try again!";
        setTimeout(()=>{first.el.classList.remove("wflash");el.classList.remove("wflash");},500);
      }
      first=null;
    }
  };
  render();
}

// ── GAME 2: SCRAMBLE ──
function gSC(a){
  const u=U[gu()];const words=u.v.filter(v=>!v.w.includes(" ")&&v.w.length>=3).sort(()=>Math.random()-.5);
  let qi=0,score=0;
  function show(){
    if(qi>=Math.min(words.length,8)){
      a.innerHTML=`<div class="garea" style="text-align:center"><div style="font-size:3.5rem">🏆</div><h3 style="font-family:'Fredoka One',cursive;font-size:1.8rem">Scramble Done!</h3><p style="font-weight:700">Score: ${score}</p><button onclick="gSC(document.getElementById('ga'))" style="margin-top:.8rem;padding:.65rem 1.8rem;background:var(--pr);color:#fff;border:none;border-radius:14px;font-weight:700;cursor:pointer">Play Again!</button></div>`;return;
    }
    const wobj=words[qi];const w=wobj.w;const scr=w.split("").sort(()=>Math.random()-.5).join("");
    a.innerHTML=`<div class="garea"><div class="ghdr"><div class="gtitle">🔤 Scramble!</div><div class="gscore">⭐ ${score}</div></div>
    <p style="color:#6B7280">Word ${qi+1} of ${Math.min(words.length,8)}</p>
    <div class="scword">${scr.toUpperCase()}</div>
    <div style="text-align:center;margin-bottom:.7rem">${wobj.e} – ${w.length} letters</div>
    <input class="scinp" id="sc-in" placeholder="Type the word…" autocomplete="off" autocorrect="off" spellcheck="false" onkeypress="if(event.key==='Enter')scCheck('${w.replace(/'/g,"\\'")}')">
    <button class="scsubmit" onclick="scCheck('${w.replace(/'/g,"\\'")}')">✅ Check!</button>
    <button onclick="spk('${w.replace(/'/g,"\\'")}',0.85)" style="width:100%;margin-top:.4rem;padding:.6rem;background:var(--bl);color:#fff;border:none;border-radius:11px;font-weight:700;cursor:pointer">🔊 Hear</button>
    <div id="sc-res"></div></div>`;
    document.getElementById("sc-in").focus();
  }
  window.scCheck=correct=>{
    const inp=document.getElementById("sc-in");const res=document.getElementById("sc-res");if(!inp)return;
    if(inp.value.trim().toLowerCase()===correct.toLowerCase()){
      score+=5;addStars(5);spk(correct);
      if(res)res.innerHTML=`<p style="color:var(--gn);font-weight:800;text-align:center;margin-top:.5rem">✅ +5 ⭐ "${correct}"</p>`;
      setTimeout(()=>{qi++;show();},1200);
    }else{
      inp.style.borderColor="#EF4444";if(res)res.innerHTML=`<p style="color:#EF4444;font-weight:700;text-align:center;margin-top:.5rem">❌ Try again!</p>`;
      setTimeout(()=>{if(inp)inp.style.borderColor="#E5E7EB";inp.value="";},500);
    }
  };
  show();
}

// ── GAME 3: MEMORY ──
function gMem(a){
  const u=U[gu()];const words=[...u.v].sort(()=>Math.random()-.5).slice(0,6);
  const pairs=[...words.map((w,i)=>({id:i,type:"e",val:w.e,match:i})),...words.map((w,i)=>({id:i+6,type:"w",val:w.w,match:i}))].sort(()=>Math.random()-.5);
  let flipped=[],matched=[],moves=0,score=0;
  function render(){
    const cols=4;
    a.innerHTML=`<div class="garea"><div class="ghdr"><div class="gtitle">🃏 Memory</div><div style="display:flex;gap:.4rem"><div class="gscore">⭐${score}</div><div class="gtimer">Moves:${moves}</div></div></div>
    <div class="memgrid" style="grid-template-columns:repeat(${cols},1fr);max-width:360px;margin:0 auto">
    ${pairs.map((p,i)=>{const isM=matched.includes(p.match);const isF=flipped.includes(i);return `<div class="memcard${isM?" matched":isF?" flipped":" hidden"}" onclick="memFlip(${i})">${isM||isF?p.val:"?"}</div>`}).join("")}
    </div>${matched.length===words.length?`<p style="text-align:center;margin-top:.9rem;font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gn)">🏆 Done in ${moves} moves!</p>`:""}</div>`;
  }
  window.memFlip=i=>{
    if(flipped.length===2||flipped.includes(i)||matched.includes(pairs[i].match))return;
    flipped.push(i);moves++;render();
    if(flipped.length===2){
      const[a2,b]=flipped;
      if(pairs[a2].match===pairs[b].match&&pairs[a2].type!==pairs[b].type){
        matched.push(pairs[a2].match);score+=10;addStars(5);spk(words[pairs[a2].match].w);flipped=[];
        if(matched.length===words.length){addStars(20);toast("🏆 Memory done! +20 bonus!");}
      }else setTimeout(()=>{flipped=[];render();},800);
      setTimeout(render,0);
    }
  };
  render();
}

// ── GAME 6: WORD SEARCH ──
function gWS(a){
  const u=U[gu()];const tw=u.v.filter(v=>!v.w.includes(" ")&&v.w.length>=3&&v.w.length<=7).slice(0,6).map(v=>v.w.toUpperCase());
  const SZ=9;const grid=Array.from({length:SZ},()=>Array(SZ).fill(""));const placed=[];
  function tryPl(word,r,c,h){
    const cells=[];for(let i=0;i<word.length;i++){const nr=h?r:r+i;const nc=h?c+i:c;if(nr<0||nr>=SZ||nc<0||nc>=SZ)return false;if(grid[nr][nc]&&grid[nr][nc]!==word[i])return false;cells.push([nr,nc]);}
    cells.forEach(([nr,nc],i)=>grid[nr][nc]=word[i]);placed.push({word,cells});return true;
  }
  tw.forEach(w=>{const dirs=[[0,1],[1,0],[1,1]];for(let at=0;at<60;at++){const d=dirs[Math.floor(Math.random()*dirs.length)];if(tryPl(w,Math.floor(Math.random()*SZ),Math.floor(Math.random()*SZ),d[0]===0))break;}});
  const L="ABCDEFGHIJKLMNOPQRSTUVWXYZ";for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(!grid[r][c])grid[r][c]=L[Math.floor(Math.random()*L.length)];
  let selCells=[],found=[],score=0;
  function render(){
    a.innerHTML=`<div class="garea"><div class="ghdr"><div class="gtitle">🔍 Word Search</div><div class="gscore">⭐${score}</div></div>
    <div style="overflow-x:auto"><div class="wsgrid" style="grid-template-columns:repeat(${SZ},auto)">
    ${grid.map((row,r)=>row.map((cell,c)=>{const isF=placed.some(p=>p.cells.some(([pr,pc])=>pr===r&&pc===c)&&found.includes(p.word));const isSel=selCells.some(([sr,sc])=>sr===r&&sc===c);return `<div class="wscell${isF?" fnd":isSel?" sel":""}" onclick="wsClick(${r},${c})">${cell}</div>`;}).join("")).join("")}
    </div></div>
    <div class="wswords">${tw.map(w=>`<div class="wsword${found.includes(w)?" fnd":""}">${w}</div>`).join("")}</div>
    ${found.length===tw.length?`<p style="text-align:center;font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gn);margin-top:.8rem">🏆 All found!</p>`:""}</div>`;
  }
  window.wsClick=(r,c)=>{
    if(selCells.length===0){selCells=[[r,c]];}
    else if(selCells.length===1){
      selCells.push([r,c]);
      const[r1,c1]=selCells[0];const[r2,c2]=selCells[1];
      const dr=Math.sign(r2-r1);const dc=Math.sign(c2-c1);
      const fs=[];let cr=r1;let cc=c1;const steps=Math.max(Math.abs(r2-r1),Math.abs(c2-c1));
      for(let i=0;i<=steps;i++){fs.push([cr,cc]);cr+=dr;cc+=dc;}
      const sw=fs.map(([sr,sc])=>grid[sr][sc]).join("");
      const fp=placed.find(p=>p.word===sw||p.word===sw.split("").reverse().join(""));
      if(fp&&!found.includes(fp.word)){found.push(fp.word);score+=15;addStars(15);spk(fp.word.toLowerCase());toast("✅ Found: "+fp.word+" +15 ⭐");if(found.length===tw.length){addStars(30);toast("🏆 All found! +30 bonus!");}}
      selCells=[];
    }else{selCells=[[r,c]];}
    render();
  };
  render();
}

// ── GAME 10: CROSSWORD ──
function gCW(a){

  const SZ=10;const cg=Array.from({length:SZ},()=>Array(SZ).fill(null));const placed=[];
  function tryP(word,r,c,h){const w=word.toUpperCase();for(let i=0;i<w.length;i++){const nr=h?r:r+i;const nc=h?c+i:c;if(nr>=SZ||nc>=SZ||nr<0||nc<0)return false;if(cg[nr][nc]!==null&&cg[nr][nc]!==w[i])return false;}for(let i=0;i<w.length;i++){const nr=h?r:r+i;const nc=h?c+i:c;cg[nr][nc]=w.toUpperCase()[i];}placed.push({word:w,r,c,h,orig:word});return true;}
  tryP(words[0].w,2,2,true);
  for(let k=1;k<words.length;k++){const w=words[k].w.toUpperCase();let done=false;for(let p=0;p<placed.length&&!done;p++){const pw=placed[p];for(let ci=0;ci<pw.word.length&&!done;ci++){for(let wi=0;wi<w.length&&!done;wi++){if(pw.word[ci]===w[wi]){const nr=pw.h?pw.r-wi:pw.r+ci;const nc=pw.h?pw.c+ci:pw.c-wi;if(tryP(words[k].w,nr,nc,!pw.h))done=true;}}}}if(!done)tryP(words[k].w,k+3,1,k%2===0);}
  let cwScore=0;const total=placed.reduce((s,p)=>s+p.word.length,0);
  a.innerHTML=`<div class="garea"><div class="ghdr"><div class="gtitle">✏️ Crossword</div><div class="gscore" id="cw-sc">⭐0</div></div>
  <div style="overflow-x:auto;margin-bottom:.9rem"><div class="cwgrid" style="grid-template-columns:repeat(${SZ},auto)">
  ${Array.from({length:SZ},(_,r)=>Array.from({length:SZ},(_,c)=>{const isL=cg[r][c]!==null;const ni=placed.findIndex(p=>p.r===r&&p.c===c);return isL?`<div class="cwcell cwwhite">${ni>=0?`<span class="cwnum">${ni+1}</span>`:""}
  <input maxlength="1" id="cw${r}_${c}" oninput="this.value=this.value.toUpperCase();cwChk(${r},${c},'${cg[r][c]}')" style="text-transform:uppercase"></div>`:`<div class="cwcell cwblack"></div>`;}).join("")).join("")}
  </div></div>
  <div class="cwclues">
  <div><strong>Across:</strong>${placed.filter(p=>p.h).map(p=>{const idx=placed.indexOf(p)+1;const vo=words.find(w=>w.w.toUpperCase()===p.word);return `<div class="cwclue"><strong>${idx}.</strong> ${vo?.e||""} (${p.word.length}) <button onclick="spk('${p.orig}')" style="border:none;background:none;cursor:pointer">🔊</button></div>`;}).join("")}</div>
  <div><strong>Down:</strong>${placed.filter(p=>!p.h).map(p=>{const idx=placed.indexOf(p)+1;const vo=words.find(w=>w.w.toUpperCase()===p.word);return `<div class="cwclue"><strong>${idx}.</strong> ${vo?.e||""} (${p.word.length}) <button onclick="spk('${p.orig}')" style="border:none;background:none;cursor:pointer">🔊</button></div>`;}).join("")}</div>
  </div></div>`;
  window.cwChk=(r,c,correct)=>{const inp=document.getElementById(`cw${r}_${c}`);if(!inp)return;if(inp.value.toUpperCase()===correct){inp.className="correct";cwScore++;const scel=document.getElementById("cw-sc");if(scel)scel.textContent="⭐"+cwScore;addStars(1);if(cwScore>=total){toast("🏆 Crossword done!");addStars(20);confetti();}}else if(inp.value)inp.className="wrong";};
}

  <h3 style="font-family:'Fredoka One',cursive;font-size:1.2rem;margin:.9rem 0 .7rem">📊 Unit Progress</h3>
  <div class="uplist">${UK.map(k=>{const pct=getUPct(k);const u=U[k];return `<div class="upitem"><div class="upicon">${u.ic}</div><div class="upinfo"><div class="upname">${u.t}</div><div class="upbar"><div class="upfill" style="width:${pct}%;background:${u.c}"></div></div></div><div class="uppct">${pct}%</div></div>`;}).join("")}</div>

// ===================== INIT =====================
window.addEventListener("load",()=>{
  if(window.speechSynthesis)window.speechSynthesis.getVoices();
  loadS();
  const sp=document.getElementById("sstarsdiv");
  if(sp&&S.stars>0){const cnt=Math.min(5,Math.floor(S.stars/20));sp.innerHTML=Array(5).fill(0).map((_,i)=>`<span style="font-size:1.6rem;opacity:${i<cnt?1:.3}">⭐</span>`).join("");}
});

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Hứng Từ Đúng</title>
    <style>
        /* Tối ưu hóa toàn màn hình chống cuộn */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        /* Khung chứa game tự động co giãn theo mọi kích thước màn hình */
        #game-wrapper {
            width: 800px;
            height: 650px;
            position: relative;
            transform-origin: center center;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
        }

        /* Thanh thông tin phía trên */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            z-index: 10;
        }

        #lives-display {
            letter-spacing: 5px;
        }

        /* Khu vực hiển thị câu hỏi/yêu cầu */
        #question-box {
            position: absolute;
            top: 65px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #d35400;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            z-index: 10;
        }

        /* Chiếc rổ hứng */
        #basket {
            position: absolute;
            bottom: 20px;
            width: 180px;
            height: 45px;
            background: #e67e22;
            border-radius: 0 0 25px 25px;
            border: 5px solid #d35400;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s ease;
        }

        /* Vật phẩm rơi xuống */
        .game-item {
            position: absolute;
            padding: 10px 20px;
            background: #ffffff;
            border: 3px solid #2ecc71;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .game-item.wrong-style {
            border-color: #e74c3c;
        }

        /* Hiệu ứng chớp màn hình */
        .flash-correct { animation: flashGreen 0.3s ease-out; }
        .flash-wrong { animation: flashRed 0.3s ease-out; }
        .bounce { transform: scale(1.1); }

        @keyframes flashGreen {
            0% { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
            50% { background: #abf7b1; }
            100% { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
        }
        @keyframes flashRed {
            0% { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
            50% { background: #f7abab; }
            100% { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
        }

        /* Màn hình kết thúc */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        #game-over-screen h1 { font-size: 48px; margin-bottom: 10px; color: #f1c40f; }
        #game-over-screen p { font-size: 28px; margin-bottom: 20px; }
        #game-over-screen button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background: #2ecc71;
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46,204,113,0.4);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div id="score-box">⭐ Điểm: <span id="score-display">0</span></div>
        <div id="lives-display">💖💖💖</div>
    </div>
    
    <div id="question-box">Hãy hứng quả chứa: Từ chỉ màu sắc!</div>
    <div id="basket"></div>

    <div id="game-over-screen">
        <h1>HẾT GIỜ RỒI!</h1>
        <p>Điểm của bé: <span id="final-score">0</span></p>
        <button onclick="resetGame()">Chơi lại</button>
    </div>
</div>

<script>
    // Cấu hình DOM và Dữ liệu mẫu câu hỏi cho bé
    const wrapper = document.getElementById('game-wrapper');
    const gameArea = wrapper; 
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score-display');
    const livesDisplay = document.getElementById('lives-display');
    const questionBox = document.getElementById('question-box');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScore = document.getElementById('final-score');

    const sampleQuestions = [
        { q: "Hãy hứng: Từ chỉ MÀU SẮC! 🎨", correct: ["Đỏ", "Xanh", "Vàng"], wrong: ["Chạy", "Mèo", "To"] },
        { q: "Hãy hứng: Từ chỉ CON VẬT! 🐶", correct: ["Chó", "Mèo", "Gà", "Vịt"], wrong: ["Bàn", "Đỏ", "Ngủ"] },
        { q: "Hãy hứng: Từ chỉ HÀNH ĐỘNG! 🏃", correct: ["Chạy", "Nhảy", "Đọc", "Ăn"], wrong: ["Nhà", "Đẹp", "Cá"] }
    ];

    let score = 0;
    let lives = 3;
    let speed = 1.8;
    let gameOver = false;
    let activeElements = [];
    let basketX = 310; // Tọa độ X ban đầu của rổ (ở giữa khung 800px)
    let currentQuestion = null;

    // --- 1. TỰ ĐỘNG DIỆN TÍCH MÀN HÌNH & XOAY NGANG ---
    function resizeGame() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        
        // Tỷ lệ chuẩn gốc của game là 800x650
        const baseWidth = 800;
        const baseHeight = 650;
        
        // Tính toán tỷ lệ co giãn phù hợp nhất (fit màn hình)
        const scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
        
        // Áp dụng zoom bằng CSS Transform
        wrapper.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));
    resizeGame(); // Chạy ngay lần đầu tiên

    // --- 2. HỆ THỐNG ÂM THANH (CHÚC MỪNG & TÈ) ---
    function playVoiceEffect(isCorrect) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Ngắt câu nói cũ ngay lập tức
            
            let text = "";
            if (isCorrect) {
                const wins = ["Đúng rồi! Giỏi quá!", "Tuyệt vời!", "Chính xác!"];
                text = wins[Math.floor(Math.random() * wins.length)];
            } else {
                text = "Tè te te, sai rồi!";
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = 1.2; // Nói nhanh vui tươi phù hợp với trẻ em
            window.speechSynthesis.speak(utterance);
        }
    }

    // --- 3. ĐIỀU KHIỂN RỔ HỨNG ---
    // Hỗ trợ cả chuột (PC) và Cảm ứng vuốt chạm (Điện thoại/Máy tính bảng)
    function moveBasket(clientX) {
        if (gameOver) return;
        const rect = wrapper.getBoundingClientRect();
        // Tính toán vị trí chuột/tay dựa trên tỷ lệ scale hiện tại của khung chứa
        const scale = rect.width / 800;
        let relativeX = (clientX - rect.left) / scale;
        
        // Giới hạn rổ không chạy ra ngoài viền game (0 đến 800 - 180)
        basketX = Math.max(0, Math.min(620, relativeX - 90));
        basket.style.left = basketX + 'px';
    }

    window.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    window.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) moveBasket(e.touches[0].clientX);
    }, { passive: true });

    // --- 4. LOGIC TRÒ CHƠI CHÍNH ---
    function triggerEffect(type) {
        gameArea.classList.remove('flash-correct', 'flash-wrong');
        void gameArea.offsetWidth; 
        
        if (type === 'correct') {
            gameArea.classList.add('flash-correct');
            basket.classList.add('bounce');
            setTimeout(() => basket.classList.remove('bounce'), 200);
        } else {
            gameArea.classList.add('flash-wrong');
        }
    }

    function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "💖";
        for (let i = lives; i < 3; i++) hearts += "🖤";
        livesDisplay.innerText = hearts;
    }

    function clearAllActiveElements() {
        activeElements.forEach(item => item.dom.remove());
        activeElements = [];
    }

    function nextQuestion() {
        clearAllActiveElements();
        // Chọn ngẫu nhiên một câu hỏi từ bộ đề
        currentQuestion = sampleQuestions[Math.floor(Math.random() * sampleQuestions.length)];
        questionBox.innerText = currentQuestion.q;

        // Tạo vật phẩm đúng
        currentQuestion.correct.forEach((text) => spawnItem(text, true));
        // Tạo vật phẩm sai
        currentQuestion.wrong.forEach((text) => spawnItem(text, false));
    }
    // --- 5. LOGIC TẠO VẬT PHẨM RƠI ---
    function spawnItem(text, isCorrect) {
        const itemDom = document.createElement('div');
        itemDom.className = 'game-item' + (isCorrect ? '' : ' wrong-style');
        itemDom.innerText = text;
        wrapper.appendChild(itemDom);

        // Đo kích thước thực tế của chữ sau khi tạo để tính va chạm chính xác
        const width = itemDom.offsetWidth || 100;
        
        // Phát tán ngẫu nhiên vị trí X (nằm gọn trong khung 800px)
        const randomX = Math.random() * (800 - width - 40) + 20;
        // Phát tán chiều cao Y âm để các chữ rơi xuống rải rác, không bị đè lên nhau
        const randomY = -(Math.random() * 250 + 50); 

        itemDom.style.left = randomX + 'px';
        itemDom.style.top = randomY + 'px';

        // Đẩy vật phẩm vào mảng quản lý
        activeElements.push({
            dom: itemDom,
            x: randomX,
            y: randomY,
            width: width,
            isCorrect: isCorrect
        });
    }

    // --- 6. VÒNG LẶP GAME CHÍNH (XỬ LÝ VA CHẠM & DI CHUYỂN) ---
    function gameLoop() {
        if (gameOver) return;
        
        let questionChanged = false;
        
        // Duyệt ngược mảng từ dưới lên để xóa phần tử không bị lỗi chỉ mục (index)
        for (let i = activeElements.length - 1; i >= 0; i--) {
            let item = activeElements[i];
            item.y += speed;
            item.dom.style.top = item.y + 'px';

            // Kiểm tra va chạm với rổ ở độ cao từ 550px đến 595px
            if (item.y > 550 && item.y < 595) {
                // Kiểm tra tọa độ X của vật phẩm có nằm trong phạm vi miệng rổ (rộng 180px)
                if (item.x + item.width > basketX && item.x < basketX + 180) {
                    
                    // Xóa ngay vật phẩm khỏi màn hình và mảng để tránh bị trừ tim/cộng điểm lặp lại
                    item.dom.remove();
                    activeElements.splice(i, 1);

                    if (item.isCorrect) {
                        score += 10;
                        scoreDisplay.innerText = score;
                        speed += 0.05; // Tăng tốc độ chậm rãi để thử thách phản xạ của bé
                        playVoiceEffect(true); // Khen ngợi: "Đúng rồi! Giỏi quá!"
                        triggerEffect('correct');
                        questionChanged = true;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        playVoiceEffect(false); // Kêu: "Tè te te, sai rồi!"
                        triggerEffect('wrong');
                        
                        if (lives <= 0) {
                            endGame();
                            return; // Dừng hẳn vòng lặp game
                        }
                        questionChanged = true;
                    }
                    continue; // Bỏ qua các kiểm tra phía dưới, chuyển sang vật phẩm tiếp theo
                }
            }

            // Nếu vật phẩm vượt quá đáy màn hình (650px) mà bé không hứng
            if (item.y > 650) {
                item.dom.remove(); // Dọn dẹp DOM tránh nặng máy
                activeElements.splice(i, 1);

                // Nếu bé bỏ lỡ "Từ đúng" -> Tự động đổi sang câu hỏi khác để bé không đợi lâu
                if (item.isCorrect) {
                    questionChanged = true;
                }
            }
        }

        // Nếu có tín hiệu đổi câu hỏi (do hứng trúng hoặc bỏ lỡ từ đúng)
        if (questionChanged) {
            nextQuestion();
        }

        // Tiếp tục chạy khung hình tiếp theo
        requestAnimationFrame(gameLoop);
    }

    // --- 7. TRẠNG THÁI KẾT THÚC & CHƠI LẠI ---
    function endGame() {
        gameOver = true;
        finalScore.innerText = score;
        gameOverScreen.classList.add('active');
        clearAllActiveElements(); // Xóa sạch chữ rơi trên màn hình khi thua
    }

    function resetGame() {
        score = 0;
        lives = 3;
        speed = 1.8; // Đặt lại tốc độ rơi mượt mà ban đầu
        gameOver = false;
        scoreDisplay.innerText = "0";
        basketX = 310; // Đưa rổ về lại chính giữa
        basket.style.left = basketX + 'px';
        updateLivesDisplay();
        gameOverScreen.classList.remove('active');
        nextQuestion();
        gameLoop();
    }

    // --- 8. KHỞI CHẠY TRÒ CHƠI LẦN ĐẦU TIÊN ---
    updateLivesDisplay();
    nextQuestion();
    gameLoop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Catching Game - Letter J Only</title>
    <style>
        /* Toàn màn hình chống cuộn */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        /* KHUNG CHỨA GAME: Tự động co giãn theo tỷ lệ cố định (Fixed Aspect Ratio) */
        #gameArea {
            width: 800px;
            height: 650px;
            position: relative;
            transform-origin: center center;
            /* Hình nền hoạt họa sinh động phong cách bầu trời rừng xanh thiên nhiên */
            background: linear-gradient(to bottom, rgba(135, 206, 235, 0.8), rgba(224, 246, 255, 0.9)), 
                        url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 8px solid #ffffff;
            border-radius: 20px;
        }

        /* Thanh thông tin Điểm và Tim */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 30px;
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
        }
        #scoreDisplay { color: #27ae60; font-size: 28px; }
        #livesDisplay { letter-spacing: 5px; }

        /* Bảng câu hỏi treo phía trên */
        #question-box {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            border: 4px solid #f1c40f;
            border-radius: 15px;
            padding: 12px 30px;
            font-size: 26px;
            font-weight: 900;
            color: #d35400;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 10;
            min-width: 450px;
        }

        /* RỔ HỨNG HOẠT HỌA SINH ĐỘNG */
        #basket {
            position: absolute;
            bottom: 20px;
            left: 310px;
            width: 180px;
            height: 60px;
            /* Tạo vân gỗ đan rổ hoạt hình 3D */
            background: radial-gradient(circle at 50% 0%, #ffb366, #cc6600);
            border: 5px solid #994d00;
            border-radius: 10px 10px 45px 45px;
            box-shadow: inset 0 10px 0 rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            z-index: 5;
        }
        /* Viền miệng rổ */
        #basket::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            width: 180px;
            height: 12px;
            background: #994d00;
            border-radius: 10px;
        }

        /* VẬT PHẨM RƠI: Bao gồm cả Hình ảnh + Chữ bên dưới */
        .game-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            border: 4px solid #2ecc71;
            border-radius: 18px;
            padding: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 2;
        }
        .game-item img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            pointer-events: none;
            border-radius: 10px;
            background: #fcfcfc;
        }
        .game-item .word-label {
            margin-top: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: capitalize;
        }
        /* Viền đỏ cho từ sai mục tiêu */
        .game-item.wrong-style {
            border-color: #e74c3c;
        }

        /* Hiệu ứng flash màn hình & nảy rổ */
        .flash-correct { animation: flashGreen 0.3s ease-out; }
        .flash-wrong { animation: flashRed 0.3s ease-out; }
        .bounce { transform: scale(1.15); }

        @keyframes flashGreen {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(46, 204, 113, 0.4); }
        }
        @keyframes flashRed {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(231, 76, 60, 0.4); }
        }

        /* MÀN HÌNH KẾT THÚC GAME */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        #gameOverScreen.active {
            opacity: 1;
            pointer-events: auto;
        }
        #gameOverScreen h1 {
            font-size: 50px;
            color: #f1c40f;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOverScreen p { font-size: 26px; margin-bottom: 25px; }
        #gameOverScreen button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: #2ecc71;
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(46,204,113,0.4);
        }
    </style>
</head>
<body>

<div id="gameArea">
    <div id="hud">
        <div>⭐ Score: <span id="scoreDisplay">0</span></div>
        <div id="livesDisplay">💖💖💖</div>
    </div>
    
    <!-- Hiển thị cấu trúc câu hỏi ngẫu nhiên -->
    <div id="question-box">Loading...</div>
    
    <div id="basket"></div>

    <div id="gameOverScreen">
        <h1>WELL DONE!</h1>
        <p>Your Score: <span id="finalScore">0</span> pts</p>
        <button onclick="resetGame()">Play Again 🔄</button>
    </div>
</div>

<script>
    const gameArea = document.getElementById('gameArea');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const questionBox = document.getElementById('question-box');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');

    // CHỈ SỬ DỤNG DUY NHẤT DANH SÁCH TỪ CHỮ J BẠN CUNG CẤP
    const J_WORDS = [
        { word: "juice", img: "https://flaticon.com" },
        { word: "jug", img: "https://flaticon.com" },
        { word: "jar", img: "https://flaticon.com" },
        { word: "jet", img: "https://flaticon.com" },
        { word: "jacket", img: "https://flaticon.com" },
        { word: "jam", img: "https://flaticon.com" },
        { word: "jellyfish", img: "https://flaticon.com" },
        { word: "jelly", img: "https://flaticon.com" }
    ];

    const QUESTION_TEMPLATES = [
        { text: "What is it? It is...", type: "is" },
        { text: "What can you see? I can see...", type: "see" }
    ];

    let score = 0;
    let lives = 3;
    let speed = 1.8;
    let gameOver = false;
    let activeElements = [];
    let basketX = 310;
    let targetWord = ""; 

    // --- 1. TỰ ĐỘNG CHỈNH TOÀN MÀN HÌNH (Responsive & Xoay Ngang) ---
    function resizeGame() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const baseWidth = 800;
        const baseHeight = 650;
        const scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
        gameArea.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));
    resizeGame();

    // --- 2. ÂM THANH CHÚC MỪNG & TÈ BÁO SAI CHUẨN TIẾNG ANH ---
    function playSound(isCorrect) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let text = "";
            if (isCorrect) {
                const kudos = ["Correct!", "Good job!", "Excellent!", "Awesome!"];
                text = `${kudos[Math.floor(Math.random() * kudos.length)]}. It is ${targetWord}!`;
            } else {
                text = "Te te te! Wrong!";
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.2;
            window.speechSynthesis.speak(utterance);
        }
    }

    // --- 3. ĐIỀU KHIỂN RỔ HỨNG MƯỢT MÀ ---
    function moveBasket(clientX) {
        if (gameOver) return;
        const rect = gameArea.getBoundingClientRect();
        const scale = rect.width / 800;
        let relativeX = (clientX - rect.left) / scale;
        basketX = Math.max(0, Math.min(620, relativeX - 90));
             basket.style.left = basketX + 'px';
    }
    window.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    window.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) moveBasket(e.touches[0].clientX);
    }, { passive: true });

    // --- 4. SINH CÂU HỎI VÀ ĐỐI TƯỢNG RƠI ---
    function clearAllActiveElements() {
        activeElements.forEach(item => item.dom.remove());
        activeElements = [];
    }

    function nextQuestion() {
        clearAllActiveElements();
        
        // Chọn ngẫu nhiên 1 từ đúng trong danh sách chữ J làm mục tiêu hứng
        const correctIndex = Math.floor(Math.random() * J_WORDS.length);
        const correctObj = J_WORDS[correctIndex];
        targetWord = correctObj.word;

        // Chọn ngẫu nhiên cấu trúc câu hỏi (What is it? / What can you see?)
        const template = QUESTION_TEMPLATES[Math.floor(Math.random() * QUESTION_TEMPLATES.length)];
        questionBox.innerHTML = `${template.text} <span style="color:#2ecc71; text-decoration: underline;">${targetWord}</span>`;

        // Kích hoạt vật phẩm ĐÚNG rơi xuống
        spawnItem(correctObj.word, correctObj.img, true);

        // Lấy các từ còn lại trong danh sách chữ J để làm từ SAI (gây nhiễu)
        let wrongCandidates = J_WORDS.filter((_, idx) => idx !== correctIndex);
        wrongCandidates.sort(() => 0.5 - Math.random());

        // Sinh ra 2 vật phẩm sai ngẫu nhiên (cùng nhóm chữ J nhưng khác từ đang đố)
        if (wrongCandidates[0]) spawnItem(wrongCandidates[0].word, wrongCandidates[0].img, false);
        if (wrongCandidates[1]) spawnItem(wrongCandidates[1].word, wrongCandidates[1].img, false);
    }

    function spawnItem(word, imgSrc, isCorrect) {
        const itemDom = document.createElement('div');
        itemDom.className = 'game-item' + (isCorrect ? '' : ' wrong-style');
        itemDom.innerHTML = `<img src="${imgSrc}"><div class="word-label">${word}</div>`;
        gameArea.appendChild(itemDom);

        const width = itemDom.offsetWidth || 110;
        const randomX = Math.random() * (800 - width - 40) + 20;
        const randomY = -(Math.random() * 200 + 60); // Tạo độ trễ chiều cao để vật rơi so le

        itemDom.style.left = randomX + 'px';
        itemDom.style.top = randomY + 'px';

        activeElements.push({
            dom: itemDom,
            x: randomX,
            y: randomY,
            width: width,
            isCorrect: isCorrect
        });
    }

    // --- 5. LOGIC KIỂM TRA VA CHẠM VÀ VÒNG LẶP GAME ---
    function triggerEffect(type) {
        gameArea.classList.remove('flash-correct', 'flash-wrong');
        void gameArea.offsetWidth; 
        
        if (type === 'correct') {
            gameArea.classList.add('flash-correct');
            basket.classList.add('bounce');
            setTimeout(() => basket.classList.remove('bounce'), 200);
        } else {
            gameArea.classList.add('flash-wrong');
        }
    }

    function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "💖";
        for (let i = lives; i < 3; i++) hearts += "🖤";
        livesDisplay.innerText = hearts;
    }

    function gameLoop() {
        if (gameOver) return;
        
        let questionChanged = false;
        
        for (let i = activeElements.length - 1; i >= 0; i--) {
            let item = activeElements[i];
            item.y += speed;
            item.dom.style.top = item.y + 'px';

            // Va chạm miệng rổ (Độ cao Y: từ 530px đến 585px)
            if (item.y > 530 && item.y < 585) {
                if (item.x + item.width > basketX && item.x < basketX + 180) {
                    
                    item.dom.remove();
                    activeElements.splice(i, 1);

                    if (item.isCorrect) {
                        score += 10;
                        scoreDisplay.innerText = score;
                        speed += 0.05; 
                        playSound(true); // Khen tiếng Anh chuẩn bản xứ
                        triggerEffect('correct');
                        questionChanged = true;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        playSound(false); // Phát âm thanh cảnh báo "Tè te te"
                        triggerEffect('wrong');
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                        questionChanged = true;
                    }
                    continue; 
                }
            }

            // Vật phẩm lọt xuống đáy màn hình (650px) mà không được hứng
            if (item.y > 650) {
                item.dom.remove();
                activeElements.splice(i, 1);

                if (item.isCorrect) {
                    questionChanged = true; // Bỏ lỡ từ đúng -> tự động đổi sang câu hỏi tiếp theo
                }
            }
        }

        if (questionChanged) {
            nextQuestion();
        }

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameOver = true;
        finalScore.innerText = score;
        gameOverScreen.classList.add('active');
        clearAllActiveElements();
    }

    function resetGame() {
        score = 0;
        lives = 3;
        speed = 1.8; 
        gameOver = false;
        scoreDisplay.innerText = "0";
        basketX = 310;
        basket.style.left = basketX + 'px';
        updateLivesDisplay();
        gameOverScreen.classList.remove('active');
        nextQuestion();
        gameLoop();
    }

    // --- 6. KHỞI CHẠY HỆ THỐNG TRÒ CHƠI ---
    updateLivesDisplay();
    nextQuestion();
    gameLoop();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vương Quốc Từ Vựng - Bé Học Tiếng Anh</title>
    <style>
        body { margin: 0; background: #ffeaa7; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; user-select: none; overflow: hidden; }
        
        /* Khu vực nút bấm nghe câu hỏi lớn hơn */
        #topArea { text-align: center; margin-bottom: 15px; background: #fff; padding: 20px 40px; border-radius: 25px; box-shadow: 0 8px 0 #fab1a0; width: 600px; border: 4px solid #ff7675; }
        #audioBtn { background: #ff7675; color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #d63031; transition: all 0.1s; display: inline-flex; align-items: center; gap: 15px; }
        #audioBtn:active { transform: translateY(4px); box-shadow: none; }
        
        /* Khung chứa trò chơi siêu rộng rãi cho bé */
        #gameArea { width: 800px; height: 650px; background: linear-gradient(to bottom, #74b9ff, #81ecec); border: 8px solid #2d3436; position: relative; overflow: hidden; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        /* Hiệu ứng chớp màn hình khi Đúng/Sai */
        #gameArea.flash-correct { animation: flashGreen 0.4s ease-out; }
        #gameArea.flash-wrong { animation: flashRed 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* Rổ hứng thiết kế to hơn, dễ đón hơn */
        #basket { width: 180px; height: 40px; background: #e67e22; position: absolute; bottom: 20px; left: 310px; border-radius: 15px 15px 25px 25px; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.3), 0 6px 8px rgba(0,0,0,0.15); border: 3px solid #d35400; transition: transform 0.1s; }
        #basket.bounce { transform: scale(1.15); }
        
        /* Thẻ rơi kích thước LỚN, hình ảnh TO rõ ràng */
        .falling-card { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffffff; padding: 15px; border-radius: 24px; border: 5px solid #fdcb6e; box-shadow: 0 8px 0 #f39c12, 0 12px 20px rgba(0,0,0,0.15); top: -180px; width: 160px; text-align: center; box-sizing: border-box; }
        .falling-card .svg-container { width: 95px; height: 95px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .falling-card .svg-container svg { width: 100%; height: 100%; }
        .falling-card span { font-size: 20px; font-weight: bold; color: #2d3436; text-transform: uppercase; white-space: nowrap; font-family: 'Comic Sans MS', sans-serif; pointer-events: none; }

        /* Bảng điểm số to rõ */
        .stats { position: absolute; top: 20px; font-size: 24px; font-weight: bold; color: #2d3436; background: #fff; padding: 8px 25px; border-radius: 35px; z-index: 10; border: 4px solid #2d3436; box-shadow: 0 5px 0 #2d3436; }
        #scoreBoard { left: 20px; }
        #livesBoard { right: 20px; color: #d63031; letter-spacing: 3px; }

        /* Màn hình Game Over */
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #gameOverScreen.active { opacity: 1; pointer-events: auto; }
        .over-box { background: white; padding: 40px; border-radius: 30px; text-align: center; border: 8px solid #ff7675; box-shadow: 0 20px 0 #d63031; transform: scale(0.7); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 420px; }
        #gameOverScreen.active .over-box { transform: scale(1); }
        .over-box h1 { margin: 0 0 15px 0; color: #ff7675; font-size: 42px; }
        .over-box p { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #2d3436; }
        .restart-btn { background: #2ecc71; color: white; border: none; padding: 15px 45px; font-size: 24px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #27ae60; }
        .restart-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Hiệu ứng chớp màn hình hoạt hình */
        @keyframes flashGreen { 0% { background: #2ecc71; } 100% { background: linear-gradient(to bottom, #74b9ff, #81ecec); } }
        @keyframes flashRed { 0% { background: #ff7675; } 100% { background: linear-gradient(to bottom, #74b9ff, #81ecec); } }
        @keyframes shake { 10%, 90% { transform: translate3d(-3px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-7px, 0, 0); } 40%, 60% { transform: translate3d(7px, 0, 0); } }
    </style>

    </div>

    // Audio Context tạo âm thanh trực tiếp
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(isCorrect) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (isCorrect) {
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // Nốt D5 vui tươi
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else {
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); // Âm trầm cảnh báo sai
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

        { word: "koala", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="38" r="18" fill="#bdc3c7" stroke="#2c3e50" stroke-width="2"/><circle cx="16" cy="24" r="8" fill="#95a5a6"/><circle cx="48" cy="24" r="8" fill="#95a5a6"/><circle cx="24" cy="36" r="3" fill="#333"/><circle cx="40" cy="36" r="3" fill="#333"/></svg>' },
        { word: "lion", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="24" fill="#e67e22" stroke="#2c3e50" stroke-width="2"/><circle cx="32" cy="34" r="17" fill="#f1c40f"/><circle cx="24" cy="32" r="3" fill="#333"/><circle cx="40" cy="32" r="3" fill="#333"/></svg>' },
        { word: "lemon", svg: '<svg viewBox="0 0 64 64"><ellipse cx="32" cy="32" rx="22" ry="16" fill="#f1c40f" stroke="#d4ac0d" stroke-width="2"/></svg>' },
{ word: "leaf", svg: '<svg viewBox="0 0 64 64"><path d="M14 50C14 30 30 14 50 14c0 20-14 36-36 36z" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/><path d="M14 50L42 22" stroke="#27ae60" stroke-width="3"/></svg>' },
        { word: "lollipop", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="22" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><path d="M32 40v18" stroke="#7f8c8d" stroke-width="5" stroke-linecap="round"/></svg>' },
        { word: "ladder", svg: '<svg viewBox="0 0 64 64"><path d="M20 8v48M44 8v48M20 18h24M20 32h24M20 46h24" stroke="#d35400" stroke-width="5" stroke-linecap="round"/></svg>' },
        { word: "lock", svg: '<svg viewBox="0 0 64 64"><rect x="18" y="28" width="28" height="26" rx="5" fill="#f1c40f" stroke="#2c3e50" stroke-width="2"/><path d="M24 28v-8c0-5 4-7 8-7s8 2 8 7v8" stroke="#bdc3c7" stroke-width="5" fill="none"/></svg>' },
        { word: "lips", svg: '<svg viewBox="0 0 64 64"><path d="M12 32s10-12 20-5c10-7 20 5 20 5s-10 12-20 5c-10 7-20-5-20-5z" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/></svg>' },
        { word: "lizard", svg: '<svg viewBox="0 0 64 64"><path d="M10 32s14-8 26 0 18 8 18 8" stroke="#2ecc71" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="15" cy="30" r="2" fill="#333"/></svg>' }
    ];

    const gameArea = document.getElementById('gameArea');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const livesDisplay = document.getElementById('lives');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');

    let score = 0;
    let lives = 3;
    let basketX = 310; // Đặt rổ ở giữa màn hình rộng ban đầu (800 / 2 - 180 / 2)
    let speed = 2.0;   // TỐC ĐỘ RƠI CHẬM giúp bé dễ nhìn và phản xạ
    let gameOver = false;
    let currentTarget = {};
    let currentQuestionText = "";
    let activeElements = [];

    function speakQuestion() {
        if ('speechSynthesis' in window && currentQuestionText) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQuestionText);
            utterance.lang = 'en-US';
            utterance.rate = 0.75; // Giọng đọc tiếng Anh chậm rãi giúp bé dễ nghe rõ chữ
            window.speechSynthesis.speak(utterance);
        }
    }

    function nextQuestion() {
        activeElements.forEach(item => item.dom.remove());
        activeElements = [];
        
        if (gameOver) return;

        currentTarget = wordBank[Math.floor(Math.random() * wordBank.length)];

        if (Math.random() < 0.5) {
            currentQuestionText = `What is it? It is a ${currentTarget.word}.`;
        } else {
            currentQuestionText = `What can you see? I can see a ${currentTarget.word}.`;
        }

        // Tự động phát âm câu hỏi trước
        speakQuestion();

        // ĐỘ TRỄ 2.5 GIÂY: Chờ bé nghe xong câu hỏi rồi các khối hình mới xuất hiện và rơi
        setTimeout(() => {
            if (gameOver) return;

            let swap = Math.random() < 0.5;
            // Phân phối tọa độ X rộng hơn (Trái: 80px, Phải: 520px) cho màn hình lớn rộng 800px
            createCard(currentTarget, true, swap ? 80 : 520);

            let wrongTarget;
            do {
                wrongTarget = wordBank[Math.floor(Math.random() * wordBank.length)];
            } while (wrongTarget.word === currentTarget.word);

            createCard(wrongTarget, false, swap ? 520 : 80);
        }, 2500);
    }

    function createCard(targetObj, isCorrect, fixedX) {
        const card = document.createElement('div');
        card.className = 'falling-card';
        
        card.innerHTML = `
            <div class="svg-container"> 
                ${targetObj.svg} 
            </div> 
            <span>${targetObj.word}</span>
        `;
        gameArea.appendChild(card);

        // Tạo biên độ ngẫu nhiên vị trí X rộng hơn một chút cho tự nhiên
        const xPos = fixedX + (Math.random() * 80 - 40);
        const yPos = -200 - (Math.random() * 60); // Đẩy điểm xuất phát lên cao hẳn ngoài màn hình
        card.style.left = xPos + 'px';
        card.style.top = yPos + 'px';

        activeElements.push({
            dom: card,
            x: xPos,
            y: yPos,
            isCorrect: isCorrect,
            width: 150 // Chiều rộng thẻ to lớn 150px
        });
    }

    // Điều khiển chuyển động rổ mượt mà theo chuột trên phạm vi khung 800px
    gameArea.addEventListener('mousemove', (e) => {
        if (gameOver) return;
        const rect = gameArea.getBoundingClientRect();
        basketX = e.clientX - rect.left - 90; // 90 là một nửa chiều rộng rổ (180px)
        if (basketX < 0) basketX = 0;
        if (basketX > 620) basketX = 620; // Giới hạn biên bên phải (800 - 180)
        basket.style.left = basketX + 'px';
    });

    function triggerEffect(type) {
        gameArea.classList.remove('flash-correct', 'flash-wrong');
        void gameArea.offsetWidth; // Bản vá kích hoạt lại CSS Animation
        
        if (type === 'correct') {
            gameArea.classList.add('flash-correct');
            basket.classList.add('bounce');
            setTimeout(() => basket.classList.remove('bounce'), 200);
        } else {
            gameArea.classList.add('flash-wrong');
        }
    }

    function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "💖";
        for (let i = lives; i < 3; i++) hearts += "🖤";
        livesDisplay.innerText = hearts;
    }

    function gameLoop() {
        if (gameOver) return;
        
        let questionChanged = false;
        
        for (let i = activeElements.length - 1; i >= 0; i--) {
            let item = activeElements[i];
            item.y += speed;
            item.dom.style.top = item.y + 'px';

            // Xử lý va chạm với rổ ở độ cao 550px đến 595px (Khung cao tổng 650px)
            if (item.y > 550 && item.y < 595) {
                if (item.x + item.width > basketX && item.x < basketX + 180) {
                    if (item.isCorrect) {
                        score += 10;
                        scoreDisplay.innerText = score;
                        speed += 0.03; // Gia tốc tăng rất nhỏ để trò chơi giữ độ chậm ổn định
                        playSound(true); // Phát âm thanh đúng vui tai
                        triggerEffect('correct');
                        questionChanged = true;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        playSound(false); // Phát âm thanh cảnh báo sai trầm
                        triggerEffect('wrong');
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                        questionChanged = true;
                    }
                    break;
                }
            }

            // Nếu lọt xuống đáy màn hình rộng (650px)
            if (item.y > 650) {
                if (item.isCorrect) {
                    questionChanged = true; // Bỏ lỡ từ đúng thì tự động đổi câu khác
                    break;
                } else {
                    item.dom.remove();
                    activeElements.splice(i, 1);
                }
            }
        }

        if (questionChanged) {
            nextQuestion();
        }

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameOver = true;
        finalScore.innerText = score;
        gameOverScreen.classList.add('active');
    }

    function resetGame() {
        score = 0;
        lives = 3;
        speed = 2.0; // Reset lại tốc độ rơi chậm ban đầu
        gameOver = false;
        scoreDisplay.innerText = "0";
        updateLivesDisplay();
        gameOverScreen.classList.remove('active');
        nextQuestion();
        gameLoop();
    }

    // Khởi chạy hệ thống game lần đầu
    updateLivesDisplay();
    nextQuestion();
    gameLoop();
</script>

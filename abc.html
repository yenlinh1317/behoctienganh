<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Vui Học Tiếng Anh</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- HỆ THỐNG GIAO DIỆN HOÀN TOÀN MỚI --- */
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --bg-gradient: linear-gradient(135deg, #F3F8FF 0%, #E5EFFF 100%);
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --shadow-soft: 0 12px 24px rgba(0,0,0,0.06);
            --shadow-pop: 0 8px 0 #E6D05C;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Container thích ứng linh hoạt với mọi kích thước màn hình */
        #app-container {
            width: 100%;
            max-width: 1100px; /* Mở rộng tối đa trên PC */
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            border: 5px solid var(--accent-color);
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        /* Thanh tiêu đề bo cong hoạt họa */
        header {
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
            padding: 22px 20px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            position: relative;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        header .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            display: none;
            font-size: 15px;
            transition: all 0.2s;
        }

        header .back-btn:hover {
            background: white;
            color: var(--primary-color);
        }

        /* Vùng nội dung */
        .content {
            padding: 25px;
            flex: 1;
        }

        /* --- MÀN HÌNH CHÍNH: LƯỚI TỰ ĐỘNG THEO CHIỀU XOAY --- */
        .alphabet-grid {
            display: grid;
            /* Tự động tính toán số lượng cột dựa trên chiều rộng màn hình */
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 18px;
        }

        .letter-card {
            background: #F8FAFC;
            border: 3px solid #E2E8F0;
            border-radius: 24px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Hiệu ứng nảy bong bóng khi di chuột qua */
        .letter-card:hover {
            transform: translateY(-6px) scale(1.03);
            background: #FFF;
            border-color: var(--secondary-color);
            box-shadow: 0 12px 20px rgba(78, 205, 196, 0.15);
        }

        .letter-card img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .letter-card div {
            margin-top: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #475569;
        }

        /* --- MÀN HÌNH TỪ VỰNG: GRID THÍCH ỨNG --- */
        .word-list {
            display: grid;
            /* Trên màn hình ngang/PC sẽ tự chia làm nhiều cột từ vựng thay vì kéo dài ngoằng */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .word-card {
            background: #FFF;
            border: 3px solid #E2E8F0;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .word-card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .word-card img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            background: #F1F5F9;
            border-radius: 18px;
            padding: 8px;
        }

        .word-info {
            flex: 1;
        }

        .word-eng {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .word-vie {
            font-size: 16px;
            color: #64748B;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Nút âm thanh dạng 3D khối đồ chơi */
        .audio-btn {
            background: var(--accent-color);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-pop);
            transition: all 0.1s ease;
        }

        .audio-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #E6D05C;
        }

        /* Tối ưu hóa phản hồi chạm trên điện thoại */
        @media (max-width: 480px) {
            body { padding: 8px; }
            #app-container { border-radius: 24px; min-height: 95vh; }
            header { font-size: 22px; padding: 18px 15px; }
            .alphabet-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .word-list { grid-template-columns: 1fr; gap: 12px; }
            .letter-card div { font-size: 18px; }
        }
    </style>
</head>

    const homeScreen = document.getElementById('homeScreen');
    const detailScreen = document.getElementById('detailScreen');
    const backBtn = document.getElementById('backBtn');
    const titleText = document.getElementById('titleText');

    function initApp() {
        homeScreen.innerHTML = alphabetData.map(item => `
            <div class="letter-card" onclick="openLetter('${item.letterUpper}')">
                <img src="${item.icon}" alt="${item.letterUpper}" onerror="this.src='https://placehold.co/64x64?text=${item.letterUpper}'">
                <div>${item.letterUpper}${item.letterLower}</div>
            </div>
        `).join('');
    }

    function openLetter(letter) {
        titleText.innerText = `Chữ cái: ${letter}`;
        backBtn.style.display = 'block';
        homeScreen.style.display = 'none';
        detailScreen.style.display = 'grid'; // Chuyển thành dạng Grid thông minh

        const filteredWords = wordsData.filter(w => w.chu_cai.toUpperCase() === letter.toUpperCase());

        if(filteredWords.length === 0) {
            detailScreen.innerHTML = `<div style="text-align:center;grid-column:1/-1;color:#64748B;padding:40px;font-weight:500;">Đang cập nhật từ vựng...</div>`;
            return;
        }

        detailScreen.innerHTML = filteredWords.map(w => {
            const imgUrl = (w.anh === "1fabf" || w.anh === "1fad9" || w.anh === "1fabc" || w.anh === "1f52a" || w.anh === "1fad2" || w.anh === "1f373" || w.anh === "26f5" || w.anh === "30-20e3" || w.anh.startsWith("1f")) 
                ? `https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/72x72/${w.anh}.png`
                : `https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/${w.anh}.png`;

            const cleanAudioName = w.thanh.replace(" ", "_");
            const audioUrl = `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${cleanAudioName}--_gb_1.mp3`;

            return `
                <div class="word-card">
                    <img src="${imgUrl}" alt="${w.tu_vung}" onerror="this.src='https://placehold.co/75x75?text=🔍'">
                    <div class="word-info">
                        <div class="word-eng">${w.tu_vung}</div>
                        <div class="word-vie">${w.nghia}</div>
                    </div>
                    <button class="audio-btn" onclick="playAudio('${audioUrl}')">🔊</button>
                </div>
            `;
        }).join('');
    }

    function goHome() {
        titleText.innerText = "Bảng Chữ Cái";
        backBtn.style.display = 'none';
        homeScreen.style.display = 'grid';
        detailScreen.style.display = 'none';
    }

    function playAudio(url) {
        if(!url) return;
        const audio = new Audio(url);
        audio.play().catch(e => console.log("Lỗi âm thanh:", e));
    }

    initApp();
</script>

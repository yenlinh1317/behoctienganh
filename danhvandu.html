<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🌈 Bé Học Đánh Vần</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');
:root{--red:#FF4757;--orange:#FF7F11;--yellow:#FFD32A;--green:#26de81;--teal:#20bf6b;--blue:#0984e3;--dpurp:#6c5ce7;--pink:#fd79a8;--navy:#2d3436;--bg:#FFF8F0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Baloo 2',sans-serif;background:var(--bg);overflow-x:hidden}
#hdr{background:linear-gradient(135deg,#FF6B6B,#FF8E53,#FFC200);padding:10px 14px 8px;text-align:center;box-shadow:0 3px 12px rgba(255,100,0,.3)}
#hdr h1{font-size:clamp(18px,5vw,28px);font-weight:800;color:#fff;text-shadow:1px 2px 0 rgba(0,0,0,.15)}
.star-row{display:flex;justify-content:center;gap:4px;margin-top:4px;min-height:22px}
.star-row span{font-size:18px;animation:popIn .3s ease both}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
#modetabs{display:flex;background:#fff;border-bottom:2px solid #f0f0f0;overflow-x:auto;justify-content:center;flex-wrap:wrap}
.mtab{padding:10px 16px;border:none;background:transparent;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s}
.mtab.on{color:var(--blue);border-bottom-color:var(--blue)}
.mpnl{display:none;padding:12px;animation:fadeUp .2s ease}
.mpnl.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pa-sel{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.pa-btn{padding:5px 11px;border:2px solid #e0e0e0;border-radius:11px;background:#fff;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .14s;color:var(--navy)}
.pa-btn.on{color:#fff}
.pa-board{background:#fff;border-radius:16px;padding:12px;box-shadow:0 3px 14px rgba(0,0,0,.09)}
.pa-big{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;cursor:pointer;flex-shrink:0}
.tbl-wrap{overflow-x:auto;margin-top:10px}
table.ptbl{border-collapse:collapse;width:100%}
table.ptbl th{background:#f8f9fa;padding:6px 8px;font-size:14px;font-weight:800;text-align:center;border:1px solid #eee;min-width:44px}
table.ptbl td{padding:5px 3px;border:1px solid #eee;text-align:center;vertical-align:middle}
table.ptbl td.na-hd{font-size:14px;font-weight:800;color:var(--dpurp);background:#f0edff;cursor:pointer;min-width:30px}
table.ptbl td.syl-cell{cursor:pointer;min-width:50px}
table.ptbl td.syl-cell:hover{background:#f5f0ff}
table.ptbl td.syl-na{min-width:50px}
.syl-ok{font-size:15px;font-weight:800}
.syl-no{font-size:13px;color:#ddd}
.syl-x{font-size:13px;color:#eee}
table.ptbl td.ex-cell{min-width:80px;cursor:pointer;padding:4px 6px}
table.ptbl td.ex-cell:hover{background:#fff9e6}
.ex-em{font-size:18px}.ex-w{font-size:14px;font-weight:800}.ex-m{font-size:10px;color:#aaa}
.vg-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.vg-tab{padding:5px 11px;border:2px solid #ddd;border-radius:11px;background:#fff;font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .14s}
.vg-tab.on{color:#fff}
.vg-board{background:#fff;border-radius:16px;padding:12px;box-shadow:0 3px 14px rgba(0,0,0,.09);margin-bottom:12px}
.vg-van-hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.vg-van-title{font-size:36px;font-weight:800;cursor:pointer;line-height:1}
table.vtbl{border-collapse:collapse;width:100%}
table.vtbl th{background:#f8f9fa;padding:6px 8px;font-size:14px;font-weight:800;text-align:center;border:1px solid #eee;min-width:44px}
table.vtbl td{padding:5px 3px;border:1px solid #eee;text-align:center;vertical-align:middle;min-width:50px}
table.vtbl td.pa-hd{font-size:14px;font-weight:800;color:var(--dpurp);background:#f0edff;cursor:pointer;min-width:36px}
.speak-btn{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#00b894,#20bf6b);color:#fff;border:none;padding:7px 14px;border-radius:9px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.sample-row{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
.sw{background:#fff3e0;border:2px solid #ffcc80;border-radius:9px;padding:4px 10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.sw:hover{background:#ff9800;color:#fff;border-color:#ff9800}
.sents-box{background:#f8f9fa;border-radius:10px;padding:8px 10px;margin-top:5px}
.sent-line{font-size:13px;font-weight:700;color:var(--navy);padding:3px 5px;border-radius:5px;cursor:pointer;transition:all .12s}
.sent-line:hover{background:#e8f5e9;color:var(--teal)}
.sent-line::before{content:'• '}
.tone-note{font-size:11px;background:#fff3e0;border:1px solid #ffcc80;border-radius:7px;padding:3px 8px;color:#e67e22;display:inline-block;margin-bottom:6px}
.game-hdr{border-radius:14px;padding:10px;text-align:center;margin-bottom:10px;color:#fff}
.game-hdr h2{font-size:17px;font-weight:800}
.game-hdr p{font-size:11px;opacity:.9;margin-top:1px}
.score-row{display:flex;gap:7px;justify-content:center;margin-bottom:8px}
.sc{padding:4px 12px;border-radius:9px;font-size:12px;font-weight:800}
.sc-ok{background:#d4f8e0;color:#00b894}.sc-no{background:#ffe0e3;color:#e17055}.sc-st{background:#fff3cd;color:#e67e22}
.g-type-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.play-btn{display:block;margin:0 auto 10px;width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);border:none;font-size:34px;cursor:pointer;box-shadow:0 5px 16px rgba(102,126,234,.4);transition:all .16s}
.play-btn:hover{transform:scale(1.07)}
.play-btn.pulse{animation:pa .45s ease}
@keyframes pa{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.g-instruct{text-align:center;font-size:12px;color:#636e72;font-weight:700;margin-bottom:9px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gopt{background:#fff;border:3px solid #e8e8e8;border-radius:13px;padding:11px 6px;cursor:pointer;text-align:center;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Baloo 2',sans-serif}
.gopt:hover{border-color:var(--dpurp);background:#f5f0ff;transform:translateY(-2px)}
.gopt .ge{font-size:26px}.gopt .gt{font-size:18px;font-weight:800;color:var(--navy)}.gopt .gs{font-size:11px;color:#aaa}
.gopt.ok{border-color:#00b894;background:#d4f8e0;animation:boun .4s}
.gopt.no{border-color:#e17055;background:#ffe0e3;animation:shk .3s}
@keyframes boun{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes shk{0%,100%{transform:translateX(0)}33%{transform:translateX(-6px)}66%{transform:translateX(6px)}}
.g-msg{text-align:center;font-size:13px;font-weight:800;min-height:20px;margin:7px 0 2px}
.next-btn{display:block;margin:7px auto 0;padding:9px 24px;border:none;border-radius:11px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.fb-card{background:#fff;border-radius:13px;padding:13px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:9px}
.fb-emoji{font-size:58px;display:block;margin-bottom:3px}
.fb-word{display:flex;align-items:flex-end;justify-content:center;gap:4px;font-size:26px;font-weight:800;color:var(--navy);margin-bottom:2px;flex-wrap:wrap}
.fb-blank{min-width:46px;height:42px;border-bottom:4px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--blue)}
.fb-choices{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.fbc{background:#fff;border:3px solid #e0e0e0;border-radius:9px;padding:7px 12px;font-size:18px;font-weight:800;font-family:'Baloo 2',sans-serif;color:var(--navy);cursor:pointer;transition:all .13s;min-width:46px}
.fbc:hover{border-color:var(--pink);background:#fff0f5}
.fbc.ok{border-color:#00b894;background:#d4f8e0;color:#00b894;animation:boun .4s}
.fbc.no{border-color:#e17055;background:#ffe0e3;animation:shk .3s}
.arr-card{background:#fff;border-radius:13px;padding:13px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:9px}
.arr-ans{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;min-height:48px;background:#f7f7f7;border-radius:9px;padding:6px 9px;margin-bottom:7px;align-items:center}
.arr-placed{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:6px 12px;border-radius:8px;font-size:18px;font-weight:800;cursor:pointer}
.arr-placeholder{color:#ccc;font-size:11px}
.arr-tiles{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:7px}
.arr-tile{background:#fff;border:3px solid #ddd;border-radius:9px;padding:7px 12px;font-size:18px;font-weight:800;cursor:pointer;font-family:'Baloo 2',sans-serif;color:var(--navy);transition:all .12s}
.arr-tile:hover{border-color:var(--dpurp);background:#f0edff}
.arr-tile.used{opacity:.3;pointer-events:none}
.arr-btns{display:flex;gap:6px;justify-content:center}
.arr-check{padding:8px 16px;border:none;border-radius:9px;font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00b894,#20bf6b);color:#fff}
.arr-reset{padding:8px 13px;border:none;border-radius:9px;font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:#f0f0f0;color:#666}
.cnf{position:fixed;pointer-events:none;z-index:1000;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh)rotate(720deg);opacity:0}}
#reward{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
#reward.on{display:flex}
.rw{background:#fff;border-radius:20px;padding:24px 18px;text-align:center;max-width:270px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.rw-em{font-size:58px;animation:spin .6s ease both}
@keyframes spin{from{transform:scale(0)rotate(-180deg)}to{transform:scale(1)rotate(0)}}
.rw-t{font-size:20px;font-weight:800;margin:7px 0 2px;color:var(--navy)}
.rw-btn{margin-top:12px;padding:9px 26px;border:none;border-radius:11px;font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff}
.sec-lbl{font-size:11px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 5px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="hdr"><h1>🌈 Bé Học Đánh Vần</h1><div class="star-row" id="starRow"></div></div>
<div id="modetabs">
  <button class="mtab on" data-m="pa">📋 Phụ âm × Nguyên âm</button>
  <button class="mtab" data-m="vg">📖 Nhóm vần SGK</button>
  <button class="mtab" data-m="g1">🎵 Nghe &amp; Chọn</button>
  <button class="mtab" data-m="g2">✏️ Điền vần</button>
  <button class="mtab" data-m="g3">🧩 Ghép từ</button>
</div>
<div class="mpnl on" id="mpnl-pa"><div class="sec-lbl">Chọn phụ âm:</div><div class="pa-sel" id="paSel"></div><div id="paBoard"></div></div>
<div class="mpnl" id="mpnl-vg"><div class="sec-lbl">Chọn nhóm vần:</div><div class="vg-tabs" id="vgTabs"></div><div id="vgBoard"></div></div>
<div class="mpnl" id="mpnl-g1">
  <div class="game-hdr" style="background:linear-gradient(135deg,#667eea,#764ba2)"><h2>🎵 Nghe &amp; Chọn Đúng</h2><p>Bấm 🔊 nghe rồi chọn từ đúng!</p></div>
  <div class="score-row"><span class="sc sc-ok" id="g1ok">✓ 0</span><span class="sc sc-no" id="g1no">✗ 0</span><span class="sc sc-st" id="g1st">🔥 0</span></div>
  <div class="g-type-row" id="g1TypeRow"><button class="pa-btn on" data-t="van">Theo vần</button><button class="pa-btn" data-t="tu">Từ có hình</button></div>
  <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:8px" id="g1VGSel"></div>
  <button class="play-btn" id="g1Btn">🔊</button>
  <div class="g-instruct">👆 Bấm loa để nghe rồi chọn đúng</div>
  <div class="opts-grid" id="g1Opts"></div>
  <div class="g-msg" id="g1Msg"></div>
  <button class="next-btn hidden" id="g1Next">Câu tiếp ➡️</button>
</div>
<div class="mpnl" id="mpnl-g2">
  <div class="game-hdr" style="background:linear-gradient(135deg,#f7971e,#ffd200);color:#333"><h2>✏️ Điền Vần Còn Thiếu</h2><p style="color:#555">Tự chuyển câu khi đúng!</p></div>
  <div class="score-row"><span class="sc sc-ok" id="g2ok">✓ 0</span><span class="sc sc-no" id="g2no">✗ 0</span><span class="sc sc-st" id="g2st">🔥 0</span></div>
  <div class="g-type-row" id="g2VGRow"></div>
  <div id="g2Board"></div><div class="g-msg" id="g2Msg"></div>
  <button class="next-btn hidden" id="g2Next">Câu tiếp ➡️</button>
</div>
<div class="mpnl" id="mpnl-g3">
  <div class="game-hdr" style="background:linear-gradient(135deg,#00b894,#20bf6b)"><h2>🧩 Ghép Âm Thành Từ</h2><p>Tự chuyển câu khi đúng!</p></div>
  <div class="score-row"><span class="sc sc-ok" id="g3ok">✓ 0</span><span class="sc sc-no" id="g3no">✗ 0</span></div>
  <div class="g-type-row" id="g3VGRow"></div>
  <div id="g3Board"></div><div class="g-msg" id="g3Msg"></div>
  <button class="next-btn hidden" id="g3Next">Câu tiếp ➡️</button>
</div>
<div id="reward"><div class="rw"><div class="rw-em" id="rwEm">🏆</div><div class="rw-t">Tuyệt vời!</div><div style="font-size:12px;color:#888">Bé học giỏi lắm!</div><button class="rw-btn" id="rwClose">Tiếp tục ▶</button></div></div>

<script>
const $=id=>document.getElementById(id);
const speak=(t,r=0.8)=>{if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=r;speechSynthesis.speak(u);};
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

// ===== THANH ĐIỆU =====
const TK=['','`','´','?','~','·'];
const TC=['#555','#0984e3','#e17055','#00b894','#6c5ce7','#c0392b'];
// KIỂU vần quyết định thanh nào dùng được:
// 'open'  = vần mở (a,e,o...): cả 6 thanh
// 'sonorant' = kết thúc m/n/ng/nh: cả 6 thanh  
// 'stop'  = kết thúc p/t/c/ch: chỉ thanh SẮC(2) và NẶNG(5)
const TONE_MASK={
  open:[0,1,2,3,4,5],
  sonorant:[0,1,2,3,4,5],
  stop:[2,5],      // chỉ ´ và ·
};

// Nguyên âm đơn — KHÔNG có ă, â (chỉ trong vần ghép)
const NA_BASE=['a','e','ê','i','o','ô','ơ','u','ư'];
const NA_T={
  a:['a','à','á','ả','ã','ạ'],e:['e','è','é','ẻ','ẽ','ẹ'],ê:['ê','ề','ế','ể','ễ','ệ'],
  i:['i','ì','í','ỉ','ĩ','ị'],o:['o','ò','ó','ỏ','õ','ọ'],ô:['ô','ồ','ố','ổ','ỗ','ộ'],
  ơ:['ơ','ờ','ớ','ở','ỡ','ợ'],u:['u','ù','ú','ủ','ũ','ụ'],ư:['ư','ừ','ứ','ử','ữ','ự'],
};

// ===== PHỤ ÂM DATA =====
// words: {na: [{t,w,e,m}]} — chỉ từ thực có nghĩa
const PHU_AM=[
  {pa:'b',col:'#0984e3',na_ok:['a','e','ê','i','o','ô','ơ','u','ư'],words:{
    a:[{t:0,w:'ba',e:'👨',m:'ba'},{t:1,w:'bà',e:'👵',m:'bà'},{t:2,w:'bá',e:'👑',m:'bá'},{t:5,w:'bạ',e:'📝',m:'bạ'},{t:3,w:'bả',e:'🧪',m:'bả'},{t:4,w:'bã',e:'🌿',m:'bã'}],
    e:[{t:2,w:'bé',e:'👶',m:'bé'},{t:1,w:'bè',e:'🛶',m:'bè'},{t:0,w:'be',e:'🍼',m:'be'},{t:5,w:'bẹ',e:'🐟',m:'bẹ'}],
    ê:[{t:0,w:'bê',e:'🐄',m:'bê'},{t:2,w:'bế',e:'🤱',m:'bế'},{t:1,w:'bề',e:'📐',m:'bề'},{t:3,w:'bể',e:'🐠',m:'bể'}],
    i:[{t:0,w:'bi',e:'🔮',m:'bi'},{t:2,w:'bí',e:'🥒',m:'bí'},{t:1,w:'bì',e:'📦',m:'bì'},{t:5,w:'bị',e:'😣',m:'bị'},{t:3,w:'bỉ',e:'😤',m:'bỉ'}],
    o:[{t:1,w:'bò',e:'🐄',m:'bò'},{t:2,w:'bó',e:'💐',m:'bó'},{t:3,w:'bỏ',e:'🚮',m:'bỏ'},{t:5,w:'bọ',e:'🐛',m:'bọ'}],
    ô:[{t:0,w:'bô',e:'🪣',m:'bô'},{t:2,w:'bố',e:'👨',m:'bố'},{t:1,w:'bồ',e:'🐦',m:'bồ'},{t:3,w:'bổ',e:'💊',m:'bổ'},{t:5,w:'bộ',e:'📚',m:'bộ'}],
    ơ:[{t:0,w:'bơ',e:'🧈',m:'bơ'},{t:1,w:'bờ',e:'🏖️',m:'bờ'},{t:2,w:'bớ',e:'😮',m:'bớ'},{t:3,w:'bở',e:'🤏',m:'bở'}],
    u:[{t:0,w:'bu',e:'🐝',m:'bu'},{t:2,w:'bú',e:'🍼',m:'bú'},{t:1,w:'bù',e:'💇',m:'bù'},{t:5,w:'bụ',e:'👶',m:'bụ'},{t:3,w:'bủ',e:'🌿',m:'bủ'}],
    ư:[{t:4,w:'bữa',e:'🍽️',m:'bữa'},{t:1,w:'bừa',e:'🌿',m:'bừa'},{t:2,w:'bứa',e:'🌳',m:'bứa'}],
  }},
  {pa:'c',col:'#00b894',na_ok:['a','o','ô','ơ','u','ư'],words:{
    a:[{t:0,w:'ca',e:'🎵',m:'ca'},{t:2,w:'cá',e:'🐟',m:'cá'},{t:1,w:'cà',e:'🍆',m:'cà'},{t:3,w:'cả',e:'🐟',m:'cả'},{t:5,w:'cạ',e:'🔧',m:'cạ'}],
    o:[{t:0,w:'co',e:'🦵',m:'co'},{t:2,w:'có',e:'✅',m:'có'},{t:1,w:'cò',e:'🦢',m:'cò'},{t:5,w:'cọ',e:'🌴',m:'cọ'},{t:3,w:'cỏ',e:'🌿',m:'cỏ'}],
    ô:[{t:0,w:'cô',e:'👩',m:'cô'},{t:2,w:'cố',e:'🙏',m:'cố'},{t:1,w:'cồ',e:'🦅',m:'cồ'},{t:3,w:'cổ',e:'🦒',m:'cổ'},{t:5,w:'cộ',e:'🌿',m:'cộ'}],

// ===== VẦN — đầy đủ với kiểu thanh điệu =====
// type: 'open'|'sonorant'|'stop'
// Vần kết thúc -p,-t,-c,-ch → STOP (chỉ ´ và ·)
// Vần kết thúc -m,-n,-ng,-nh → SONORANT (cả 6)
// Vần kết thúc nguyên âm → OPEN (cả 6)

function vanType(v){
  if(/[ptckh]$/.test(v)||v.endsWith('ch')) return 'stop';
  if(/[mn]$/.test(v)||v.endsWith('ng')||v.endsWith('nh')) return 'sonorant';
  return 'open';
}

function renderPABoard(pa){
  const bd=$('paBoard');bd.innerHTML='';

  if(pa.note) noteHtml=`<div class="tone-note">⚠️ ${pa.note}</div>`;
  box.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
    <div class="pa-big" style="background:linear-gradient(135deg,${pa.col}cc,${pa.col})" onclick="speak('${pa.pa}')">${pa.pa}</div>
    <div><div style="font-size:16px;font-weight:800;color:${pa.col}">${pa.pa}</div>
    <div style="font-size:11px;color:#888">NA ghép: ${pa.na_ok.join(' · ')} · Bấm ô để nghe</div>
    ${noteHtml}</div>
  </div>`;
  const wrap=document.createElement('div');wrap.className='tbl-wrap';
  const tbl=document.createElement('table');tbl.className='ptbl';
  tbl.innerHTML=`<thead><tr><th style="min-width:28px">NA</th>${TK.map((k,i)=>`<th style="color:${TC[i]};font-size:15px">${k||'◻'}</th>`).join('')}<th>Ví dụ</th></tr></thead>`;
  const tb=document.createElement('tbody');

  pa.na_ok.forEach(na=>{
    const tones=NA_T[na];if(!tones)return;
    const wordList=pa.words[na]||[];if(!wordList.length)return;
    const byTone={};wordList.forEach(w=>byTone[w.t]=w);
    const tr=document.createElement('tr');
    const natd=document.createElement('td');natd.className='na-hd';natd.textContent=na;natd.onclick=()=>speak(na);
    tr.appendChild(natd);
    // Vần nguyên âm đơn = open → cả 6 thanh
    tones.forEach((tn,ti)=>{

      const pair=byTone[ti];
      const td=document.createElement('td');
      if(pair){td.className='syl-cell';td.innerHTML=`<span class="syl-ok" style="color:${TC[ti]}">${syl}</span>`;td.title=pair.m;td.onclick=()=>speak(syl);}
      else{td.className='syl-na';td.innerHTML=`<span class="syl-no">${syl}</span>`;}

    extd.onclick=()=>speak(best.w);tr.appendChild(extd);tb.appendChild(tr);

const ALL_PAS=['b','c','d','đ','g','gh','h','k','l','m','n','ng','ngh','r','s','t','v','x','ch','nh','th','tr','ph','kh'];

function paCanJoinVan(pa,van){
  const v=van.v;
  const firstV=v[0];
  const eVowels=['e','ê','i'];
  const nonEVowels=['a','ă','â','o','ô','ơ','u','ư'];
  if(pa==='c'&&eVowels.some(e=>v.startsWith(e)))return false;
  if(pa==='k'&&!eVowels.some(e=>v.startsWith(e))||pa==='k'&&!v.startsWith('y'))if(pa==='k'&&nonEVowels.some(e=>v.startsWith(e)))return false;
  if(pa==='k'){if(!['e','ê','i','y','iê'].some(e=>v.startsWith(e)))return false;}
  if(pa==='g'&&eVowels.some(e=>v.startsWith(e)))return false;
  if(pa==='gh'&&!eVowels.some(e=>v.startsWith(e)))return false;
  if(pa==='ng'&&eVowels.some(e=>v.startsWith(e)))return false;
  if(pa==='ngh'&&!eVowels.some(e=>v.startsWith(e)))return false;
  return true;
}

function renderVGBoard(g){
  const bd=$('vgBoard');bd.innerHTML='';
  g.vans.forEach(van=>{
    const box=document.createElement('div');box.className='vg-board';
    const allowedTones=TONE_MASK[van.type];
    const isStop=van.type==='stop';
    const toneNote=isStop
      ?'<span class="tone-note">⚠️ Vần này chỉ dùng thanh ´ (sắc) và · (nặng)</span>'
      :'';

    const hdr=document.createElement('div');hdr.className='vg-van-hdr';
    hdr.innerHTML=`<div class="vg-van-title" style="color:${van.col}" onclick="speak('${van.v}')">-${van.v} ${van.e}</div>
      <button class="speak-btn" onclick="speak('${van.v}')">🔊 Nghe</button>${toneNote}`;
    box.appendChild(hdr);

    const validPAs=ALL_PAS.filter(pa=>paCanJoinVan(pa,van));
    const wrap=document.createElement('div');wrap.className='tbl-wrap';
    const tbl=document.createElement('table');tbl.className='vtbl';

    // Header: show only allowed tones
    const thCells=TK.map((k,i)=>{
      const allowed=allowedTones.includes(i);
      return `<th style="color:${allowed?TC[i]:'#ddd'};font-size:15px">${k||'◻'}</th>`;
    }).join('');
    tbl.innerHTML=`<thead><tr><th style="min-width:36px">PA</th>${thCells}<th>Ví dụ</th></tr></thead>`;

    const tb=document.createElement('tbody');
    validPAs.slice(0,16).forEach(pa=>{
      const base=pa+van.v;
      const tr=document.createElement('tr');
      const patd=document.createElement('td');patd.className='pa-hd';patd.textContent=pa;patd.onclick=()=>speak(pa);
      tr.appendChild(patd);

      TK.forEach((_,ti)=>{
        const td=document.createElement('td');
        if(allowedTones.includes(ti)){
          const form=applyTone(base,ti);
          td.innerHTML=`<span class="syl-ok" style="color:${TC[ti]};cursor:pointer" onclick="speak('${form}')">${form}</span>`;
        } else {
          // Không dùng được thanh này
          td.innerHTML=`<span class="syl-x">✗</span>`;
        }
        tr.appendChild(td);
      });

      // Ví dụ: tìm từ từ exW bắt đầu bằng pa này
      const exWord=van.exW.find(w=>w.startsWith(pa))||'';
      const extd=document.createElement('td');extd.style.cssText='min-width:70px;cursor:pointer;padding:4px';
      if(exWord){extd.innerHTML=`<span class="ex-w" style="color:${van.col}">${exWord}</span>`;extd.onclick=()=>speak(exWord);}
      tr.appendChild(extd);tb.appendChild(tr);
    });
    tbl.appendChild(tb);wrap.appendChild(tbl);box.appendChild(wrap);

    if(van.exW&&van.exW.length){
      const rl=document.createElement('div');rl.className='sec-lbl';rl.style.marginTop='7px';rl.textContent='📖 Đọc từ:';
      box.appendChild(rl);
      const sr=document.createElement('div');sr.className='sample-row';
      van.exW.forEach(w=>{const c=document.createElement('span');c.className='sw';c.textContent=w;c.onclick=()=>speak(w);sr.appendChild(c);});
      box.appendChild(sr);
    }
    const goodSents=van.sents.filter(s=>s.length>3);
    if(goodSents.length){
      const sb=document.createElement('div');sb.className='sents-box';
      goodSents.forEach(s=>{const d=document.createElement('div');d.className='sent-line';d.textContent=s;d.onclick=()=>speak(s,0.75);sb.appendChild(d);});
      box.appendChild(sb);
    }
    bd.appendChild(box);
  });
}

function g1Pool(){
  if(g1.type==='van'){
    const g=VG_GROUPS.find(x=>x.id===g1.vgId);if(!g)return[];
    return g.vans.flatMap(van=>
      van.exW.filter(w=>w.length>0).map(w=>({am:w,van:van.v,show:{e:van.e,tx:w,sub:'-'+van.v}}))
    );
  }
  return PHU_AM.flatMap(p=>Object.values(p.words).flat().filter(x=>x.e&&x.m).map(x=>({am:x.w,show:{e:x.e,tx:x.w,sub:x.m}})));
}

function newG1(){
  g1.done=false;$('g1Next').classList.add('hidden');$('g1Msg').textContent='';
  const pool=g1Pool();if(!pool.length)return;
  const item=rnd(pool);
  const wrongs=shuffle(pool.filter(x=>x.am!==item.am)).slice(0,3);
  const opts=shuffle([item,...wrongs]);
  const od=$('g1Opts');od.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');btn.className='gopt';
    btn.innerHTML=`<span class="ge">${o.show.e}</span><span class="gt">${o.show.tx}</span><span class="gs">${o.show.sub}</span>`;
    btn.onclick=()=>{
      if(g1.done)return;g1.done=true;
      od.querySelectorAll('.gopt').forEach(x=>x.disabled=true);
      if(o.am===item.am){btn.classList.add('ok');g1.ok++;g1.streak++;$('g1Msg').innerHTML='<span style="color:#00b894">🎉 Đúng rồi!</span>';speak('Đúng rồi!');confetti();if(g1.streak%5===0)showReward();}
      else{btn.classList.add('no');g1.no++;g1.streak=0;Array.from(od.children).forEach((x,i)=>{if(opts[i].am===item.am)x.classList.add('ok');});$('g1Msg').innerHTML=`<span style="color:#e17055">❌ Đúng: ${item.show.tx} (-${item.van||''})</span>`;speak('Sai rồi!');}
      $('g1ok').textContent='✓ '+g1.ok;$('g1no').textContent='✗ '+g1.no;$('g1st').textContent='🔥 '+g1.streak;
      $('g1Next').classList.remove('hidden');
    };
    od.appendChild(btn);
  });
  $('g1Btn').onclick=()=>{$('g1Btn').classList.add('pulse');setTimeout(()=>$('g1Btn').classList.remove('pulse'),450);speak(item.am);};
  $('g1Btn').classList.add('pulse');setTimeout(()=>$('g1Btn').classList.remove('pulse'),450);speak(item.am);
}
$('g1Next').onclick=newG1;

function newG2(){
  g2.done=false;$('g2Next').classList.add('hidden');$('g2Msg').textContent='';
  const g=VG_GROUPS.find(x=>x.id===g2.vgId);
  const van=rnd(g.vans);
  const words=van.exW.filter(w=>w.length>=2);if(!words.length){newG2();return;}
  const word=rnd(words);
  // Tách PA và vần
  let pa='',vn=van.v;
  const twoPA=['ch','nh','th','tr','ph','kh','ng','gh'];
  if(word.length>2&&twoPA.some(p=>word.startsWith(p))){pa=word.slice(0,2);vn=word.slice(2)||van.v;}
  else{pa=word[0];vn=word.slice(1)||van.v;}
  if(!pa||!vn){newG2();return;}
  const blankPa=Math.random()>0.5;
  const ans=blankPa?pa:vn;
  const wrongPool=blankPa
    ?[...new Set(g.vans.flatMap(v=>v.exW.filter(w=>w.length>1).map(w=>{const tp=twoPA.find(p=>w.startsWith(p));return tp||w[0];})).filter(x=>x&&x!==pa))].slice(0,4)
    :[...new Set(g.vans.map(v=>v.v).filter(v=>v!==vn))].slice(0,4);
  const choices=shuffle([ans,...shuffle(wrongPool).slice(0,4)]).slice(0,5);

  const allWords=PHU_AM.flatMap(p=>Object.values(p.words).flat());
  const matched=allWords.find(w=>w.w===word);
  const emoji=matched?matched.e:(van.e||'📝');

  const bd=$('g2Board');bd.innerHTML='';
  const wDisp=blankPa
    ?`<div class="fb-blank" id="g2bl">?</div><span>+</span><span style="color:${g.col}">${vn}</span>`
    :`<span>${pa}</span><span>+</span><div class="fb-blank" id="g2bl">?</div>`;

  bd.innerHTML=`<div class="fb-card">
    <span class="fb-emoji">${emoji}</span>
    <div class="fb-word">${wDisp}<span style="margin:0 5px">=</span><span style="color:${g.col}">${word}</span></div>
    <div style="font-size:11px;color:#aaa">Điền ${blankPa?'phụ âm':'vần'} còn thiếu</div>
    <button class="speak-btn" style="margin:5px auto;display:inline-flex" onclick="speak('${word}')">🔊 ${word}</button>
    <div class="fb-choices" id="g2c">${choices.map(c=>`<button class="fbc" data-v="${c}">${c}</button>`).join('')}</div>
    <div id="g2m" style="min-height:18px;font-size:13px;font-weight:800;text-align:center;margin-top:5px"></div>
  </div>`;

  document.getElementById('g2c').querySelectorAll('.fbc').forEach(btn=>{
    btn.onclick=()=>{
      if(g2.done)return;
      const v=btn.dataset.v;
      document.getElementById('g2c').querySelectorAll('.fbc').forEach(x=>x.disabled=true);
      if(v===ans){
        btn.classList.add('ok');$('g2bl').textContent=ans;$('g2bl').style.color=g.col;$('g2bl').style.borderColor=g.col;
        document.getElementById('g2m').innerHTML=`<span style="color:#00b894">🎉 ${pa}+${vn}=${word}</span>`;
        g2.ok++;g2.streak++;speak('Đúng rồi! '+word);confetti();if(g2.streak%5===0)showReward();
        g2.done=true;$('g2ok').textContent='✓ '+g2.ok;$('g2no').textContent='✗ '+g2.no;$('g2st').textContent='🔥 '+g2.streak;
        setTimeout(newG2,1300);
      } else {
        btn.classList.add('no');document.getElementById('g2c').querySelectorAll('.fbc').forEach(x=>{if(x.dataset.v===ans)x.classList.add('ok');});
        document.getElementById('g2m').innerHTML=`<span style="color:#e17055">❌ Đáp án: ${ans}</span>`;
        g2.no++;g2.streak=0;g2.done=true;speak('Sai rồi. Đáp án là '+ans);
        $('g2ok').textContent='✓ '+g2.ok;$('g2no').textContent='✗ '+g2.no;$('g2st').textContent='🔥 '+g2.streak;
        $('g2Next').classList.remove('hidden');
      }
    };
  });
  speak(word);
}
$('g2Next').onclick=newG2;

// ===== GAME 3 =====
let g3={ok:0,no:0,placed:[],done:false,vgId:'g01',_cur:null};
function buildG3VGRow(){
  const row=$('g3VGRow');row.innerHTML='';
  VG_GROUPS.forEach((g,i)=>{
    const b=document.createElement('button');b.className='pa-btn'+(i===0?' on':'');
    b.style.cssText=`font-size:11px;border-color:${g.col}44`;b.textContent=g.name;
    b.onclick=()=>{row.querySelectorAll('.pa-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');g3.vgId=g.id;newG3();};
    row.appendChild(b);
  });
}
function newG3(){
  g3.done=false;g3.placed=[];$('g3Next').classList.add('hidden');$('g3Msg').textContent='';
  const g=VG_GROUPS.find(x=>x.id===g3.vgId);
  const van=rnd(g.vans);
  const words=van.exW.filter(w=>w.length>=2);if(!words.length){newG3();return;}
  const word=rnd(words);
  const twoPA=['ch','nh','th','tr','ph','kh','ng','gh'];
  let pa=word[0],vn=word.slice(1)||van.v;
  if(word.length>2){const tp=twoPA.find(p=>word.startsWith(p));if(tp){pa=tp;vn=word.slice(tp.length)||van.v;}}
  if(!vn||!pa){newG3();return;}
  g3._cur={word,pa,vn,g,van};
  const allPAList=['b','c','d','đ','g','h','l','m','n','r','s','t','v','x'];
  const distPAs=shuffle(allPAList.filter(p=>p!==pa)).slice(0,1);
  const distVs=shuffle(g.vans.map(v=>v.v).filter(v=>v!==vn)).slice(0,1);
  const tiles=shuffle([pa,vn,...distPAs,...distVs]);

  const allWords=PHU_AM.flatMap(p=>Object.values(p.words).flat());
  const matched=allWords.find(w=>w.w===word);
  const emoji=matched?matched.e:(van.e||'📝');

  const bd=$('g3Board');bd.innerHTML='';
  bd.innerHTML=`<div class="arr-card">
    <div style="font-size:54px">${emoji}</div>
    <div style="font-size:12px;color:#636e72;margin:3px 0 7px">${word}</div>
    <button class="speak-btn" style="margin:0 auto 8px;display:inline-flex" onclick="speak('${word}')">🔊 Nghe</button>
  </div>
  <div class="arr-ans" id="g3ar"><span class="arr-placeholder">Chọn âm xếp thành từ</span></div>
  <div class="arr-tiles" id="g3tl">${tiles.map((t,i)=>`<button class="arr-tile" data-v="${t}" data-i="${i}">${t}</button>`).join('')}</div>
  <div id="g3m" style="min-height:18px;font-size:13px;font-weight:800;text-align:center;margin:4px 0"></div>
  <div class="arr-btns"><button class="arr-check" id="g3chk">✅ Kiểm tra</button><button class="arr-reset" id="g3rst">🔄 Xóa</button></div>`;

  document.getElementById('g3tl').querySelectorAll('.arr-tile').forEach(btn=>{
    btn.onclick=()=>{
      if(btn.classList.contains('used')||g3.done)return;
      btn.classList.add('used');g3.placed.push({v:btn.dataset.v,i:btn.dataset.i});
      renderG3Ans();
      if(g3.placed.length>=2)doCheckG3();
    };
  });
  document.getElementById('g3chk').onclick=doCheckG3;
  document.getElementById('g3rst').onclick=()=>{
    if(g3.done)return;
    g3.placed=[];document.getElementById('g3tl').querySelectorAll('.arr-tile').forEach(b=>b.classList.remove('used'));
    document.getElementById('g3m').textContent='';renderG3Ans();
  };
  speak(word);
}
function doCheckG3(){
  if(!g3._cur||g3.done)return;
  const{word,pa,vn,g,van}=g3._cur;
  const ans=g3.placed.map(x=>x.v).join('');
  if(ans===word){
    document.getElementById('g3m').innerHTML=`<span style="color:#00b894">🎉 ${pa}+${vn}=${word}</span>`;
    g3.ok++;speak('Đúng rồi! '+word);confetti();g3.done=true;
    $('g3ok').textContent='✓ '+g3.ok;$('g3no').textContent='✗ '+g3.no;
    setTimeout(newG3,1300);
  } else if(g3.placed.length>=2&&!g3.done){
    // Chỉ báo sai khi bấm nút kiểm tra, không auto
    const isManual=window._g3manual;
    if(isManual){
      document.getElementById('g3m').innerHTML=`<span style="color:#e17055">❌ Cần: ${pa}+${vn}=${word}</span>`;
      g3.no++;g3.done=true;speak('Sai rồi. Phải là '+pa+' '+vn+' '+word);
      $('g3ok').textContent='✓ '+g3.ok;$('g3no').textContent='✗ '+g3.no;
      $('g3Next').classList.remove('hidden');
    }
  }
}
// Override check button
document.addEventListener('click',e=>{if(e.target&&e.target.id==='g3chk'){window._g3manual=true;doCheckG3();window._g3manual=false;}});
function renderG3Ans(){
  const row=document.getElementById('g3ar');if(!row)return;
  if(!g3.placed.length){row.innerHTML='<span class="arr-placeholder">Chọn âm xếp thành từ</span>';return;}
  row.innerHTML=g3.placed.map(x=>`<div class="arr-placed" onclick="g3Remove('${x.i}')">${x.v}</div>`).join('');
}
window.g3Remove=(idx)=>{
  if(g3.done)return;
  g3.placed=g3.placed.filter(x=>x.i!==idx);
  document.querySelectorAll('.arr-tile').forEach(b=>{if(b.dataset.i===idx)b.classList.remove('used');});
  renderG3Ans();
};
$('g3Next').onclick=newG3;

// ===== CONFETTI & REWARD =====
let stars=0;
function confetti(){
  stars++;const sr=$('starRow');const s=document.createElement('span');s.textContent='⭐';sr.appendChild(s);
  if(sr.children.length>12)sr.removeChild(sr.firstChild);
  const cols=['#FF4757','#FF7F11','#FFD32A','#26de81','#0984e3','#a29bfe','#fd79a8'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='cnf';const sz=5+Math.random()*6;
    p.style.cssText=`left:${10+Math.random()*80}vw;top:-10px;width:${sz}px;height:${sz}px;background:${rnd(cols)};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.3}s;animation-delay:${Math.random()*.2}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),2800);
  }
}
function showReward(){
  $('rwEm').textContent=rnd(['🏆','🌟','🎉','🥇','🌈','🎁','👑']);
  $('reward').classList.add('on');speak('Ôi tuyệt vời! Bé học giỏi quá!',0.88);
}
$('rwClose').onclick=()=>$('reward').classList.remove('on');

// ===== TABS =====
document.querySelectorAll('.mtab').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.mpnl').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');$('mpnl-'+btn.dataset.m).classList.add('on');
    if(btn.dataset.m==='g1'&&!$('g1Opts').children.length)newG1();
    if(btn.dataset.m==='g2'&&!$('g2Board').children.length)newG2();
    if(btn.dataset.m==='g3'&&!$('g3Board').children.length)newG3();
  };
});

buildPASel();buildVGTabs();buildG2VGRow();buildG3VGRow();buildG1VGSel();
$('g1VGSel').style.display='flex';
</script>
</body>
</html>

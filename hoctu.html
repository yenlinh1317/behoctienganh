<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé Học Chữ Tiếng Việt 🌟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap');
  :root{--sky:#4FC3F7;--sun:#FFD54F;--grass:#81C784;--rose:#F48FB1;--lavender:#CE93D8;--orange:#FFB74D;--bg:#FFF9F0;--card:#FFF;--text:#3E2723;--radius:20px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Baloo 2',cursive;background:var(--bg);min-height:100vh;overflow-x:hidden;}

  .header{background:linear-gradient(135deg,var(--sky),var(--lavender));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 30px 30px;box-shadow:0 4px 20px rgba(0,0,0,.1);}
  .header h1{color:#fff;font-size:clamp(18px,5vw,26px);font-weight:800;text-shadow:2px 2px 4px rgba(0,0,0,.2);}
  .stars-display{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.3);border-radius:20px;padding:6px 14px;}
  .stars-display span{color:#fff;font-size:20px;font-weight:800;}

  .level-section{padding:14px 16px 6px;}
  .level-section h2{color:var(--text);font-size:13px;margin-bottom:8px;opacity:.6;}
  .level-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .level-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;font-family:'Baloo 2',cursive;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;background:#E0E0E0;color:#757575;line-height:1.3;}
  .level-tab.active{color:#fff;transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .level-tab[data-lv="1"].active{background:var(--grass);}
  .level-tab[data-lv="2"].active{background:var(--sky);}
  .level-tab[data-lv="3"].active{background:var(--orange);}
  .level-tab[data-lv="4"].active{background:var(--rose);}
  .level-tab[data-lv="5"].active{background:var(--lavender);}

  .game-area{padding:12px 16px;}
  .progress-wrap{margin-bottom:12px;}
  .progress-info{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:6px;}
  .progress-bar{height:10px;background:#E0E0E0;border-radius:10px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--grass),var(--sky));transition:width .5s ease;}

  .game-card{background:var(--card);border-radius:var(--radius);padding:20px 16px;box-shadow:0 6px 24px rgba(0,0,0,.08);text-align:center;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative;overflow:hidden;}

  .game-badge{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;color:#fff;letter-spacing:.5px;}
  .badge-nhandien{background:var(--grass);}.badge-ghepvan{background:var(--orange);}.badge-nghe{background:var(--sky);}.badge-to{background:var(--rose);}

  .big-word{font-size:clamp(48px,14vw,76px);font-weight:800;color:var(--text);line-height:1;cursor:pointer;user-select:none;}
  .word-emoji{font-size:clamp(64px,16vw,88px);line-height:1;}
  .instruction{font-size:clamp(15px,4vw,17px);color:#888;font-weight:600;}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:380px;}
  .choice-btn{padding:16px 8px;border-radius:16px;border:3px solid transparent;font-family:'Baloo 2',cursive;font-size:clamp(24px,6.5vw,34px);font-weight:800;cursor:pointer;transition:all .15s;background:#F5F5F5;color:var(--text);}
  .choice-btn:active{transform:scale(.95);}
  .choice-btn.correct{background:#E8F5E9;border-color:var(--grass);color:#2E7D32;}
  .choice-btn.wrong{background:#FFEBEE;border-color:#EF9A9A;color:#C62828;animation:shake .3s;}
  .choice-btn.disabled{pointer-events:none;opacity:.5;}
  .choice-emoji{display:block;font-size:clamp(30px,7vw,42px);margin-bottom:4px;}
  .choice-label{display:block;font-size:clamp(22px,6vw,30px);}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  .speak-btn{background:var(--sun);border:none;border-radius:50%;width:68px;height:68px;font-size:28px;cursor:pointer;transition:transform .15s;box-shadow:0 4px 12px rgba(255,213,79,.5);}
  .speak-btn:active{transform:scale(.9);}

  /* GHEP VAN */
  .ghep-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:clamp(26px,7vw,38px);font-weight:800;background:#F5F5F5;padding:12px 20px;border-radius:14px;flex-wrap:wrap;}
  .ghep-am-dau{color:var(--rose);}
  .ghep-plus{color:#aaa;font-weight:400;}
  .blank-slot{display:inline-block;min-width:48px;border-bottom:4px solid var(--sky);color:var(--sky);text-align:center;padding:0 4px;}
  .ghep-dau{font-size:clamp(22px,6vw,32px);color:var(--lavender);}
  .ghep-result{color:var(--grass);}
  .van-choices{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .van-btn{padding:12px 20px;border-radius:12px;border:3px solid var(--orange);background:#fff;font-family:'Baloo 2',cursive;font-size:clamp(22px,6vw,28px);font-weight:800;color:var(--orange);cursor:pointer;transition:all .15s;}
  .van-btn:active{background:var(--orange);color:#fff;}
  .van-btn.used{opacity:.3;pointer-events:none;}

  /* TO MAU */
  .color-word{font-size:clamp(50px,13vw,72px);font-weight:800;padding:10px 24px;border-radius:16px;border:4px dashed #ccc;cursor:pointer;transition:all .3s;}
  .color-palette{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .color-dot{width:48px;height:48px;border-radius:50%;border:3px solid #fff;cursor:pointer;transition:transform .15s;box-shadow:0 3px 8px rgba(0,0,0,.2);}
  .color-dot:active{transform:scale(1.2);}
  .color-dot.selected{border-color:var(--text);transform:scale(1.15);}

  .result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
  .result-overlay.show{opacity:1;pointer-events:all;}
  .result-box{background:#fff;border-radius:28px;padding:36px 28px;text-align:center;max-width:300px;width:90%;transform:scale(.8);transition:transform .3s;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .result-overlay.show .result-box{transform:scale(1);}
  .result-big{font-size:70px;line-height:1;margin-bottom:10px;}
  .result-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
  .result-sub{font-size:15px;color:#888;margin-bottom:20px;}
  .result-btn{background:linear-gradient(135deg,var(--sky),var(--lavender));color:#fff;border:none;border-radius:16px;padding:14px 32px;font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;cursor:pointer;width:100%;}

  .confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:200;animation:confettiFall 1.2s ease-in forwards;}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
  .star-pop{position:fixed;font-size:34px;pointer-events:none;z-index:199;animation:starPop .8s ease-out forwards;}
  @keyframes starPop{0%{transform:scale(0) translateY(0);opacity:1;}50%{transform:scale(1.5) translateY(-30px);opacity:1;}100%{transform:scale(1) translateY(-60px);opacity:0;}}

  .feedback{font-size:clamp(18px,5vw,22px);font-weight:800;min-height:28px;}
  .feedback.ok{color:var(--grass);}.feedback.no{color:#EF5350;}
  .auto-next-bar{height:5px;background:var(--grass);border-radius:3px;width:0%;transition:width 1s linear;margin-top:8px;}
</style>
</head>
<body>
<div class="header">
  <h1>🌟 Bé Học Chữ</h1>
  <div class="stars-display">⭐ <span id="totalStars">0</span></div>
</div>
<div class="level-section">
  <h2>Chọn cấp độ:</h2>
  <div class="level-tabs">
    <button class="level-tab active" data-lv="1">🌱 Cấp 1<br><small>Chữ cái</small></button>
    <button class="level-tab" data-lv="2">🌿 Cấp 2<br><small>Âm + vần</small></button>
    <button class="level-tab" data-lv="3">🌸 Cấp 3<br><small>Ghép vần</small></button>
    <button class="level-tab" data-lv="4">🌺 Cấp 4<br><small>Từ có vần</small></button>
    <button class="level-tab" data-lv="5">🌟 Cấp 5<br><small>Câu ngắn</small></button>
  </div>
</div>
<div class="game-area">
  <div class="progress-wrap">
    <div class="progress-info"><span id="questionCounter">Câu 1 / 10</span><span id="scoreInfo">⭐ 0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="game-card" id="gameCard"></div>
  <div class="auto-next-bar" id="autoNextBar"></div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-big" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">Tuyệt vời!</div>
    <div class="result-sub" id="resultSub"></div>
    <button class="result-btn" onclick="restartLevel()">Chơi lại 🔄</button>
  </div>
</div>
<script>
// ═══ DỮ LIỆU ═══════════════════════════════════════════════════

const LEVELS = {
  // Cấp 1: chữ cái đơn lẻ
  1: { items: [
    {word:"a",emoji:"🍎"},{word:"ă",emoji:"🦎"},{word:"â",emoji:"🪶"},
    {word:"b",emoji:"🐝"},{word:"c",emoji:"🐱"},{word:"d",emoji:"🌸"},
    {word:"đ",emoji:"🔔"},{word:"e",emoji:"🦅"},{word:"ê",emoji:"🦢"},
    {word:"g",emoji:"🐔"},{word:"h",emoji:"🌺"},{word:"i",emoji:"🍦"},
    {word:"k",emoji:"🪁"},{word:"l",emoji:"🦁"},{word:"m",emoji:"🌙"},
    {word:"n",emoji:"🎵"},{word:"o",emoji:"🍊"},{word:"ô",emoji:"🌀"},
    {word:"ơ",emoji:"🌾"},{word:"p",emoji:"🍑"},{word:"r",emoji:"🌹"},
    {word:"s",emoji:"⭐"},{word:"t",emoji:"🌴"},{word:"u",emoji:"🦋"},
    {word:"ư",emoji:"🪷"},{word:"v",emoji:"🎻"},{word:"x",emoji:"🔮"},
    {word:"y",emoji:"🧶"},
  ]},

  // Cấp 2: ĐÚNG 1 phụ âm + 1 nguyên âm (không có vần, không có phụ âm cuối)
  // Cấu trúc: C + V (+ dấu)
  2: { items: [
    {word:"bé",emoji:"👶"},{word:"bà",emoji:"👵"},{word:"bò",emoji:"🐮"},
    {word:"bê",emoji:"🐄"},{word:"ba",emoji:"👨"},{word:"bơ",emoji:"🧈"},
    {word:"cá",emoji:"🐟"},{word:"cô",emoji:"👩"},{word:"cò",emoji:"🦢"},
    {word:"dê",emoji:"🐐"},{word:"dơ",emoji:"🧹"},{word:"gà",emoji:"🐓"},
    {word:"gô",emoji:"🥅"},{word:"hà",emoji:"🦀"},{word:"hô",emoji:"📢"},
    {word:"kê",emoji:"🌾"},{word:"lá",emoji:"🍃"},{word:"lê",emoji:"🍐"},
    {word:"lô",emoji:"🎲"},{word:"mẹ",emoji:"👩"},{word:"mô",emoji:"⛰️"},
    {word:"né",emoji:"🙈"},{word:"nô",emoji:"🎭"},{word:"ô",emoji:"☂️"},
    {word:"tô",emoji:"🥣"},{word:"tê",emoji:"🥶"},{word:"vô",emoji:"🚫"},
    {word:"xô",emoji:"🪣"},{word:"yê",emoji:"🌟"},
  ]},

  // Cấp 3: Ghép vần — hiển thị dấu bằng ký hiệu thực
  // dau_ky_hieu: ký hiệu dấu thực tế
  3: { items: [
    // từ không dấu
    {word:"ba",  am_dau:"b", van:"a",  dau:"",  dau_kh:"",  emoji:"3️⃣"},
    {word:"bo",  am_dau:"b", van:"o",  dau:"",  dau_kh:"",  emoji:"🧴"},
    {word:"ca",  am_dau:"c", van:"a",  dau:"",  dau_kh:"",  emoji:"🎵"},
    {word:"lo",  am_dau:"l", van:"o",  dau:"",  dau_kh:"",  emoji:"🏺"},
    {word:"mo",  am_dau:"m", van:"o",  dau:"",  dau_kh:"",  emoji:"💭"},
    // dấu sắc /
    {word:"bé",  am_dau:"b", van:"e",  dau:"é", dau_kh:"́",  emoji:"👶"},
    {word:"cá",  am_dau:"c", van:"a",  dau:"á", dau_kh:"́",  emoji:"🐟"},
    {word:"lá",  am_dau:"l", van:"a",  dau:"á", dau_kh:"́",  emoji:"🍃"},
    {word:"mé",  am_dau:"m", van:"e",  dau:"é", dau_kh:"́",  emoji:"🪨"},
    {word:"tô",  am_dau:"t", van:"ô",  dau:"ô", dau_kh:"",  emoji:"🥣"},
    // dấu huyền \
    {word:"bà",  am_dau:"b", van:"a",  dau:"à", dau_kh:"̀",  emoji:"👵"},
    {word:"bò",  am_dau:"b", van:"o",  dau:"ò", dau_kh:"̀",  emoji:"🐮"},
    {word:"gà",  am_dau:"g", van:"a",  dau:"à", dau_kh:"̀",  emoji:"🐓"},
    {word:"mè",  am_dau:"m", van:"e",  dau:"è", dau_kh:"̀",  emoji:"🐟"},
    // dấu hỏi
    {word:"bả",  am_dau:"b", van:"a",  dau:"ả", dau_kh:"̉",  emoji:"🌿"},
    {word:"hổ",  am_dau:"h", van:"o",  dau:"ổ", dau_kh:"̉",  emoji:"🐯"},
    {word:"lỏ",  am_dau:"l", van:"o",  dau:"ỏ", dau_kh:"̉",  emoji:"🔩"},
    // dấu ngã ~
    {word:"bã",  am_dau:"b", van:"a",  dau:"ã", dau_kh:"̃",  emoji:"🌊"},
    {word:"mã",  am_dau:"m", van:"a",  dau:"ã", dau_kh:"̃",  emoji:"🐴"},
    // dấu nặng .
    {word:"bạ",  am_dau:"b", van:"a",  dau:"ạ", dau_kh:"̣",  emoji:"🪵"},
    {word:"mẹ",  am_dau:"m", van:"e",  dau:"ẹ", dau_kh:"̣",  emoji:"👩"},
  ]},

  // Cấp 4: từ có vần (phụ âm cuối, vần phức)
  4: { items: [
    {word:"bàn",emoji:"🪑"},{word:"cửa",emoji:"🚪"},{word:"đèn",emoji:"💡"},
    {word:"sách",emoji:"📚"},{word:"bút",emoji:"✏️"},{word:"gấu",emoji:"🐻"},
    {word:"mèo",emoji:"🐱"},{word:"chó",emoji:"🐶"},{word:"cơm",emoji:"🍚"},
    {word:"sữa",emoji:"🥛"},{word:"cam",emoji:"🍊"},{word:"táo",emoji:"🍎"},
    {word:"nước",emoji:"💧"},{word:"hoa",emoji:"🌸"},{word:"quả",emoji:"🍑"},
    {word:"trời",emoji:"☁️"},{word:"mưa",emoji:"🌧️"},{word:"biển",emoji:"🌊"},
    {word:"núi",emoji:"⛰️"},{word:"cặp",emoji:"🎒"},
  ]},

  // Cấp 5: câu ngắn
  5: { items: [
    {word:"Bé ăn cơm",emoji:"🍚"},{word:"Mẹ nấu ăn",emoji:"👩‍🍳"},
    {word:"Con mèo ngủ",emoji:"😴"},{word:"Bố đi làm",emoji:"💼"},
    {word:"Bà kể chuyện",emoji:"📖"},{word:"Bé học bài",emoji:"📚"},
    {word:"Trời có mưa",emoji:"🌧️"},{word:"Con chó chạy",emoji:"🐕"},
    {word:"Hoa nở rồi",emoji:"🌺"},{word:"Bé yêu mẹ",emoji:"❤️"},
  ]}
};

const GAME_SEQ=["nhandien","nghe","to","nhandien","nghe","nhandien","to","nghe","nhandien","nghe"];
const COLORS=["#FF6B6B","#FFD54F","#81C784","#64B5F6","#CE93D8","#FF8A65","#4DB6AC"];

let currentLevel=1,currentQ=0,sessionScore=0,answered=false;
let questions=[],selectedColor="#FFD54F";
let totalStars=parseInt(localStorage.getItem('beHocChuStars')||'0');
let autoNextTimer=null;

function init(){
  document.getElementById('totalStars').textContent=totalStars;
  buildQ(); render();
}
function buildQ(){
  const pool=[...LEVELS[currentLevel].items];
  shuffle(pool);
  questions=pool.slice(0,Math.min(10,pool.length));
  currentQ=0; sessionScore=0;
}
function getGT(){
  if(currentLevel===3) return "ghepvan";
  return GAME_SEQ[currentQ%GAME_SEQ.length];
}
function render(){
  answered=false;
  if(autoNextTimer){clearTimeout(autoNextTimer);autoNextTimer=null;}
  const bar=document.getElementById('autoNextBar');
  bar.style.transition='none'; bar.style.width='0%';
  updateProg();
  const q=questions[currentQ], card=document.getElementById('gameCard');
  const gt=getGT();
  if(gt==="nhandien") doNhanDien(card,q);
  else if(gt==="nghe") doNghe(card,q);
  else if(gt==="to") doTo(card,q);
  else if(gt==="ghepvan") doGhep(card,q);
}

function bdg(t){
  const m={nhandien:"NHẬN DIỆN",nghe:"NGHE & CHỌN",to:"TÔ MÀU",ghepvan:"GHÉP VẦN"};
  return `<div class="game-badge badge-${t}">${m[t]}</div>`;
}

// ─── Game 1: Nhận diện ──────────────────────────────────────────
function doNhanDien(card,q){
  const pool=questions.filter(x=>x.word!==q.word); shuffle(pool);
  const opts=shuffle([...pool.slice(0,3),q]);
  card.innerHTML=`${bdg('nhandien')}
    <div class="instruction">Chữ nào là "${q.word}"?</div>
    <button class="speak-btn" onclick="spk('${q.word}')">🔊</button>
    <div class="choices">
      ${opts.map(o=>`<button class="choice-btn" onclick="chkOpt(this,'${o.word}','${q.word}')">
        <span class="choice-emoji">${o.emoji}</span>
        <span class="choice-label">${o.word}</span>
      </button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
  spk(q.word);
}

// ─── Game 2: Nghe & chọn ────────────────────────────────────────
function doNghe(card,q){
  const pool=questions.filter(x=>x.word!==q.word); shuffle(pool);
  const opts=shuffle([...pool.slice(0,3),q]);
  card.innerHTML=`${bdg('nghe')}
    <div class="instruction">Nghe và chọn chữ đúng</div>
    <button class="speak-btn" onclick="spk('${q.word}')">🔊</button>
    <div class="word-emoji">${q.emoji}</div>
    <div class="choices">
      ${opts.map(o=>`<button class="choice-btn" onclick="chkOpt(this,'${o.word}','${q.word}')">
        <span class="choice-label">${o.word}</span>
      </button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
  setTimeout(()=>spk(q.word),400);
}

function chkOpt(btn,chosen,correct){
  if(answered) return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
  if(chosen===correct){
    btn.classList.remove('disabled'); btn.classList.add('correct');
    setFb('✅ Giỏi quá!','ok'); award(btn); sessionScore++;
    autoNext(1000);
  } else {
    btn.classList.add('wrong');
    setFb('❌ Chưa đúng!','no');
    document.querySelectorAll('.choice-btn').forEach(b=>{
      const lbl=b.querySelector('.choice-label');
      if(lbl&&lbl.textContent.trim()===correct){b.classList.remove('disabled');b.classList.add('correct');}
    });
  }
}

// ─── Game 3: Tô màu ─────────────────────────────────────────────
function doTo(card,q){
  selectedColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  card.innerHTML=`${bdg('to')}
    <div class="instruction">Tô màu chữ này nhé! 🎨</div>
    <div class="color-word" id="cw" onclick="applyC()">${q.word}</div>
    <div style="font-size:52px">${q.emoji}</div>
    <div class="color-palette">
      ${COLORS.map(c=>`<div class="color-dot${c===selectedColor?' selected':''}" style="background:${c}" onclick="pickC('${c}',this)"></div>`).join('')}
    </div>
    <div class="feedback" id="fb" style="color:#aaa">Nhấn vào chữ để tô!</div>`;
}
function pickC(c,el){
  selectedColor=c;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
}
function applyC(){
  const w=document.getElementById('cw');
  w.style.color=selectedColor; w.style.borderColor=selectedColor;
  if(!answered){
    answered=true;
    setFb('🎨 Đẹp lắm!','ok');
    document.getElementById('fb').style.color=selectedColor;
    spk(questions[currentQ].word);
    award(w); sessionScore++;
    autoNext(1200);
  }
}

// ─── Game 4: Ghép vần ───────────────────────────────────────────
function doGhep(card,q){
  // Lấy các vần khác nhau làm đáp án sai
  const allVans=[...new Set(LEVELS[3].items.map(x=>x.van))].filter(v=>v!==q.van);
  shuffle(allVans);
  const opts=shuffle([q.van,...allVans.slice(0,3)]);

  // Hiển thị dấu bằng ký hiệu: ́ ̀ ̉ ̃ ̣
  const dauShow = q.dau_kh
    ? `<span class="ghep-plus">+</span><span class="ghep-dau" title="dấu">${q.dau_kh || q.dau}</span>`
    : '';

  card.innerHTML=`${bdg('ghepvan')}
    <div class="word-emoji" style="font-size:56px">${q.emoji}</div>
    <div class="instruction">Chọn vần để ghép thành từ</div>
    <div class="ghep-row">
      <span class="ghep-am-dau">${q.am_dau}</span>
      <span class="ghep-plus">+</span>
      <span class="blank-slot" id="bslot">?</span>
      ${dauShow}
      <span class="ghep-plus">=</span>
      <span class="ghep-result">${q.word}</span>
    </div>
    <div class="van-choices">
      ${opts.map(o=>`<button class="van-btn" onclick="chkGhep(this,'${o}','${q.van}','${q.word}')">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
}
function chkGhep(btn,chosen,correct,fw){
  if(answered) return;
  const sl=document.getElementById('bslot');
  sl.textContent=chosen;
  if(chosen===correct){
    answered=true;
    sl.style.color='var(--grass)'; sl.style.borderColor='var(--grass)';
    btn.style.cssText='background:var(--grass);color:#fff;border-color:var(--grass);';
    setFb(`✅ ${fw} — Đúng rồi!`,'ok');
    spk(fw);
    document.querySelectorAll('.van-btn').forEach(b=>b.classList.add('used'));
    award(btn); sessionScore++;
    autoNext(1300);
  } else {
    btn.classList.add('used');
    sl.style.color='#EF5350';
    setFb('❌ Thử lại!','no');
    setTimeout(()=>{sl.textContent='?';sl.style.color='var(--sky)';setFb('','');},700);
  }
}

// ─── Helpers ────────────────────────────────────────────────────
function setFb(msg,cls){
  const el=document.getElementById('fb');
  if(!el) return;
  el.textContent=msg; el.className='feedback'+(cls?' '+cls:'');
}
function autoNext(delay){
  const bar=document.getElementById('autoNextBar');
  setTimeout(()=>{bar.style.transition=`width ${delay}ms linear`;bar.style.width='100%';},30);
  autoNextTimer=setTimeout(nextQ,delay);
}
function nextQ(){
  currentQ++;
  if(currentQ>=questions.length) showResult(); else render();
}
function showResult(){
  const pct=Math.round(sessionScore/questions.length*100);
  document.getElementById('resultEmoji').textContent=pct>=80?'🎉':pct>=50?'😊':'💪';
  document.getElementById('resultTitle').textContent=pct>=80?'Tuyệt vời!':pct>=50?'Khá giỏi!':'Cố lên nhé!';
  document.getElementById('resultSub').textContent=`Đúng ${sessionScore}/${questions.length} câu · +${sessionScore}⭐`;
  document.getElementById('resultOverlay').classList.add('show');
  if(pct>=80) boom(30);
}
function restartLevel(){
  document.getElementById('resultOverlay').classList.remove('show');
  buildQ(); render();
}
function award(el){
  boom(14,el);
  const rect=el.getBoundingClientRect();
  const s=document.createElement('div'); s.className='star-pop'; s.textContent='⭐';
  s.style.cssText=`left:${rect.left+rect.width/2-17}px;top:${rect.top}px;`;
  document.body.appendChild(s); setTimeout(()=>s.remove(),900);
  totalStars++; document.getElementById('totalStars').textContent=totalStars;
  localStorage.setItem('beHocChuStars',totalStars);
}
function boom(n,refEl){
  const cs=["#FF6B6B","#FFD54F","#81C784","#64B5F6","#CE93D8","#FF8A65"];
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    const lx=refEl?15+Math.random()*70:Math.random()*100;
    const ty=refEl?10+Math.random()*30:Math.random()*20;
    c.style.cssText=`left:${lx}%;top:${ty}%;background:${cs[i%6]};animation-delay:${Math.random()*.4}s;animation-duration:${.8+Math.random()*.7}s;`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),1600);
  }
}
function updateProg(){
  document.getElementById('progressFill').style.width=(currentQ/questions.length*100)+'%';
  document.getElementById('questionCounter').textContent=`Câu ${currentQ+1} / ${questions.length}`;
  document.getElementById('scoreInfo').textContent=`⭐ ${sessionScore}`;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function spk(t){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='vi-VN'; u.rate=0.75; u.pitch=1.1;
  speechSynthesis.speak(u);
}

document.querySelectorAll('.level-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentLevel=parseInt(tab.dataset.lv);
    buildQ(); render();
  });
});

init();
</script>

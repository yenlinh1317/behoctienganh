<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Cấu hình chống thu nhỏ, ép co giãn tràn màn hình trên thiết bị di động -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trò Chơi: Đua Xe Học Vần (Tràn Màn Hình)</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #4dabf7; --success: #2b8a3e; --error: #e03131; --dark: #2f3542; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            background: #e3fafc; 
            min-height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow: hidden; 
            padding: 10px;
        }
        
        /* CONTAINER PHÓNG TO 100% TRÀN MÀN HÌNH THEO HƯỚNG XOAY */
        .game-container { 
            background: white; 
            border: 4px solid #15aabf; 
            border-radius: 24px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            width: 100%; 
            height: 98vh; /* Chiếm trọn chiều cao màn hình */
            max-width: 1400px; /* Mở rộng tối đa cho màn hình ngang */
            padding: 15px 25px; 
            text-align: center; 
            position: relative; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* ĐƯỜNG ĐUA Ô TÔ LỚN HƠN */
        .race-track { 
            background: #555; 
            padding: 10px; 
            border-radius: 15px; 
            position: relative; 
            border-top: 4px dashed #fff; 
            border-bottom: 4px dashed #fff; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }
        .lane { height: 55px; position: relative; display: flex; align-items: center; border-bottom: 2px dashed #aaa; }
        .lane:last-child { border-bottom: none; }
        
        /* XE ĐUA QUAY ĐÚNG CHIỀU SANG PHẢI */
        .car { font-size: 45px; position: absolute; left: 0; bottom: 2px; transition: left 0.8s cubic-bezier(0.25, 1, 0.5, 1); display: inline-block; transform: scaleX(-1); }
        .finish-line { position: absolute; right: 10px; top: 0; bottom: 0; width: 15px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); border-radius: 3px; }

        /* BẢNG ĐIỂM TINH GỌN */
        .scoreboard { display: flex; justify-content: space-around; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 15px; padding: 8px; }
        .score-box { font-size: 20px; font-weight: 700; color: #0b7285; }
        .score-box span { font-size: 26px; color: #e03131; }

        .status-bar { font-size: 18px; font-weight: 700; color: #0b7285; margin: 2px 0; }
        
        /* THANH THỜI GIAN */
        .timer-container { width: 100%; height: 14px; background: #e9ecef; border-radius: 10px; overflow: hidden; border: 1px solid #ced4da; margin-bottom: 5px; }
        .timer-bar { height: 100%; width: 100%; background: #fab005; transition: width 0.1s linear; }

        .battle-status { font-size: 24px; font-weight: 700; color: #0b7285; margin-bottom: 5px; }

        /* KHU VỰC LOA TRỰC QUAN */
        .audio-box { margin-bottom: 5px; }
        .btn-listen { background: #15aabf; border: none; border-radius: 50%; width: 90px; height: 90px; font-size: 45px; color: white; cursor: pointer; box-shadow: 0 6px 12px rgba(21, 170, 191, 0.3); transition: 0.2s; }
        .btn-listen:active { transform: scale(0.95); }
        .hint-text { color: #868e96; margin-top: 4px; font-size: 14px; }

        /* ĐÁP ÁN Ô CHỮ KHỔNG LỒ KHI MÀN HÌNH XOAY NGANG */
        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            flex-grow: 1; /* Tự động kéo giãn lấp đầy phần dưới màn hình */
            margin-top: 5px;
        }
        .btn-option { 
            font-size: 50px; /* Chữ siêu to khổng lồ cho bé nhìn rõ */
            font-weight: 700; 
            color: var(--dark); 
            background: #f1f3f5; 
            border: 3px solid #dee2e6; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0px #ced4da;
        }
        .btn-option:hover { background: #e9ecef; border-color: #adb5bd; }
        .btn-option:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-option.correct { background: #40c057 !important; color: white !important; border-color: #2b8a3e !important; box-shadow: 0 6px 0px #2b8a3e !important; animation: pop 0.3s ease; }
        .btn-option.wrong { background: #ffc9c9 !important; color: #c92a2a !important; border-color: #fa5252 !important; box-shadow: 0 6px 0px #fa5252 !important; }
        .btn-option.ai-selected { border: 5px dashed #f59f00 !important; background: #fff9db; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* MÀN HÌNH PHỦ ĐẦU/CUỐI */
        .screen { position: absolute; inset: 0; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
        .screen h1 { font-size: 45px; color: #0c8599; margin-bottom: 15px; }
        .screen p { font-size: 22px; color: #495057; margin-bottom: 30px; }
        .btn-start { padding: 15px 40px; font-size: 26px; font-weight: 700; background: #228be6; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #1864ab; }
        .btn-start:active { transform: translateY(6px); box-shadow: none; }
        .hidden { display: none !important; }

        /* TỰ ĐỘNG ĐIỀU CHỈNH GIAO DIỆN KHI XOAY NGANG MÀN HÌNH (LANDSCAPE) */
        @media screen and (orientation: landscape) {
            .game-container { height: 96vh; padding: 10px 20px; }
            .lane { height: 45px; }
            .car { font-size: 40px; }
            .btn-listen { width: 75px; height: 75px; font-size: 35px; }
            .btn-option { font-size: 55px; border-radius: 16px; } /* Phóng cực đại chữ đáp án khi nằm ngang */
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- MÀN HÌNH BẮT ĐẦU -->
    <div id="start-screen" class="screen">
        <h1>🏎️ ĐUA XE HỌC TỪ 🏎️</h1>
        <p>Minh Khang lái 🚗 Ô tô Đỏ thi đấu cùng bạn 🚙 Ô tô Xanh xem ai về đích trước nhé!</p>
        <button class="btn-start" onclick="startGame()">BẮT ĐẦU ĐUA</button>
    </div>

    <!-- MÀN HÌNH KẾT THÚC -->
    <div id="end-screen" class="screen hidden">
        <h1>🏁 CUỘC ĐUA KẾT THÚC! 🏁</h1>
        <p id="winner-text" style="font-size: 28px; font-weight: 700; color: #2b8a3e; margin-bottom: 20px;"></p>
        <div style="display: flex; gap: 40px; margin-bottom: 30px;">
            <div class="score-box">Minh Khang: <span id="final-khang">0</span>đ</div>
            <div class="score-box">Bạn AI: <span id="final-ai">0</span>đ</div>
        </div>
        <button class="btn-start" style="background: #12b886; box-shadow: 0 6px 0 #087f5b;" onclick="startGame()">ĐUAlẠI LƯỢT MỚI</button>
    </div>

    <!-- ĐƯỜNG ĐUA TRỰC QUAN TRÀN VIỀN -->
    <div class="race-track">
        <div class="finish-line"></div>
        <div class="lane">
            <span style="position:absolute; left:10px; color:#fff; font-size:12px; font-weight:bold; z-index:1;">KHANG</span>
            <div id="car-khang" class="car">🚗</div>
        </div>
        <div class="lane">
            <span style="position:absolute; left:10px; color:#fff; font-size:12px; font-weight:bold; z-index:1;">BẠN AI</span>
            <div id="car-ai" class="car">🚙</div>
        </div>
    </div>

    <!-- BẢNG ĐIỂM -->
    <div class="scoreboard">
        <div class="score-box">👦 Khang: <span id="score-khang">0</span> điểm</div>
        <div class="score-box">🤖 Bạn AI: <span id="score-ai">0</span> điểm</div>
    </div>

    <div class="status-bar">
        <div>CHẶNG ĐƯỜNG: <span id="question-idx">1</span> / 20</div>
    </div>

    <div class="timer-container">
        <div id="timer" class="timer-bar"></div>
    </div>

    <div id="battle-status" class="battle-status">Chuẩn bị xuất phát...</div>

    <div class="audio-box">
        <button class="btn-listen" onclick="playCurrentWord()">📢</button>
        <div class="hint-text">(Bấm vào loa nếu muốn nghe lại)</div>
    </div>

    <!-- LƯỚI ĐÁP ÁN TỰ TĂNG KÍCH THƯỚC THEO KHÔNG GIAN MÀN HÌNH -->
    <div class="options-grid">
        <button class="btn-option" onclick="checkAnswer(this)"></button>
        <button class="btn-option" onclick="checkAnswer(this)"></button>
        <button class="btn-option" onclick="checkAnswer(this)"></button>
        <button class="btn-option" onclick="checkAnswer(this)"></button>
    </div>
</div>

<script>
    const database = [
        'ba', 'bà', 'bá', 'bả', 'bạ', 'cá', 'cà', 'gà', 'cổ cò', 'lá', 'ca','cô','cỏ','cọ','cổ','cờ','da','đe','đa','đò','đố','đổ','dẻ','lê','lồ ô','le le','lọ',
        'cố đô', 'bơ', 'đồ cổ', 'dế', 'dê', 'đê', 'da cá', 'sư tử', 'cá cờ','lê la','bê','bễ','ga','hồ','bi','bia','bi bô','lia lịa','bể cá','đĩa','hổ',
        'đu đủ', 'bí đỏ', 'mẹ', 'bố', 'xe', 'ví','ghế gỗ','ghế da','ghế đá','giá đỗ','kì đà','kể','giẻ','kẻ','giò','bờ kè','giỏ cá'
    ];

    let scoreKhang = 0;
    let scoreAI = 0;
    let currentIdx = 0;
    let currentWord = '';
    let timerInterval = null;
    let aiTimeout = null;
    let timeLeft = 100; 
    let canClick = false;
    let hasAiAnswered = false;
    const maxQuestions = 20;
    function speak(text, slow = false) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'vi-VN';
        u.rate = slow ? 0.55 : 0.65; // Giọng đọc chậm rãi giúp bé nghe từ chuẩn xác nhất
        window.speechSynthesis.speak(u);
    }

    function startGame() {
        scoreKhang = 0;
        scoreAI = 0;
        currentIdx = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('score-khang').innerText = scoreKhang;
        document.getElementById('score-ai').innerText = scoreAI;
        updateCarPositions(); // Đưa hai xe về lại vạch xuất phát
        nextQuestion();
    }

    function updateCarPositions() {
        // Tính toán vị trí xe tiến lên dựa trên điểm số (Giới hạn tối đa 82% để không đè vạch đích)
        const maxScore = maxQuestions * 10;
        const posKhang = maxScore > 0 ? (scoreKhang / maxScore) * 82 : 0;
        const posAi = maxScore > 0 ? (scoreAI / maxScore) * 82 : 0;
        
        document.getElementById('car-khang').style.left = posKhang + '%';
        document.getElementById('car-ai').style.left = posAi + '%';
    }

    function playCurrentWord() {
        speak(`Khang ơi, hãy chọn từ: ... ${currentWord}`);
    }

    function nextQuestion() {
        if (currentIdx >= maxQuestions) {
            endGame();
            return;
        }

        currentIdx++;
        document.getElementById('question-idx').innerText = currentIdx;
        document.getElementById('battle-status').innerText = "Khang ơi, nhấn ga tìm từ nhanh lên nào! 🏎️";
        document.getElementById('battle-status').style.color = "#0b7285";
        canClick = true;
        hasAiAnswered = false;

        const buttons = document.querySelectorAll('.btn-option');
        buttons.forEach(btn => btn.className = 'btn-option');

        // Bốc từ đúng ngẫu nhiên trong kho dữ liệu sạch
        currentWord = database[Math.floor(Math.random() * database.length)];

        // Tạo ma trận 4 đáp án (1 từ đúng và 3 từ sai ngẫu nhiên)
        let options = [currentWord];
        while (options.length < 4) {
            let randomWord = database[Math.floor(Math.random() * database.length)];
            if (!options.includes(randomWord)) {
                options.push(randomWord);
            }
        }
        options.sort(() => Math.random() - 0.5); // Xáo trộn vị trí các nút bấm

        buttons.forEach((btn, idx) => {
            btn.innerText = options[idx];
        });

        playCurrentWord();
        startTimer();
        scheduleAiAnswer(); // Kích hoạt AI suy nghĩ chậm hơn bé
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        const timerBar = document.getElementById('timer');
        
        timerInterval = setInterval(() => {
            timeLeft -= 1; 
            timerBar.style.width = timeLeft + '%';

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                clearTimeout(aiTimeout);
                canClick = false;
                showCorrectAnswerOnTimeout();
            }
        }, 250); // Bé Khang có hẳn 25 giây tự do suy nghĩ và tìm từ
    }

    function scheduleAiAnswer() {
        clearTimeout(aiTimeout);
        // AI CHẠY CHẬM: Máy ngẫu nhiên chờ từ 12 đến 16 giây mới tự bấm (Khang chỉ mất 10 giây nên sẽ luôn thắng)
        const aiDelay = Math.floor(Math.random() * 4000) + 12000; 

        aiTimeout = setTimeout(() => {
            if (!canClick || hasAiAnswered) return;
            
            hasAiAnswered = true;
            document.getElementById('battle-status').innerText = "🤖 Bạn AI đã nhấn ga phóng lên trước rồi!";
            document.getElementById('battle-status').style.color = "#f59f00";

            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                if (btn.innerText === currentWord) {
                    btn.classList.add('ai-selected');
                }
            });

            scoreAI += 10;
            document.getElementById('score-ai').innerText = scoreAI;
            updateCarPositions(); // Phóng xe AI tiến lên phía trước
            speak(`Bạn AI chọn đúng từ: ${currentWord} mất rồi!`);
            
            canClick = false;
            clearInterval(timerInterval);
            setTimeout(nextQuestion, 3500); // Chờ 3.5 giây rồi qua chặng mới

        }, aiDelay);
    }

    function checkAnswer(selectedButton) {
        if (!canClick) return;
        canClick = false;
        clearInterval(timerInterval);
        clearTimeout(aiTimeout); // Khóa ngay lượt bấm của AI vì bé Khang đã nhanh tay nhấn ga trước!

        const chosenWord = selectedButton.innerText;

        if (chosenWord === currentWord) {
            selectedButton.classList.add('correct');
            scoreKhang += 10;
            document.getElementById('score-khang').innerText = scoreKhang;
            document.getElementById('battle-status').innerText = "🎉 Tuyệt vời! Xe của Khang vừa tăng tốc vút lên!";
            document.getElementById('battle-status').style.color = "#2b8a3e";
            updateCarPositions(); // Phóng xe Đỏ của Khang tiến thẳng lên trước
            
            // THÊM GIỌNG ĐỌC CHÚC MỪNG TRỰC QUAN SINH ĐỘNG KHI BÉ BẤM TRÚNG
            speak(`Đúng rồi! ... Xuất sắc! ... Từ ${currentWord}! ... Xe của Khang tiến lên một đoạn!`);
        } else {
            selectedButton.classList.add('wrong');
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                if (btn.innerText === currentWord) {
                    btn.classList.add('correct');
                }
            });
            document.getElementById('battle-status').innerText = "Nhầm đường rồi, chặng sau cố lên con!";
            document.getElementById('battle-status').style.color = "#e03131";
            speak(`Chưa đúng rồi con ơi! ... Từ đúng là từ: ${currentWord}`);
        }

        setTimeout(nextQuestion, 4500); // Khoảng nghỉ 4.5 giây cho con thoải mái nghe hết câu chúc mừng
    }

    function showCorrectAnswerOnTimeout() {
        const buttons = document.querySelectorAll('.btn-option');
        buttons.forEach(btn => {
            if (btn.innerText === currentWord) {
                btn.classList.add('correct');
            }
        });
        document.getElementById('battle-status').innerText = "Hết xăng giữa đường rồi! Đổi chặng mới!";
        speak(`Hết giờ mất rồi con ơi! Từ cần tìm là từ: ${currentWord}`);
        setTimeout(nextQuestion, 3500);
    }

    function endGame() {
        clearInterval(timerInterval);
        clearTimeout(aiTimeout);
        
        document.getElementById('final-khang').innerText = scoreKhang;
        document.getElementById('final-ai').innerText = scoreAI;

        const winnerText = document.getElementById('winner-text');
        if (scoreKhang > scoreAI) {
            winnerText.innerText = "🏆 CHIẾN THẮNG! Minh Khang đã cán đích đầu tiên! 🎉";
            winnerText.style.color = "#2b8a3e";
            speak(`Chúc mừng Minh Khang siêu tốc độ đã cán đích đầu tiên và giành chiến thắng trước bạn AI! Con thật tuyệt vời!`);
        } else if (scoreKhang < scoreAI) {
            winnerText.innerText = "🤖 Lần này Bạn AI về đích trước rồi. Khang nhấn ga nhanh hơn ở lượt sau nhé!";
            winnerText.style.color = "#f59f00";
            speak(`Bạn AI suýt soát thắng lần này rồi. Khang nhấn ga nhanh hơn ở lượt chơi sau nhé!`);
        } else {
            winnerText.innerText = "🤝 Bám đuổi ngoạn mục! Cả hai xe cùng cán đích một lúc!";
            winnerText.style.color = "#15aabf";
            speak(`Hòa nhau rồi! Cả hai xe cùng cán đích một lúc!`);
        }

        document.getElementById('end-screen').classList.remove('hidden');
    }
</script>

</body>
</html>

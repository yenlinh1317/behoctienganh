<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>English Catching Game - Letter L Responsive</title>
    <style>
        /* Toàn màn hình chống cuộn */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        /* KHUNG CHỨA GAME: Định vị tuyệt đối làm mốc để co giãn scale */
        #gameArea {
            width: 800px;
            height: 650px;
            position: absolute;
            transform-origin: center center;
            background: linear-gradient(to bottom, #cae9ff, #f7fff7);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 8px solid #ffffff;
            border-radius: 20px;
        }

        /* Thanh thông tin Điểm và Tim - Ẩn lúc đầu để hiện nút Start */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
        }
        #scoreDisplay { color: #27ae60; font-size: 28px; font-weight: bold; }
        #livesDisplay { letter-spacing: 5px; font-size: 24px; }

        /* Bảng câu hỏi treo phía trên - Ẩn lúc đầu */
        #question-box {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            border: 4px solid #f1c40f;
            border-radius: 15px;
            padding: 12px 30px;
            font-size: 26px;
            font-weight: 900;
            color: #d35400;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 10;
            min-width: 520px;
            display: none;
        }

        /* RỔ HỨNG HOẠT HỌA 3D - Ẩn lúc đầu */
        #basket {
            position: absolute;
            bottom: 20px;
            left: 310px;
            width: 180px;
            height: 60px;
            background: radial-gradient(circle at 50% 0%, #ffb366, #cc6600);
            border: 5px solid #994d00;
            border-radius: 10px 10px 45px 45px;
            box-shadow: inset 0 10px 0 rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            z-index: 5;
            display: none;
        }
        #basket::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            width: 180px;
            height: 12px;
            background: #994d00;
            border-radius: 10px;
        }

        /* VẬT PHẨM RƠI: Ô đúng và ô sai viền xám trung tính giống nhau */
        .game-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 4px solid #bdc3c7; 
            border-radius: 18px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 2;
            width: 130px;
            height: 130px;
        }
        .game-item .word-label {
            margin-top: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: capitalize;
        }

        /* MÀN HÌNH MỞ KHÓA CHO IPHONE */
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .screen-title { font-size: 45px; color: #f1c40f; margin-bottom: 25px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .action-btn { padding: 15px 45px; font-size: 22px; font-weight: bold; background: #2ecc71; border: none; color: white; border-radius: 30px; cursor: pointer; box-shadow: 0 8px 20px rgba(46,204,113,0.4); }
        
        #gameOverScreen { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #gameOverScreen.active { opacity: 1; pointer-events: auto; }

        /* Hiệu ứng chớp nền & nảy rổ */
        .flash-correct { animation: flashGreen 0.3s ease-out; }
        .flash-wrong { animation: flashRed 0.3s ease-out; }
        .bounce { transform: scale(1.15); }

        @keyframes flashGreen {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(46, 204, 113, 0.4); }
        }
        @keyframes flashRed {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(231, 76, 60, 0.4); }
        }
    </style>
</head>
<body>

<div id="gameArea">
    <!-- MÀN HÌNH MỞ KHÓA BẮT BUỘC CHO IPHONE / SAFARI -->
    <div id="startScreen">
        <h1 class="screen-title">LETTER L GAME</h1>
        <button class="action-btn" onclick="pressStartButton()">Play Game 🎮</button>
    </div>

    <div id="hud">
        <div>⭐ Score: <span id="scoreDisplay">0</span></div>
        <div id="livesDisplay">💖💖💖</div>
    </div>
    
    <div id="question-box">Loading...</div>
    <div id="basket"></div>

    <!-- MÀN HÌNH THUA CUỘC -->
    <div id="gameOverScreen">
        <h1>WELL DONE!</h1>
        <p style="font-size: 26px; margin-bottom: 25px;">Your Score: <span id="finalScore">0</span> pts</p>
        <button class="action-btn" onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<script>
    const gameArea = document.getElementById('gameArea');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const questionBox = document.getElementById('question-box');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');
    const startScreen = document.getElementById('startScreen');

    // 1. DANH SÁCH CHỮ L THEO ẢNH: ĐÃ FIX LỖI LADDER BẰNG VẼ SVG & MẠO TỪ CHUẨN
    const L_WORDS = [
        { word: "lion", icon: "🦁", isSvg: false, article: "a" },
        { word: "lemon", icon: "🍋", isSvg: false, article: "a" },
        { word: "leaf", icon: "🍃", isSvg: false, article: "a" },
        { word: "lollipop", icon: "🍭", isSvg: false, article: "a" },
        { 
            word: "ladder", 
            icon: `<svg viewBox="0 0 64 64" width="45" height="45"><path d="M22,8V56M42,8V56" stroke="#8b5a2b" stroke-width="5" stroke-linecap="round"/><path d="M22,18H42M22,28H42M22,38H42M22,48H42" stroke="#cd853f" stroke-width="4" stroke-linecap="round"/></svg>`, 
            isSvg: true, 
            article: "a" 
        },
        { word: "lock", icon: "🔒", isSvg: false, article: "a" },
        { word: "lips", icon: "👄", isSvg: false, article: "some" },
        { word: "lizard", icon: "🦎", isSvg: false, article: "a" }
    ];

    const QUESTION_TEMPLATES = [
        { text: "What is it? It is...", type: "is" },
        { text: "What can you see? I can see...", type: "see" }
    ];

    let score = 0;
    let lives = 3;
    let speed = 1.8;
    let gameOver = false;
    let activeElements = [];
    let basketX = 310;
    let targetWord = ""; 
    let isWaitingForVoice = true;
    let audioCtx = null;

    // --- 2. TỰ ĐỘNG CO GIÃN THEO TỶ LỆ CHUẨN (CONTAIN) CHỐNG BỊ TRÀN VIỀN ---
    function resizeGame() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const baseWidth = 800;
        const baseHeight = 650;
        
        const scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
        gameArea.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));
    resizeGame();

    // --- 3. MỞ KHÓA QUYỀN TRÊN IPHONE KHI ẤN NÚT CHƠI ---
    function pressStartButton() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        startScreen.style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        questionBox.style.display = 'block';
        basket.style.display = 'block';

        updateLivesDisplay();
        nextQuestion();
        gameLoop();
    }

    // --- 4. ÂM THANH GIỌNG ĐỌC CÂU HỎI TIẾNG ANH ---
    function speakQuestion(textToSpeak, callback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US';
            utterance.rate = 1.0; 
            utterance.onend = function() { callback(); };
            window.speechSynthesis.speak(utterance);
        } else {
            setTimeout(callback, 2000); 
        }
    }

    function playSound(isCorrect) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let text = isCorrect ? "Good job!" : "Wrong!";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.2;
            window.speechSynthesis.speak(utterance);
        }
    }

    // --- 5. ĐIỀU KHIỂN RỔ HỨNG MƯỢT MÀ CHỐNG ĐƠ IPHONE ---
    function moveBasket(clientX) {
        if (gameOver || startScreen.style.display !== 'none') return;
        const rect = gameArea.getBoundingClientRect();
        const scale = rect.width / 800;
        let relativeX = (clientX - rect.left) / scale;
        basketX = Math.max(0, Math.min(620, relativeX - 90));
        basket.style.left = basketX + 'px';
    }
    window.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    window.addEventListener('touchmove', (e) => {
        if (e.touches && e.touches.length > 0) {
            moveBasket(e.touches.clientX); // Sửa dứt điểm lỗi đơ rổ trên iOS Safari
        }
    }, { passive: true });

    // --- 6. SINH CÂU HỎI VÀ XẾP 3 CỘT THẲNG HÀNG CHỐNG TRÀN MÀN HÌNH ---
    function clearAllActiveElements() {
        activeElements.forEach(item => item.dom.remove());
        activeElements = [];
    }

    function nextQuestion() {
        clearAllActiveElements();
        isWaitingForVoice = true;

        // Chọn ngẫu nhiên 1 từ đúng trong danh sách L_WORDS làm mục tiêu hứng
        const correctIndex = Math.floor(Math.random() * L_WORDS.length);
        const correctObj = L_WORDS[correctIndex];
        targetWord = correctObj.word;
        const article = correctObj.article; 

        const template = QUESTION_TEMPLATES[Math.floor(Math.random() * QUESTION_TEMPLATES.length)];
        questionBox.innerHTML = `${template.text} <span style="color:#2ecc71; text-decoration: underline;">${article} ${targetWord}</span>`;

        const textToSpeak = template.text.replace("...", "") + " " + article + " " + targetWord;

        speakQuestion(textToSpeak, function() {
            // Lấy danh sách từ sai từ bộ đề chữ L
            let wrongCandidates = L_WORDS.filter((_, idx) => idx !== correctIndex);
            wrongCandidates.sort(() => 0.5 - Math.random());

            // Gộp mảng chuẩn index loại trừ hoàn toàn lỗi undefined chữ
            let itemsToSpawn = [
                { word: correctObj.word, icon: correctObj.icon, isSvg: correctObj.isSvg, isCorrect: true },
                { word: wrongCandidates.word, icon: wrongCandidates.icon, isSvg: wrongCandidates.isSvg, isCorrect: false },
                { word: wrongCandidates.word, icon: wrongCandidates.icon, isSvg: wrongCandidates.isSvg, isCorrect: false }
            ];
            itemsToSpawn.sort(() => 0.5 - Math.random());

            // Tọa độ 3 làn đường (150px, 400px, 650px) đảm bảo ôm khít nằm gọn trong viền màn hình ngang
            const columnPositions =;

            itemsToSpawn.forEach((item, index) => {
                spawnItemAtColumn(item.word, item.icon, item.isSvg, item.isCorrect, columnPositions[index]);
            });

            isWaitingForVoice = false; 
        });
    }

    function spawnItemAtColumn(word, icon, isSvg, isCorrect, colX) {
        const itemDom = document.createElement('div');
        itemDom.className = 'game-item'; // Đồng bộ viền xám trung tính cho mọi ô khi rơi
        
        let iconHtml = isSvg ? icon : `<div style="font-size: 55px; line-height: 70px; height: 70px; text-align: center;">${icon}</div>`;
        
        itemDom.innerHTML = `
            <div style="width:70px; height:70px; display:flex; justify-content:center; align-items:center;">${iconHtml}</div>
            <div class="word-label">${word}</div>
        `;
        gameArea.appendChild(itemDom);

        const width = 130;
        const finalX = colX - (width / 2);
        const startY = -130; // Xuất phát ẩn hoàn toàn ở trên viền game

        itemDom.style.left = finalX + 'px';
        itemDom.style.top = startY + 'px';

        activeElements.push({
            dom: itemDom,
            x: finalX,
            y: startY,
            width: width,
            isCorrect: isCorrect
        });
    }

    // --- 7. LOGIC VA CHẠM VÀ VÒNG LẶP GAME CHÍNH ---
    function triggerEffect(type) {
        gameArea.classList.remove('flash-correct', 'flash-wrong');
        void gameArea.offsetWidth; 
        
        if (type === 'correct') {
            gameArea.classList.add('flash-correct');
            basket.classList.add('bounce');
            setTimeout(() => basket.classList.remove('bounce'), 200);
        } else {
            gameArea.classList.add('flash-wrong');
        }
    }

    function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "💖";
        for (let i = lives; i < 3; i++) hearts += "🖤";
        livesDisplay.innerText = hearts;
    }

    function gameLoop() {
        if (gameOver) return;
        
        if (isWaitingForVoice) {
            requestAnimationFrame(gameLoop);
            return;
        }

        let questionChanged = false;
        
        for (let i = activeElements.length - 1; i >= 0; i--) {
            let item = activeElements[i];
            item.y += speed;
            item.dom.style.top = item.y + 'px';

            // Va chạm miệng rổ (Y: từ 530px đến 585px)
            if (item.y > 530 && item.y < 585) {
                if (item.x + item.width > basketX && item.x < basketX + 180) {
                    
                    item.dom.remove();
                    activeElements.splice(i, 1);

                    if (item.isCorrect) {
                        score += 10;
                        scoreDisplay.innerText = score;
                        speed += 0.04; 
                        playSound(true); 
                        triggerEffect('correct');
                        questionChanged = true;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        playSound(false); 
                        triggerEffect('wrong');
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                        questionChanged = true;
                    }
                    continue; 
                }
            }

            // Vật phẩm rơi quá đáy màn hình (650px)
            if (item.y > 650) {
                item.dom.remove();
                activeElements.splice(i, 1);

                if (item.isCorrect) {
                    questionChanged = true; // Đổi sang câu khác khi bé lỡ từ đúng
                }
            }
        }

        if (questionChanged) {
            nextQuestion();
        }

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameOver = true;
        finalScore.innerText = score;
        gameOverScreen.classList.add('active');
        clearAllActiveElements();
    }
</script>

</body>
</html>

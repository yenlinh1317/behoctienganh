<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Catching Game - Letter L Complete</title>
    <style>
        /* Toàn màn hình chống cuộn */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        /* KHUNG CHỨA GAME: Tự động co giãn theo tỷ lệ cố định */
        #gameArea {
            width: 800px;
            height: 650px;
            position: relative;
            transform-origin: center center;
            background: linear-gradient(to bottom, #cae9ff, #f7fff7);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 8px solid #ffffff;
            border-radius: 20px;
        }

        /* Thanh thông tin Điểm và Tim */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
        }
        #scoreDisplay { color: #27ae60; font-size: 28px; font-weight: bold; }
        #livesDisplay { letter-spacing: 5px; font-size: 24px; }

        /* Bảng câu hỏi treo phía trên */
        #question-box {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            border: 4px solid #f1c40f;
            border-radius: 15px;
            padding: 12px 30px;
            font-size: 26px;
            font-weight: 900;
            color: #d35400;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 10;
            min-width: 520px;
        }

        /* RỔ HỨNG HOẠT HỌA 3D */
        #basket {
            position: absolute;
            bottom: 20px;
            left: 310px;
            width: 180px;
            height: 60px;
            background: radial-gradient(circle at 50% 0%, #ffb366, #cc6600);
            border: 5px solid #994d00;
            border-radius: 10px 10px 45px 45px;
            box-shadow: inset 0 10px 0 rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            z-index: 5;
        }
        #basket::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            width: 180px;
            height: 12px;
            background: #994d00;
            border-radius: 10px;
        }

        /* VẬT PHẨM RƠI: Tất cả viền xám trung tính giống hệt nhau khi rơi */
        .game-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 4px solid #bdc3c7; 
            border-radius: 18px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 2;
            width: 130px;
            height: 130px;
        }
        .game-item .word-label {
            margin-top: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: capitalize;
        }

        /* MÀN HÌNH KẾT THÚC */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        #gameOverScreen.active {
            opacity: 1;
            pointer-events: auto;
        }
        #gameOverScreen h1 {
            font-size: 50px;
            color: #f1c40f;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOverScreen p { font-size: 26px; margin-bottom: 25px; }
        #gameOverScreen button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: #2ecc71;
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(46,204,113,0.4);
        }
    </style>
</head>
<body>

<div id="gameArea">
    <div id="hud">
        <div>⭐ Score: <span id="scoreDisplay">0</span></div>
        <div id="livesDisplay">💖💖💖</div>
    </div>
    
    <div id="question-box">Loading...</div>
    <div id="basket"></div>

    <div id="gameOverScreen">
        <h1>WELL DONE!</h1>
        <p>Your Score: <span id="finalScore">0</span> pts</p>
        <button onclick="resetGame()">Play Again 🔄</button>
    </div>
</div>

<script>
    const gameArea = document.getElementById('gameArea');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const questionBox = document.getElementById('question-box');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');

    // 1. DANH SÁCH TỪ CHỮ L: KHÔNG DÙNG ẢNH INTERNET - TỰ VẼ LADDER CHỐNG LỖI Ô VUÔNG TRẮNG
    const L_WORDS = [
        { word: "lion", icon: "🦁", isSvg: false, article: "a" },
        { word: "lemon", icon: "🍋", isSvg: false, article: "a" },
        { word: "leaf", icon: "🍃", isSvg: false, article: "a" },
        { word: "lollipop", icon: "🍭", isSvg: false, article: "a" },
        // Sử dụng mã vẽ SVG viết trực tiếp cho Ladder để thiết bị cũ không bị ô vuông rỗng
        { 
            word: "ladder", 
            icon: `<svg viewBox="0 0 64 64" width="65" height="65"><path d="M22,8V56M42,8V56" stroke="#8b5a2b" stroke-width="5" stroke-linecap="round"/><path d="M22,18H42M22,28H42M22,38H42M22,48H42" stroke="#cd853f" stroke-width="4" stroke-linecap="round"/></svg>`, 
            isSvg: true, 
            article: "a" 
        },
        { word: "lock", icon: "🔒", isSvg: false, article: "a" },
        { word: "lips", icon: "👄", isSvg: false, article: "some" },
        { word: "lizard", icon: "🦎", isSvg: false, article: "a" }
    ];

    const QUESTION_TEMPLATES = [
        { text: "What is it? It is...", type: "is" },
        { text: "What can you see? I can see...", type: "see" }
    ];

    let score = 0;
    let lives = 3;
    let speed = 1.8;
    let gameOver = false;
    let activeElements = [];
    let basketX = 310;
    let targetWord = ""; 
    let isWaitingForVoice = true;

    // --- 2. TỰ ĐỘNG CHỈNH TOÀN MÀN HÌNH & XOAY NGANG ---
    function resizeGame() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const baseWidth = 800;
        const baseHeight = 650;
        const scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
        gameArea.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));
    resizeGame();

    // --- 3. ÂM THANH ĐỌC CÂU HỎI VÀ TRÚNG/TRƯỢT CHUẨN ANH - MỸ ---
    function speakQuestion(textToSpeak, callback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US';
            utterance.rate = 1.0; 
            utterance.onend = function() {
                callback(); 
            };
            window.speechSynthesis.speak(utterance);
        } else {
            setTimeout(callback, 2000); 
        }
    }

    function playSound(isCorrect) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let text = "";
            if (isCorrect) {
                const kudos = ["Correct!", "Good job!", "Excellent!", "Awesome!"];
                text = `${kudos[Math.floor(Math.random() * kudos.length)]}. It is ${targetWord}!`;
            } else {
                text = "Te te te! Wrong!";
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.2;
            window.speechSynthesis.speak(utterance);
        }
    }

    // --- 4. ĐIỀU KHIỂN RỔ HỨNG MƯỢT MÀ ---
    function moveBasket(clientX) {
        if (gameOver) return;
        const rect = gameArea.getBoundingClientRect();
        const scale = rect.width / 800;
        let relativeX = (clientX - rect.left) / scale;
        basketX = Math.max(0, Math.min(620, relativeX - 90));
        basket.style.left = basketX + 'px';
    }
    window.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    window.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) moveBasket(e.touches.clientX);
    }, { passive: true });

    // --- 5. SINH CÂU HỎI VÀ XẾP 3 CỘT THẲNG HÀNG SẠCH LỖI UNDEFINED ---
    function clearAllActiveElements() {
        activeElements.forEach(item => item.dom.remove());
        activeElements = [];
    }
function nextQuestion() {
        clearAllActiveElements();
        isWaitingForVoice = true; // Khóa di chuyển rơi tự do lại khi đang đọc câu hỏi

        // Chọn ngẫu nhiên 1 từ đúng trong danh sách L_WORDS làm mục tiêu hứng
        const correctIndex = Math.floor(Math.random() * L_WORDS.length);
        const correctObj = L_WORDS[correctIndex];
        targetWord = correctObj.word;
        const article = correctObj.article; 

        // Chọn ngẫu nhiên cấu trúc câu hỏi (What is it? / What can you see?)
        const template = QUESTION_TEMPLATES[Math.floor(Math.random() * QUESTION_TEMPLATES.length)];
        questionBox.innerHTML = `${template.text} <span style="color:#2ecc71; text-decoration: underline;">${article} ${targetWord}</span>`;

        const textToSpeak = template.text.replace("...", "") + " " + article + " " + targetWord;

        speakQuestion(textToSpeak, function() {
            // SAU KHI ĐỌC XONG: Lấy ngẫu nhiên thêm 2 từ khác trong mảng làm từ sai (gây nhiễu)
            let wrongCandidates = L_WORDS.filter((_, idx) => idx !== correctIndex);
            wrongCandidates.sort(() => 0.5 - Math.random());

            // ĐỊNH VỊ CHÍNH XÁC MẢNG: Gọi đúng chỉ mục [0] và [1] để sạch hoàn toàn lỗi chữ undefined
            let itemsToSpawn = [
                { word: correctObj.word, icon: correctObj.icon, isSvg: correctObj.isSvg, isCorrect: true },
                { word: wrongCandidates[0].word, icon: wrongCandidates[0].icon, isSvg: wrongCandidates[0].isSvg, isCorrect: false },
                { word: wrongCandidates[1].word, icon: wrongCandidates[1].icon, isSvg: wrongCandidates[1].isSvg, isCorrect: false }
            ];
            // Trộn ngẫu nhiên vị trí xuất hiện giữa các cột
            itemsToSpawn.sort(() => 0.5 - Math.random());

            // 3 làn đường cố định thẳng tắp giúp các khối rơi so le (150px, 400px, 650px)
            const columnPositions = [150, 400, 650];

            itemsToSpawn.forEach((item, index) => {
                spawnItemAtColumn(item.word, item.icon, item.isSvg, item.isCorrect, columnPositions[index]);
            });

            isWaitingForVoice = false; // Mở khóa cho phép vật phẩm bắt đầu rơi xuống từ từ
        });
    }

    function spawnItemAtColumn(word, icon, isSvg, isCorrect, colX) {
        const itemDom = document.createElement('div');
        // Các ô khi rơi xuống dùng chung class 'game-item' viền màu xám giống nhau để ẩn viền xanh/đỏ ban đầu
        itemDom.className = 'game-item';
        
        let iconHtml = isSvg ? icon : `<div style="font-size: 55px; line-height: 70px; height: 70px; text-align: center;">${icon}</div>`;
        
        itemDom.innerHTML = `
            <div style="width:70px; height:70px; display:flex; justify-content:center; align-items:center;">${iconHtml}</div>
            <div class="word-label">${word}</div>
        `;
        gameArea.appendChild(itemDom);

        const width = 130;
        const finalX = colX - (width / 2);
        const startY = -130; // Xuất phát ẩn hoàn toàn ở trên viền game

        itemDom.style.left = finalX + 'px';
        itemDom.style.top = startY + 'px';

        activeElements.push({
            dom: itemDom,
            x: finalX,
            y: startY,
            width: width,
            isCorrect: isCorrect
        });
    }

    // --- 6. LOGIC VA CHẠM VÀ VÒNG LẶP GAME CHÍNH ---
    function triggerEffect(type) {
        gameArea.classList.remove('flash-correct', 'flash-wrong');
        void gameArea.offsetWidth; 
        
        if (type === 'correct') {
            gameArea.classList.add('flash-correct');
            basket.classList.add('bounce');
            setTimeout(() => basket.classList.remove('bounce'), 200);
        } else {
            gameArea.classList.add('flash-wrong');
        }
    }

    function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "💖";
        for (let i = lives; i < 3; i++) hearts += "🖤";
        livesDisplay.innerText = hearts;
    }

    function gameLoop() {
        if (gameOver) return;
        
        if (isWaitingForVoice) {
            requestAnimationFrame(gameLoop);
            return;
        }

        let questionChanged = false;
        
        for (let i = activeElements.length - 1; i >= 0; i--) {
            let item = activeElements[i];
            item.y += speed;
            item.dom.style.top = item.y + 'px';

            // Va chạm miệng rổ (Y: từ 530px đến 585px)
            if (item.y > 530 && item.y < 585) {
                if (item.x + item.width > basketX && item.x < basketX + 180) {
                    
                    item.dom.remove();
                    activeElements.splice(i, 1);

                    if (item.isCorrect) {
                        score += 10;
                        scoreDisplay.innerText = score;
                        speed += 0.04; 
                        playSound(true); 
                        triggerEffect('correct');
                        questionChanged = true;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        playSound(false); 
                        triggerEffect('wrong');
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                        questionChanged = true;
                    }
                    continue; 
                }
            }

            // Vật phẩm rơi quá đáy màn hình (650px)
            if (item.y > 650) {
                item.dom.remove();
                activeElements.splice(i, 1);

                if (item.isCorrect) {
                    questionChanged = true; // Bé bỏ lỡ mất từ đúng -> tự động chuyển sang câu khác
                }
            }
        }

        if (questionChanged) {
            nextQuestion();
        }

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameOver = true;
        finalScore.innerText = score;
        gameOverScreen.classList.add('active');
        clearAllActiveElements();
    }

    function resetGame() {
        score = 0;
        lives = 3;
        speed = 1.8; 
        gameOver = false;
        scoreDisplay.innerText = "0";
        basketX = 310;
        basket.style.left = basketX + 'px';
        updateLivesDisplay();
        gameOverScreen.classList.remove('active');
        nextQuestion();
        gameLoop();
    }

    // Khởi động hệ thống trò chơi lần đầu tiên
    updateLivesDisplay();
    nextQuestion();
    gameLoop();
</script>

</body>
</html>

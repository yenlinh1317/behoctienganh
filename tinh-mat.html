       function getSpellingGuide(word) {
            // 1. Danh sách tất cả các vần phức tạp (3-4 chữ cái) chuẩn sách giáo khoa
            const danhSachVanPhucTap = {
                "oay": "o, a, y, oay",
                "oai": "o, a, i, oai",
                "oan": "o, a, nờ, oan",
                "oang": "o, a, ngờ, oang",
                "oanh": "o, a, nhờ, oanh",
                "uynh": "u, y, nhờ, uynh",
                "uych": "u, y, chờ, uych",
                "uyêt": "u, iê, tờ, uyêt",
                "uyên": "u, iê, nờ, uyên",
                "ươu": "ươ, u, ươu",
                "ương": "ươ, ngờ, ương",
                "ươn": "ươ, nờ, ươn",
                "iêu": "i, ê, u, iêu",
                "yêu": "y, ê, u, yêu",
                "iên": "i, ê, nờ, iên",
                "yên": "i, ê, nờ, yên",
                "ang": "a, ngờ, ang",
                "anh": "a, nhờ, anh",
                "inh": "i, nhờ, inh",
                "ich": "i, chờ, ich",
                "ăng": "ă, ngờ, ăng",
                "âng": "â, ngờ, âng",
                "ong": "o, ngờ, ong",
                "ông": "ô, ngờ, ông",
                "ung": "u, ngờ, ung",
                "ưng": "ư, ngờ, ưng",
                "uông": "u, ô, ngờ, uông",
                "eng": "e, ngờ, eng",
                "iêng": "i, ê, ngờ, iêng",
                "uât": "u, ớ, tờ, uất",
                "uân": "u, ớ, nờ, uân",
                "uây": "u, ớ, i, uây",
                "oet": "o, e, tờ, oét",
                "uyu": "u, y, u, uyu"
            };

            // Nếu vần nằm trong nhóm phức tạp, trả về ngay cách đọc chuẩn
            if (danhSachVanPhucTap[word]) {
                return danhSachVanPhucTap[word];
            }

            // 2. Tự động dịch các vần 2 chữ cái (am, an, at, et, ot, uc...) sang từ thuần Việt để ép loa đọc chuẩn
            let components = [];
            for (let i = 0; i < word.length; i++) {
                let char = word[i];
                
                // Ép trình duyệt đọc đúng tên âm vị tiếng Việt bằng các từ có dấu thanh nhẹ
                if (char === 'n') components.push("nờ");
                else if (char === 'm') components.push("mờ");
                else if (char === 't') components.push("tờ");
                else if (char === 'c') components.push("cờ");
                else if (char === 'p') components.push("pờ");
                else if (char === 'g') components.push("gờ");
                else if (char === 'h') components.push("hờ");
                else if (char === 'b') components.push("bờ");
                else if (char === 'd') components.push("giờ");
                else if (char === 'đ') components.push("đờ");
                else if (char === 'l') components.push("lờ");
                else if (char === 'r') components.push("rờ");
                else if (char === 's') components.push("sờ");
                else if (char === 'v') components.push("vờ");
                else if (char === 'x') components.push("xờ");
                // Xử lý phụ âm ghép tiếng Việt ở cuối vần
                else if (word.substr(i, 2) === 'ch') { components.push("chờ"); i++; }
                else if (word.substr(i, 2) === 'ng') { components.push("ngờ"); i++; }
                else if (word.substr(i, 2) === 'nh') { components.push("nhờ"); i++; }
                // Giữ nguyên các nguyên âm nhưng ép bóc tách độc lập
                else {
                    components.push(char);
                }
            }

            // Nối các âm lại bằng dấu phẩy để ép máy đọc ngắt quãng (Ví dụ: "e, tờ, et")
            let guideText = components.join(", ");
            return `${guideText}, ${word}`;
        }

            let targetHeight = "130px"; 

            if (currentIdx > 4) { 
                gridSize = 12; 
                columns = isPortrait ? 3 : 4; 
                targetHeight = "115px"; 
            } 
            if (currentIdx > 7) { 
                gridSize = 16; 
                columns = isPortrait ? 4 : 4; 
                targetHeight = "90px";  
            } 

            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = "";
            gridContainer.style.gridTemplateColumns = `repeat(${columns}, auto)`;

            let items = Array(gridSize).fill(normalVần);
            const spyIndex = Math.floor(Math.random() * gridSize);
            items[spyIndex] = targetVần;

            items.forEach((vần, idx) => {
                const box = document.createElement('div');
                box.className = 'letter-box';
                box.innerText = vần;
                
                box.style.height = targetHeight; 
                if (currentIdx > 7) {
                    box.style.fontSize = "75px";
                }

                box.onclick = () => checkAnswer(box, vần);
                gridContainer.appendChild(box);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 100;
            const timerBar = document.getElementById('timer-bar');
            
            timerInterval = setInterval(() => {
                timeLeft -= 1; 
                if (timerBar) timerBar.style.width = timeLeft + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showCorrectAnswerOnTimeout();
                }
            }, 100);
        }

        function checkAnswer(selectedBox, value) {
            if (!canClick) return;
            canClick = false;
            clearInterval(timerInterval);

            if (value === targetVần) {
                selectedBox.classList.add('correct');
                score += 10;
                document.getElementById('score').innerText = score;
                
                // Lấy chuỗi đánh vần từ hàm getSpellingGuide
                let spelling = getSpellingGuide(targetVần);
                
                // Tách câu thành các cụm từ có dấu phẩy và chấm để máy nghỉ hơi tự nhiên
                let chúcMừngText = `Đúng rồi! ... Vần ${targetVần}. ... ${spelling}. ... ${targetVần}!`;
                
                // Cấu hình giọng đọc riêng biệt: Chậm rãi, rõ ràng cho bé dễ nghe
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(chúcMừngText);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.65; // Đẩy tốc độ đọc chậm hẳn lại (mức cũ là 0.8)
                window.speechSynthesis.speak(utterance);
                
            } else {
                selectedBox.classList.add('wrong');
                const boxes = document.querySelectorAll('.letter-box');
                boxes.forEach(box => {
                    if (box.innerText === targetVần) box.classList.add('correct');
                });
                
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(`Chưa đúng rồi con ơi! ... Vần ${targetVần} ở đây cơ!`);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.75;
                window.speechSynthesis.speak(utterance);
            }

            // Tăng thời gian chờ lên 5.5 giây để bé có đủ thời gian nghe hết câu đọc chậm
            setTimeout(nextQuestion, 5500); 
        }

        function showCorrectAnswerOnTimeout() {
            canClick = false;
            const boxes = document.querySelectorAll('.letter-box');
            boxes.forEach(box => {
                if (box.innerText === targetVần) box.classList.add('correct');
            });
            speak(`Hết giờ rồi con ơi! Vần ${targetVần} trốn ở đây này!`);
            setTimeout(nextQuestion, 3000);
        }

        function endGame() {
            clearInterval(timerInterval);
            const endScreen = document.getElementById('end-screen');
            const endTitle = document.getElementById('end-title');
            const endP = document.getElementById('end-p');
            
            endScreen.classList.remove('hidden');
            endTitle.innerHTML = "🏆 THẦN ĐỒNG TINH MẮT! 🏆";
            endP.innerText = `Chúc mừng siêu thám tử Minh Khang hoàn thành xuất sắc với ${score} điểm!`;
            speak(`Chúc mừng Minh Khang siêu tinh mắt đã hoàn thành trò chơi với ${score} điểm! Con thật là tuyệt vời!`);
        }
    </script>
</body>
</html>

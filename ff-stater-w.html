function save(){
  try{localStorage.setItem('ffp3',JSON.stringify(prog));localStorage.setItem('ffs3',JSON.stringify(stars));}catch(e){}
  updateHero();
}
function load(){
  try{prog=JSON.parse(localStorage.getItem('ffp3')||'{}');}catch(e){prog={};}
  try{stars=JSON.parse(localStorage.getItem('ffs3')||'{}');}catch(e){stars={};}
}
function updateHero(){
  const total=UNITS.reduce((s,u)=>s+u.lessons.length,0);
  const done=Object.keys(prog).filter(k=>prog[k]).length;
  const pct=Math.round(done/total*100);
  const f=D.getElementById('hfill'),l=D.getElementById('hlbl');
  if(f) f.style.width=pct+'%';
  if(l) l.textContent=pct===100?'Hoàn thành tất cả! 🎉':`${pct}% · ${done}/${total} bài`;
}
function go(id){
  D.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  D.getElementById(id).classList.add('on');
  if(id==='s-home'){buildHome();}
  if(id==='s-prog'){buildProg();}
  W.scrollTo(0,0);
}
function buildHome(){
  const g=D.getElementById('ugrid');
  if(!g) return;
  g.innerHTML='';
  UNITS.forEach(u=>{
    const done=u.lessons.filter(l=>prog[l.id]).length;
    const tot=u.lessons.length;
    const el=D.createElement('div');
    el.className='ucard'+(done===tot?' done':'');
    el.innerHTML=`<span class="uem">${u.emoji}</span><div class="uname">${u.name}</div><div class="uvn">${u.vn}</div><div class="ust">${done===tot?'★★★':'☆☆☆'} ${done}/${tot}</div>`;
    el.onclick=()=>openUnit(u);
    g.appendChild(el);
  });
  updateHero();
}
function openUnit(u){
  curUnit=u;
  D.getElementById('uhdr').innerHTML=`<div class="uhem">${u.emoji}</div><div><div class="uhtitle">${u.name}</div><div class="uhsub">${u.vn}</div></div>`;
  const ll=D.getElementById('ulist'); ll.innerHTML='';
  const tE={vocab:'📚',grammar:'💬',alpha:'🔤',nums:'🔢',matching:'🎮',colorgame:'🎮',story:'📖',review:'⭐',hw:'✍️'};
  u.lessons.forEach(l=>{
    const d=prog[l.id];
    const el=D.createElement('div'); el.className='litem';
    el.innerHTML=`<div class="lic">${d?'✅':tE[l.type]||'📝'}</div><div style="flex:1;min-width:0;"><div class="ltit">${l.title}</div><div class="lsub">${l.vn}</div></div><span class="lbadge ${l.badge}">${{bw:'words',bg:'game',bl:'letters',bn:'numbers',bs:'story',br:'review'}[l.badge]}</span>`;
    el.onclick=()=>openLesson(l);
    ll.appendChild(el);
  });
  go('s-unit');
}
function openLesson(l){
  curLesson=l;
  D.getElementById('lback').onclick=()=>openUnit(curUnit);
  const tE={vocab:'📚',grammar:'💬',alpha:'🔤',nums:'🔢',matching:'🎮',colorgame:'🎮',story:'📖',review:'⭐',hw:'✍️'};
  D.getElementById('lhdr').innerHTML=`<div class="lhem">${tE[l.type]||'📝'}</div><div><div class="lhtit">${l.title}</div><div class="lhsub">${l.vn}</div></div>`;
  const c=D.getElementById('lcontent');
  if(l.type==='vocab') c.innerHTML=buildVocab(l);
  else if(l.type==='grammar') c.innerHTML=buildGrammar(l);
  else if(l.type==='alpha') c.innerHTML=buildAlpha(l);
  else if(l.type==='nums') c.innerHTML=buildNums(l);
  else if(l.type==='matching'){initMG(l);c.innerHTML=buildMG();}
  else if(l.type==='colorgame'){initCG();c.innerHTML=buildCGHtml();}
  else if(l.type==='story'){stIdx=0;c.innerHTML=buildStory(l);}
  else if(l.type==='review') c.innerHTML=buildReview(l);
  else if(l.type==='hw') c.innerHTML=buildHW(l);
  else c.innerHTML='<p style="padding:1rem;color:var(--color-text-secondary);">Sắp ra mắt · Coming soon...</p>';
  go('s-lesson');
}

/* SPEAK */
function speak(txt,lang){
  if(!synth) return;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang=lang||'en-US'; u.rate=0.85; u.pitch=1.1;
  synth.speak(u);
}
function speakBtn(txt,btnId){
  const el=D.getElementById(btnId);
  if(el) el.classList.add('speaking');
  speak(txt,'en-US');
  setTimeout(()=>{if(el)el.classList.remove('speaking');},2000);
}

/* VOCAB */
function buildVocab(l){
  const cards=l.vocab.map((v,i)=>`<div class="vc" id="vc${i}" onclick="flipVC(${i},'${v.pr}')"><div class="vem">${v.em}</div><div class="ven">${v.en}</div><div class="vvn">${v.vn}</div><div class="vpr">${v.pr}</div></div>`).join('');
  const allWords=l.vocab.map(v=>`"${v.en}"`).join(', ');
  return `<button class="speak-btn" id="speak-all-btn" onclick="speakAllVocab(${JSON.stringify(l.vocab.map(v=>v.pr))})"><div class="speak-pulse"></div>🔊 Nghe tất cả từ · Hear all words</button><div class="hint">💡 Bấm thẻ nghe phát âm · Tap card to hear!</div><div class="vgrid">${cards}</div>${doneBtn(l.id)}`;
}
function flipVC(i,pr){
  const el=D.getElementById('vc'+i);
  el.classList.toggle('flip');
  el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),300);
  speak(pr,'en-US');
}
let vocabIdx=0;
function speakAllVocab(words){
  const btn=D.getElementById('speak-all-btn');
  if(btn) btn.classList.add('speaking');
  let i=0;
  function next(){
    if(i>=words.length){if(btn)btn.classList.remove('speaking');return;}
    const u=new SpeechSynthesisUtterance(words[i]);
    u.lang='en-US';u.rate=0.8;u.pitch=1.1;
    u.onend=()=>{i++;setTimeout(next,600);};
    synth.speak(u);
    i===0&&synth.cancel()&&synth.speak(u);
    i++;
  }
  synth.cancel();
  function sayNext(idx){
    if(idx>=words.length){if(btn)btn.classList.remove('speaking');return;}
    const u2=new SpeechSynthesisUtterance(words[idx]);
    u2.lang='en-US';u2.rate=0.8;u2.pitch=1.1;
    u2.onend=()=>setTimeout(()=>sayNext(idx+1),500);
    synth.speak(u2);
  }
  sayNext(0);
}

/* ALPHABET */
function buildAlpha(l){
  window._aLen=l.letters.length;
  const cards=l.letters.map((lt,i)=>`<div class="ac" id="ac${i}" onclick="showA(${i},'${lt.say}')"><div class="abig">${lt.U}</div><div class="asm">${lt.l}</div><div class="aword">${lt.w1}</div></div>`).join('');
  const dets=l.letters.map((lt,i)=>`<div class="adet" id="ad${i}"><div class="adetbig">${lt.U}${lt.l}</div><div class="adetw">${lt.em} ${lt.w1} · ${lt.w2}</div><div class="adettrace">${lt.U}${lt.U} ${lt.l}${lt.l}</div><button class="speak-btn" style="margin-top:10px;" onclick="speak('${lt.say}','en-US')"><div class="speak-pulse"></div>🔊 ${lt.say}</button></div>`).join('');
  return `<div class="agrid">${cards}</div>${dets}${doneBtn(l.id)}`;
}
function showA(i,say){
  for(let j=0;j<window._aLen;j++){
    const d=D.getElementById('ad'+j),c=D.getElementById('ac'+j);
    if(d)d.classList.toggle('on',j===i);
    if(c)c.classList.toggle('sel',j===i);
  }
  speak(say,'en-US');
}

/* NUMBERS */
function buildNums(l){
  const cards=l.nums.map(n=>`<div class="nc" onclick="tapNum(this,${n})"><div class="nbig">${n}</div><div class="nword">${NW[n]}</div><div class="nvn">${NVN[n]}</div><div class="ndots">${Array(Math.min(n,20)).fill('<div class="nd"></div>').join('')}</div></div>`).join('');
  return `<div class="ngrid">${cards}</div><div class="hint">👆 Bấm để nghe đọc số · Tap to hear the number!</div>${doneBtn(l.id)}`;
}
function tapNum(el,n){

  el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),300);
  speak(NW[n],'en-US');

/* GRAMMAR */
function buildGrammar(l){
  const exs=l.exs.map(e=>`<div class="gex"><span>${e.q}</span> → ${e.a}</div>`).join('');
  const fills=l.fills.map((f,i)=>`<div class="fq"><div class="fqtxt">${f.t}</div><div class="fopts">${f.opts.map(o=>`<div class="fo" onclick="chkF(this,'${o}','${f.ans}')">${o}</div>`).join('')}</div></div>`).join('');
  const speakExs=l.exs.map(e=>e.a).join('. ');
  return `<div class="gbox"><button class="speak-btn" onclick="speak('${l.pat}','en-US')"><div class="speak-pulse"></div>🔊 ${l.pat}</button><div class="gpat">${l.pvn}</div>${l.pat2?`<button class="speak-btn" style="margin-top:8px;" onclick="speak('${l.pat2}','en-US')"><div class="speak-pulse"></div>🔊 ${l.pat2}</button><div class="gpat2">${l.p2vn}</div>`:''}<div style="margin-top:10px;">${exs}</div></div><div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">✏️ Điền vào chỗ trống · Fill in the blank:</div><div>${fills}</div>${doneBtn(l.id)}`;
}
function chkF(el,chosen,ans){
  el.closest('.fopts').querySelectorAll('.fo').forEach(o=>o.classList.remove('ok','no'));
  el.classList.add(chosen===ans?'ok':'no');
  el.classList.add('pop');
  if(chosen===ans) speak(ans,'en-US');
}

/* COLOUR GAME - multi-round */
function initCG(){
  cgData=[...COLORS].sort(()=>Math.random()-.5);
  cgIdx=0; cgScore=0;
}
function buildCGHtml(){
  const total=cgData.length;
  const pct=Math.round(cgIdx/total*100);
  if(cgIdx>=total) return buildCGResult();
  const tgt=cgData[cgIdx];
  const opts=[...COLORS].sort(()=>Math.random()-.5);
  const cards=opts.map(c=>`<button class="cb" id="cb_${c.n}" style="background:${c.bg};color:${c.fg};" onclick="chkCG('${c.n}','${tgt.n}')">${c.n}</button>`).join('');
  return `<div class="game-top"><span class="game-score">⭐ ${cgScore}/${total}</span><span class="game-progress">Câu ${cgIdx+1}/${total}</span></div><div class="game-pbar"><div class="game-pfill" style="width:${pct}%"></div></div><div class="cg-card"><div class="cg-em">${tgt.em}</div><div class="cg-q">What colour is it?</div><div class="cg-hint">Màu gì? · Bấm đáp án đúng!</div><div class="cg-opts">${cards}</div><div class="cg-fb" id="cgfb"></div></div>`;
}
function buildCGResult(){
  const total=COLORS.length;
  const pct=Math.round(cgScore/total*100);
  const msg=pct===100?'Xuất sắc! 🏆':pct>=80?'Rất giỏi! 🌟':pct>=60?'Tốt lắm! 😊':'Cố lên nhé! 💪';
  return `<div class="cg-card"><div class="cg-em">🎉</div><div class="cg-q">${msg}</div><div style="font-size:15px;color:var(--color-text-secondary);margin:6px 0;">${cgScore}/${total} câu đúng · correct</div><button class="next-btn" onclick="initCG();D.getElementById('lcontent').innerHTML=buildCGHtml();">🔄 Chơi lại · Play again</button></div>${doneBtn(curLesson.id)}`;
}
function chkCG(chosen,tgt){
  D.querySelectorAll('.cb').forEach(b=>b.style.pointerEvents='none');
  const fb=D.getElementById('cgfb');
  if(chosen===tgt){
    D.getElementById('cb_'+chosen).classList.add('ok');
    fb.textContent='🎉 Đúng rồi! · Correct!'; fb.style.color='#085041';
    cgScore++;
    speak(tgt,'en-US');
  } else {
    D.getElementById('cb_'+chosen).classList.add('no');
    D.getElementById('cb_'+tgt).classList.add('ok');
    fb.textContent='❌ '+tgt+' · Thử lại sau!'; fb.style.color='#993C1D';
    const se=D.getElementById('cb_'+chosen);
    se.classList.add('shake');
  }
  cgIdx++;
  setTimeout(()=>{ D.getElementById('lcontent').innerHTML=buildCGHtml(); },1600);
}

/* MATCHING GAME - multi-round */
function initMG(l){
  mgData=[...l.pairs].sort(()=>Math.random()-.5);
  mgIdx=0; mgScore=0;
}
function buildMG(){
  const total=mgData.length;
  const pct=Math.round(mgIdx/total*100);
  if(mgIdx>=total) return buildMGResult();
  const cur=mgData[mgIdx];
  const opts=[...mgData].sort(()=>Math.random()-.5).slice(0,4);
  if(!opts.find(o=>o.en===cur.en)) opts[0]=cur;
  opts.sort(()=>Math.random()-.5);
  const cards=opts.map(o=>`<div class="mo" id="mo_${o.en.replace(/[^a-z]/gi,'')}" onclick="chkMG('${o.en}','${cur.en}')">${o.vn}</div>`).join('');
  return `<div class="game-top"><span class="game-score">⭐ ${mgScore}/${total}</span><span class="game-progress">Câu ${mgIdx+1}/${total}</span></div><div class="game-pbar"><div class="game-pfill" style="width:${pct}%"></div></div><div class="match-q"><div class="match-em">${cur.em}</div><button class="speak-btn" style="margin:6px auto;width:auto;display:inline-flex;" onclick="speak('${cur.en}','en-US')"><div class="speak-pulse"></div>🔊 ${cur.en}</button><div class="match-sub">Nghĩa tiếng Việt là gì? · What does it mean?</div></div><div class="match-opts">${cards}</div>`;
}
function buildMGResult(){
  const total=mgData.length;
  const pct=Math.round(mgScore/total*100);
  const msg=pct===100?'Hoàn hảo! 🏆':pct>=80?'Rất giỏi! 🌟':pct>=60?'Tốt lắm! 😊':'Cố lên! 💪';
  return `<div class="cg-card"><div class="cg-em">🎉</div><div class="cg-q">${msg}</div><div style="font-size:15px;color:var(--color-text-secondary);margin:6px 0;">${mgScore}/${total} câu đúng · correct</div><button class="next-btn" onclick="initMG(curLesson);D.getElementById('lcontent').innerHTML=buildMG();">🔄 Chơi lại · Play again</button></div>${doneBtn(curLesson.id)}`;
}
function chkMG(chosen,correct){
  D.querySelectorAll('.mo').forEach(m=>m.style.pointerEvents='none');
  const safeC=correct.replace(/[^a-z]/gi,'');
  const safeChosen=chosen.replace(/[^a-z]/gi,'');
  D.querySelectorAll('.mo').forEach(m=>{
    const id=m.id.replace('mo_','');
    if(id===safeC) m.classList.add('ok');
  });
  if(chosen!==correct){
    const el=D.getElementById('mo_'+safeChosen);
    if(el){el.classList.add('no');el.classList.add('shake');}
  } else {
    mgScore++;
    speak(correct,'en-US');
  }
  mgIdx++;
  setTimeout(()=>{ D.getElementById('lcontent').innerHTML=buildMG(); },1400);
}

/* STORY */
function buildStory(l){
  const sc=l.scenes[stIdx];
  const done=stIdx===l.scenes.length-1;
  return `<div class="story-card"><div class="story-em">${sc.em}</div><div class="bubble"><div class="bsp">${sc.sp} nói · says:</div><button class="speak-btn" onclick="speakBtn('${sc.txt}','spbtn_story')" id="spbtn_story" style="margin-bottom:6px;"><div class="speak-pulse"></div>🔊 ${sc.txt}</button><div class="bvn">${sc.vn}</div></div></div><div class="snav"><button class="sbtn" onclick="navSt(-1)" ${stIdx===0?'disabled':''}>← Trước</button><span class="sstep">${stIdx+1} / ${l.scenes.length}</span><button class="sbtn" onclick="navSt(1)" ${done?'disabled':''}>Tiếp →</button></div>${done?doneBtn(l.id):''}`;
}
function navSt(d){
  stIdx=Math.max(0,Math.min(curLesson.scenes.length-1,stIdx+d));
  D.getElementById('lcontent').innerHTML=buildStory(curLesson);
}

/* REVIEW - multi-round với progress bar */
function buildReview(l){
  const qs=l.qs.map((q,i)=>`<div class="rq" id="rq${i}"><div class="rqtxt">${i+1}. ${q.q}</div><div class="ropts">${q.os.map((o,j)=>`<div class="ro" onclick="chkRev(this,${j},${q.c},'rq${i}')">${o}</div>`).join('')}</div></div>`).join('');
  return `<div class="hint">⭐ Chọn câu trả lời đúng · Choose the correct answer! (${l.qs.length} câu)</div>${qs}${doneBtn(l.id)}`;
}
function chkRev(el,chosen,correct,qid){
  const c=el.closest('.ropts');
  if(c.querySelector('.ok')||c.querySelector('.no')) return;
  c.querySelectorAll('.ro').forEach((o,i)=>{if(i===correct)o.classList.add('ok');});
  if(chosen!==correct){el.classList.add('no');el.classList.add('shake');}
  else{el.classList.add('pop');speak(el.textContent,'vi-VN');}
}

function buildHW(l){

/* DONE */
function doneBtn(id){
  if(prog[id]) return `<div class="donebox"><div class="doneem">🌟</div><div class="donetit">Hoàn thành! · Completed!</div><div class="donesub">Bé giỏi lắm!</div><div class="xp">+10 XP ⭐</div></div>`;
  return `<div class="donebtn-wrap"><button class="donebtn" onclick="markDone('${id}')">✅ Hoàn thành bài học!</button></div>`;
}
function markDone(id){
  prog[id]=true;stars[id]=3;save();
  const w=D.querySelector('.donebtn-wrap');
  if(w) w.outerHTML=`<div class="donebox pop"><div class="doneem">🎉</div><div class="donetit">Tuyệt vời! · Well done!</div><div class="donesub">Bé học rất giỏi!</div><div class="xp">+10 XP ⭐⭐⭐</div></div>`;
}

/* PROGRESS */
function buildProg(){
  let html='';
  UNITS.forEach(u=>{
    const done=u.lessons.filter(l=>prog[l.id]).length;
    const tot=u.lessons.length;
    const pct=Math.round(done/tot*100);
    html+=`<div class="prow"><span style="font-size:18px;">${u.emoji}</span><span class="prname">${u.name}</span><div class="prbar"><div class="prfill" style="width:${pct}%"></div></div><span class="prpct">${pct}%</span></div>`;
  });
  const td=Object.keys(prog).filter(k=>prog[k]).length;
  const ta=UNITS.reduce((s,u)=>s+u.lessons.length,0);
  const ts=Object.values(stars).reduce((s,v)=>s+v,0);
  D.getElementById('proglist').innerHTML=html;
  D.getElementById('totstats').innerHTML=`⭐ ${ts} sao · ${td}/${ta} bài hoàn thành`;
}

/* GLOBAL REVIEW QUIZ */
function launchRevQuiz(){
  const all=UNITS.flatMap(u=>u.lessons.filter(l=>l.type==='review'));
  const pick=all[Math.floor(Math.random()*all.length)];
  D.getElementById('rqcontent').innerHTML=buildReview(pick)+`<div style="margin-top:12px;text-align:center;"><button onclick="launchRevQuiz()" style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px 22px;cursor:pointer;font-size:14px;color:var(--color-text-primary);">🔄 Bộ câu hỏi mới · New quiz</button></div>`;
  go('s-revquiz');
}

load();
buildHome();
</script>

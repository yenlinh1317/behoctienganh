<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tung Xúc Xắc - Luyện Nhìn Nhanh Đoán Số</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    color: #fff;
  }
  h1 { font-size: 1.6em; margin-bottom: 4px; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
  .subtitle { font-size: 0.9em; opacity: 0.9; margin-bottom: 16px; text-align: center; }

  .modes {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px;
  }
  .mode-btn {
    padding: 10px 16px; border-radius: 20px; border: 2px solid #fff;
    background: rgba(255,255,255,0.15); color: #fff; font-weight: bold;
    cursor: pointer; font-size: 0.95em; transition: 0.2s;
  }
  .mode-btn.active { background: #fff; color: #764ba2; }

  .stage {
    background: #fff; border-radius: 24px; padding: 24px;
    width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: #333; text-align: center;
  }

  .score-row {
    display: flex; justify-content: space-between; font-size: 0.95em;
    margin-bottom: 12px; color: #555; font-weight: bold;
  }

  .dice-area {
    display: flex; justify-content: center; gap: 16px; min-height: 140px;
    align-items: center; margin: 16px 0;
  }
  .die {
    width: 100px; height: 100px; background: #fff; border: 4px solid #333;
    border-radius: 16px; display: grid; grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr); padding: 12px; gap: 4px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    transition: transform 0.15s;
  }
  .die.rolling { animation: shake 0.5s; }
  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg) scale(1.05); }
    75% { transform: rotate(15deg) scale(1.05); }
  }
  .dot { width: 18px; height: 18px; border-radius: 50%; background: #d32f2f; align-self: center; justify-self: center; }
  .die.hidden-face { background: linear-gradient(135deg,#764ba2,#667eea); }

  .pos-1-5 { grid-row: 2; grid-column: 2; }
  .pos-2-1 { grid-row: 1; grid-column: 1; }
  .pos-2-9 { grid-row: 3; grid-column: 3; }
  .pos-3-1 { grid-row: 1; grid-column: 1; }
  .pos-3-5 { grid-row: 2; grid-column: 2; }
  .pos-3-9 { grid-row: 3; grid-column: 3; }
  .pos-4-1 { grid-row: 1; grid-column: 1; }
  .pos-4-3 { grid-row: 1; grid-column: 3; }
  .pos-4-7 { grid-row: 3; grid-column: 1; }
  .pos-4-9 { grid-row: 3; grid-column: 3; }
  .pos-5-1 { grid-row: 1; grid-column: 1; }
  .pos-5-3 { grid-row: 1; grid-column: 3; }
  .pos-5-5 { grid-row: 2; grid-column: 2; }
  .pos-5-7 { grid-row: 3; grid-column: 1; }
  .pos-5-9 { grid-row: 3; grid-column: 3; }
  .pos-6-1 { grid-row: 1; grid-column: 1; }
  .pos-6-3 { grid-row: 1; grid-column: 3; }
  .pos-6-4 { grid-row: 2; grid-column: 1; }
  .pos-6-6 { grid-row: 2; grid-column: 3; }
  .pos-6-7 { grid-row: 3; grid-column: 1; }
  .pos-6-9 { grid-row: 3; grid-column: 3; }

  .roll-btn {
    background: #ff9800; color: #fff; border: none; padding: 14px 36px;
    border-radius: 30px; font-size: 1.2em; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 16px;
  }
  .roll-btn:active { transform: scale(0.96); }
  .roll-btn:disabled { opacity: 0.5; }

  .answers {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px;
  }
  .ans-btn {
    padding: 14px 0; border-radius: 12px; border: none; background: #eee;
    font-size: 1.3em; font-weight: bold; cursor: pointer; color: #333;
  }
  .ans-btn:active { transform: scale(0.95); }
  .ans-btn.correct { background: #4caf50; color: #fff; }
  .ans-btn.wrong { background: #f44336; color: #fff; }

  .feedback {
    min-height: 36px; font-size: 1.1em; font-weight: bold; margin-top: 12px;
  }
  .feedback.good { color: #4caf50; }
  .feedback.bad { color: #f44336; }
  footer { margin-top: 16px; font-size: 0.8em; opacity: 0.7; text-align: center; }

  .hint-toggle {
    display: none; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 12px; font-size: 0.9em; color: #555;
  }
  .hint-toggle.show { display: flex; }
  .hint-toggle input { width: 18px; height: 18px; cursor: pointer; }

  .die.big-die {
    transform: scale(1.15);
    border-color: #ff9800;
    box-shadow: 0 0 0 4px rgba(255,152,0,0.4), 4px 4px 0 rgba(0,0,0,0.2);
  }
  .die.small-die { position: relative; }

  .count-on-label {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    background: #ff9800; color: #fff; font-size: 0.7em; font-weight: bold;
    padding: 2px 8px; border-radius: 10px; white-space: nowrap;
  }

  .counting-bubbles {
    display: flex; justify-content: center; gap: 6px; min-height: 28px; margin-top: -4px;
  }
  .count-num {
    width: 26px; height: 26px; border-radius: 50%; background: #ffe0b2;
    color: #e65100; font-weight: bold; font-size: 0.85em;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.25s, transform 0.25s;
  }
  .count-num.show { opacity: 1; transform: scale(1); }
  .count-num.base { background: #ff9800; color: #fff; }
</style>
</head>
<body>

<h1>🎲 Tung Xúc Xắc Đoán Số</h1>
<div class="subtitle">Nhìn chấm xúc xắc, đoán số ngay — không đếm từng chấm!</div>

<div class="modes">
  <button class="mode-btn active" data-mode="slow1">🐢 1 xúc xắc - thong thả</button>
  <button class="mode-btn" data-mode="fast1">⚡ 1 xúc xắc - nhìn nhanh</button>
  <button class="mode-btn" data-mode="sum2">➕ 2 xúc xắc - cộng lại</button>
</div>

<div class="stage">
  <div class="score-row">
    <span id="score">⭐ Điểm: 0</span>
    <span id="streak">🔥 Chuỗi đúng: 0</span>
  </div>

  <div class="hint-toggle" id="hintToggle">
    <input type="checkbox" id="hintCheckbox">
    <label for="hintCheckbox">💡 Gợi ý: đếm tiếp (counting on)</label>
  </div>

  <div class="dice-area" id="diceArea">
    <div class="die" id="die1"></div>
    <div class="die" id="die2" style="display:none;"></div>
  </div>

  <div class="counting-bubbles" id="countingBubbles"></div>

  <button class="roll-btn" id="rollBtn">🎲 Tung xúc xắc!</button>

  <div class="answers" id="answers"></div>
  <div class="feedback" id="feedback"></div>
</div>

<footer>Mẹo: khuyến khích bé "nhìn hình đoán số", đừng đếm bằng tay 👀</footer>

<script>
const DOT_LAYOUTS = {
  1: [5], 2: [1,9], 3: [1,5,9], 4: [1,3,7,9],
  5: [1,3,5,7,9], 6: [1,3,4,6,7,9]
};

let mode = 'slow1';
let score = 0, streak = 0;
let current = { d1: 0, d2: 0 };
let answered = false;
let fastTimer = null;

const dieEl1 = document.getElementById('die1');
const dieEl2 = document.getElementById('die2');
const rollBtn = document.getElementById('rollBtn');
const answersEl = document.getElementById('answers');
const feedbackEl = document.getElementById('feedback');
const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const hintToggle = document.getElementById('hintToggle');
const hintCheckbox = document.getElementById('hintCheckbox');
const countingBubbles = document.getElementById('countingBubbles');

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    resetStage();
  });
});

function resetStage() {
  clearTimeout(fastTimer);
  answered = false;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  dieEl2.style.display = mode === 'sum2' ? 'grid' : 'none';
  dieEl1.classList.remove('big-die', 'small-die');
  dieEl2.classList.remove('big-die', 'small-die');
  hintToggle.classList.toggle('show', mode === 'sum2');
  countingBubbles.innerHTML = '';
  renderDie(dieEl1, 0, true); // mặt úp
  renderDie(dieEl2, 0, true);
  answersEl.innerHTML = '';
  rollBtn.disabled = false;
}

function renderDie(el, num, hidden) {
  el.innerHTML = '';
  if (hidden) {
    el.classList.add('hidden-face');
    return;
  }
  el.classList.remove('hidden-face');
  const positions = DOT_LAYOUTS[num] || [];
  for (let i = 1; i <= 9; i++) {
    const cell = document.createElement('div');
    if (positions.includes(i)) {
      cell.className = 'dot pos-' + num + '-' + i;
    }
    el.appendChild(cell);
  }
}

function randDie() {
  return Math.floor(Math.random() * 6) + 1;
}

function showCountOnHint(d1, d2) {
  countingBubbles.innerHTML = '';
  dieEl1.classList.remove('big-die', 'small-die');
  dieEl2.classList.remove('big-die', 'small-die');
  if (!hintCheckbox.checked || mode !== 'sum2' || d1 === 0 || d2 === 0) return;

  const bigger = Math.max(d1, d2);
  const smaller = Math.min(d1, d2);
  // Xúc xắc nào lớn hơn (hoặc bằng) thì gắn class big-die
  if (d1 >= d2) { dieEl1.classList.add('big-die'); dieEl2.classList.add('small-die'); }
  else { dieEl2.classList.add('big-die'); dieEl1.classList.add('small-die'); }

  // Bóng "số gốc" (bigger), rồi đếm tiếp thêm smaller lần
  const baseBubble = document.createElement('div');
  baseBubble.className = 'count-num base';
  baseBubble.textContent = bigger;
  countingBubbles.appendChild(baseBubble);
  setTimeout(() => baseBubble.classList.add('show'), 50);

  for (let i = 1; i <= smaller; i++) {
    const bubble = document.createElement('div');
    bubble.className = 'count-num';
    bubble.textContent = bigger + i;
    countingBubbles.appendChild(bubble);
    setTimeout(() => bubble.classList.add('show'), 50 + i * 450);
  }

  speak('Giữ ' + bigger + ' trong đầu, đếm tiếp ' + smaller + ' lần nữa');
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'vi-VN';
  u.rate = 0.95;
  speechSynthesis.speak(u);
}

function buildAnswers(correctValue, maxOptions) {
  answersEl.innerHTML = '';
  const choices = new Set([correctValue]);
  const low = mode === 'sum2' ? 2 : 1;
  const high = mode === 'sum2' ? 12 : 6;
  while (choices.size < maxOptions) {
    const r = Math.floor(Math.random() * (high - low + 1)) + low;
    choices.add(r);
  }
  const arr = Array.from(choices).sort(() => Math.random() - 0.5);
  arr.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = val;
    btn.addEventListener('click', () => checkAnswer(val, correctValue, btn));
    answersEl.appendChild(btn);
  });
}

function checkAnswer(picked, correctValue, btn) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.ans-btn').forEach(b => {
    if (parseInt(b.textContent) === correctValue) b.classList.add('correct');
  });
  if (picked === correctValue) {
    score += (mode === 'fast1' ? 2 : 1);
    streak += 1;
    feedbackEl.textContent = '🎉 Đúng rồi, giỏi quá!';
    feedbackEl.className = 'feedback good';
    speak('Đúng rồi, giỏi quá!');
  } else {
    streak = 0;
    btn.classList.add('wrong');
    feedbackEl.textContent = '🤔 Chưa đúng, đáp án là ' + correctValue + '. Thử lại nha!';
    feedbackEl.className = 'feedback bad';
    speak('Chưa đúng. Đáp án là ' + correctValue);
  }
  scoreEl.textContent = '⭐ Điểm: ' + score;
  streakEl.textContent = '🔥 Chuỗi đúng: ' + streak;
}

rollBtn.addEventListener('click', () => {
  rollBtn.disabled = true;
  answered = false;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  answersEl.innerHTML = '';

  dieEl1.classList.add('rolling');
  if (mode === 'sum2') dieEl2.classList.add('rolling');

  dieEl1.classList.remove('big-die', 'small-die');
  dieEl2.classList.remove('big-die', 'small-die');
  countingBubbles.innerHTML = '';

  renderDie(dieEl1, 0, true);
  renderDie(dieEl2, 0, true);

  setTimeout(() => {
    const d1 = randDie();
    const d2 = mode === 'sum2' ? randDie() : 0;
    current = { d1, d2 };
    dieEl1.classList.remove('rolling');
    dieEl2.classList.remove('rolling');

    renderDie(dieEl1, d1, false);
    if (mode === 'sum2') renderDie(dieEl2, d2, false);

    if (mode === 'fast1') {
      // Hiện 1.3 giây rồi che lại - luyện nhìn nhanh, không đếm
      fastTimer = setTimeout(() => {
        renderDie(dieEl1, 0, true);
      }, 1300);
    }

    if (mode === 'sum2') {
      showCountOnHint(d1, d2);
    }

    const correctValue = mode === 'sum2' ? d1 + d2 : d1;
    buildAnswers(correctValue, mode === 'sum2' ? 6 : 4);
    rollBtn.disabled = false;
  }, 500);
});

resetStage();
</script>

</body>
</html>

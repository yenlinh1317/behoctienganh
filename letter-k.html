<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vương Quốc Chữ K - Bé Học Tiếng Anh</title>
    <style>
        body { margin: 0; background: #ffeaa7; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; user-select: none; overflow: hidden; }
        
        /* Khu vực nút bấm nghe câu hỏi lớn hơn */
        #topArea { text-align: center; margin-bottom: 15px; background: #fff; padding: 20px 40px; border-radius: 25px; box-shadow: 0 8px 0 #fab1a0; width: 600px; border: 4px solid #ff7675; }
        #audioBtn { background: #ff7675; color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #d63031; transition: all 0.1s; display: inline-flex; align-items: center; gap: 15px; }
        #audioBtn:active { transform: translateY(4px); box-shadow: none; }
        
        /* Khung chứa trò chơi siêu rộng rãi cho bé */
        #gameArea { width: 800px; height: 650px; background: linear-gradient(to bottom, #74b9ff, #81ecec); border: 8px solid #2d3436; position: relative; overflow: hidden; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        /* Hiệu ứng chớp màn hình khi Đúng/Sai */
        #gameArea.flash-correct { animation: flashGreen 0.4s ease-out; }
        #gameArea.flash-wrong { animation: flashRed 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* Rổ hứng thiết kế to hơn, dễ đón hơn */
        #basket { width: 180px; height: 40px; background: #e67e22; position: absolute; bottom: 20px; left: 310px; border-radius: 15px 15px 25px 25px; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.3), 0 6px 8px rgba(0,0,0,0.15); border: 3px solid #d35400; transition: transform 0.1s; }
        #basket.bounce { transform: scale(1.15); }
        
        /* Thẻ rơi kích thước LỚN, hình ảnh TO rõ ràng */
        .falling-card { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffffff; padding: 15px; border-radius: 24px; border: 5px solid #fdcb6e; box-shadow: 0 8px 0 #f39c12, 0 12px 20px rgba(0,0,0,0.15); top: -180px; width: 150px; text-align: center; box-sizing: border-box; }
        .falling-card .svg-container { width: 90px; height: 90px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .falling-card .svg-container svg { width: 100%; height: 100%; }
        .falling-card span { font-size: 20px; font-weight: bold; color: #2d3436; text-transform: uppercase; white-space: nowrap; font-family: 'Comic Sans MS', sans-serif; pointer-events: none; }

        /* Bảng điểm số to rõ */
        .stats { position: absolute; top: 20px; font-size: 24px; font-weight: bold; color: #2d3436; background: #fff; padding: 8px 25px; border-radius: 35px; z-index: 10; border: 4px solid #2d3436; box-shadow: 0 5px 0 #2d3436; }
        #scoreBoard { left: 20px; }
        #livesBoard { right: 20px; color: #d63031; letter-spacing: 3px; }

        /* Màn hình Game Over */
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #gameOverScreen.active { opacity: 1; pointer-events: auto; }
        .over-box { background: white; padding: 40px; border-radius: 30px; text-align: center; border: 8px solid #ff7675; box-shadow: 0 20px 0 #d63031; transform: scale(0.7); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 400px; }
        #gameOverScreen.active .over-box { transform: scale(1); }
        .over-box h1 { margin: 0 0 15px 0; color: #ff7675; font-size: 42px; }
        .over-box p { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #2d3436; }
        .restart-btn { background: #2ecc71; color: white; border: none; padding: 15px 45px; font-size: 24px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #27ae60; }
        .restart-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Hiệu ứng chớp màn hình hoạt hình */
        @keyframes flashGreen { 0% { background: #2ecc71; } 100% { background: linear-gradient(to bottom, #74b9ff, #81ecec); } }
        @keyframes flashRed { 0% { background: #ff7675; } 100% { background: linear-gradient(to bottom, #74b9ff, #81ecec); } }
    </style>
</head>
<body>

<div id="topArea">
    <button id="audioBtn" onclick="speakQuestion()">🔊 Bé Nghe Câu Hỏi</button>
</div>

<div id="gameArea">
    <div id="scoreBoard" class="stats">Điểm: <span id="score">0</span></div>
    <div id="livesBoard" class="stats">Mạng: <span id="lives">💖💖💖</span></div>
    <div id="basket"></div>

    <div id="gameOverScreen">
        <div class="over-box">
            <h1>Hết Mạng Rồi! 🧸</h1>
            <p>Bé xuất sắc đạt: <span id="finalScore" style="color: #0984e3; font-size: 32px;">0</span> điểm!</p>
            <button class="restart-btn" onclick="resetGame()">Chơi Lại Lần Nữa 🎮</button>
        </div>
    </div>
</div>

<script>
    // Audio Context tạo âm thanh trực tiếp
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(isCorrect) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (isCorrect) {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else {
            osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }
    }

    // Đã lọc riêng biệt 8 từ vựng thuộc nhóm chữ K từ ảnh của bạn
    const wordBank = [
        { word: "key", svg: '<svg viewBox="0 0 64 64"><circle cx="20" cy="32" r="10" stroke="#f1c40f" stroke-width="5" fill="none"/><path d="M30 32h24v8h-5v-8h-5v8h-5v-8" stroke="#f1c40f" stroke-width="5" fill="none" stroke-linecap="round"/></svg>' },
        { word: "kite", svg: '<svg viewBox="0 0 64 64"><path d="M32 8L14 28l18 20 18-20z" fill="#e74c3c" stroke="#2c3e50" stroke-width="2"/><path d="M32 48s-5 5 0 12" stroke="#2c3e50" stroke-width="3" fill="none"/></svg>' },
        { word: "kangaroo", svg: '<svg viewBox="0 0 64 64"><path d="M18 48V28c0-5 5-7 10-7h10M28 21l5-10" stroke="#e67e22" stroke-width="7" stroke-linecap="round" fill="none"/><circle cx="31" cy="14" r="1.5" fill="#333"/></svg>' },
        { word: "kitten", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="36" r="18" fill="#bdc3c7" stroke="#2c3e50" stroke-width="2"/><path d="M18 22l8 8M46 22l-8 8" stroke="#bdc3c7" stroke-width="5" stroke-linecap="round"/><circle cx="24" cy="34" r="3" fill="#333"/><circle cx="40" cy="34" r="3" fill="#333"/></svg>' },
        { word: "knife", svg: '<svg viewBox="0 0 64 64"><path d="M14 46l32-32" stroke="#bdc3c7" stroke-width="8" stroke-linecap="round"/><path d="M14 46l-5 5" stroke="#e67e22" stroke-width="10" stroke-linecap="round"/></svg>' },
        { word: "kettle", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="40" r="18" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/><path d="M22 22h20" stroke="#34495e" stroke-width="5" stroke-linecap="round" fill="none"/><path d="M46 34l8-5" stroke="#95a5a6" stroke-width="5" stroke-linecap="round"/></svg>' },
        { word: "king", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="38" r="16" fill="#ffeaa7" stroke="#2c3e50" stroke-width="2"/><path d="M14 24l7 10 11-12 11 12 7-10v16H14z" fill="#f1c40f" stroke="#2c3e50" stroke-width="2"/></svg>' },
        { word: "koala", svg: '<svg viewBox="0 0 64 64"><circle cx="32" cy="38" r="18" fill="#bdc3c7" stroke="#2c3e50" stroke-width="2"/><circle cx="16" cy="24" r="8" fill="#95a5a6"/><circle cx="48" cy="24" r="8" fill="#95a5a6"/><circle cx="24" cy="36" r="3" fill="#333"/><circle cx="40" cy="36" r="3" fill="#333"/></svg>' }
    ];

    const gameArea = document.getElementById('gameArea');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const livesDisplay = document.getElementById('lives');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');

    let score = 0;
    let lives = 3;
    let basketX = 310; 
    let speed = 1.8;   // Tốc độ rơi nhanh vừa vặn
    let gameOver = false;
    let currentTarget = {};
    let currentQuestionText = "";
    let activeElements = [];

    function speakQuestion() {
        if ('speechSynthesis' in window && currentQuestionText) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQuestionText);
            utterance.lang = 'en-US';
            utterance.rate = 0.75; 
            window.speechSynthesis.speak(utterance);
        }
    }

    function nextQuestion() {
        activeElements.forEach(item => item.dom.remove());
        activeElements = [];
        
        if (gameOver) return;

        currentTarget = wordBank[Math.floor(Math.random() * wordBank.length)];

        if (Math.random() < 0.5) {
            currentQuestionText = `What is it? It is a ${currentTarget.word}.`;
          } else {
            currentQuestionText = `What can you see? I can see a ${currentTarget.word}.`;
        }

        speakQuestion();

        // TẠO ĐỘ TRỄ 2.5 GIÂY: Chờ bé nghe câu hỏi xong các khối hình mới bắt đầu rơi xuống
        setTimeout(() => {
            if (gameOver) return;

            let swap = Math.random() < 0.5;
            // Phân phối vị trí X rộng rãi (Trái: 80px, Phải: 520px) cho khung hình rộng 800px
            createCard(currentTarget, true, swap ? 80 : 520);

            let wrongTarget;
            do {
                wrongTarget = wordBank[Math.floor(Math.random() * wordBank.length)];
            } while (wrongTarget.word === currentTarget.word);

            createCard(wrongTarget, false, swap ? 520 : 80);
        }, 2500);
    }

    function createCard(targetObj, isCorrect, fixedX) {
        const card = document.createElement('div');
        card.className = 'falling-card';
        
        card.innerHTML = `
            <div class="svg-container"> 
                ${targetObj.svg} 
            </div> 
            <span>${targetObj.word}</span>
        `;
        gameArea.appendChild(card);

        // Tạo biên độ ngẫu nhiên vị trí X xung quanh trục cố định để rơi tự nhiên
        const xPos = fixedX + (Math.random() * 80 - 40);
        const yPos = -200 - (Math.random() * 60); // Đẩy điểm xuất phát lên cao hẳn ngoài màn hình
        card.style.left = xPos + 'px';
        card.style.top = yPos + 'px';

        activeElements.push({
            dom: card,
            x: xPos,
            y: yPos,
            isCorrect: isCorrect,
            width: 150 // Kích thước chiều rộng thẻ lớn 150px cho bé nhìn rõ hình
        });
    }

    // Điều khiển chuyển động rổ hứng mượt mà theo vị trí chuột trên phạm vi 800px
    gameArea.addEventListener('mousemove', (e) => {
        if (gameOver) return;
        const rect = gameArea.getBoundingClientRect();
        basketX = e.clientX - rect.left - 90; // 90 là một nửa chiều rộng rổ (180px)
        if (basketX < 0) basketX = 0;
        if (basketX > 620) basketX = 620; // Giới hạn biên bên phải (800 - 180)
        basket.style.left = basketX + 'px';
    });

    function triggerEffect(type) {
        gameArea.classList.remove('flash-correct', 'flash-wrong');
        void gameArea.offsetWidth; // Ép trình duyệt vẽ lại để kích hoạt lại CSS Animation
        
        if (type === 'correct') {
            gameArea.classList.add('flash-correct');
            basket.classList.add('bounce');
            setTimeout(() => basket.classList.remove('bounce'), 200);
        } else {
            gameArea.classList.add('flash-wrong');
        }
    }

    function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "💖";
        for (let i = lives; i < 3; i++) hearts += "🖤";
        livesDisplay.innerText = hearts;
    }

    function gameLoop() {
        if (gameOver) return;
        
        let questionChanged = false;
        
        for (let i = activeElements.length - 1; i >= 0; i--) {
            let item = activeElements[i];
            item.y += speed;
            item.dom.style.top = item.y + 'px';

            // Xử lý va chạm với rổ ở độ cao từ 550px đến 595px (Khung cao tổng 650px)
            if (item.y > 550 && item.y < 595) {
                if (item.x + item.width > basketX && item.x < basketX + 180) {
                    if (item.isCorrect) {
                        score += 10;
                        scoreDisplay.innerText = score;
                        speed += 0.05; // Gia tốc tăng nhỏ để trò chơi giữ độ chậm ổn định cho phản xạ của bé
                        playSound(true); // Phát âm thanh trúng bíp cao vui tai
                        triggerEffect('correct');
                        questionChanged = true;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        playSound(false); // Phát âm thanh cảnh báo trầm
                        triggerEffect('wrong');
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                        questionChanged = true;
                    }
                    break;
                }
            }

            // Nếu lọt xuống đáy màn hình rộng (650px) mà không được hứng
            if (item.y > 650) {
                if (item.isCorrect) {
                    questionChanged = true; // Bỏ lỡ từ đúng thì tự động đổi sang câu khác
                    break;
                } else {
                    item.dom.remove();
                    activeElements.splice(i, 1);
                }
            }
        }

        if (questionChanged) {
            nextQuestion();
        }

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameOver = true;
        finalScore.innerText = score;
        gameOverScreen.classList.add('active');
    }

    function resetGame() {
        score = 0;
        lives = 3;
        speed = 1.8; // Đặt lại tốc độ rơi mượt mà vừa vặn ban đầu
        gameOver = false;
        scoreDisplay.innerText = "0";
        updateLivesDisplay();
        gameOverScreen.classList.remove('active');
        nextQuestion();
        gameLoop();
    }

    // Khởi chạy hệ thống trò chơi lần đầu tiên
    updateLivesDisplay();
    nextQuestion();
    gameLoop();
</script>

</body>
</html>

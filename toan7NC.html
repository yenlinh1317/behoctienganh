<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toán 7 Nâng Cao</title>
<style>
  :root{
    --bg:#eef1f8; --panel:#ffffff; --panel2:#eef0fa; --accent:#3b53e0; --accent2:#7b3fe0;
    --good:#1ca97c; --bad:#d93a3a; --text:#1c2333; --muted:#5b6178; --hsg:#c97a14;
    --border:#dde1f0; --inputbg:#f7f8fd;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:linear-gradient(135deg,#eef1f8,#e6eaf8);color:var(--text);min-height:100vh;}
  .app{display:flex;min-height:100vh;}
  /* Sidebar */
  .sidebar{width:300px;background:var(--panel);padding:18px 14px;overflow-y:auto;max-height:100vh;flex-shrink:0;border-right:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .brand .logo{font-size:28px;}
  .brand h1{font-size:18px;margin:0;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .overall{background:var(--panel2);border-radius:12px;padding:10px 12px;margin-bottom:16px;border:1px solid var(--border);}
  .overall .pct{font-size:22px;font-weight:700;color:var(--accent);}
  .progressbar{height:8px;background:#dfe3f3;border-radius:6px;overflow:hidden;margin-top:6px;}
  .progressbar > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}
  .chapter{margin-bottom:10px;}
  .chapter-head{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;background:var(--panel2);font-weight:600;font-size:14px;border:1px solid var(--border);}
  .chapter-head:hover{background:#e3e7f9;}
  .chapter-head small{color:var(--muted);font-weight:400;}
  .bai-list{margin-top:6px;display:flex;flex-direction:column;gap:4px;}
  .bai-item{padding:8px 12px 8px 18px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .bai-item:hover{background:#eceffb;color:var(--text);}
  .bai-item.active{background:linear-gradient(90deg,#dbe1fb,#ece0fb);color:var(--text);font-weight:600;}
  .badge-done{font-size:11px;color:var(--good);}
  /* Main */
  .main{flex:1;padding:24px 32px;overflow-y:auto;max-height:100vh;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .topbar h2{margin:0;font-size:22px;}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{padding:9px 18px;border-radius:999px;background:var(--panel2);cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);border:1px solid var(--border);}
  .tab.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
  .tab.hsg.active{background:linear-gradient(90deg,#e08a2e,var(--hsg));color:#fff;border-color:transparent;}
  .card{background:var(--panel);border-radius:16px;padding:22px 24px;margin-bottom:18px;line-height:1.7;border:1px solid var(--border);box-shadow:0 2px 10px rgba(40,50,90,.05);}
  .card h3{margin-top:0;color:var(--accent);font-size:16px;}
  .formula{background:#eef1ff;border-left:3px solid var(--accent);padding:10px 14px;border-radius:8px;margin:10px 0;font-family:'Cambria Math',Georgia,serif;font-size:15px;color:#28306b;}
  .example{background:#f5f7ff;border-radius:12px;padding:16px 18px;margin-bottom:14px;border:1px solid var(--border);}
  .example .lbl{color:var(--accent2);font-weight:700;font-size:13px;margin-bottom:6px;}
  .example .sol{margin-top:8px;color:#3a4060;font-size:14px;white-space:pre-line;}
  .exercise{background:var(--panel);border-radius:12px;padding:16px 18px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(40,50,90,.04);}
  .exercise.hsgbox{border:1px solid #f0d8ab;background:#fff8ec;}
  .exercise .q{margin-bottom:10px;font-size:15px;}
  .exercise .qnum{color:var(--muted);font-size:12px;margin-bottom:4px;display:flex;gap:8px;align-items:center;}
  .lvl{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;}
  .lvl-nb{background:#dff4ea;color:#1a8f63;}
  .lvl-th{background:#dfeaff;color:#2456c9;}
  .lvl-vd{background:#ffe7cf;color:#b3650e;}
  .lvl-vdc{background:#fde0e0;color:#c22f2f;}
  .lvl-sieukho{background:#2a1530;color:#ffd1f0;border:1px solid #c22fc2;}
  .answer-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .answer-row input{flex:1;min-width:140px;padding:9px 12px;border-radius:8px;border:1px solid #c7cdec;background:var(--inputbg);color:var(--text);font-size:14px;}
  .answer-row input:disabled{background:#eef3ee;color:#1ca97c;}
  .btn{padding:9px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:13px;}
  .btn:hover{background:var(--accent2);}
  .btn.secondary{background:#e4e7f7;color:var(--text);}
  .feedback{margin-top:10px;font-size:14px;font-weight:600;}
  .feedback.ok{color:var(--good);}
  .feedback.no{color:var(--bad);}
  .explain{margin-top:8px;color:#3a4060;font-size:13px;white-space:pre-line;background:#f5f7ff;padding:10px 12px;border-radius:8px;border:1px solid var(--border);}
  .hint{font-size:12px;color:var(--muted);margin-top:4px;}
  .home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .home-card{background:var(--panel);border-radius:14px;padding:18px;cursor:pointer;transition:.2s;border:1px solid var(--border);}
  .home-card:hover{transform:translateY(-3px);background:var(--panel2);}
  .home-card h4{margin:0 0 6px;font-size:15px;}
  .home-card .pct2{font-size:24px;font-weight:700;color:var(--accent);margin:6px 0;}
  .welcome{text-align:center;padding:40px 20px;}
  .welcome .big{font-size:46px;margin-bottom:8px;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#c7cdec;border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<script>
/* ============== DATA ============== */
const CHAPTERS = [
  {
    "id": "c1",
    "name": "Chương 1: Số hữu tỉ",
    "bai": [
      {
        "id": "b1",
        "title": "Bài 1: Tập hợp các số hữu tỉ",
        "theory": "\n        <p><b>Số hữu tỉ</b> là số viết được dưới dạng phân số <b>a/b</b> với a, b ∈ ℤ, b ≠ 0. Tập hợp số hữu tỉ kí hiệu là <b>ℚ</b>.</p>\n        <div class=\"formula\">a/b = ka/kb với mọi k ≠ 0 (hai phân số biểu diễn cùng một số hữu tỉ)</div>\n        <p><b>So sánh hai số hữu tỉ:</b> đưa về cùng mẫu dương, số nào có tử lớn hơn thì số đó lớn hơn.</p>\n        <p>Mỗi số hữu tỉ đều được biểu diễn bởi một điểm duy nhất trên trục số.</p>",
        "examples": [
          {
            "lbl": "Ví dụ 1",
            "problem": "So sánh −3/4 và −5/6.",
            "sol": "Quy đồng mẫu 12: −3/4 = −9/12 ; −5/6 = −10/12.\nVì −9 > −10 nên −9/12 > −10/12.\n⇒ −3/4 > −5/6"
          },
          {
            "lbl": "Ví dụ 2",
            "problem": "Sắp xếp tăng dần: 2/−3, −1/2, 5/6, −7/12.",
            "sol": "Quy đồng mẫu 12: 2/−3 = −8/12 ; −1/2 = −6/12 ; 5/6 = 10/12 ; −7/12 giữ nguyên.\nSo sánh tử: −8 < −7 < −6 < 10\n⇒ Thứ tự: 2/−3 < −7/12 < −1/2 < 5/6"
          }
        ],
        "exercises": [
          {
            "q": "So sánh −2/5 và −3/7. Điền dấu >, < hoặc =",
            "answer": [
              ">"
            ],
            "explain": "Quy đồng mẫu 35: −2/5=−14/35; −3/7=−15/35. Vì −14>−15 nên −2/5 > −3/7.",
            "level": "nb"
          },
          {
            "q": "Viết số hữu tỉ 3/(−4) dưới dạng phân số có mẫu dương.",
            "answer": [

            ],
            "explain": "3/(−4) = −3/4 (đổi dấu cả tử và mẫu).",
            "level": "nb"
          },
          {
            "q": "Sắp xếp tăng dần các số: −1/3, 1/4, −5/6, 2/3 (cách nhau bởi ;)",
            "answer": [
              "-5/6;-1/3;1/4;2/3"
            ],
            "explain": "Quy đồng mẫu 12: −4/12; 3/12; −10/12; 8/12 ⇒ thứ tự −5/6 < −1/3 < 1/4 < 2/3.",
            "level": "th"
          },
          {
            "q": "So sánh 0.75 và 3/4. Điền dấu >, < hoặc =",
            "answer": [
              "="
            ],
            "explain": "0.75 = 75/100 = 3/4, hai số bằng nhau.",
            "level": "th"
          },
          {
            "q": "Tìm số hữu tỉ là trung điểm giữa 0 và −1 trên trục số.",
            "answer": [
              "-1/2",
              "-0.5"

            "explain": "Trung điểm = (0+(−1))/2 = −1/2.",
            "level": "vd"
          },
          {
            "q": "So sánh −7/9 và −8/9. Điền dấu >, < hoặc =",
            "answer": [
              ">"
            ],
            "explain": "Cùng mẫu dương, −7 > −8 nên −7/9 > −8/9.",
            "level": "vd"
          },
          {
            "q": "Có bao nhiêu số hữu tỉ có mẫu 6 nằm trong khoảng (−1; 0)? (chỉ ghi số lượng)",
            "level": "vd",

          {

        "hsgTheory": "<p><b>Mở rộng:</b> Giữa hai số hữu tỉ bất kì a < b luôn tồn tại vô số số hữu tỉ khác nằm giữa chúng (tập ℚ \"dày đặc\"). Một số hữu tỉ ở giữa luôn tìm được là trung bình cộng (a+b)/2.</p>",

            "level": "vd"
          },
          {
            "q": "Tìm số hữu tỉ a/b (b dương, nhỏ nhất có thể) sao cho 1/3 < a/b < 2/5.",
            "answer": [

            "explain": "Thử dần b=4,5,6,7 đều không có tử nguyên thỏa mãn. Với b=8: 1/3≈0.333 < a/8 < 0.4=2/5 ⇒ 2.67<a<3.2 ⇒ a=3. Vậy phân số có mẫu dương nhỏ nhất là 3/8.",
            "level": "vdc"
          },
          {
            "q": "Số hữu tỉ ở giữa hai số 1/3 và 1/4 (theo công thức trung bình cộng) là bao nhiêu?",
            "answer": [
              "7/24"
            ],
            "explain": "Trung bình cộng = (1/3+1/4)/2 = (4/12+3/12)/2 = (7/12)/2 = 7/24.",
            "level": "vdc"
          },
          {
            "q": "So sánh (−2/3)² và (−5/6 + 1/3). Điền dấu >, < hoặc =",
            "level": "vdc",
            "answer": [
              ">"
            ],
            "explain": "(−2/3)²=4/9>0. −5/6+1/3=−5/6+2/6=−1/2<0. Vậy 4/9 > −1/2."
          },
          {
            "q": "Tìm phân số a/b (a,b nguyên dương, b nhỏ nhất) sao cho 1/5 < a/b < 1/4.",
            "level": "sieukho",
            "answer": [
              "2/9"
            ],
            "explain": "Thử b=6,7,8 đều không có a nguyên thỏa. Với b=9: 1.8<a<2.25 ⇒ a=2 ⇒ 2/9 thỏa 0.2<2/9≈0.222<0.25."
          }
        ]
      },
      {
        "id": "b2",
        "title": "Bài 2: Cộng, trừ, nhân, chia số hữu tỉ",
        "theory": "\n        <p><b>Cộng, trừ:</b> quy đồng mẫu dương rồi cộng/trừ tử số, giữ nguyên mẫu.</p>\n        <p><b>Nhân:</b> tử nhân tử, mẫu nhân mẫu.  <b>Chia:</b> nhân với số nghịch đảo của số chia.</p>\n        <div class=\"formula\">a/b : c/d = a/b × d/c  (c,d ≠ 0)</div>\n        <p>Phép cộng và phép nhân số hữu tỉ có tính chất giao hoán, kết hợp; phép nhân phân phối với phép cộng.</p>",
        "examples": [
          {
            "lbl": "Ví dụ 1",
            "problem": "Tính −3/4 + 5/6.",
            "sol": "Quy đồng mẫu 12: −9/12 + 10/12 = 1/12"
          },
          {
            "lbl": "Ví dụ 2",
            "problem": "Tính (−2/3) × (9/4).",
            "sol": "(−2×9)/(3×4) = −18/12 = −3/2"
          },
          {
            "lbl": "Ví dụ 3",
            "problem": "Tính (−5/6) : (2/3).",
            "sol": "= (−5/6) × (3/2) = −15/12 = −5/4"
          }
        ],
        "exercises": [
          {
            "q": "Tính: 2/5 + (−3/10)",
            "answer": [
              "1/10"
            ],
            "explain": "4/10 − 3/10 = 1/10.",
            "level": "nb"
          },
          {
            "q": "Tính: −7/12 − 1/4",
            "answer": [
              "-5/6"
            ],
            "explain": "−7/12 − 3/12 = −10/12 = −5/6.",
            "level": "nb"
          },
          {
            "q": "Tính: (−4/9) × (3/8)",
            "answer": [
              "-1/6"
            ],
            "explain": "(−4×3)/(9×8) = −12/72 = −1/6.",
            "level": "th"
          },
          {
            "q": "Tính: (−5/7) : (−10/21)",

            "explain": "(−5/7)×(−21/10) = 105/70 = 3/2.",

          },
          {

            "answer": [

            "answer": [

            ],

          },

            "q": "Tính: (5/6 − 2/3) ÷ (−1/4) + 1/2",
            "level": "vd",

            ],
            "explain": "5/6−2/3=1/6. (1/6)÷(−1/4)=−2/3. −2/3+1/2=−1/6."
          },
          {

            ],

            "level": "vdc",
            "answer": [

          }
        ],
        "hsgTheory": "<p><b>Kĩ thuật tính nhanh:</b> 1/(n(n+1)) = 1/n − 1/(n+1) (tách phân số kiểu \"viễn vông\") giúp tính tổng nhiều số hạng rất nhanh.</p>",
        "hsgExercises": [
          {

          {

        ]
      },
      {
        "id": "b3",
        "title": "Bài 3: Lũy thừa với số mũ tự nhiên của số hữu tỉ",
        "theory": "\n        <p>x<sup>n</sup> = x × x × ... × x (n lần), x<sup>0</sup>=1 (x≠0), x<sup>1</sup>=x.</p>\n        <div class=\"formula\">\n          x<sup>m</sup> × x<sup>n</sup> = x<sup>m+n</sup> &nbsp;&nbsp; x<sup>m</sup> : x<sup>n</sup> = x<sup>m−n</sup> (m≥n)<br>\n          (x<sup>m</sup>)<sup>n</sup> = x<sup>m·n</sup> &nbsp;&nbsp; (xy)<sup>n</sup> = x<sup>n</sup>y<sup>n</sup> &nbsp;&nbsp; (x/y)<sup>n</sup> = x<sup>n</sup>/y<sup>n</sup>\n        </div>",
        "examples": [

<script>
(function(){
const CHAPTERS = window.MATH7_CHAPTERS;
const STORAGE_KEY = "toan7_progress_v1";
let state = { current:{chapter:null,bai:null}, tab:"theory" };

function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ return {}; }
}
function saveProgress(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
let progress = loadProgress(); // { "b1_ex_0": true, ... }

function getExArr(bai, kind){
  if(kind==='ex') return bai.exercises;
  if(kind==='hsg') return bai.hsgExercises;
  if(kind==='adv') return bai.advancedExercises || [];
  return [];
}
function allExerciseKeys(bai){
  const keys=[];
  bai.exercises.forEach((_,i)=>keys.push(bai.id+"_ex_"+i));
  bai.hsgExercises.forEach((_,i)=>keys.push(bai.id+"_hsg_"+i));
  (bai.advancedExercises||[]).forEach((_,i)=>keys.push(bai.id+"_adv_"+i));
  return keys;
}
function baiProgress(bai){
  const keys = allExerciseKeys(bai);
  const done = keys.filter(k=>progress[k]).length;
  return {done, total:keys.length, pct: keys.length? Math.round(done/keys.length*100):0};
}
function chapterProgress(ch){
  let done=0, total=0;
  ch.bai.forEach(b=>{ const p=baiProgress(b); done+=p.done; total+=p.total; });
  return {done,total,pct: total? Math.round(done/total*100):0};
}
function overallProgress(){
  let done=0,total=0;
  CHAPTERS.forEach(ch=>{ const p=chapterProgress(ch); done+=p.done; total+=p.total; });
  return {done,total,pct: total? Math.round(done/total*100):0};
}

/* ---------- Answer checking ---------- */
function normalizeStr(s){ return s.trim().toLowerCase().replace(/\s+/g,'').replace(/đ/g,'d').normalize('NFC'); }
function parseNum(s){
  s = s.trim().replace(',', '.');
  if(s.includes('/')){
    const parts = s.split('/');
    if(parts.length===2){
      const a=parseFloat(parts[0]), b=parseFloat(parts[1]);
      if(!isNaN(a) && !isNaN(b) && b!==0) return a/b;
    }
    return null;
  }
  const n = parseFloat(s);
  return isNaN(n)? null : n;
}
function matchSingle(u,c){
  const un=normalizeStr(u), cn=normalizeStr(c);
  if(un===cn) return true;
  const a=parseNum(u), b=parseNum(c);
  if(a!==null && b!==null && Math.abs(a-b) < 1e-6) return true;
  return false;
}
function checkAnswer(userInput, correctList){
  const u = (userInput||"").trim();
  if(!u) return false;
  for(const c of correctList){
    if(c.includes(';')){
      const cParts = c.split(';').map(x=>x.trim());
      const uParts = u.split(';').map(x=>x.trim());
      if(cParts.length===uParts.length && cParts.every((cp,i)=>matchSingle(uParts[i],cp))) return true;
    } else {
      if(matchSingle(u,c)) return true;
    }
  }
  return false;
}

/* ---------- Rendering ---------- */
function findBai(id){
  for(const ch of CHAPTERS) for(const b of ch.bai) if(b.id===id) return {ch,b};
  return null;
}

function renderSidebar(){
  const sb = document.getElementById('sidebar');
  const op = overallProgress();
  let html = `
    <div class="brand"><span class="logo">📐</span><h1>Toán 7 Nâng Cao</h1></div>
    <div class="overall">
      <div>Tiến độ toàn bộ</div>
      <div class="pct">${op.pct}%</div>
      <div class="progressbar"><div style="width:${op.pct}%"></div></div>
      <div class="hint">${op.done}/${op.total} bài tập hoàn thành</div>
    </div>`;
  CHAPTERS.forEach(ch=>{
    const cp = chapterProgress(ch);
    const isOpen = state.current.chapter===ch.id || !state.openChapter ? true : state.openChapter===ch.id;
    html += `<div class="chapter">
      <div class="chapter-head" onclick="MATH7.toggleChapter('${ch.id}')">
        <span>${ch.name}</span><small>${cp.pct}%</small>
      </div>
      <div class="bai-list" id="list_${ch.id}" style="display:${(state.openChapter===ch.id || state.current.chapter===ch.id)?'flex':'none'}">`;
    ch.bai.forEach(b=>{
      const bp = baiProgress(b);
      const active = state.current.bai===b.id ? 'active' : '';
      html += `<div class="bai-item ${active}" onclick="MATH7.selectBai('${ch.id}','${b.id}')">
        <span>${b.title.replace(/^Bài \d+:\s*/,'')}</span>
        <span class="badge-done">${bp.done}/${bp.total}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  sb.innerHTML = html;
}

function renderMain(){
  const main = document.getElementById('main');
  if(!state.current.bai){
    main.innerHTML = `<div class="welcome">
      <div class="big">📐✨</div>
      <h2>Chào mừng đến với Toán 7 Nâng Cao!</h2>
      <p style="color:var(--muted)">Chọn một bài học ở thanh bên trái để bắt đầu — đầy đủ Lý thuyết, Ví dụ, Bài tập cơ bản và Chuyên đề HSG.</p>
    </div>`;
    return;
  }
  const found = findBai(state.current.bai);
  const {ch,b} = found;
  let tab = state.tab;
  const hasExamples = b.examples && b.examples.length>0;
  const hasHsg = b.hsgExercises && b.hsgExercises.length>0;
  const hasAdv = b.advancedExercises && b.advancedExercises.length>0;
  if(tab==='examples' && !hasExamples) tab='exercises';
  if(tab==='hsg' && !hasHsg) tab='exercises';
  if(tab==='adv' && !hasAdv) tab='exercises';
  let tabsHtml = `<div class="tab ${tab==='theory'?'active':''}" onclick="MATH7.setTab('theory')">📖 Lý thuyết</div>`;
  if(hasExamples) tabsHtml += `<div class="tab ${tab==='examples'?'active':''}" onclick="MATH7.setTab('examples')">✏️ Ví dụ</div>`;
  tabsHtml += `<div class="tab ${tab==='exercises'?'active':''}" onclick="MATH7.setTab('exercises')">📝 Bài tập</div>`;
  if(hasHsg) tabsHtml += `<div class="tab hsg ${tab==='hsg'?'active':''}" onclick="MATH7.setTab('hsg')">🏆 Chuyên đề HSG</div>`;
  if(hasAdv) tabsHtml += `<div class="tab hsg ${tab==='adv'?'active':''}" onclick="MATH7.setTab('adv')">🧩 Toán nâng cao</div>`;

  let content = "";
  if(tab==='theory'){
    content = `<div class="card"><h3>Lý thuyết</h3>${b.theory}</div>`;
  } else if(tab==='examples'){
    content = b.examples.map(ex=>`
      <div class="card example">
        <div class="lbl">${ex.lbl}</div>
        <div><b>${ex.problem}</b></div>
        <div class="sol">${ex.sol}</div>
      </div>`).join('');
  } else if(tab==='exercises'){
    content = `<div class="card" style="background:transparent;padding:0;">` +
      b.exercises.map((ex,i)=>renderExercise(b.id, 'ex', i, ex, false)).join('') + `</div>`;
  } else if(tab==='hsg'){
    content = `<div class="card"><h3>🏆 Mở rộng</h3>${b.hsgTheory||''}</div>` +
      `<div class="card" style="background:transparent;padding:0;">` +
      b.hsgExercises.map((ex,i)=>renderExercise(b.id, 'hsg', i, ex, true)).join('') + `</div>`;
  } else if(tab==='adv'){
    content = `<div class="card"><h3>🧩 Toán nâng cao (tham khảo sách nâng cao)</h3><p style="color:var(--muted)">Đây là các bài toán <b>chứng minh / tìm số</b> mức độ thi học sinh giỏi thực sự — không có 1 đáp số ngắn để chấm, hãy tự làm ra giấy trước rồi bấm "Xem lời giải đầy đủ" để đối chiếu.</p></div>` +
      `<div class="card" style="background:transparent;padding:0;">` +
      b.advancedExercises.map((ex,i)=>renderExercise(b.id, 'adv', i, ex, true)).join('') + `</div>`;
  }

  main.innerHTML = `
    <div class="topbar">
      <div><h2>${b.title}</h2><div class="sub">${ch.name}</div></div>
    </div>
    <div class="tabs">${tabsHtml}</div>
    ${content}
  `;
}

const LEVEL_LABEL = {nb:["Nhận biết","lvl-nb"], th:["Thông hiểu","lvl-th"], vd:["Vận dụng","lvl-vd"], vdc:["Vận dụng cao","lvl-vdc"], sieukho:["Siêu khó","lvl-sieukho"]};

function renderExercise(baiId, kind, idx, ex, isHsg){
  const key = baiId + "_" + kind + "_" + idx;
  const done = progress[key];
  const lvl = LEVEL_LABEL[ex.level] || LEVEL_LABEL.nb;
  if(ex.type === 'proof'){
    return `
      <div class="exercise ${isHsg?'hsgbox':''}" id="card_${key}">
        <div class="qnum">Bài ${idx+1} <span class="lvl lvl-vdc">Chứng minh</span> <span class="lvl ${lvl[1]}">${lvl[0]}</span></div>
        <div class="q">${ex.q}</div>
        <div class="answer-row">
          <button class="btn secondary" onclick="MATH7.revealProof('${baiId}','${kind}',${idx})">📖 Xem lời giải đầy đủ</button>
        </div>
        <div id="feedback_${key}" class="feedback ${done?'ok':''}">${done?'✅ Đã xem lời giải':''}</div>
        <div id="explain_${key}" class="explain" style="display:${done?'block':'none'}">${done?ex.explain:''}</div>
      </div>`;
  }
  return `
    <div class="exercise ${isHsg?'hsgbox':''}" id="card_${key}">
      <div class="qnum">Câu ${idx+1} ${isHsg?'(HSG)':''} <span class="lvl ${lvl[1]}">${lvl[0]}</span></div>
      <div class="q">${ex.q}</div>
      <div class="answer-row">
        <input type="text" id="input_${key}" placeholder="Nhập câu trả lời..." ${done?'disabled':''} value="${done? (window.__lastVal && window.__lastVal[key]||''):''}">
        <button class="btn" onclick="MATH7.check('${baiId}','${kind}',${idx})">Kiểm tra</button>
        <button class="btn secondary" onclick="MATH7.reveal('${baiId}','${kind}',${idx})">Xem đáp án</button>
      </div>
      <div id="feedback_${key}" class="feedback ${done?'ok':''}">${done?'✅ Đã hoàn thành':''}</div>
      <div id="explain_${key}" class="explain" style="display:${done?'block':'none'}">${done?ex.explain:''}</div>
    </div>`;
}

/* ---------- Public API ---------- */
window.MATH7 = {
  toggleChapter(chId){
    state.openChapter = (state.openChapter===chId) ? null : chId;
    renderSidebar();
  },
  selectBai(chId, baiId){
    state.current = {chapter:chId, bai:baiId};
    state.openChapter = chId;
    const found = findBai(baiId);
    state.tab = (found && found.b.isTongHop) ? "exercises" : "theory";
    renderSidebar();
    renderMain();
  },
  setTab(t){
    state.tab = t;
    renderMain();
  },
  check(baiId, kind, idx){
    const found = findBai(baiId);
    const ex = getExArr(found.b, kind)[idx];
    const key = baiId+"_"+kind+"_"+idx;
    const input = document.getElementById('input_'+key);
    const val = input.value;
    const fb = document.getElementById('feedback_'+key);
    const explainEl = document.getElementById('explain_'+key);
    const correct = checkAnswer(val, ex.answer);
    if(correct){
      fb.textContent = "✅ Chính xác!";
      fb.className = "feedback ok";
      progress[key] = true;
      saveProgress(progress);
      input.disabled = true;
      explainEl.style.display = "block";
      explainEl.textContent = ex.explain;
      renderSidebar();
    } else {
      fb.textContent = "❌ Chưa đúng, hãy thử lại.";
      fb.className = "feedback no";
    }
  },
  reveal(baiId, kind, idx){
    const found = findBai(baiId);
    const ex = getExArr(found.b, kind)[idx];
    const key = baiId+"_"+kind+"_"+idx;
    const explainEl = document.getElementById('explain_'+key);
    explainEl.style.display = "block";
    explainEl.textContent = "Đáp án: " + ex.answer[0] + "\n" + ex.explain;
  },
  revealProof(baiId, kind, idx){
    const found = findBai(baiId);
    const ex = getExArr(found.b, kind)[idx];
    const key = baiId+"_"+kind+"_"+idx;
    progress[key] = true;
    saveProgress(progress);
    const fb = document.getElementById('feedback_'+key);
    fb.textContent = "✅ Đã xem lời giải";
    fb.className = "feedback ok";
    const explainEl = document.getElementById('explain_'+key);
    explainEl.style.display = "block";
    explainEl.textContent = ex.explain;
    renderSidebar();
  }
};

renderSidebar();
renderMain();
})();

</script>
